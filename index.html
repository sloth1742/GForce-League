<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');

:root, html, :root {
  --color-background-primary: #13151c;
  --color-background-secondary: #1a1d27;
  --color-background-tertiary: #0e1016;
  --color-background-info: #1e3a5f;
  --color-background-success: #1e3a2f;
  --color-background-danger: #3e1e24;
  --color-background-warning: #3e331e;
  --color-text-primary: #e8eaed;
  --color-text-secondary: #a8b0bd;
  --color-text-tertiary: #6b7280;
  --color-text-info: #7ab8ff;
  --color-text-success: #6bd994;
  --color-text-danger: #ff7788;
  --color-text-warning: #f5c547;
  --color-border-primary: rgba(255,255,255,0.18);
  --color-border-secondary: rgba(255,255,255,0.12);
  --color-border-tertiary: rgba(255,255,255,0.08);
  --color-border-info: #7ab8ff;
  --color-border-danger: #ff7788;
  --color-border-success: #6bd994;
  --border-radius-sm: 6px;
  --border-radius-md: 10px;
  --border-radius-lg: 14px;
  --border-radius-xl: 20px;
  --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-display: 'Space Grotesk', 'Inter', sans-serif;
  --font-mono: 'JetBrains Mono', 'Courier New', monospace;
}

body {
  background: var(--color-background-tertiary) !important;
  color: var(--color-text-primary);
  font-family: var(--font-sans);
  margin: 0;
  padding: 0;
}

#gforce-root {
  max-width: 1200px;
  margin: 0 auto;
  padding: 2rem 1.5rem;
}

#gforce-app * {
  box-sizing: border-box;
}

#gforce-app h1, #gforce-app h2, #gforce-app h3 {
  font-family: var(--font-display);
  letter-spacing: -0.02em;
}

#gforce-app table {
  border-collapse: collapse;
  width: 100%;
}

#gforce-app button {
  font-family: var(--font-sans);
  background: var(--color-background-secondary);
  color: var(--color-text-primary);
  border: 0.5px solid var(--color-border-secondary);
  padding: 8px 14px;
  border-radius: var(--border-radius-md);
  cursor: pointer;
  transition: all 0.15s;
  font-size: 13px;
}
#gforce-app button:hover {
  background: var(--color-background-primary);
  border-color: var(--color-border-primary);
}

#gforce-app select, #gforce-app input {
  font-family: var(--font-sans);
  background: var(--color-background-secondary);
  color: var(--color-text-primary);
  border: 0.5px solid var(--color-border-secondary);
  padding: 7px 10px;
  border-radius: var(--border-radius-md);
  font-size: 13px;
  transition: border-color 0.15s;
}
#gforce-app select:focus, #gforce-app input:focus {
  outline: none;
  border-color: var(--color-border-info);
}

#gforce-app ::-webkit-scrollbar {
  width: 10px;
  height: 10px;
}
#gforce-app ::-webkit-scrollbar-track {
  background: var(--color-background-tertiary);
}
#gforce-app ::-webkit-scrollbar-thumb {
  background: var(--color-background-secondary);
  border-radius: 5px;
}
#gforce-app ::-webkit-scrollbar-thumb:hover {
  background: var(--color-border-secondary);
}
</style>

<div id="gforce-root">
<div id="gforce-app"></div>
</div>

function decompressData(b64) {
  const binary = atob(b64);
  const bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  const decompressed = pako.ungzip(bytes, { to: 'string' });
  return JSON.parse(decompressed);
}

function decode(rows, keys) {
  return rows.map(r => {
    const o = {};
    keys.forEach((k, i) => { o[k] = r[i]; });
    // Use pre-built gid if present, otherwise construct from wk/m/g
    if (!o.gid) {
      o.gid = 'W' + String(o.wk).padStart(2,'0') + '-M' + String(o.m).padStart(2,'0') + '-G' + o.g;
    }
    return o;
  });
}

function decodeAll(raw) {
  return {
    gameLog: decode(raw.gl, GL_KEYS),
    moveLog: decode(raw.ml, ML_KEYS),
    turnLog: decode(raw.tl, TL_KEYS),
    roster: raw.rs.map(r => ({ coach: r[0], mon: r[1], status: r[2] }))
  };
}
// ── coachStats ────────────────────────────────────────────────────────────────
function coachStats(gameLog) {
  const stats = {};
  COACHES.forEach(c => {
    stats[c] = {
      coach: c, gp: 0, gw: 0, gl: 0, kills: 0, deaths: 0, dmg: 0, sw: 0,
      abil: 0, item: 0, cp: 0, cm: 0, teras: 0, sp: 0,
      gids: new Set(), gwGids: new Set(),
      seriesWon: new Set(), seriesLost: new Set(), seriesPlayed: new Set(),
      leaguePoints: 0, plusMinus: 0,
    };
  });

  const seriesMap = {};
  gameLog.forEach(r => {
    const s = stats[r.coach]; if (!s) return;
    s.kills += (r.kd||0)+(r.ki||0); s.deaths += r.d||0;
    s.dmg += r.dout||0; s.sw += r.sw||0;
    s.abil += r.abil||0; s.item += r.item||0;
    s.cp += r.cp||0; s.cm += r.cm||0; s.teras += r.tera||0;
    if (!s.gids.has(r.gid)) {
      s.gids.add(r.gid);
      s.gp++;
      if (r.won) { s.gw++; s.gwGids.add(r.gid); } else s.gl++;
    } else {
      if (r.won) s.gwGids.add(r.gid);
    }
    const sid = 'W'+r.wk+'-M'+r.m;
    if (!seriesMap[sid]) seriesMap[sid] = {};
    if (!seriesMap[sid][r.coach]) seriesMap[sid][r.coach] = {gids:new Set(), gwGids:new Set(), opp:r.opp};
    seriesMap[sid][r.coach].gids.add(r.gid);
    if (r.won) seriesMap[sid][r.coach].gwGids.add(r.gid);
  });

  Object.entries(seriesMap).forEach(([sid, coaches]) => {
    const arr = Object.entries(coaches);
    if (arr.length !== 2) return;
    const [[cA, sA],[cB, sB]] = arr;
    const aW = sA.gwGids.size, aL = sA.gids.size - sA.gwGids.size;
    const bW = sB.gwGids.size, bL = sB.gids.size - sB.gwGids.size;
    [cA,cB].forEach(c => { if (stats[c]) { stats[c].seriesPlayed.add(sid); stats[c].sp++; } });
    const aWon = aW > bW, bWon = bW > aW;
    const sw = aWon ? cA : bWon ? cB : null;
    const sl = aWon ? cB : bWon ? cA : null;
    const [wW, wL] = aWon ? [aW, aL] : [bW, bL];
    if (sw && stats[sw]) {
      stats[sw].seriesWon.add(sid);
      if (wW===2&&wL===0) stats[sw].leaguePoints += 3;
      else if (wW===2&&wL===1) stats[sw].leaguePoints += 2;
    }
    if (sl && stats[sl]) {
      stats[sl].seriesLost.add(sid);
      const lW = aWon ? bW : aW;
      if (lW===1) stats[sl].leaguePoints += 1;
    }
  });

  function h2hResult(coachA, coachB) {
    const gids = new Set();
    gameLog.forEach(r => { if (r.coach===coachA && r.opp===coachB) gids.add(r.gid); });
    if (!gids.size) return 0;
    const winners = {};
    gameLog.forEach(r => { if (gids.has(r.gid) && r.won && !winners[r.gid]) winners[r.gid]=r.coach; });
    const aW = Object.values(winners).filter(w=>w===coachA).length;
    const bW = Object.values(winners).filter(w=>w===coachB).length;
    return aW - bW;
  }

  Object.values(stats).forEach(s => {
    s.uniqueGames = s.gids.size;
    s.sw_series = s.seriesWon.size;
    s.sl_series = s.seriesLost.size;
    s.winPct = s.gp > 0 ? s.gw/s.gp : 0;
    s.kdr = s.deaths > 0 ? s.kills/s.deaths : s.kills;
    s.dmgPerGame = s.uniqueGames > 0 ? s.dmg/s.uniqueGames : 0;
    s.swPerGame = s.uniqueGames > 0 ? s.sw/s.uniqueGames : 0;
    s.plusMinus = s.gw - s.gl;
    s.gids = undefined; s.gwGids = undefined;
    s.seriesPlayed = undefined; s.seriesWon = undefined; s.seriesLost = undefined;
  });

  const ranked = Object.values(stats).sort((a,b) => {
    if (b.sw_series !== a.sw_series) return b.sw_series - a.sw_series;
    if (b.leaguePoints !== a.leaguePoints) return b.leaguePoints - a.leaguePoints;
    if (b.plusMinus !== a.plusMinus) return b.plusMinus - a.plusMinus;
    const h2h = h2hResult(b.coach, a.coach);
    if (h2h !== 0) return h2h;
    if (b.kills !== a.kills) return b.kills - a.kills;
    return a.coach.localeCompare(b.coach);
  });
  ranked.forEach((s,i) => { s.rank = i+1; });
  return stats;
}

// ── monStats ──────────────────────────────────────────────────────────────────
function monStats(gameLog) {
  const stats = {};
  gameLog.forEach(r => {
    const key = r.coach+'|'+r.mon;
    if (!stats[key]) stats[key] = {
      coach:r.coach, mon:r.mon, gp:0, gw:0, kd:0, ki:0, tk:0,
      deaths:0, dout:0, din:0, sw:0, teras:0, leads:0,
      cp:0, cm:0, moves:0, abil:0, item:0, ta:0,
    };
    const s = stats[key];
    s.gp++; if (r.won) s.gw++;
    s.kd += r.kd||0; s.ki += r.ki||0; s.tk += (r.kd||0)+(r.ki||0);
    s.deaths += r.d||0; s.dout += r.dout||0; s.din += r.din||0;
    s.sw += r.sw||0; s.teras += r.tera||0; s.leads += r.lead||0;
    s.cp += r.cp||0; s.cm += r.cm||0; s.moves += r.moves||0;
    s.abil += r.abil||0; s.item += r.item||0; s.ta += r.ta||0;
  });
  Object.values(stats).forEach(s => {
    s.winPct = s.gp>0 ? s.gw/s.gp : 0;
    s.kdr = s.deaths>0 ? s.tk/s.deaths : s.tk;
    s.dmgPerGame = s.gp>0 ? s.dout/s.gp : 0;
    s.dmgPerTurn = s.ta>0 ? s.dout/s.ta : 0;
    s.mvp = s.tk*3 + s.deaths*-1 + s.gw*2 + s.teras*1;
  });
  return stats;
}

// ── Carry Score ───────────────────────────────────────────────────────────────
function computeCarryScore(gameLog, coach) {
  const cgl = gameLog.filter(r => r.coach === coach);
  const monScores = {};
  cgl.forEach(r => {
    if (!monScores[r.mon]) monScores[r.mon] = {mon:r.mon, tk:0, dout:0};
    monScores[r.mon].tk += (r.kd||0)+(r.ki||0);
    monScores[r.mon].dout += r.dout||0;
  });
  const total = Object.values(monScores).reduce((s,m) => s + m.tk*3 + m.dout/10, 0);
  if (!total) return {mon:'—', pct:0};
  const top = Object.values(monScores).sort((a,b)=>(b.tk*3+b.dout/10)-(a.tk*3+a.dout/10))[0];
  return {mon:top.mon, pct:Math.round((top.tk*3+top.dout/10)/total*100)};
}

// ── Weekly Recap ──────────────────────────────────────────────────────────────
function computeWeeklyRecap(gameLog, moveLog, turnLog, targetWk) {
  const weekMatches = {};
  gameLog.forEach(r => {
    if (!weekMatches[r.wk]) weekMatches[r.wk] = new Set();
    weekMatches[r.wk].add(r.m);
  });
  const completeWeeks = Object.entries(weekMatches)
    .filter(([wk, matches]) => matches.size >= 6)
    .map(([wk]) => parseInt(wk))
    .sort((a,b)=>b-a);
  if (!completeWeeks.length) return null;
  const wk = targetWk && completeWeeks.includes(targetWk) ? targetWk : completeWeeks[0];

  const wgl = gameLog.filter(r=>r.wk===wk);
  const wml = moveLog.filter(r=>r.wk===wk);
  const wtl = turnLog.filter(r=>r.wk===wk);

  const series = {};
  wgl.forEach(r => {
    const sid = 'M'+r.m;
    if (!series[sid]) series[sid] = {m:r.m, opp:{}, gameWinners:{}};
    if (!series[sid].opp[r.coach]) series[sid].opp[r.coach] = r.opp;
    if (r.won && !series[sid].gameWinners[r.gid]) series[sid].gameWinners[r.gid] = r.coach;
  });

  const results = Object.values(series).map(s => {
    const coaches = Object.keys(s.opp);
    if (coaches.length !== 2) return null;
    const [cA, cB] = coaches;
    const gameResults = Object.values(s.gameWinners);
    const aW = gameResults.filter(w=>w===cA).length;
    const bW = gameResults.filter(w=>w===cB).length;
    const winner = aW >= bW ? cA : cB;
    const loser  = aW >= bW ? cB : cA;
    const wScore = Math.max(aW, bW);
    const lScore = Math.min(aW, bW);
    const swept = wScore===2 && lScore===0;
    return {m:s.m, winner, loser, wScore, lScore, swept};
  }).filter(x=>x).sort((a,b)=>a.m-b.m);

  const monScores = {};
  wgl.forEach(r=>{
    const k=r.coach+'|'+r.mon;
    if(!monScores[k]) monScores[k]={coach:r.coach,mon:r.mon,tk:0,dout:0,gw:0,gp:0};
    monScores[k].tk+=(r.kd||0)+(r.ki||0);
    monScores[k].dout+=r.dout||0;
    monScores[k].gp++;
    if(r.won) monScores[k].gw++;
  });
  const weekMVP = Object.values(monScores).sort((a,b)=>(b.tk*3+b.gw*2+b.dout/20)-(a.tk*3+a.gw*2+a.dout/20))[0];

  const standings = coachStats(gameLog);
  let biggestUpset = null;
  results.forEach(res => {
    const winnerRank = standings[res.winner]?.rank || 99;
    const loserRank  = standings[res.loser]?.rank  || 99;
    if (winnerRank > loserRank) {
      if (!biggestUpset || (winnerRank - loserRank) > ((standings[biggestUpset.winner]?.rank||0)-(standings[biggestUpset.loser]?.rank||0))) {
        biggestUpset = res;
      }
    }
  });

  const mostDominant = results.reduce((best, r) => {
    const diff = r.wScore - r.lScore;
    return (!best || diff > (best.wScore-best.lScore)) ? r : best;
  }, null);

  const closestSeries = results.filter(r=>r.lScore===1);

  return { wk, results, weekMVP, biggestUpset, mostDominant, closestSeries, wgl, wml, wtl };
}

// ── Pivot helpers ─────────────────────────────────────────────────────────────
function monMoveStats(moveLog, coach, mon) {
  const moves = {};
  moveLog.filter(r => r.coach === coach && r.mon === mon).forEach(r => {
    if (!moves[r.move]) moves[r.move] = {move:r.move, uses:0, dmg:0, avg:0};
    moves[r.move].uses += r.uses||0;
    moves[r.move].dmg += r.dmg||0;
  });
  return Object.values(moves).sort((a,b)=>b.uses-a.uses);
}

function pivotGameStats(gameLog, config) {
  const { metric, groupBy, filters } = config;
  const filtered = gameLog.filter(r => {
    if (filters.coach && r.coach !== filters.coach) return false;
    if (filters.opp && r.opp !== filters.opp) return false;
    if (filters.week && r.wk !== parseInt(filters.week)) return false;
    if (filters.teraOnly === 'yes' && !r.tera) return false;
    if (filters.teraOnly === 'no' && r.tera) return false;
    if (filters.leadOnly === 'yes' && !r.lead) return false;
    if (filters.leadOnly === 'no' && r.lead) return false;
    if (filters.wonOnly === 'yes' && !r.won) return false;
    if (filters.wonOnly === 'no' && r.won) return false;
    return true;
  });
  const groups = {};
  filtered.forEach(r => {
    const key = groupBy === 'coach' ? r.coach : groupBy === 'mon' ? r.coach+'|'+r.mon : r.coach+'|'+r.opp;
    if (!groups[key]) groups[key] = {coach:r.coach, mon:r.mon, opp:r.opp, gp:0, gw:0, dout:0, din:0, tk:0, deaths:0, ta:0};
    const g = groups[key];
    g.gp++; if (r.won) g.gw++;
    g.dout+=r.dout||0; g.din+=r.din||0;
    g.tk+=(r.kd||0)+(r.ki||0); g.deaths+=r.d||0; g.ta+=r.ta||0;
  });
  return Object.values(groups).map(g => {
    g.winPct = g.gp>0?g.gw/g.gp:0;
    g.kdr = g.deaths>0?g.tk/g.deaths:g.tk;
    g.dmgPerGame = g.gp>0?g.dout/g.gp:0;
    g.dmgPerTurn = g.ta>0?g.dout/g.ta:0;
    if (metric==='dout') g.value=g.dout;
    else if (metric==='din') g.value=g.din;
    else if (metric==='tk') g.value=g.tk;
    else if (metric==='deaths') g.value=g.deaths;
    else if (metric==='kdr') g.value=g.kdr;
    else if (metric==='winPct') g.value=g.winPct;
    else if (metric==='dmgPerGame') g.value=g.dmgPerGame;
    else if (metric==='dmgPerTurn') g.value=g.dmgPerTurn;
    else g.value=g.gp;
    return g;
  }).filter(g=>g.gp>=(config.minGP||1)).sort((a,b)=>b.value-a.value);
}

function pivotEventStats(turnLog, gameLog, config) {
  const { event, outcome, groupBy, filters, statusType } = config;
  const gidSet = new Set(gameLog.filter(r => {
    if (filters.coach && r.coach !== filters.coach) return false;
    if (filters.week && r.wk !== parseInt(filters.week)) return false;
    return true;
  }).map(r=>r.gid));
  const filtered = turnLog.filter(r => {
    if (!gidSet.has(r.gid)) return false;
    if (event !== 'ALL' && r.event !== event) return false;
    if (outcome && outcome !== 'All' && r.outcome !== outcome) return false;
    if (statusType && statusType !== 'All' && event==='STATUS' && r.detail !== statusType) return false;
    if (filters.coach && r.coach !== filters.coach) return false;
    return true;
  });
  const groups = {};
  filtered.forEach(r => {
    const key = groupBy === 'coach' ? r.coach : r.coach+'|'+r.mon;
    if (!groups[key]) groups[key] = {coach:r.coach, mon:r.mon, count:0};
    groups[key].count++;
  });
  return Object.values(groups).sort((a,b)=>b.count-a.count);
}

const el = (tag, attrs, children) => {
  const e = document.createElement(tag);
  if (attrs) for (const k in attrs) {
    if (k === 'style') Object.assign(e.style, attrs[k]);
    else if (k === 'onclick') e.onclick = attrs[k];
    else if (k === 'onchange') e.onchange = attrs[k];
    else if (k === 'oninput') e.oninput = attrs[k];
    else if (k === 'onmouseover') e.onmouseover = attrs[k];
    else if (k === 'onmouseout') e.onmouseout = attrs[k];
    else if (k === 'html') e.innerHTML = attrs[k];
    else if (k === 'value') { e.setAttribute(k, attrs[k]); e.value = attrs[k]; }
    else e.setAttribute(k, attrs[k]);
  }
  if (children) {
    if (!Array.isArray(children)) children = [children];
    children.forEach(c => {
      if (c == null) return;
      if (typeof c === 'string' || typeof c === 'number') e.appendChild(document.createTextNode(c));
      else e.appendChild(c);
    });
  }
  return e;
};

      padding:7px 11px;font-size:12px;line-height:1.4;
      color:var(--color-text-secondary);
      box-shadow:0 4px 20px rgba(0,0,0,0.35);
      max-width:260px;opacity:0;transition:opacity 0.12s;
    `;
    document.body.appendChild(_tooltipEl);
  }
  return _tooltipEl;
}

function showTooltip(text, e) {
  const tip = getTooltip();
  tip.textContent = text;
  tip.style.opacity = '1';
  positionTooltip(e);
}

function positionTooltip(e) {
  const tip = getTooltip();
  const x = e.clientX + 14;
  const y = e.clientY - 10;
  const tw = tip.offsetWidth || 200;
  const th = tip.offsetHeight || 40;
  tip.style.left = (x + tw > window.innerWidth - 8 ? x - tw - 20 : x) + 'px';
  tip.style.top  = (y + th > window.innerHeight - 8 ? y - th - 4 : y) + 'px';
}

function hideTooltip() {
  getTooltip().style.opacity = '0';
}

// Wrap any element with tooltip behaviour
function withTooltip(el, text) {
  if (!text) return el;
  el.style.cursor = 'help';
  el.addEventListener('mouseenter', (e) => showTooltip(text, e));
  el.addEventListener('mousemove',  (e) => positionTooltip(e));
  el.addEventListener('mouseleave', () => hideTooltip());
  return el;
}

// Wrap a stat label string → returns a span with tooltip if known
function statLabel(label, overrideText) {
  const tipText = overrideText || TOOLTIPS[label];
  const span = document.createElement('span');
  span.textContent = label;
  if (tipText) {
    span.style.borderBottom = '1px dashed var(--color-text-tertiary)';
    withTooltip(span, tipText);
  }
  return span;
}

const POKEAPI_BASE = 'https://pokeapi.co/api/v2';

const POKEAPI_SLUG_MAP = {
  'Alolan Muk': 'muk-alola',
  'Alolan Ninetales': 'ninetales-alola',
  'Alolan Raichu': 'raichu-alola',
  'Basculegion': 'basculegion-male',
  'Galarian Weezing': 'weezing-galar',
  'Hisuian Arcanine': 'arcanine-hisui',
  'Hisuian Avalugg': 'avalugg-hisui',
  'Hisuian Braviary': 'braviary-hisui',
  'Hisuian Decidueye': 'decidueye-hisui',
  'Hisuian Goodra': 'goodra-hisui',
  'Hisuian Lilligant': 'lilligant-hisui',
  'Hisuian Sliggoo': 'sliggoo-hisui',
  'Hisuian Typhlosion': 'typhlosion-hisui',
  'Hisuian Zoroark': 'zoroark-hisui',
  'Indeedee-Female': 'indeedee-f',
  'Minior': 'minior-red-meteor',
  'Oricorio': 'oricorio-baile',
  'Oricorio-Sensu': 'oricorio-sensu',
  'Palafin': 'palafin-zero',
  'Paldean Tauros Blaze': 'tauros-paldea-blaze-breed',
  'Squawkabilly': 'squawkabilly-green-plumage',
  'Tatsugiri': 'tatsugiri-curly',
  'Toxtricity': 'toxtricity-amped',
};

// In-session cache
const POKEAPI_CACHE = {};

function monToSlug(name) {
  if (POKEAPI_SLUG_MAP[name]) return POKEAPI_SLUG_MAP[name];
  return name.toLowerCase().replace(/\s+/g,'-').replace(/['.]/g,'');
}

async function fetchPokeData(monName) {
  const slug = monToSlug(monName);
  if (POKEAPI_CACHE[slug]) return POKEAPI_CACHE[slug];
  try {
    const [pokeRes, specRes] = await Promise.all([
      fetch(`${POKEAPI_BASE}/pokemon/${slug}`),
      fetch(`${POKEAPI_BASE}/pokemon-species/${slug.replace(/-[a-z]+$/, '').replace(/-\d+$/, '') || slug}`)
        .catch(() => null)
    ]);
    if (!pokeRes.ok) throw new Error(`${pokeRes.status} for ${slug}`);
    const poke = await pokeRes.json();
    const spec = specRes && specRes.ok ? await specRes.json() : null;

    // Parse what we need
    const data = {
      name: monName,
      slug,
      id: poke.id,
      types: poke.types.map(t => t.type.name),
      stats: Object.fromEntries(poke.stats.map(s => [s.stat.name, s.base_stat])),
      abilities: poke.abilities.map(a => ({
        name: a.ability.name,
        url: a.ability.url,
        isHidden: a.is_hidden,
        displayName: a.ability.name.replace(/-/g,' ').replace(/\b\w/g,c=>c.toUpperCase()),
        description: null, // fetched lazily
      })),
      // S/V learnset: filter moves learned in scarlet-violet
      moves: poke.moves
        .filter(m => m.version_group_details.some(v =>
          v.version_group.name === 'scarlet-violet' &&
          (v.move_learn_method.name === 'level-up' || v.move_learn_method.name === 'machine')
        ))
        .map(m => ({
          name: m.move.name,
          url: m.move.url,
          displayName: m.move.name.replace(/-/g,' ').replace(/\b\w/g,c=>c.toUpperCase()),
          learnMethod: m.version_group_details.find(v=>v.version_group.name==='scarlet-violet')?.move_learn_method.name,
          levelLearnedAt: m.version_group_details.find(v=>v.version_group.name==='scarlet-violet' && v.move_learn_method.name==='level-up')?.level_learned_at || null,
          detail: null, // fetched lazily
        }))
        .sort((a,b) => {
          if (a.learnMethod === 'level-up' && b.learnMethod !== 'level-up') return -1;
          if (b.learnMethod === 'level-up' && a.learnMethod !== 'level-up') return 1;
          return (a.levelLearnedAt||999) - (b.levelLearnedAt||999) || a.displayName.localeCompare(b.displayName);
        }),
    };
    POKEAPI_CACHE[slug] = data;
    return data;
  } catch(e) {
    POKEAPI_CACHE[slug] = {error: e.message, slug};
    return POKEAPI_CACHE[slug];
  }
}

async function fetchMoveDetail(moveUrl) {
  try {
    const res = await fetch(moveUrl);
    if (!res.ok) return null;
    const m = await res.json();
    const effectEntry = m.effect_entries?.find(e=>e.language.name==='en');
    return {
      type: m.type?.name || '?',
      category: m.damage_class?.name || '?',
      power: m.power,
      accuracy: m.accuracy,
      pp: m.pp,
      effect: effectEntry?.short_effect || '',
    };
  } catch { return null; }
}

async function fetchAbilityDetail(abilityUrl) {
  try {
    const res = await fetch(abilityUrl);
    if (!res.ok) return null;
    const a = await res.json();
    const entry = a.effect_entries?.find(e=>e.language.name==='en');
    return entry?.short_effect || entry?.effect || '';
  } catch { return null; }
}

function renderWeeklyRecap(state) {
  const { data } = state;

  // Week selector — find all complete weeks
  const weekMatches = {};
  data.gameLog.forEach(r => {
    if (!weekMatches[r.wk]) weekMatches[r.wk] = new Set();
    weekMatches[r.wk].add(r.m);
  });
  const completeWeeks = Object.entries(weekMatches)
    .filter(([, m]) => m.size >= 6)
    .map(([wk]) => parseInt(wk))
    .sort((a,b) => a - b);

  const maxWk = completeWeeks.length ? Math.max(...completeWeeks) : 0;
  const selectedWk = state.standings.recapWeek && completeWeeks.includes(state.standings.recapWeek)
    ? state.standings.recapWeek : maxWk;

  const weekSelector = completeWeeks.length > 1 ? el('div', {
    style: { display:'flex', alignItems:'center', gap:'8px', marginBottom:'1rem', flexWrap:'wrap' }

      }
    },[
      el('div',{style:{fontSize:'10px',color:'var(--color-text-tertiary)',textTransform:'uppercase',letterSpacing:'0.6px',marginBottom:'10px'}},'⭐ Week MVP'),
      el('div',{style:{display:'flex',alignItems:'center',gap:'10px'}},[
        monSprite(weekMVP.mon,40),
        el('div',{},[
          el('div',{style:{fontWeight:'600',fontSize:'13px'}},weekMVP.mon),
          el('div',{style:{marginTop:'4px'}},coachBadge(weekMVP.coach))
        ])
      ]),
      el('div',{style:{marginTop:'10px',fontFamily:'var(--font-display)',fontWeight:'700',fontSize:'20px',color:c}},
        weekMVP.tk+'K  '+weekMVP.gw+'W  '+Math.round(weekMVP.dout)+'%dmg')
    ]));
  }

  if (biggestUpset) {
    const c = COACH_COLORS[biggestUpset.winner]||'#888';
    highlights.push(el('div',{
      onclick:()=>{state.h2h.c1=biggestUpset.winner;state.h2h.c2=biggestUpset.loser;state.view='h2h';render(state);},
      style:{
        padding:'16px',background:'var(--color-background-secondary)',
        border:'0.5px solid var(--color-border-tertiary)',borderRadius:'var(--border-radius-lg)',
        cursor:'pointer',flex:'1',minWidth:'180px'
      }
    },[
      el('div',{style:{fontSize:'10px',color:'var(--color-text-tertiary)',textTransform:'uppercase',letterSpacing:'0.6px',marginBottom:'10px'}},'💥 Biggest Upset'),
      el('div',{style:{display:'flex',alignItems:'center',gap:'8px',flexWrap:'wrap'}},[
        coachBadge(biggestUpset.winner),
        el('span',{style:{fontWeight:'700',color:c}},biggestUpset.wScore+'-'+biggestUpset.lScore),
        coachBadge(biggestUpset.loser)
      ]),
      el('div',{style:{marginTop:'8px',fontSize:'12px',color:'var(--color-text-tertiary)'}},
        biggestUpset.winner+' took down the higher seed')
    ]));
  }

  if (closestSeries.length > 0) {
    const cs = closestSeries[0];
    highlights.push(el('div',{
      onclick:()=>{state.h2h.c1=cs.winner;state.h2h.c2=cs.loser;state.view='h2h';render(state);},
      style:{
        padding:'16px',background:'var(--color-background-secondary)',
        border:'0.5px solid var(--color-border-tertiary)',borderRadius:'var(--border-radius-lg)',
        cursor:'pointer',flex:'1',minWidth:'180px'
      }
    },[
      el('div',{style:{fontSize:'10px',color:'var(--color-text-tertiary)',textTransform:'uppercase',letterSpacing:'0.6px',marginBottom:'10px'}},'🎲 War of Attrition'),
      el('div',{style:{display:'flex',alignItems:'center',gap:'8px',flexWrap:'wrap'}},[
        coachBadge(cs.winner),
        el('span',{style:{fontWeight:'700'}},'2-1'),
        coachBadge(cs.loser)
      ]),
      el('div',{style:{marginTop:'8px',fontSize:'12px',color:'var(--color-text-tertiary)'}},'Went the distance — 3 games played')
    ]));
  }

  // More weekly superlatives
  const wekMons = monStats(wgl);
  const allWekMons = Object.values(wekMons);
  const topKiller = allWekMons.sort((a,b)=>b.tk-a.tk)[0];
  const topDmg    = allWekMons.slice().sort((a,b)=>b.dout-a.dout)[0];


  // Highlight card builder
  const mkHL = (icon, label, coach, mon, val, clickFn) => {
    const c = COACH_COLORS[coach]||'#888';
    const card = el('div',{
      onclick: clickFn,
      style:{ padding:'14px 16px', background:'var(--color-background-secondary)', border:'0.5px solid var(--color-border-tertiary)', borderRadius:'var(--border-radius-lg)', cursor:'pointer', flex:'1', minWidth:'160px' }
    },[
      el('div',{style:{fontSize:'10px',color:'var(--color-text-tertiary)',textTransform:'uppercase',letterSpacing:'0.6px',marginBottom:'8px'}},icon+' '+label),
      el('div',{style:{display:'flex',alignItems:'center',gap:'8px',marginBottom:'6px'}},[
        monSprite(mon,32),
        el('div',{},[
          el('div',{style:{fontWeight:'600',fontSize:'12px'}},mon),
          el('div',{style:{marginTop:'3px'}},coachBadge(coach))
        ])
      ]),
      el('div',{style:{fontFamily:'var(--font-display)',fontWeight:'700',fontSize:'17px',color:c}},val)
    ]);
    return card;
  };

  const extraHighlights = [
    topKiller && topKiller.tk>0 ? mkHL('⚔️','Top killer',topKiller.coach,topKiller.mon,topKiller.tk+' kills',()=>{state.mdd.coach=topKiller.coach;state.mdd.mon=topKiller.mon;state.view='mon';render(state);}) : null,
    topDmg ? mkHL('💥','Most damage',topDmg.coach,topDmg.mon,Math.round(topDmg.dout)+'%',()=>{state.mdd.coach=topDmg.coach;state.mdd.mon=topDmg.mon;state.view='mon';render(state);}) : null,
  ].filter(x=>x);

  // Results grid with proper Bo3 scores
  const resultCards = results.map(res => {
    const wColor = COACH_COLORS[res.winner]||'#888';
    const lColor = COACH_COLORS[res.loser]||'#888';
    const card = el('div',{
      onclick:()=>{state.h2h.c1=res.winner;state.h2h.c2=res.loser;state.view='h2h';render(state);},
      style:{
        display:'flex', alignItems:'center', gap:'10px',
        padding:'12px 16px',
        background:'var(--color-background-secondary)',
        border:'0.5px solid '+wColor+'40',
        borderRadius:'var(--border-radius-lg)',
        cursor:'pointer', transition:'all 0.15s'
      }
    },[
      el('div',{style:{flex:'1',minWidth:'0'}},coachBadge(res.winner)),
      el('div',{style:{textAlign:'center',flexShrink:'0'}},[
        el('div',{style:{display:'flex',alignItems:'center',gap:'6px'}},[
          el('span',{style:{fontFamily:'var(--font-display)',fontWeight:'700',fontSize:'18px',color:wColor}},String(res.wScore)),
          el('span',{style:{color:'var(--color-text-tertiary)',fontSize:'14px'}},'-'),
          el('span',{style:{fontFamily:'var(--font-display)',fontWeight:'700',fontSize:'18px',color:'var(--color-text-tertiary)'}},String(res.lScore)),
        ]),
        res.swept?el('div',{style:{fontSize:'9px',color:'var(--color-text-tertiary)',textTransform:'uppercase',letterSpacing:'0.5px'}},'sweep'):
        el('div',{style:{fontSize:'9px',color:'var(--color-text-tertiary)',textTransform:'uppercase',letterSpacing:'0.5px'}},'Bo3')
      ]),
      el('div',{style:{flex:'1',minWidth:'0',display:'flex',justifyContent:'flex-end'}},coachBadge(res.loser))
    ]);
    card.onmouseover=()=>{card.style.borderColor=wColor+'80';};
    card.onmouseout=()=>{card.style.borderColor=wColor+'40';};
    return card;
  });

  return el('div',{},[
    weekSelector,
    section('Week '+wk+' Recap', (selectedWk < maxWk ? 'Historical recap' : 'Most recently completed week')+' — all results and standouts',
      el('div',{},[
        highlights.length>0?el('div',{style:{display:'flex',gap:'10px',flexWrap:'wrap',padding:'16px 20px 8px'}},highlights):null,
        extraHighlights.length>0?el('div',{style:{display:'flex',gap:'10px',flexWrap:'wrap',padding:'0 20px 8px'}},extraHighlights):null,
        el('div',{style:{padding:'4px 20px 4px'}},[
          el('div',{style:{fontSize:'11px',fontWeight:'600',color:'var(--color-text-tertiary)',textTransform:'uppercase',letterSpacing:'0.6px',marginBottom:'10px'}},'All results')
        ]),
        el('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(260px,1fr))',gap:'8px',padding:'0 20px 20px'}},resultCards)
      ])
    )
  ]);
}

// ── Leaderboard ────────────────────────────────────────────────────────────────
function viewLeaderboard(state) {
  const { data } = state;
  const { lb } = state;

  // Sort key and direction
  const sortKey = lb.sortKey || 'mvp';
  const sortDir = lb.sortDir || 'desc';
  const minGP = parseInt(lb.minGP) || 1;

  const mons = monStats(data.gameLog);
  const filtered = Object.values(mons)
    .filter(m => lb.filterCoach === 'All' || m.coach === lb.filterCoach)
    .filter(m => m.gp >= minGP)
    .sort((a, b) => {
      const av = a[sortKey] ?? 0, bv = b[sortKey] ?? 0;
      return sortDir === 'desc' ? bv - av : av - bv;
    })
    .slice(0, 80);

  const controls = el('div', {
    style: { display:'flex', gap:'12px', marginBottom:'1.25rem', flexWrap:'wrap', alignItems:'center' }
  }, [
    el('label', { style:{ fontSize:'12px', color:'var(--color-text-secondary)', textTransform:'uppercase', letterSpacing:'0.6px', fontWeight:'600' } }, 'Coach'),
    select(lb.filterCoach || 'All', ['All'].concat(COACHES), v => { state.lb.filterCoach = v; render(state); }),
    el('label', { style:{ fontSize:'12px', color:'var(--color-text-secondary)', textTransform:'uppercase', letterSpacing:'0.6px', fontWeight:'600' } }, 'Min GP'),
    el('input', {
      type:'number', value:String(minGP), min:'1', max:'20',
      style:{ width:'60px', padding:'6px 8px', borderRadius:'var(--border-radius-md)', border:'0.5px solid var(--color-border-secondary)', background:'var(--color-background-secondary)', color:'var(--color-text-primary)', fontSize:'13px' },
      oninput: (e) => { state.lb.minGP = Math.max(1, parseInt(e.target.value) || 1); render(state); }
    })
  ]);

  // Sortable column header
  const colHeader = (key, label, align, tipText) => {
    const active = sortKey === key;
    const arrow = active ? (sortDir === 'desc' ? ' ▼' : ' ▲') : '';
    const th = el('th', {
      onclick: () => {
        if (state.lb.sortKey === key) {
          state.lb.sortDir = state.lb.sortDir === 'desc' ? 'asc' : 'desc';
        } else {
          state.lb.sortKey = key;
          state.lb.sortDir = 'desc';
        }
        render(state);
      },
      style: {
        padding:'10px 12px', fontSize:'11px', fontWeight:'600',
        color: active ? 'var(--color-text-primary)' : 'var(--color-text-tertiary)',
        textTransform:'uppercase', letterSpacing:'0.6px',
        textAlign: align || 'right',
        cursor:'pointer', userSelect:'none', whiteSpace:'nowrap',
        background: active ? 'var(--color-background-secondary)' : 'var(--color-background-primary)',
        transition:'background 0.1s',
        borderBottom: active ? '2px solid var(--color-text-primary)' : '0.5px solid var(--color-border-tertiary)',
      }
    }, label + arrow);
    if (tipText) withTooltip(th, tipText);
    th.onmouseover = () => { if (!active) th.style.color = 'var(--color-text-secondary)'; };
    th.onmouseout  = () => { if (!active) th.style.color = 'var(--color-text-tertiary)'; };
    return th;
  };

  const rows = filtered.map((r, i) => [
    rankBadge(i + 1),
    el('span', { style:{ fontFamily:'var(--font-display)', fontWeight:'600', fontSize:'15px' } }, String(r.mvp)),
    monLink(r.coach, r.mon),
    coachBadge(r.coach),
    formatInt(r.gp),
    mono(r.gw + '-' + (r.gp - r.gw)),
    formatPct(r.winPct),
    formatInt(r.tk),
    formatInt(r.deaths),
    formatKDR(r.kdr),
    formatDmg(r.dout),
    formatInt(r.dmgPerGame) + '%',
    r.dmgPerTurn > 0 ? r.dmgPerTurn.toFixed(1) + '%' : '—',
  ]);

  // Custom table with sortable headers
  const thead = el('thead', {}, [
    el('tr', { style:{ background:'var(--color-background-primary)', position:'sticky', top:'0', zIndex:'2' } }, [
      colHeader('rank',       '#',          'left'),
      colHeader('mvp',        'MVP',        'right', TOOLTIPS['MVP']),
      colHeader('mon',        'Pokémon',    'left'),
      colHeader('coach',      'Coach',      'left'),
      colHeader('gp',         'GP',         'right', TOOLTIPS['GP']),
      colHeader('record',     'W-L',        'right', TOOLTIPS['W-L']),
      colHeader('winPct',     'Win%',       'right', TOOLTIPS['Win%']),
      colHeader('tk',         'K',          'right', TOOLTIPS['K']),
      colHeader('deaths',     'D',          'right', TOOLTIPS['D']),
      colHeader('kdr',        'K/D',        'right', TOOLTIPS['K/D']),
      colHeader('dout',       'Dmg',        'right', TOOLTIPS['Dmg']),
      colHeader('dmgPerGame', 'Dmg/G',      'right', TOOLTIPS['Dmg/G']),
      colHeader('dmgPerTurn', 'Dmg/T',      'right', TOOLTIPS['Dmg/T']),
    ])
  ]);

  const tbody = el('tbody', {}, rows.map(row => {
    return el('tr', { style:{ borderBottom:'0.5px solid var(--color-border-tertiary)', transition:'background 0.1s' } },
      row.map((cell, ci) => {
        const align = [0,2,3].includes(ci) ? 'left' : 'right';
        const td = el('td', { style:{ padding:'10px 12px', textAlign:align, fontSize:'13px' } });
        if (typeof cell === 'string' || typeof cell === 'number') td.textContent = String(cell);
        else if (cell) td.appendChild(cell);
        return td;
      })
    );
  }));

  const table = el('div', { style:{ overflowX:'auto' } }, [
    el('table', { style:{ width:'100%', borderCollapse:'collapse', fontSize:'13px' } }, [thead, tbody])
  ]);

  return el('div', {}, [
    controls,
    section('Pokémon Leaderboard', filtered.length + ' entries — click any column to sort',
      table
    )
  ]);
}// ── Head-to-head ──────────────────────────────────────────────────────────────
function viewHeadToHead(state) {
  const { data } = state;
  const c1 = state.h2h.c1, c2 = state.h2h.c2;

  const controls = el('div', {
    style: { display: 'flex', gap: '12px', marginBottom: '1.5rem', flexWrap: 'wrap', alignItems: 'center' }
  }, [
    el('label', { style: { fontSize: '12px', color: 'var(--color-text-secondary)', textTransform: 'uppercase', letterSpacing: '0.6px', fontWeight: '600' } }, 'Coach 1'),
    select(c1, COACHES, v => { state.h2h.c1 = v; render(state); }),
    el('label', { style: { fontSize: '12px', color: 'var(--color-text-secondary)', textTransform: 'uppercase', letterSpacing: '0.6px', fontWeight: '600' } }, 'Coach 2'),
    select(c2, COACHES.filter(c => c !== c1), v => { state.h2h.c2 = v; render(state); }),
  ]);

  if (c1 === c2) return el('div', {}, [controls, card(el('p', { style: { margin: '0', color: 'var(--color-text-secondary)' } }, 'Select two different coaches.'))]);

  const gl = data.gameLog;
  const gids = new Set();
  gl.forEach(r => { if (r.coach === c1 && r.opp === c2) gids.add(r.gid); });
  const games = Array.from(gids).sort();

  if (!games.length) return el('div', {}, [controls, card(el('p', { style: { margin: '0', color: 'var(--color-text-secondary)' } }, 'These coaches have not played yet.'))]);

  const h2hGl = gl.filter(r => gids.has(r.gid));
  const h2hMl = data.moveLog.filter(r => gids.has(r.gid));
  const h2hTl = data.turnLog.filter(r => gids.has(r.gid));

  const c1Rows = h2hGl.filter(r => r.coach === c1);
  const c2Rows = h2hGl.filter(r => r.coach === c2);

  // Game-level wins
  const gameWinners = {};
  h2hGl.forEach(r => { if (r.won && !gameWinners[r.gid]) gameWinners[r.gid] = r.coach; });
  const c1Wins = games.filter(g => gameWinners[g] === c1).length;
  const c2Wins = games.filter(g => gameWinners[g] === c2).length;

  // Overall stats
  const c1Kills = c1Rows.reduce((s, r) => s + (r.kd||0) + (r.ki||0), 0);
  const c2Kills = c2Rows.reduce((s, r) => s + (r.kd||0) + (r.ki||0), 0);
  const c1Dmg   = c1Rows.reduce((s, r) => s + (r.dout||0), 0);
  const c2Dmg   = c2Rows.reduce((s, r) => s + (r.dout||0), 0);

  const c1Color = COACH_COLORS[c1] || '#888';
  const c2Color = COACH_COLORS[c2] || '#888';

  // ── Scoreboard hero ──────────────────────────────────────────────────────
  const scoreboard = el('div', {
    style: {
      background: `linear-gradient(135deg, ${c1Color}15 0%, var(--color-background-primary) 50%, ${c2Color}15 100%)`,
      border: '0.5px solid var(--color-border-tertiary)',
      borderRadius: 'var(--border-radius-lg)',
      padding: '2rem', marginBottom: '1.25rem'
    }
  }, [
    el('div', {
      style: { display: 'grid', gridTemplateColumns: '1fr auto 1fr', alignItems: 'center', gap: '24px' }
    }, [
      // C1 side
      el('div', { style: { textAlign: 'center' } }, [
        el('div', { style: { marginBottom: '12px', display: 'flex', justifyContent: 'center' } }, coachBadge(c1, 'lg')),
        el('div', {
          style: { fontFamily: 'var(--font-display)', fontSize: '72px', fontWeight: '700', color: c1Wins > c2Wins ? c1Color : 'var(--color-text-primary)', lineHeight: '1', letterSpacing: '-0.04em' }
        }, String(c1Wins)),
      ]),
      // Center divider
      el('div', { style: { textAlign: 'center' } }, [
        el('div', { style: { fontSize: '32px', color: 'var(--color-text-tertiary)', fontWeight: '300', lineHeight: '1' } }, '—'),
        el('div', { style: { fontSize: '11px', color: 'var(--color-text-tertiary)', marginTop: '10px', textTransform: 'uppercase', letterSpacing: '0.8px', fontWeight: '600' } }, games.length + ' games'),
      ]),
      // C2 side
      el('div', { style: { textAlign: 'center' } }, [
        el('div', { style: { marginBottom: '12px', display: 'flex', justifyContent: 'center' } }, coachBadge(c2, 'lg')),
        el('div', {
          style: { fontFamily: 'var(--font-display)', fontSize: '72px', fontWeight: '700', color: c2Wins > c1Wins ? c2Color : 'var(--color-text-primary)', lineHeight: '1', letterSpacing: '-0.04em' }
        }, String(c2Wins)),
      ]),
    ]),
    // Team stats row
    el('div', {
      style: { display: 'grid', gridTemplateColumns: '1fr 1fr 1fr 1fr', gap: '0', marginTop: '24px', borderTop: '0.5px solid var(--color-border-tertiary)', paddingTop: '20px' }
    }, [
      el('div', { style: { textAlign: 'center', borderRight: '0.5px solid var(--color-border-tertiary)', padding: '0 16px' } }, [
        el('div', { style: { fontSize: '10px', color: 'var(--color-text-tertiary)', textTransform: 'uppercase', letterSpacing: '0.6px', fontWeight: '600', marginBottom: '6px' } }, c1 + ' kills'),
        el('div', { style: { fontFamily: 'var(--font-display)', fontSize: '24px', fontWeight: '700', color: c1Color } }, String(c1Kills)),
      ]),
      el('div', { style: { textAlign: 'center', borderRight: '0.5px solid var(--color-border-tertiary)', padding: '0 16px' } }, [
        el('div', { style: { fontSize: '10px', color: 'var(--color-text-tertiary)', textTransform: 'uppercase', letterSpacing: '0.6px', fontWeight: '600', marginBottom: '6px' } }, c1 + ' damage'),
        el('div', { style: { fontFamily: 'var(--font-display)', fontSize: '24px', fontWeight: '700', color: c1Color } }, formatInt(c1Dmg) + '%'),
      ]),
      el('div', { style: { textAlign: 'center', borderRight: '0.5px solid var(--color-border-tertiary)', padding: '0 16px' } }, [
        el('div', { style: { fontSize: '10px', color: 'var(--color-text-tertiary)', textTransform: 'uppercase', letterSpacing: '0.6px', fontWeight: '600', marginBottom: '6px' } }, c2 + ' kills'),
        el('div', { style: { fontFamily: 'var(--font-display)', fontSize: '24px', fontWeight: '700', color: c2Color } }, String(c2Kills)),
      ]),
      el('div', { style: { textAlign: 'center', padding: '0 16px' } }, [
        el('div', { style: { fontSize: '10px', color: 'var(--color-text-tertiary)', textTransform: 'uppercase', letterSpacing: '0.6px', fontWeight: '600', marginBottom: '6px' } }, c2 + ' damage'),
        el('div', { style: { fontFamily: 'var(--font-display)', fontSize: '24px', fontWeight: '700', color: c2Color } }, formatInt(c2Dmg) + '%'),
      ]),
    ])
  ]);

  // ── Highlights ───────────────────────────────────────────────────────────
  const monAgg = {};
  h2hGl.forEach(r => {
    const k = r.coach + '|' + r.mon;
    if (!monAgg[k]) monAgg[k] = { coach: r.coach, mon: r.mon, tk: 0, d: 0, dout: 0, gp: 0 };
    monAgg[k].tk += (r.kd||0) + (r.ki||0);
    monAgg[k].d  += r.d||0;
    monAgg[k].dout += r.dout||0;
    monAgg[k].gp++;
  });

  const moveAgg = {};
  h2hMl.forEach(r => {
    const k = r.coach + '|' + r.mon + '|' + r.move;
    if (!moveAgg[k]) moveAgg[k] = { coach: r.coach, mon: r.mon, move: r.move, uses: 0, dmg: 0 };
    moveAgg[k].uses += r.uses||0;
    moveAgg[k].dmg  += r.dmg||0;
  });

  const protectBlocks = {};
  h2hTl.forEach(r => {
    if (r.event === 'PROTECT' && r.outcome === 'BLOCKED' && r.coach && r.mon) {
      const k = r.coach + '|' + r.mon;
      if (!protectBlocks[k]) protectBlocks[k] = { coach: r.coach, mon: r.mon, count: 0 };
      protectBlocks[k].count++;
    }
  });

  const flinchAgg = {};
  h2hTl.forEach(r => {
    if (r.event === 'FLINCH' && r.coach && r.mon) {
      const k = r.coach + '|' + r.mon;
      if (!flinchAgg[k]) flinchAgg[k] = { coach: r.coach, mon: r.mon, count: 0 };
      flinchAgg[k].count++;
    }
  });

  const monArr  = Object.values(monAgg).sort((a,b) => b.tk - a.tk);
  const moveArr = Object.values(moveAgg).sort((a,b) => b.uses - a.uses);
  const topKiller   = monArr[0];
  const topDmg      = Object.values(monAgg).sort((a,b) => b.dout - a.dout)[0];
  const topMove     = moveArr[0];
  const topWall     = Object.values(protectBlocks).sort((a,b) => b.count - a.count)[0];
  const topFlincher = Object.values(flinchAgg).sort((a,b) => b.count - a.count)[0];

  const makeHighlight = (icon, label, coach, mon, valueLine, subLine) => {
    if (!mon) return null;
    const color = COACH_COLORS[coach] || '#888';
    const card = el('div', {
      onclick: () => { state.view = 'mon'; state.mdd.coach = coach; state.mdd.mon = mon; render(state); },
      style: {
        background: 'var(--color-background-secondary)', border: '0.5px solid var(--color-border-tertiary)',
        borderRadius: 'var(--border-radius-lg)', padding: '16px', cursor: 'pointer',
        transition: 'all 0.15s', position: 'relative'
      }
    }, [
      el('div', { style: { position: 'absolute', top: '12px', right: '12px', width: '28px', height: '28px', borderRadius: '50%', background: color + '25', color: color, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '15px' } }, icon),
      el('div', { style: { fontSize: '10px', color: 'var(--color-text-tertiary)', textTransform: 'uppercase', letterSpacing: '0.6px', fontWeight: '600', marginBottom: '10px', paddingRight: '32px' } }, label),
      el('div', { style: { display: 'flex', alignItems: 'center', gap: '10px', marginBottom: '6px' } }, [
        monSprite(mon, 40),
        el('div', {}, [
          el('div', { style: { fontWeight: '600', fontSize: '13px', lineHeight: '1.2' } }, mon),
          el('div', { style: { display: 'flex', justifyContent: 'flex-start', marginTop: '4px' } }, coachBadge(coach))
        ])
      ]),
      el('div', { style: { fontFamily: 'var(--font-display)', fontSize: '20px', fontWeight: '700', color, marginTop: '8px', letterSpacing: '-0.02em' } }, valueLine),
      subLine ? el('div', { style: { fontSize: '11px', color: 'var(--color-text-tertiary)', marginTop: '3px' } }, subLine) : null
    ].filter(x => x));
    card.onmouseover = () => { card.style.transform = 'translateY(-2px)'; card.style.borderColor = color + '60'; };
    card.onmouseout  = () => { card.style.transform = ''; card.style.borderColor = 'var(--color-border-tertiary)'; };
    return card;
  };

  const highlights = [
    topKiller && topKiller.tk > 0 ? makeHighlight('⚔️', 'Match MVP', topKiller.coach, topKiller.mon,
      topKiller.tk + ' kill' + (topKiller.tk !== 1 ? 's' : ''),
      formatInt(topKiller.dout) + '% damage  •  ' + topKiller.gp + ' game' + (topKiller.gp !== 1 ? 's' : '')) : null,
    topMove ? makeHighlight('📋', 'Signature move', topMove.coach, topMove.mon,
      topMove.move + ' ×' + topMove.uses, formatInt(topMove.dmg) + '% total damage') : null,
    topWall && topWall.count >= 2 ? makeHighlight('🛡️', 'The wall', topWall.coach, topWall.mon,
      topWall.count + ' protects blocked', 'hardest to get through') : null,
    topFlincher && topFlincher.count >= 1 ? makeHighlight('💥', 'Flinch machine', topFlincher.coach, topFlincher.mon,
      topFlincher.count + ' flinch' + (topFlincher.count !== 1 ? 'es' : '') + ' caused', 'disruption specialist') : null,
    topDmg && topDmg.mon !== topKiller?.mon ? makeHighlight('💢', 'Damage dealer', topDmg.coach, topDmg.mon,
      formatInt(topDmg.dout) + '% damage', formatInt(topDmg.dout / Math.max(1, topDmg.gp)) + '% per game') : null,
  ].filter(x => x).slice(0, 4);

  const highlightsSection = highlights.length > 0 ? section('Match highlights', 'Click any card to open deep dive',
    el('div', { style: { display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(200px, 1fr))', gap: '12px', padding: '16px 20px 20px' } }, highlights),
    { marginBottom: '1.25rem' }
  ) : null;

  // ── Per-game breakdown — grouped by week ─────────────────────────────────
  // Build team panel for a single game
  const makeTeamPanel = (gid, coach) => {
    const gameRows = h2hGl.filter(r => r.gid === gid);
    const winner   = gameWinners[gid];
    const coachRows = gameRows.filter(r => r.coach === coach);
    const color = COACH_COLORS[coach] || '#888';
    const isWinner = winner === coach;

    const monRows = coachRows.map(r => {
      const movesForMon = h2hMl
        .filter(m => m.gid === gid && m.coach === coach && m.mon === r.mon)
        .sort((a, b) => b.uses - a.uses);
      const teraEvent = h2hTl.find(t => t.gid === gid && t.coach === coach && t.mon === r.mon && t.event === 'TERA');
      const teraType = teraEvent ? teraEvent.outcome : null;

      return el('div', {
        style: { display: 'flex', alignItems: 'center', gap: '10px', padding: '8px 0', borderBottom: '0.5px solid var(--color-border-tertiary)' }
      }, [
        el('div', { style: { position: 'relative', flexShrink: '0' } }, [
          monSprite(r.mon, 38),
          r.lead ? el('span', {
            style: { position: 'absolute', top: '-4px', right: '-4px', width: '14px', height: '14px', borderRadius: '50%', background: color, color: '#fff', fontSize: '8px', fontWeight: '700', display: 'flex', alignItems: 'center', justifyContent: 'center' }
          }, 'L') : null
        ]),
        el('div', { style: { flex: '1', minWidth: '0' } }, [
          el('div', { style: { fontSize: '13px', fontWeight: '600', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' } }, r.mon),
          el('div', { style: { fontSize: '11px', color: 'var(--color-text-tertiary)', marginTop: '3px' } },
            movesForMon.length > 0
              ? movesForMon.map(m => m.move + ' ×' + m.uses).join('  •  ')
              : 'no moves recorded')
        ]),
        el('div', { style: { textAlign: 'right', flexShrink: '0' } }, [
          el('div', { style: { fontSize: '11px', fontWeight: '600', display: 'flex', gap: '6px', justifyContent: 'flex-end', alignItems: 'center' } }, [
            (r.kd + r.ki) > 0 ? el('span', { style: { color: 'var(--color-text-success)' } }, (r.kd + r.ki) + 'K') : null,
            r.d > 0 ? el('span', { style: { color: 'var(--color-text-danger)' } }, r.d + 'D') : null,
            teraType ? typeBadge(teraType) : null
          ].filter(x => x)),
          el('div', { style: { fontSize: '11px', color: 'var(--color-text-tertiary)', marginTop: '2px' } }, formatInt(r.dout) + '% dmg')
        ])
      ]);
    });

    return el('div', {
      style: {
        flex: '1', minWidth: '0',
        background: isWinner ? color + '10' : 'var(--color-background-secondary)',
        border: '0.5px solid ' + (isWinner ? color + '50' : 'var(--color-border-tertiary)'),
        borderRadius: 'var(--border-radius-lg)', padding: '14px 16px'
      }
    }, [
      el('div', { style: { display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: '10px' } }, [
        coachBadge(coach),
        isWinner ? el('span', { style: { fontSize: '11px', fontWeight: '700', color, textTransform: 'uppercase', letterSpacing: '0.6px' } }, 'Winner') : null
      ].filter(x => x)),
      el('div', {}, monRows)
    ]);
  };

  // Group gids by week
  const byWeek = {};
  games.forEach(gid => {
    const wk = h2hGl.find(r => r.gid === gid)?.wk;
    if (!byWeek[wk]) byWeek[wk] = [];
    byWeek[wk].push(gid);
  });

  const weekCards = Object.entries(byWeek).sort((a,b) => parseInt(a[0])-parseInt(b[0])).map(([wk, wkGids]) => {
    // Series result for this week
    const wkC1Wins = wkGids.filter(g => gameWinners[g] === c1).length;
    const wkC2Wins = wkGids.filter(g => gameWinners[g] === c2).length;
    const wkWinner = wkC1Wins > wkC2Wins ? c1 : wkC2Wins > wkC1Wins ? c2 : null;
    const wkColor  = wkWinner ? (COACH_COLORS[wkWinner] || '#888') : 'var(--color-text-tertiary)';
    const seriesLabel = wkWinner
      ? `${wkWinner} wins ${Math.max(wkC1Wins,wkC2Wins)}-${Math.min(wkC1Wins,wkC2Wins)}`
      : `${wkC1Wins}-${wkC2Wins}`;

    // Individual game panels inside the week section
    const gamePanels = wkGids.map((gid, gi) => {
      const gameWinner = gameWinners[gid];
      const gWinColor  = gameWinner ? (COACH_COLORS[gameWinner] || '#888') : 'var(--color-border-tertiary)';
      return el('div', { style: { marginBottom: gi < wkGids.length - 1 ? '16px' : '0' } }, [
        // Game label row
        el('div', { style: { display: 'flex', alignItems: 'center', gap: '10px', marginBottom: '10px' } }, [
          el('span', { style: { fontSize: '11px', fontWeight: '700', textTransform: 'uppercase', letterSpacing: '0.7px', color: 'var(--color-text-tertiary)' } }, 'Game ' + (gi + 1)),
          gameWinner ? el('span', { style: { fontSize: '11px', fontWeight: '600', color: gWinColor, background: gWinColor + '20', padding: '2px 8px', borderRadius: '999px' } }, gameWinner + ' wins') : null,
        ].filter(x => x)),
        // Two-col team panels
        el('div', { style: { display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '12px' } },
          [makeTeamPanel(gid, c1), makeTeamPanel(gid, c2)]
        )
      ]);
    });

    return section(
      'Week ' + wk,
      seriesLabel,
      el('div', { style: { padding: '16px 20px 20px' } }, gamePanels),
      { marginBottom: '1.25rem', accentColor: wkColor }
    );
  });

  return el('div', {}, [controls, scoreboard, highlightsSection, ...weekCards].filter(x => x));
}


// ── Mon Deep Dive ─────────────────────────────────────────────────────────────
function viewMonDeepDive(state) {
  const { data } = state;
  const { coach, mon } = state.mdd;
  const coachMons = data.roster.filter(r => r.coach === coach);
  const currentMon = coachMons.find(m => m.mon === mon) ? mon : (coachMons[0] && coachMons[0].mon) || '';
  if (currentMon !== mon) state.mdd.mon = currentMon;

  const controls = el('div', {
    style: { display: 'flex', gap: '12px', marginBottom: '1.25rem', flexWrap: 'wrap', alignItems: 'center' }
  }, [
    el('label', { style: { fontSize: '12px', color: 'var(--color-text-secondary)', textTransform: 'uppercase', letterSpacing: '0.6px', fontWeight: '600' } }, 'Coach'),
    select(coach, COACHES, v => { state.mdd.coach = v; state.mdd.mon = ''; render(state); }),
    el('label', { style: { fontSize: '12px', color: 'var(--color-text-secondary)', textTransform: 'uppercase', letterSpacing: '0.6px', fontWeight: '600' } }, 'Pokemon'),
    select(state.mdd.mon, coachMons.map(m => ({ value: m.mon, label: m.mon + (m.status === 'Former' ? ' (former)' : '') })), v => { state.mdd.mon = v; render(state); })
  ]);

  const all = monStats(data.gameLog);
  const s = all[coach + '|' + state.mdd.mon];

  if (!s) {
    return el('div', {}, [
      controls,
      card(el('p', { style: { margin: '0', color: 'var(--color-text-secondary)' } }, 'No games played yet.'))
    ]);
  }

  const moves = monMoveStats(data.moveLog, coach, state.mdd.mon);
  const teraTypes = {};
  data.turnLog.forEach(t => {
    if (t.coach === coach && t.mon === state.mdd.mon && t.event === 'TERA') {
      teraTypes[t.outcome] = (teraTypes[t.outcome] || 0) + 1;
    }
  });
  const teraList = Object.entries(teraTypes).sort((a, b) => b[1] - a[1]);
  const coachColor = COACH_COLORS[coach] || '#888';

  // ── Toggle: Stats vs Pokédex ───────────────────────────────────────────────
  const ddTab = state.mdd.tab || 'stats';
  const tabToggle = el('div', {
    style: {
      display:'inline-flex', background:'var(--color-background-secondary)',
      border:'0.5px solid var(--color-border-tertiary)', borderRadius:'999px',
      padding:'4px', gap:'2px', marginBottom:'1.5rem'
    }
  }, [
    ['stats','📊 Stats'], ['pokedex','📖 Pokédex']
  ].map(([id, label]) => {
    const active = ddTab === id;
    return el('button', {
      onclick: () => { state.mdd.tab = id; render(state); },
      style: {
        padding:'7px 18px', fontSize:'13px',
        fontWeight: active?'600':'500',
        background: active?'var(--color-background-primary)':'transparent',
        color: active?'var(--color-text-primary)':'var(--color-text-tertiary)',
        border: active?'0.5px solid var(--color-border-secondary)':'none',
        borderRadius:'999px', cursor:'pointer', transition:'all 0.2s', whiteSpace:'nowrap'
      }
    }, label);
  }));

  // ── Hero ───────────────────────────────────────────────────────────────────
  const hero = el('div', {
    style: {
      display: 'flex', alignItems: 'center', gap: '20px', padding: '20px 24px',
      background: `radial-gradient(circle at 5% 50%, ${coachColor}30 0%, transparent 60%), var(--color-background-primary)`,
      border: `0.5px solid ${coachColor}50`, borderRadius: 'var(--border-radius-lg)', marginBottom: '1.25rem',
      flexWrap: 'wrap'
    }
  }, [
    monSprite(state.mdd.mon, 80),
    el('div', { style: { flex: '1', minWidth: '0' } }, [
      el('h2', { style: { fontFamily: 'var(--font-display)', fontSize: '28px', fontWeight: '700', margin: '0', letterSpacing: '-0.02em' } }, state.mdd.mon),
      el('div', { style: { marginTop: '6px' } }, [coachBadge(coach)]),
      el('div', { style: { display: 'flex', gap: '12px', marginTop: '10px', flexWrap: 'wrap' } }, [
        el('span', { style: { fontSize: '13px', color: 'var(--color-text-secondary)' } }, `${s.gp} games  •  `),
        el('span', { style: { fontSize: '13px', fontWeight: '600', color: s.winPct >= 0.5 ? 'var(--color-text-success)' : 'var(--color-text-danger)' } }, formatPct(s.winPct) + ' win rate'),
        el('span', { style: { fontSize: '13px', color: 'var(--color-text-secondary)' } }, `  •  MVP: `),
        el('span', { style: { fontFamily: 'var(--font-display)', fontSize: '15px', fontWeight: '700', color: coachColor } }, String(s.mvp)),
      ])
    ]),
    teraList.length > 0 ? el('div', { style: { textAlign: 'right' } }, [
      el('div', { style: { fontSize: '10px', color: 'var(--color-text-tertiary)', textTransform: 'uppercase', letterSpacing: '0.6px', marginBottom: '6px', fontWeight: '600' } }, 'Tera types'),
      ...teraList.map(([type, count]) =>
        el('div', { style: { fontSize: '12px', marginBottom: '3px', display: 'flex', alignItems: 'center', gap: '8px', justifyContent: 'flex-end' } }, [
          el('span', { style: { fontWeight: '600' } }, type),
          el('span', { style: { fontFamily: 'var(--font-mono)', fontSize: '11px', color: 'var(--color-text-tertiary)' } }, String(count) + 'x')
        ])
      )
    ]) : null
  ].filter(x => x));

  if (ddTab === 'pokedex') {
    const pokedexContainer = el('div', {});
    renderPokedexView(state, coach, state.mdd.mon, pokedexContainer);
    return el('div', {}, [controls, tabToggle, hero, pokedexContainer]);
  }

  // ── Stats tab ──────────────────────────────────────────────────────────────
  const metric = (label, value, sub, tipText) => {
    const wrapper = el('div', {
      style: {
        background: 'var(--color-background-secondary)', border: '0.5px solid var(--color-border-tertiary)',
        borderRadius: 'var(--border-radius-lg)', padding: '16px 18px'
      }
    }, [
      withTooltip(
        el('div', { style: { fontSize: '10px', color: 'var(--color-text-tertiary)', textTransform: 'uppercase', letterSpacing: '0.8px', marginBottom: '8px', fontWeight: '600', display:'inline-block' } }, label),
        tipText || TOOLTIPS[label]
      ),
      el('div', { style: { fontFamily: 'var(--font-display)', fontSize: '26px', fontWeight: '700', letterSpacing: '-0.02em', color: coachColor } }, value),
      sub ? el('div', { style: { fontSize: '11px', color: 'var(--color-text-tertiary)', marginTop: '4px' } }, sub) : null
    ].filter(x => x));
    return wrapper;
  };

  const metricsGrid = el('div', {
    style: { display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(130px, 1fr))', gap: '10px', marginBottom: '1.25rem' }
  }, [
    metric('Games', s.gp, s.gw + ' wins'),
    metric('Win rate', formatPct(s.winPct), null, TOOLTIPS['Win%']),
    metric('Kills', s.tk, s.kd + ' KD / ' + s.ki + ' KI', TOOLTIPS['K']),
    metric('Deaths', s.deaths, null, TOOLTIPS['D']),
    metric('K/D', formatKDR(s.kdr), null, TOOLTIPS['K/D']),
    metric('Damage', formatDmg(s.dout),
      formatInt(s.dmgPerGame) + '% per game  •  ' + (s.dmgPerTurn > 0 ? s.dmgPerTurn.toFixed(1) + '% per turn' : ''),
      'Total damage dealt. Hover sub-stats for details.'),
    metric('Switches', s.sw, (s.sw / Math.max(1, s.gp)).toFixed(1) + ' per game'),
    metric('Tera', s.teras + '/' + s.gp, formatPct(s.teras / Math.max(1, s.gp)), TOOLTIPS['Tera'])
  ]);

  // Dmg breakdown sub-stats
  const dmgBreakdown = el('div', {
    style: { display:'flex', gap:'12px', flexWrap:'wrap', marginBottom:'1.25rem' }
  }, [
    el('div', {
      style: { display:'flex', alignItems:'center', gap:'8px', padding:'8px 14px', background:'var(--color-background-secondary)', border:'0.5px solid var(--color-border-tertiary)', borderRadius:'var(--border-radius-md)' }
    }, [
      withTooltip(el('span', { style:{ fontSize:'12px', color:'var(--color-text-tertiary)', fontWeight:'600', borderBottom:'1px dashed var(--color-text-tertiary)', cursor:'help' } }, 'Dmg/game'), TOOLTIPS['Dmg/G']),
      el('span', { style:{ fontFamily:'var(--font-display)', fontWeight:'700', fontSize:'16px', marginLeft:'6px' } }, formatInt(s.dmgPerGame) + '%'),
    ]),
    s.dmgPerTurn > 0 ? el('div', {
      style: { display:'flex', alignItems:'center', gap:'8px', padding:'8px 14px', background:'var(--color-background-secondary)', border:'0.5px solid var(--color-border-tertiary)', borderRadius:'var(--border-radius-md)' }
    }, [
      withTooltip(el('span', { style:{ fontSize:'12px', color:'var(--color-text-tertiary)', fontWeight:'600', borderBottom:'1px dashed var(--color-text-tertiary)', cursor:'help' } }, 'Dmg/turn alive'), TOOLTIPS['Dmg/T']),
      el('span', { style:{ fontFamily:'var(--font-display)', fontWeight:'700', fontSize:'16px', marginLeft:'6px' } }, s.dmgPerTurn.toFixed(1) + '%'),
    ]) : null
  ].filter(x=>x));

  let movesSection = null;
  if (moves.length > 0) {
    const maxUses = Math.max(...moves.map(m => m.uses));
    const moveRows = moves.map(m => {
      const pct = maxUses > 0 ? m.uses / maxUses : 0;
      return [
        // Move name with hover tooltip from PokéAPI
        moveTip(m.move),
        el('div', { style: { display: 'flex', alignItems: 'center', gap: '10px', justifyContent: 'flex-end' } }, [
          el('div', {
            style: { width: '80px', height: '6px', background: 'var(--color-background-secondary)', borderRadius: '3px', overflow: 'hidden' }
          }, el('div', {
            style: { width: (pct * 100) + '%', height: '100%', background: coachColor, boxShadow: '0 0 6px ' + coachColor + '80' }
          })),
          el('span', { style: { minWidth: '28px', textAlign: 'right', fontFamily: 'var(--font-mono)', fontWeight: '600', fontSize: '13px' } }, formatInt(m.uses))
        ]),
        formatDmg(m.dmg),
        m.avg.toFixed(1) + '%'
      ];
    });
    movesSection = section('Moves used', moves.length + ' unique moves — hover any move for details',
      el('div', { style: { overflowX: 'auto' } }, makeTable([
        { key: 'move', label: 'Move', align: 'left' },
        { key: 'uses', label: 'Uses', align: 'right' },
        { key: 'dmg', label: 'Total dmg', align: 'right' },
        { key: 'avg', label: 'Avg dmg', align: 'right' }
      ], moveRows)));
  }

  return el('div', {}, [controls, tabToggle, hero, metricsGrid, dmgBreakdown, movesSection].filter(x => x));
}
function viewCoachPanel(state) {
  const { data } = state;
  const coach = state.cp.coach;
  const coachColor = COACH_COLORS[coach] || '#888';

  const controls = el('div', {
    style: { display: 'flex', gap: '12px', marginBottom: '1.25rem', flexWrap: 'wrap', alignItems: 'center' }
  }, [
    el('label', { style: { fontSize: '12px', color: 'var(--color-text-secondary)', textTransform: 'uppercase', letterSpacing: '0.6px', fontWeight: '600' } }, 'Coach'),
    select(coach, COACHES, v => { state.cp.coach = v; render(state); })
  ]);

  const s = coachStats(data.gameLog)[coach];
  if (!s) return el('div', {}, [controls]);

  const all = monStats(data.gameLog);
  const mons = Object.values(all).filter(x => x.coach === coach).sort((a, b) => b.mvp - a.mvp);
  const fullRoster = data.roster.filter(r => r.coach === coach);

  let insights = null;
  if (mons.length > 0) {
    const byDmg = mons.slice().sort((a, b) => b.dout - a.dout);
    const byKills = mons.slice().sort((a, b) => b.tk - a.tk);
    const byMVP = mons.slice().sort((a, b) => b.mvp - a.mvp);
    const coachTurns = data.turnLog.filter(t => t.coach === coach);
    const protectors = {};
    coachTurns.filter(t => t.event === 'PROTECT' && t.outcome === 'BLOCKED').forEach(t => { protectors[t.mon] = (protectors[t.mon] || 0) + 1; });
    const topProtector = Object.entries(protectors).sort((a, b) => b[1] - a[1])[0];
    const teraUsers = {};
    coachTurns.filter(t => t.event === 'TERA').forEach(t => { teraUsers[t.mon] = (teraUsers[t.mon] || 0) + 1; });
    const topTeraUser = Object.entries(teraUsers).sort((a, b) => b[1] - a[1])[0];

    insights = { topDamage: byDmg[0], topKiller: byKills[0], topMVP: byMVP[0], topProtector, topTeraUser };
  }

  // Carry score
  const carry = computeCarryScore(data.gameLog, coach);

  const matchMap = {};
  data.gameLog.filter(r => r.coach === coach).forEach(r => {
    const k = 'W' + r.wk + '-M' + r.m;
    if (!matchMap[k]) matchMap[k] = { wk: r.wk, m: r.m, opp: r.opp, games: {} };
    if (!matchMap[k].games[r.g]) matchMap[k].games[r.g] = r.won;
  });
  const matches = Object.values(matchMap).map(m => {
    const gw = Object.values(m.games).filter(w => w).length;
    const gl = Object.values(m.games).filter(w => !w).length;
    return { wk: m.wk, m: m.m, opp: m.opp, wins: gw, losses: gl, result: gw > gl ? 'W' : 'L', score: gw + '-' + gl };
  }).sort((a, b) => a.wk - b.wk || a.m - b.m);

  const hero = el('div', {
    style: {
      position: 'relative',
      background: 'radial-gradient(circle at 10% 50%, ' + coachColor + '35 0%, ' + coachColor + '08 55%, transparent 100%), var(--color-background-primary)',
      border: '0.5px solid ' + coachColor + '60',
      borderRadius: 'var(--border-radius-lg)',
      padding: '28px 32px',
      marginBottom: '1.25rem'
    }
  }, [
    el('div', { style: { display: 'flex', alignItems: 'center', gap: '18px', marginBottom: '24px', flexWrap: 'wrap' } }, [
      el('div', {
        style: {
          width: '64px',
          height: '64px',
          borderRadius: '50%',
          background: coachColor,
          display: 'flex',
          alignItems: 'center',
          justifyContent: 'center',
          color: '#fff',
          fontSize: '26px',
          fontWeight: '700',
          fontFamily: 'var(--font-display)',
          boxShadow: '0 0 24px ' + coachColor + '60'
        }
      }, coach.charAt(0)),
      el('div', {}, [

function buildSeriesResults(gameLog) {
  const results = {};
  gameLog.forEach(r => {
    const key = 'W' + r.wk + '-M' + r.m;
    if (!results[key]) results[key] = { wk: r.wk, m: r.m, gameWinners: {}, coaches: new Set() };
    results[key].coaches.add(r.coach);
    if (r.won && !results[key].gameWinners[r.g]) results[key].gameWinners[r.g] = r.coach;
  });
  Object.values(results).forEach(s => {
    const coaches = Array.from(s.coaches);
    if (coaches.length === 2) {
      const [c1, c2] = coaches;
      s.w1 = Object.values(s.gameWinners).filter(w => w === c1).length;
      s.w2 = Object.values(s.gameWinners).filter(w => w === c2).length;
      s.c1 = c1; s.c2 = c2;
      s.done = (s.w1 === 2 || s.w2 === 2);
      s.winner = s.w1 > s.w2 ? c1 : s.w2 > s.w1 ? c2 : null;
      s.gamesPlayed = Object.keys(s.gameWinners).length;
    }
  });
  return results;
}
