<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');

:root, html, :root {
  --color-background-primary: #13151c;
  --color-background-secondary: #1a1d27;
  --color-background-tertiary: #0e1016;
  --color-background-info: #1e3a5f;
  --color-background-success: #1e3a2f;
  --color-background-danger: #3e1e24;
  --color-background-warning: #3e331e;
  --color-text-primary: #e8eaed;
  --color-text-secondary: #a8b0bd;
  --color-text-tertiary: #6b7280;
  --color-text-info: #7ab8ff;
  --color-text-success: #6bd994;
  --color-text-danger: #ff7788;
  --color-text-warning: #f5c547;
  --color-border-primary: rgba(255,255,255,0.18);
  --color-border-secondary: rgba(255,255,255,0.12);
  --color-border-tertiary: rgba(255,255,255,0.08);
  --color-border-info: #7ab8ff;
  --color-border-danger: #ff7788;
  --color-border-success: #6bd994;
  --border-radius-sm: 6px;
  --border-radius-md: 10px;
  --border-radius-lg: 14px;
  --border-radius-xl: 20px;
  --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-display: 'Space Grotesk', 'Inter', sans-serif;
  --font-mono: 'JetBrains Mono', 'Courier New', monospace;
}

body {
  background: var(--color-background-tertiary) !important;
  color: var(--color-text-primary);
  font-family: var(--font-sans);
  margin: 0;
  padding: 0;
}

#gforce-root {
  max-width: 1200px;
  margin: 0 auto;
  padding: 2rem 1.5rem;
}

#gforce-app * {
  box-sizing: border-box;
}

#gforce-app h1, #gforce-app h2, #gforce-app h3 {
  font-family: var(--font-display);
  letter-spacing: -0.02em;
}

#gforce-app table {
  border-collapse: collapse;
  width: 100%;
}

#gforce-app button {
  font-family: var(--font-sans);
  background: var(--color-background-secondary);
  color: var(--color-text-primary);
  border: 0.5px solid var(--color-border-secondary);
  padding: 8px 14px;
  border-radius: var(--border-radius-md);
  cursor: pointer;
  transition: all 0.15s;
  font-size: 13px;
}
#gforce-app button:hover {
  background: var(--color-background-primary);
  border-color: var(--color-border-primary);
}

#gforce-app select, #gforce-app input {
  font-family: var(--font-sans);
  background: var(--color-background-secondary);
  color: var(--color-text-primary);
  border: 0.5px solid var(--color-border-secondary);
  padding: 7px 10px;
  border-radius: var(--border-radius-md);
  font-size: 13px;
  transition: border-color 0.15s;
}
#gforce-app select:focus, #gforce-app input:focus {
  outline: none;
  border-color: var(--color-border-info);
}

#gforce-app ::-webkit-scrollbar {
  width: 10px;
  height: 10px;
}
#gforce-app ::-webkit-scrollbar-track {
  background: var(--color-background-tertiary);
}
#gforce-app ::-webkit-scrollbar-thumb {
  background: var(--color-background-secondary);
  border-radius: 5px;
}
#gforce-app ::-webkit-scrollbar-thumb:hover {
  background: var(--color-border-secondary);
}
</style>

<div id="gforce-root">
<div id="gforce-app"></div>
</div>

function decompressData(b64) {
  const binary = atob(b64);
  const bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  const decompressed = pako.ungzip(bytes, { to: 'string' });
  return JSON.parse(decompressed);
}

function decode(rows, keys) {
  return rows.map(r => {
    const o = {};
    keys.forEach((k, i) => { o[k] = r[i]; });
    o.gid = 'W' + String(o.wk).padStart(2,'0') + '-M' + String(o.m).padStart(2,'0') + '-G' + o.g;
    return o;
  });
}

function decodeAll(raw) {
  return {
    gameLog: decode(raw.gl, GL_KEYS),
    moveLog: decode(raw.ml, ML_KEYS),
    turnLog: decode(raw.tl, TL_KEYS),
    roster: raw.rs.map(r => ({ coach: r[0], mon: r[1], status: r[2] }))
  };
}
// ── coachStats ────────────────────────────────────────────────────────────────
function coachStats(gameLog) {
  const stats = {};
  COACHES.forEach(c => {
    stats[c] = {
      coach: c, gp: 0, gw: 0, gl: 0, kills: 0, deaths: 0, dmg: 0, sw: 0,
      abil: 0, item: 0, cp: 0, cm: 0, teras: 0, sp: 0,
      gids: new Set(), gwGids: new Set(),
      seriesWon: new Set(), seriesLost: new Set(), seriesPlayed: new Set(),
      leaguePoints: 0, plusMinus: 0,
    };
  });

  // Build series results
  const seriesMap = {};
  gameLog.forEach(r => {
    const s = stats[r.coach]; if (!s) return;
    // Count stats per row (mon-level)
    s.kills += (r.kd||0)+(r.ki||0); s.deaths += r.d||0;
    s.dmg += r.dout||0; s.sw += r.sw||0;
    s.abil += r.abil||0; s.item += r.item||0;
    s.cp += r.cp||0; s.cm += r.cm||0; s.teras += r.tera||0;
    // Count games by unique gid (not rows)
    if (!s.gids.has(r.gid)) {
      s.gids.add(r.gid);
      s.gp++;
      if (r.won) { s.gw++; s.gwGids.add(r.gid); } else s.gl++;
    } else {
      if (r.won) s.gwGids.add(r.gid); // ensure won tracked
    }

    const sid = 'W'+r.wk+'-M'+r.m;
    if (!seriesMap[sid]) seriesMap[sid] = {};
    if (!seriesMap[sid][r.coach]) seriesMap[sid][r.coach] = {gids:new Set(), gwGids:new Set(), opp:r.opp};
    seriesMap[sid][r.coach].gids.add(r.gid);
    if (r.won) seriesMap[sid][r.coach].gwGids.add(r.gid);
  });

  Object.entries(seriesMap).forEach(([sid, coaches]) => {
    const arr = Object.entries(coaches);
    if (arr.length !== 2) return;
    const [[cA, sA],[cB, sB]] = arr;
    // Count unique game wins, not rows
    const aW = sA.gwGids.size, aL = sA.gids.size - sA.gwGids.size;
    const bW = sB.gwGids.size, bL = sB.gids.size - sB.gwGids.size;
    [cA,cB].forEach(c => { if (stats[c]) stats[c].seriesPlayed.add(sid); stats[c] && stats[c].sp++; });
    const aWon = aW > bW, bWon = bW > aW;
    const sw = aWon ? cA : bWon ? cB : null;
    const sl = aWon ? cB : bWon ? cA : null;
    const [wW, wL] = aWon ? [aW, aL] : [bW, bL];
    if (sw && stats[sw]) {
      stats[sw].seriesWon.add(sid);
      if (wW===2&&wL===0) stats[sw].leaguePoints += 3;
      else if (wW===2&&wL===1) stats[sw].leaguePoints += 2;
    }
    if (sl && stats[sl]) {
      stats[sl].seriesLost.add(sid);
      const [lW] = aWon ? [bW] : [aW];
      if (lW===1) stats[sl].leaguePoints += 1;
    }
  });

  // H2H helper
  function h2hResult(coachA, coachB) {
    const gids = new Set();
    gameLog.forEach(r => { if (r.coach===coachA && r.opp===coachB) gids.add(r.gid); });
    if (!gids.size) return 0;
    const winners = {};
    gameLog.forEach(r => { if (gids.has(r.gid) && r.won && !winners[r.gid]) winners[r.gid]=r.coach; });
    const aW = Object.values(winners).filter(w=>w===coachA).length;
    const bW = Object.values(winners).filter(w=>w===coachB).length;
    return aW - bW;
  }

  Object.values(stats).forEach(s => {
    s.uniqueGames = s.gids.size;
    s.sw_series = s.seriesWon.size;
    s.sl_series = s.seriesLost.size;
    s.winPct = s.gp > 0 ? s.gw/s.gp : 0;
    s.kdr = s.deaths > 0 ? s.kills/s.deaths : s.kills;
    s.dmgPerGame = s.uniqueGames > 0 ? s.dmg/s.uniqueGames : 0;
    s.swPerGame = s.uniqueGames > 0 ? s.sw/s.uniqueGames : 0;
    s.plusMinus = s.gw - s.gl;
    s.gids = undefined; s.gwGids = undefined;
    s.seriesPlayed = undefined; s.seriesWon = undefined; s.seriesLost = undefined;
  });

  // Ranking: SW → LP → +/- → H2H → kills → alpha
  const ranked = Object.values(stats).sort((a,b) => {
    if (b.sw_series !== a.sw_series) return b.sw_series - a.sw_series;
    if (b.leaguePoints !== a.leaguePoints) return b.leaguePoints - a.leaguePoints;
    if (b.plusMinus !== a.plusMinus) return b.plusMinus - a.plusMinus;
    const h2h = h2hResult(b.coach, a.coach);
    if (h2h !== 0) return h2h;
    if (b.kills !== a.kills) return b.kills - a.kills;
    return a.coach.localeCompare(b.coach);
  });
  ranked.forEach((s,i) => { s.rank = i+1; });
  return stats;
}

function monStats(gameLog) {
  const stats = {};
  gameLog.forEach(r => {
    const key = r.coach+'|'+r.mon;
    if (!stats[key]) stats[key] = {
      coach:r.coach, mon:r.mon, gp:0, gw:0, kd:0, ki:0, tk:0,
      deaths:0, dout:0, din:0, sw:0, teras:0, leads:0,
      cp:0, cm:0, moves:0, abil:0, item:0, ta:0,
    };
    const s = stats[key];
    s.gp++; if (r.won) s.gw++;
    s.kd += r.kd||0; s.ki += r.ki||0; s.tk += (r.kd||0)+(r.ki||0);
    s.deaths += r.d||0; s.dout += r.dout||0; s.din += r.din||0;
    s.sw += r.sw||0; s.teras += r.tera||0; s.leads += r.lead||0;
    s.cp += r.cp||0; s.cm += r.cm||0; s.moves += r.moves||0;
    s.abil += r.abil||0; s.item += r.item||0; s.ta += r.ta||0;
  });
  Object.values(stats).forEach(s => {
    s.winPct = s.gp>0 ? s.gw/s.gp : 0;
    s.kdr = s.deaths>0 ? s.tk/s.deaths : s.tk;
    s.dmgPerGame = s.gp>0 ? s.dout/s.gp : 0;
    s.mvp = s.tk*3 + s.deaths*-1 + s.gw*2 + s.teras*1;
  });
  return stats;
}

// ── Weekly Recap ──────────────────────────────────────────────────────────────
function computeWeeklyRecap(gameLog, moveLog, turnLog, targetWk) {
  // Find all fully-played weeks (6 matches)
  const weekMatches = {};
  gameLog.forEach(r => {
    if (!weekMatches[r.wk]) weekMatches[r.wk] = new Set();
    weekMatches[r.wk].add(r.m);
  });
  const completeWeeks = Object.entries(weekMatches)
    .filter(([wk, matches]) => matches.size >= 6)
    .map(([wk]) => parseInt(wk))
    .sort((a,b)=>b-a);
  if (!completeWeeks.length) return null;
  const wk = targetWk && completeWeeks.includes(targetWk) ? targetWk : completeWeeks[0];

  const wgl = gameLog.filter(r=>r.wk===wk);
  const wml = moveLog.filter(r=>r.wk===wk);
  const wtl = turnLog.filter(r=>r.wk===wk);

  // Series results — count unique game wins, not rows
  const series = {};
  wgl.forEach(r => {
    const sid = 'M'+r.m;
    if (!series[sid]) series[sid] = {m:r.m, opp:{}, gameWinners:{}};
    if (!series[sid].opp[r.coach]) series[sid].opp[r.coach] = r.opp;
    // Track game winner by gid (first won=true row per gid wins it)
    if (r.won && !series[sid].gameWinners[r.gid]) series[sid].gameWinners[r.gid] = r.coach;
  });

  const results = Object.values(series).map(s => {
    const coaches = Object.keys(s.opp);
    if (coaches.length !== 2) return null;
    const [cA, cB] = coaches;
    const gameResults = Object.values(s.gameWinners);
    const aW = gameResults.filter(w=>w===cA).length;
    const bW = gameResults.filter(w=>w===cB).length;
    const winner = aW >= bW ? cA : cB;
    const loser  = aW >= bW ? cB : cA;
    const wScore = Math.max(aW, bW);
    const lScore = Math.min(aW, bW);
    const gamesPlayed = Object.keys(s.gameWinners).length;
    const swept = wScore===2 && lScore===0;
    return {m:s.m, winner, loser, wScore, lScore, swept, gamesPlayed};
  }).filter(x=>x).sort((a,b)=>a.m-b.m);

  // Week MVP: highest kills + damage among all mons this week
  const monScores = {};
  wgl.forEach(r=>{
    const k=r.coach+'|'+r.mon;
    if(!monScores[k]) monScores[k]={coach:r.coach,mon:r.mon,tk:0,dout:0,gw:0,gp:0};
    monScores[k].tk+=(r.kd||0)+(r.ki||0);
    monScores[k].dout+=r.dout||0;
    monScores[k].gp++;
    if(r.won) monScores[k].gw++;
  });
  const weekMVP = Object.values(monScores).sort((a,b)=>(b.tk*3+b.gw*2+b.dout/20)-(a.tk*3+a.gw*2+a.dout/20))[0];

  // Biggest upset: lower-ranked team (by current standing) beating higher-ranked
  const standings = coachStats(gameLog);
  let biggestUpset = null;
  results.forEach(res => {
    const winnerRank = standings[res.winner]?.rank || 99;
    const loserRank  = standings[res.loser]?.rank  || 99;
    if (winnerRank > loserRank) {
      if (!biggestUpset || (winnerRank - loserRank) > (standings[biggestUpset.winner]?.rank||0)-(standings[biggestUpset.loser]?.rank||0)) {
        biggestUpset = res;
      }
    }
  });

  // Most dominant: biggest game differential
  const mostDominant = results.reduce((best, r) => {
    const diff = r.wScore - r.lScore;
    return (!best || diff > (best.wScore-best.lScore) || (diff===(best.wScore-best.lScore)&&r.swept)) ? r : best;
  }, null);

  // Closest series: went to game 3
  const closestSeries = results.filter(r=>r.lScore===1);

  return { wk, results, weekMVP, biggestUpset, mostDominant, closestSeries, wgl, wml, wtl };
}

function monMoveStats(moveLog, coach, mon) {
  const moves = {};
  moveLog.filter(r => r.coach === coach && r.mon === mon).forEach(r => {
    if (!moves[r.move]) moves[r.move] = { move: r.move, uses: 0, dmg: 0 };
    moves[r.move].uses += r.uses || 0;
    moves[r.move].dmg += r.dmg || 0;
  });
  return Object.values(moves).map(m => ({
    move: m.move,
    uses: m.uses,
    dmg: m.dmg,
    avg: m.uses > 0 ? m.dmg / m.uses : 0
  })).sort((a, b) => b.uses - a.uses);
}

function pivotGameStats(gameLog, config) {
  const { metric, groupBy, filters } = config;
  const filtered = gameLog.filter(r => {
    if (filters.coach !== 'All' && r.coach !== filters.coach) return false;
    if (filters.week !== 'All' && r.wk !== parseInt(filters.week)) return false;
    if (filters.opponent !== 'All' && r.opp !== filters.opponent) return false;
    if (filters.teraOnly === 'yes' && !r.tera) return false;
    if (filters.teraOnly === 'no' && r.tera) return false;
    if (filters.leadOnly === 'yes' && !r.lead) return false;
    if (filters.leadOnly === 'no' && r.lead) return false;
    if (filters.wonOnly === 'yes' && !r.won) return false;
    if (filters.wonOnly === 'no' && r.won) return false;
    return true;
  });

  const groups = {};
  filtered.forEach(r => {
    let key;
    if (groupBy === 'mon') key = r.coach + '|' + r.mon;
    else if (groupBy === 'coach') key = r.coach;
    else if (groupBy === 'week') key = r.wk;
    else if (groupBy === 'opponent') key = r.opp;

    if (!groups[key]) {
      groups[key] = {
        key, coach: r.coach, mon: r.mon, wk: r.wk, opp: r.opp,
        rows: 0, games: new Set(), wins: new Set(),
        value: 0,
        kd: 0, ki: 0, deaths: 0, dout: 0, din: 0,
        sw: 0, teras: 0, cp: 0, cm: 0, moves: 0,
        abil: 0, item: 0, leads: 0, ta: 0
      };
    }
    const g = groups[key];
    g.rows++;
    g.games.add(r.gid);
    if (r.won) g.wins.add(r.gid);
    g.kd += r.kd || 0;
    g.ki += r.ki || 0;
    g.deaths += r.d || 0;
    g.dout += r.dout || 0;
    g.din += r.din || 0;
    g.sw += r.sw || 0;
    g.teras += r.tera || 0;
    g.cp += r.cp || 0;
    g.cm += r.cm || 0;
    g.moves += r.moves || 0;
    g.abil += r.abil || 0;
    g.item += r.item || 0;
    g.leads += r.lead || 0;
    g.ta += r.ta || 0;
  });

  Object.values(groups).forEach(g => {
    g.gp = g.games.size;
    g.gw = g.wins.size;
    g.kills = g.kd + g.ki;
    g.kdr = g.deaths > 0 ? g.kills / g.deaths : g.kills;
    g.winPct = g.gp > 0 ? g.gw / g.gp : 0;
    g.dmgPerGame = g.gp > 0 ? g.dout / g.gp : 0;
    g.kpg = g.gp > 0 ? g.kills / g.gp : 0;
    g.teraRate = g.gp > 0 ? g.teras / g.gp : 0;
    g.leadRate = g.gp > 0 ? g.leads / g.gp : 0;

    if (metric === 'kills') g.value = g.kills;
    else if (metric === 'kdr') g.value = g.kdr;
    else if (metric === 'kpg') g.value = g.kpg;
    else if (metric === 'winPct') g.value = g.winPct;
    else if (metric === 'dmgPerGame') g.value = g.dmgPerGame;
    else if (metric === 'teraRate') g.value = g.teraRate;
    else if (metric === 'leadRate') g.value = g.leadRate;
    else g.value = g[metric] || 0;

    g.games = undefined;
    g.wins = undefined;
  });

  return Object.values(groups).sort((a, b) => b.value - a.value);
}

function pivotEventStats(turnLog, gameLog, config) {
  const { event, outcome, groupBy, filters, statusType, teraType } = config;

  let filtered = turnLog.filter(t => {
    if (event !== 'All' && t.event !== event) return false;
    if (outcome && outcome !== 'All' && t.outcome !== outcome) return false;
    if (filters.coach !== 'All' && t.coach !== filters.coach) return false;
    if (filters.week !== 'All' && t.wk !== parseInt(filters.week)) return false;

    if (event === 'STATUS' && statusType && statusType !== 'All') {
      const detail = (t.detail || '').toLowerCase();
      if (statusType === 'burn' && !detail.includes('burn')) return false;
      if (statusType === 'paralysis' && !detail.includes('paralysis')) return false;
      if (statusType === 'sleep' && !detail.includes('sleep')) return false;
      if (statusType === 'poison' && !detail.includes('poison') && !detail.includes('toxic')) return false;
      if (statusType === 'freeze' && !detail.includes('freeze')) return false;
    }
    if (event === 'TERA' && teraType && teraType !== 'All') {
      if (t.outcome !== teraType) return false;
    }
    return true;
  });

  const groups = {};
  filtered.forEach(t => {
    if (!t.coach) return;
    let key;
    if (groupBy === 'mon') key = t.coach + '|' + (t.mon || '?');
    else if (groupBy === 'coach') key = t.coach;
    else if (groupBy === 'week') key = t.wk;
    else if (groupBy === 'event') key = t.event;
    else if (groupBy === 'detail') key = t.detail || t.outcome || '?';

    if (!groups[key]) {
      groups[key] = { key, coach: t.coach, mon: t.mon, wk: t.wk, count: 0 };
    }
    groups[key].count++;
  });

  return Object.values(groups).sort((a, b) => b.count - a.count);
}

const el = (tag, attrs, children) => {
  const e = document.createElement(tag);
  if (attrs) for (const k in attrs) {
    if (k === 'style') Object.assign(e.style, attrs[k]);
    else if (k === 'onclick') e.onclick = attrs[k];
    else if (k === 'onchange') e.onchange = attrs[k];
    else if (k === 'onmouseover') e.onmouseover = attrs[k];
    else if (k === 'onmouseout') e.onmouseout = attrs[k];
    else if (k === 'html') e.innerHTML = attrs[k];
    else e.setAttribute(k, attrs[k]);
  }
  if (children) {
    if (!Array.isArray(children)) children = [children];
    children.forEach(c => {
      if (c == null) return;
      if (typeof c === 'string' || typeof c === 'number') e.appendChild(document.createTextNode(c));
      else e.appendChild(c);
    });
  }
  return e;
};

  return el('button', {
    onclick,
    style: {
      padding: '10px 18px',
      fontSize: '13px',
      fontFamily: 'var(--font-sans)',
      fontWeight: active ? '600' : '500',
      background: active ? 'var(--color-background-primary)' : 'transparent',
      color: active ? 'var(--color-text-primary)' : 'var(--color-text-secondary)',
      border: active ? '0.5px solid var(--color-border-secondary)' : '0.5px solid transparent',
      borderBottom: 'none',
      borderRadius: 'var(--border-radius-md) var(--border-radius-md) 0 0',
      cursor: 'pointer',
      marginBottom: '-1px',
      transition: 'all 0.15s',
      position: 'relative'
    }
  }, label);
}

function makeTable(headers, rows, opts) {
  opts = opts || {};
  const thead = el('thead', {
    style: { position: opts.stickyHeader ? 'sticky' : 'static', top: '0', zIndex: '1' }
  }, el('tr', { style: { background: 'var(--color-background-secondary)' } },
    headers.map(h => el('th', {
      style: {
        padding: '12px 11px',
        textAlign: h.align || 'center',
        fontWeight: '600',
        fontSize: '10px',
        color: 'var(--color-text-tertiary)',
        textTransform: 'uppercase',
        letterSpacing: '0.8px',
        cursor: opts.sortable ? 'pointer' : 'default',
        userSelect: 'none',
        borderBottom: '0.5px solid var(--color-border-tertiary)',
        whiteSpace: 'nowrap',
        fontFamily: 'var(--font-sans)'
      },
      onclick: opts.sortable ? () => opts.onSort(h.key) : null
    }, h.label + (opts.sortKey === h.key ? (opts.sortDir === 'desc' ? ' ↓' : ' ↑') : '')))
  ));

  const tbody = el('tbody', {}, rows.map((r, i) => {
    const tr = el('tr', {
      style: {
        borderBottom: '0.5px solid var(--color-border-tertiary)',
        transition: 'background 0.1s'
      }
    }, r.map((c, j) => el('td', {
      style: {
        padding: '11px 11px',
        textAlign: headers[j].align || 'center',
        fontSize: '13px'
      }
    }, [c])));
    tr.onmouseover = () => tr.style.background = 'var(--color-background-secondary)';
    tr.onmouseout = () => tr.style.background = '';
    return tr;
  }));

  return el('table', {
    style: {
      width: '100%',
      borderCollapse: 'collapse',
      fontSize: '13px',
      fontFamily: 'var(--font-sans)'
    }
  }, [thead, tbody]);
}

function select(value, options, onchange) {
  const s = el('select', { onchange: e => onchange(e.target.value) });
  options.forEach(o => {
    const opt = document.createElement('option');
    opt.value = typeof o === 'string' ? o : o.value;
    opt.textContent = typeof o === 'string' ? o : o.label;
    if (opt.value === String(value)) opt.selected = true;
    s.appendChild(opt);
  });
  return s;
}

function formatPct(v) { return Math.round((v || 0) * 100) + '%'; }
function formatInt(v) { return Math.round(v || 0); }
function formatDmg(v) { return Math.round(v || 0) + '%'; }
function formatKDR(v) { return (v || 0).toFixed(2); }
function mono(v) {
  return el('span', { style: { fontFamily: 'var(--font-mono)', fontSize: '13px' } }, String(v));
}

function rankBadge(rank) {
  if (rank === 1) return el('span', { style: { fontSize: '18px' } }, '🥇');
  if (rank === 2) return el('span', { style: { fontSize: '18px' } }, '🥈');
  if (rank === 3) return el('span', { style: { fontSize: '18px' } }, '🥉');
  return el('span', {
    style: {
      color: 'var(--color-text-tertiary)',
      fontWeight: '600',
      fontFamily: 'var(--font-mono)',
      fontSize: '13px'
    }
  }, String(rank));
}

function pageHeader(title, subtitle) {
  return el('div', { style: { marginBottom: '1.5rem' } }, [

        fontFamily: 'var(--font-display)',

}

function monLink(coach, mon, options) {

function renderWeeklyRecap(state) {
  const { data } = state;

  // Week selector — find all complete weeks
  const weekMatches = {};
  data.gameLog.forEach(r => {
    if (!weekMatches[r.wk]) weekMatches[r.wk] = new Set();
    weekMatches[r.wk].add(r.m);
  });
  const completeWeeks = Object.entries(weekMatches)
    .filter(([, m]) => m.size >= 6)
    .map(([wk]) => parseInt(wk))
    .sort((a,b) => a - b);

  const maxWk = completeWeeks.length ? Math.max(...completeWeeks) : 0;
  const selectedWk = state.standings.recapWeek && completeWeeks.includes(state.standings.recapWeek)
    ? state.standings.recapWeek : maxWk;

  const weekSelector = completeWeeks.length > 1 ? el('div', {
    style: { display:'flex', alignItems:'center', gap:'8px', marginBottom:'1rem', flexWrap:'wrap' }
  }, [
    el('span', { style: { fontSize:'12px', color:'var(--color-text-tertiary)', fontWeight:'600', textTransform:'uppercase', letterSpacing:'0.6px' } }, 'Week:'),
    ...completeWeeks.map(wk => {
      const active = wk === selectedWk;
      return el('button', {
        onclick: () => { state.standings.recapWeek = wk; render(state); },
        style: {
          padding:'5px 12px', fontSize:'12px', fontWeight: active ? '700' : '500',
          background: active ? 'var(--color-text-primary)' : 'var(--color-background-secondary)',
          color: active ? 'var(--color-background-primary)' : 'var(--color-text-secondary)',
          border: '0.5px solid var(--color-border-tertiary)',
          borderRadius: '999px', cursor: 'pointer', transition: 'all 0.15s'
        }
      }, 'W' + wk);
    })
  ]) : null;

  const recap = computeWeeklyRecap(data.gameLog, data.moveLog, data.turnLog, selectedWk);

  if (!recap) {
    return section('Week Recap', 'No complete weeks yet',
      el('div',{style:{padding:'32px 24px',textAlign:'center',color:'var(--color-text-tertiary)'}},'Waiting for Week 1 to complete...')
    );
  }

  const { wk, results, weekMVP, biggestUpset, mostDominant, closestSeries, wgl } = recap;

  // Highlight cards
  const highlights = [];
  if (weekMVP) {
    const c = COACH_COLORS[weekMVP.coach]||'#888';
    highlights.push(el('div',{
      onclick:()=>{state.mdd.coach=weekMVP.coach;state.mdd.mon=weekMVP.mon;state.view='mon';render(state);},
      style:{
        padding:'16px',background:'var(--color-background-secondary)',
        border:'0.5px solid '+c+'50',borderRadius:'var(--border-radius-lg)',
        cursor:'pointer',flex:'1',minWidth:'180px'
      }
    },[
      el('div',{style:{fontSize:'10px',color:'var(--color-text-tertiary)',textTransform:'uppercase',letterSpacing:'0.6px',marginBottom:'10px'}},'⭐ Week MVP'),
      el('div',{style:{display:'flex',alignItems:'center',gap:'10px'}},[
        monSprite(weekMVP.mon,40),
        el('div',{},[
          el('div',{style:{fontWeight:'600',fontSize:'13px'}},weekMVP.mon),
          el('div',{style:{marginTop:'4px'}},coachBadge(weekMVP.coach))
        ])
      ]),
      el('div',{style:{marginTop:'10px',fontFamily:'var(--font-display)',fontWeight:'700',fontSize:'20px',color:c}},
        weekMVP.tk+'K  '+weekMVP.gw+'W  '+Math.round(weekMVP.dout)+'%dmg')
    ]));
  }

  if (biggestUpset) {
    const c = COACH_COLORS[biggestUpset.winner]||'#888';
    highlights.push(el('div',{
      onclick:()=>{state.h2h.c1=biggestUpset.winner;state.h2h.c2=biggestUpset.loser;state.view='h2h';render(state);},
      style:{
        padding:'16px',background:'var(--color-background-secondary)',
        border:'0.5px solid var(--color-border-tertiary)',borderRadius:'var(--border-radius-lg)',
        cursor:'pointer',flex:'1',minWidth:'180px'
      }
    },[
      el('div',{style:{fontSize:'10px',color:'var(--color-text-tertiary)',textTransform:'uppercase',letterSpacing:'0.6px',marginBottom:'10px'}},'💥 Biggest Upset'),
      el('div',{style:{display:'flex',alignItems:'center',gap:'8px',flexWrap:'wrap'}},[
        coachBadge(biggestUpset.winner),
        el('span',{style:{fontWeight:'700',color:c}},biggestUpset.wScore+'-'+biggestUpset.lScore),
        coachBadge(biggestUpset.loser)
      ]),
      el('div',{style:{marginTop:'8px',fontSize:'12px',color:'var(--color-text-tertiary)'}},
        biggestUpset.winner+' took down the higher seed')
    ]));
  }

  if (closestSeries.length > 0) {
    const cs = closestSeries[0];
    highlights.push(el('div',{
      onclick:()=>{state.h2h.c1=cs.winner;state.h2h.c2=cs.loser;state.view='h2h';render(state);},
      style:{
        padding:'16px',background:'var(--color-background-secondary)',
        border:'0.5px solid var(--color-border-tertiary)',borderRadius:'var(--border-radius-lg)',
        cursor:'pointer',flex:'1',minWidth:'180px'
      }
    },[
      el('div',{style:{fontSize:'10px',color:'var(--color-text-tertiary)',textTransform:'uppercase',letterSpacing:'0.6px',marginBottom:'10px'}},'🎲 War of Attrition'),
      el('div',{style:{display:'flex',alignItems:'center',gap:'8px',flexWrap:'wrap'}},[
        coachBadge(cs.winner),
        el('span',{style:{fontWeight:'700'}},'2-1'),
        coachBadge(cs.loser)
      ]),
      el('div',{style:{marginTop:'8px',fontSize:'12px',color:'var(--color-text-tertiary)'}},'Went the distance — 3 games played')
    ]));
  }

  // More weekly superlatives
  const wekMons = monStats(wgl);
  const allWekMons = Object.values(wekMons);
  const topKiller = allWekMons.sort((a,b)=>b.tk-a.tk)[0];
  const topDmg    = allWekMons.slice().sort((a,b)=>b.dout-a.dout)[0];


  // Highlight card builder
  const mkHL = (icon, label, coach, mon, val, clickFn) => {
    const c = COACH_COLORS[coach]||'#888';
    const card = el('div',{
      onclick: clickFn,
      style:{ padding:'14px 16px', background:'var(--color-background-secondary)', border:'0.5px solid var(--color-border-tertiary)', borderRadius:'var(--border-radius-lg)', cursor:'pointer', flex:'1', minWidth:'160px' }
    },[
      el('div',{style:{fontSize:'10px',color:'var(--color-text-tertiary)',textTransform:'uppercase',letterSpacing:'0.6px',marginBottom:'8px'}},icon+' '+label),
      el('div',{style:{display:'flex',alignItems:'center',gap:'8px',marginBottom:'6px'}},[
        monSprite(mon,32),
        el('div',{},[
          el('div',{style:{fontWeight:'600',fontSize:'12px'}},mon),
          el('div',{style:{marginTop:'3px'}},coachBadge(coach))
        ])
      ]),
      el('div',{style:{fontFamily:'var(--font-display)',fontWeight:'700',fontSize:'17px',color:c}},val)
    ]);
    return card;
  };

  const extraHighlights = [
    topKiller && topKiller.tk>0 ? mkHL('⚔️','Top killer',topKiller.coach,topKiller.mon,topKiller.tk+' kills',()=>{state.mdd.coach=topKiller.coach;state.mdd.mon=topKiller.mon;state.view='mon';render(state);}) : null,
    topDmg ? mkHL('💥','Most damage',topDmg.coach,topDmg.mon,Math.round(topDmg.dout)+'%',()=>{state.mdd.coach=topDmg.coach;state.mdd.mon=topDmg.mon;state.view='mon';render(state);}) : null,
  ].filter(x=>x);

  // Results grid with proper Bo3 scores
  const resultCards = results.map(res => {
    const wColor = COACH_COLORS[res.winner]||'#888';
    const lColor = COACH_COLORS[res.loser]||'#888';
    const card = el('div',{
      onclick:()=>{state.h2h.c1=res.winner;state.h2h.c2=res.loser;state.view='h2h';render(state);},
      style:{
        display:'flex', alignItems:'center', gap:'10px',
        padding:'12px 16px',
        background:'var(--color-background-secondary)',
        border:'0.5px solid '+wColor+'40',
        borderRadius:'var(--border-radius-lg)',
        cursor:'pointer', transition:'all 0.15s'
      }
    },[
      el('div',{style:{flex:'1',minWidth:'0'}},coachBadge(res.winner)),
      el('div',{style:{textAlign:'center',flexShrink:'0'}},[
        el('div',{style:{display:'flex',alignItems:'center',gap:'6px'}},[
          el('span',{style:{fontFamily:'var(--font-display)',fontWeight:'700',fontSize:'18px',color:wColor}},String(res.wScore)),
          el('span',{style:{color:'var(--color-text-tertiary)',fontSize:'14px'}},'-'),
          el('span',{style:{fontFamily:'var(--font-display)',fontWeight:'700',fontSize:'18px',color:'var(--color-text-tertiary)'}},String(res.lScore)),
        ]),
        res.swept?el('div',{style:{fontSize:'9px',color:'var(--color-text-tertiary)',textTransform:'uppercase',letterSpacing:'0.5px'}},'sweep'):
        el('div',{style:{fontSize:'9px',color:'var(--color-text-tertiary)',textTransform:'uppercase',letterSpacing:'0.5px'}},'Bo3')
      ]),
      el('div',{style:{flex:'1',minWidth:'0',display:'flex',justifyContent:'flex-end'}},coachBadge(res.loser))
    ]);
    card.onmouseover=()=>{card.style.borderColor=wColor+'80';};
    card.onmouseout=()=>{card.style.borderColor=wColor+'40';};
    return card;
  });

  return el('div',{},[
    weekSelector,
    section('Week '+wk+' Recap', (selectedWk < maxWk ? 'Historical recap' : 'Most recently completed week')+' — all results and standouts',
      el('div',{},[
        highlights.length>0?el('div',{style:{display:'flex',gap:'10px',flexWrap:'wrap',padding:'16px 20px 8px'}},highlights):null,
        extraHighlights.length>0?el('div',{style:{display:'flex',gap:'10px',flexWrap:'wrap',padding:'0 20px 8px'}},extraHighlights):null,
        el('div',{style:{padding:'4px 20px 4px'}},[
          el('div',{style:{fontSize:'11px',fontWeight:'600',color:'var(--color-text-tertiary)',textTransform:'uppercase',letterSpacing:'0.6px',marginBottom:'10px'}},'All results')
        ]),
        el('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(260px,1fr))',gap:'8px',padding:'0 20px 20px'}},resultCards)
      ])
    )
  ]);
}

function viewLeaderboard(state) {
  const { data } = state;
  const { lb } = state;
  const mons = monStats(data.gameLog);

  const filtered = Object.values(mons)
    .filter(m => lb.filterCoach==='All' || m.coach===lb.filterCoach)
    .filter(m => m.gp >= (lb.minGP||1))
    .sort((a,b) => {
      const av = a[lb.sortKey]??0, bv = b[lb.sortKey]??0;
      return lb.sortDir==='desc' ? bv-av : av-bv;
    }).slice(0,60);

  const controls = el('div',{
    style:{display:'flex',gap:'12px',marginBottom:'1.25rem',flexWrap:'wrap',alignItems:'center'}
  },[
    el('label',{style:{fontSize:'12px',color:'var(--color-text-secondary)',textTransform:'uppercase',letterSpacing:'0.6px',fontWeight:'600'}},'Coach'),
    select(lb.filterCoach, ['All'].concat(COACHES), v=>{state.lb.filterCoach=v;render(state);}),
    el('label',{style:{fontSize:'12px',color:'var(--color-text-secondary)',textTransform:'uppercase',letterSpacing:'0.6px',fontWeight:'600'}},'Min GP'),
    el('input',{
      type:'number',value:String(lb.minGP||1),min:'1',max:'20',
      style:{width:'60px',padding:'6px 8px',borderRadius:'var(--border-radius-md)',border:'0.5px solid var(--color-border-secondary)',background:'var(--color-background-secondary)',color:'var(--color-text-primary)',fontSize:'13px'},
      oninput:(e)=>{state.lb.minGP=Math.max(1,parseInt(e.target.value)||1);render(state);}
    })
  ]);

  const headers = [
    {key:'rank',label:'#'},{key:'mvp',label:'MVP'},
    {key:'mon',label:'Pokemon',align:'left'},{key:'coach',label:'Coach',align:'left'},
    {key:'gp',label:'GP'},{key:'record',label:'W-L'},
    {key:'winPct',label:'Win%'},{key:'tk',label:'K'},
    {key:'deaths',label:'D'},{key:'kdr',label:'K/D'},{key:'dout',label:'Dmg'}
  ];

  const rows = filtered.map((r,i) => [
    rankBadge(i+1),
    el('span',{style:{fontFamily:'var(--font-display)',fontWeight:'600',fontSize:'15px'}},String(r.mvp)),
    monLink(r.coach,r.mon),
    coachBadge(r.coach),
    formatInt(r.gp),
    mono(r.gw+'-'+(r.gp-r.gw)),
    formatPct(r.winPct),
    formatInt(r.tk),
    formatInt(r.deaths),
    formatKDR(r.kdr),
    formatDmg(r.dout)
  ]);

  return el('div',{},[controls, section('Pokemon Leaderboard','Season MVP rankings',el('div',{style:{overflowX:'auto'}},makeTable(headers,rows,{stickyHeader:true})))]);
}
function viewHeadToHead(state) {
  const { c1, c2 } = state.h2h;
  const { data } = state;

  const controls = el('div', {
    style: { display: 'flex', gap: '12px', marginBottom: '1.25rem', flexWrap: 'wrap', alignItems: 'center' }
  }, [
    el('label', { style: { fontSize: '12px', color: 'var(--color-text-secondary)', textTransform: 'uppercase', letterSpacing: '0.6px', fontWeight: '600' } }, 'Coach A'),
    select(c1, COACHES, v => { state.h2h.c1 = v; render(state); }),
    el('label', { style: { fontSize: '12px', color: 'var(--color-text-secondary)', textTransform: 'uppercase', letterSpacing: '0.6px', fontWeight: '600' } }, 'Coach B'),
    select(c2, COACHES, v => { state.h2h.c2 = v; render(state); })
  ]);

  if (c1 === c2) return el('div', {}, [controls, card(el('p', { style: { margin: '0', color: 'var(--color-text-secondary)' } }, 'Select two different coaches.'))]);

  const gids = new Set();
  data.gameLog.forEach(r => { if (r.coach === c1 && r.opp === c2) gids.add(r.gid); });
  const games = Array.from(gids).sort();

  if (games.length === 0) {
    return el('div', {}, [controls, card(el('p', { style: { margin: '0', color: 'var(--color-text-secondary)' } }, 'No games between ' + c1 + ' and ' + c2 + ' yet.'))]);
  }

  const h2hGl = data.gameLog.filter(r => gids.has(r.gid));
  const h2hMl = data.moveLog.filter(r => gids.has(r.gid));
  const h2hTl = data.turnLog.filter(r => gids.has(r.gid));

  const c1Color = COACH_COLORS[c1] || '#888';
  const c2Color = COACH_COLORS[c2] || '#888';

  // Series score
  const gameWinners = {};
  h2hGl.forEach(r => { if (r.won && !gameWinners[r.gid]) gameWinners[r.gid] = r.coach; });
  const c1Wins = Object.values(gameWinners).filter(w => w === c1).length;
  const c2Wins = Object.values(gameWinners).filter(w => w === c2).length;
  const seriesWinner = c1Wins > c2Wins ? c1 : c2Wins > c1Wins ? c2 : null;

  // Totals
  const c1Rows = h2hGl.filter(r => r.coach === c1);
  const c2Rows = h2hGl.filter(r => r.coach === c2);
  const c1Kills = c1Rows.reduce((s, r) => s + (r.kd || 0) + (r.ki || 0), 0);
  const c2Kills = c2Rows.reduce((s, r) => s + (r.kd || 0) + (r.ki || 0), 0);
  const c1Dmg = c1Rows.reduce((s, r) => s + (r.dout || 0), 0);
  const c2Dmg = c2Rows.reduce((s, r) => s + (r.dout || 0), 0);

  // Scoreboard hero
  const scoreboard = el('div', {
    style: {
      background: 'linear-gradient(135deg, ' + c1Color + '20 0%, var(--color-background-primary) 40%, var(--color-background-primary) 60%, ' + c2Color + '20 100%)',
      border: '0.5px solid var(--color-border-tertiary)',
      borderRadius: 'var(--border-radius-lg)',
      padding: '2rem',
      marginBottom: '1.25rem'
    }
  }, [
    el('div', {
      style: { display: 'grid', gridTemplateColumns: '1fr auto 1fr', alignItems: 'center', gap: '20px' }
    }, [
      el('div', { style: { textAlign: 'center' } }, [
        el('div', { style: { marginBottom: '12px', display: 'flex', justifyContent: 'center' } }, coachBadge(c1, 'lg')),
        el('div', {
          style: {
            fontFamily: 'var(--font-display)', fontSize: '64px', fontWeight: '700',
            color: c1Wins >= c2Wins ? c1Color : 'var(--color-text-tertiary)',
            lineHeight: '1', letterSpacing: '-0.03em'
          }
        }, String(c1Wins))
      ]),
      el('div', { style: { textAlign: 'center' } }, [
        el('div', { style: { fontSize: '28px', color: 'var(--color-text-tertiary)', fontWeight: '300' } }, '—'),
        el('div', {
          style: {
            fontSize: '11px', color: 'var(--color-text-tertiary)', marginTop: '8px',
            textTransform: 'uppercase', letterSpacing: '0.8px', fontWeight: '600'
          }
        }, games.length + (games.length === 1 ? ' game' : ' games'))
      ]),
      el('div', { style: { textAlign: 'center' } }, [
        el('div', { style: { marginBottom: '12px', display: 'flex', justifyContent: 'center' } }, coachBadge(c2, 'lg')),
        el('div', {
          style: {
            fontFamily: 'var(--font-display)', fontSize: '64px', fontWeight: '700',
            color: c2Wins >= c1Wins ? c2Color : 'var(--color-text-tertiary)',
            lineHeight: '1', letterSpacing: '-0.03em'
          }
        }, String(c2Wins))
      ])
    ]),
    el('div', {
      style: {
        display: 'grid', gridTemplateColumns: '1fr 1fr 1fr 1fr',
        gap: '12px', marginTop: '24px'
      }
    }, [
      el('div', { style: { textAlign: 'center' } }, [
        el('div', { style: { fontSize: '10px', color: 'var(--color-text-tertiary)', textTransform: 'uppercase', letterSpacing: '0.6px', fontWeight: '600', marginBottom: '4px' } }, c1 + ' kills'),
        el('div', { style: { fontFamily: 'var(--font-display)', fontSize: '20px', fontWeight: '600', color: c1Color } }, String(c1Kills))
      ]),
      el('div', { style: { textAlign: 'center' } }, [
        el('div', { style: { fontSize: '10px', color: 'var(--color-text-tertiary)', textTransform: 'uppercase', letterSpacing: '0.6px', fontWeight: '600', marginBottom: '4px' } }, c1 + ' damage'),
        el('div', { style: { fontFamily: 'var(--font-display)', fontSize: '20px', fontWeight: '600', color: c1Color } }, formatInt(c1Dmg) + '%')
      ]),
      el('div', { style: { textAlign: 'center' } }, [
        el('div', { style: { fontSize: '10px', color: 'var(--color-text-tertiary)', textTransform: 'uppercase', letterSpacing: '0.6px', fontWeight: '600', marginBottom: '4px' } }, c2 + ' kills'),
        el('div', { style: { fontFamily: 'var(--font-display)', fontSize: '20px', fontWeight: '600', color: c2Color } }, String(c2Kills))
      ]),
      el('div', { style: { textAlign: 'center' } }, [
        el('div', { style: { fontSize: '10px', color: 'var(--color-text-tertiary)', textTransform: 'uppercase', letterSpacing: '0.6px', fontWeight: '600', marginBottom: '4px' } }, c2 + ' damage'),
        el('div', { style: { fontFamily: 'var(--font-display)', fontSize: '20px', fontWeight: '600', color: c2Color } }, formatInt(c2Dmg) + '%')
      ])
    ])
  ]);

  // Highlights
  const monStats = {};
  h2hGl.forEach(r => {
    const k = r.coach + '|' + r.mon;
    if (!monStats[k]) monStats[k] = { coach: r.coach, mon: r.mon, tk: 0, d: 0, dout: 0, gp: 0 };
    monStats[k].tk += (r.kd || 0) + (r.ki || 0);
    monStats[k].d += r.d || 0;
    monStats[k].dout += r.dout || 0;
    monStats[k].gp++;
  });

  const moveUses = {};
  h2hMl.forEach(r => {
    const k = r.coach + '|' + r.mon + '|' + r.move;
    if (!moveUses[k]) moveUses[k] = { coach: r.coach, mon: r.mon, move: r.move, uses: 0, dmg: 0 };
    moveUses[k].uses += r.uses || 0;
    moveUses[k].dmg += r.dmg || 0;
  });

  const tlCounts = {};
  h2hTl.forEach(r => {
    if (!r.coach || !r.mon) return;
    const k = r.coach + '|' + r.mon + '|' + r.event;
    tlCounts[k] = (tlCounts[k] || 0) + 1;
  });

  const monArr = Object.values(monStats);
  const moveArr = Object.values(moveUses);

  const topKiller = monArr.sort((a, b) => b.tk - a.tk)[0];
  const topDmg = monArr.sort((a, b) => b.dout - a.dout)[0];
  const topMove = moveArr.sort((a, b) => b.uses - a.uses)[0];

  // Wall: most protect blocks
  const protectBlocks = {};
  h2hTl.forEach(r => {
    if (r.event === 'PROTECT' && r.outcome === 'BLOCKED' && r.coach && r.mon) {
      const k = r.coach + '|' + r.mon;
      protectBlocks[k] = (protectBlocks[k] || { coach: r.coach, mon: r.mon, count: 0 });
      protectBlocks[k].count++;
    }
  });
  const topWall = Object.values(protectBlocks).sort((a, b) => b.count - a.count)[0];

  // Flinch machine
  const flinches = {};
  h2hTl.forEach(r => {
    if (r.event === 'FLINCH' && r.coach && r.mon) {
      const k = r.coach + '|' + r.mon;
      flinches[k] = (flinches[k] || { coach: r.coach, mon: r.mon, count: 0 });
      flinches[k].count++;
    }
  });
  const topFlincher = Object.values(flinches).sort((a, b) => b.count - a.count)[0];

  // Build highlight cards — pick the most interesting ones
  const makeHighlight = (icon, label, coach, mon, valueLine, subLine) => {
    if (!mon) return null;
    const color = COACH_COLORS[coach] || '#888';
    return el('div', {
      onclick: () => { state.view = 'mon'; state.mdd.coach = coach; state.mdd.mon = mon; render(state); },
      style: {
        background: 'var(--color-background-secondary)',
        border: '0.5px solid var(--color-border-tertiary)',
        borderRadius: 'var(--border-radius-lg)',
        padding: '16px',
        cursor: 'pointer',
        transition: 'all 0.15s',
        position: 'relative'
      }
    }, [
      el('div', {
        style: {
          position: 'absolute', top: '12px', right: '12px',
          width: '28px', height: '28px', borderRadius: '50%',
          background: color + '25', color: color,
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          fontSize: '15px'
        }
      }, icon),
      el('div', {
        style: { fontSize: '10px', color: 'var(--color-text-tertiary)', textTransform: 'uppercase', letterSpacing: '0.6px', fontWeight: '600', marginBottom: '10px', paddingRight: '32px' }
      }, label),
      el('div', { style: { display: 'flex', alignItems: 'center', gap: '10px', marginBottom: '6px' } }, [
        monSprite(mon, 40),
        el('div', {}, [
          el('div', { style: { fontWeight: '600', fontSize: '13px', lineHeight: '1.2' } }, mon),
          el('div', { style: { display: 'flex', justifyContent: 'flex-start', marginTop: '4px' } }, coachBadge(coach))
        ])
      ]),
      el('div', {
        style: { fontFamily: 'var(--font-display)', fontSize: '20px', fontWeight: '700', color: color, marginTop: '8px', letterSpacing: '-0.02em' }
      }, valueLine),
      subLine ? el('div', { style: { fontSize: '11px', color: 'var(--color-text-tertiary)', marginTop: '3px' } }, subLine) : null
    ].filter(x => x));
  };

  const highlights = [
    topKiller && topKiller.tk > 0 ? makeHighlight('⚔️', 'Match MVP', topKiller.coach, topKiller.mon,
      topKiller.tk + ' kill' + (topKiller.tk !== 1 ? 's' : ''),
      formatInt(topKiller.dout) + '% damage  •  ' + topKiller.gp + ' game' + (topKiller.gp !== 1 ? 's' : '')) : null,
    topMove ? makeHighlight('📋', 'Signature move', topMove.coach, topMove.mon,
      topMove.move + ' ×' + topMove.uses,
      formatInt(topMove.dmg) + '% total damage') : null,
    topWall && topWall.count >= 2 ? makeHighlight('🛡️', 'The wall', topWall.coach, topWall.mon,
      topWall.count + ' protect' + (topWall.count !== 1 ? 's' : '') + ' blocked',
      'hardest to get through') : null,
    topFlincher && topFlincher.count >= 1 ? makeHighlight('💥', 'Flinch machine', topFlincher.coach, topFlincher.mon,
      topFlincher.count + ' flinch' + (topFlincher.count !== 1 ? 'es' : '') + ' caused',
      'disruption specialist') : null,
    topDmg && topDmg !== topKiller ? makeHighlight('💢', 'Damage dealer', topDmg.coach, topDmg.mon,
      formatInt(topDmg.dout) + '% damage',
      formatInt(topDmg.dout / Math.max(1, topDmg.gp)) + '% per game') : null
  ].filter(x => x).slice(0, 4);

  const highlightsSection = section('Match highlights', 'Standout performers — click to open their deep dive',
    el('div', {
      style: {
        display: 'grid',
        gridTemplateColumns: 'repeat(auto-fit, minmax(200px, 1fr))',
        gap: '12px',
        padding: '16px 20px 20px'
      }
    }, highlights.length > 0 ? highlights :
      [el('div', { style: { padding: '20px', color: 'var(--color-text-tertiary)', textAlign: 'center' } }, 'Not enough data for highlights yet')]
    ),
    { marginBottom: '1.25rem' }
  );

  // Per-game team breakdowns
  const gameCards = games.map((gid, gameIdx) => {
    const gameRows = h2hGl.filter(r => r.gid === gid);
    const winner = gameWinners[gid];
    const g = gameIdx + 1;

    const makeTeamPanel = (coach) => {
      const coachRows = gameRows.filter(r => r.coach === coach);
      const coachColor = COACH_COLORS[coach] || '#888';
      const isWinner = winner === coach;

      const monRows = coachRows.map(r => {
        const moves = h2hMl
          .filter(m => m.gid === gid && m.coach === coach && m.mon === r.mon)
          .sort((a, b) => b.uses - a.uses)

          .map(m => m.move + ' ×' + m.uses);

        // Look up actual Tera type from turn log
        const teraEvent = h2hTl.find(t => t.gid === gid && t.coach === coach && t.mon === r.mon && t.event === 'TERA');
        const teraType = teraEvent ? teraEvent.outcome : null;

        return el('div', {
          style: {
            display: 'flex',
            alignItems: 'center',
            gap: '10px',
            padding: '8px 0',
            borderBottom: '0.5px solid var(--color-border-tertiary)',
            opacity: '1'
          }
        }, [
          el('div', { style: { position: 'relative', flexShrink: '0' } }, [
            monSprite(r.mon, 36),
            r.lead ? el('span', {
              style: {
                position: 'absolute', top: '-4px', right: '-4px',
                width: '14px', height: '14px', borderRadius: '50%',
                background: coachColor, color: '#fff',
                fontSize: '8px', fontWeight: '700',
                display: 'flex', alignItems: 'center', justifyContent: 'center'
              }
            }, 'L') : null
          ]),
          el('div', { style: { flex: '1', minWidth: '0' } }, [
            el('div', { style: { fontSize: '13px', fontWeight: '600', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' } }, r.mon),
            el('div', { style: { fontSize: '11px', color: 'var(--color-text-tertiary)', marginTop: '2px', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' } },
              moves.length > 0 ? moves.join('  •  ') : 'no moves recorded')
          ]),
          el('div', { style: { textAlign: 'right', flexShrink: '0' } }, [
            el('div', {
              style: {
                fontSize: '11px', fontWeight: '600',
                display: 'flex', gap: '8px', justifyContent: 'flex-end'
              }
            }, [
              (r.kd + r.ki) > 0 ? el('span', { style: { color: 'var(--color-text-success)' } }, (r.kd + r.ki) + 'K') : null,
              r.d > 0 ? el('span', { style: { color: 'var(--color-text-danger)' } }, r.d + 'D') : null,
              teraType ? typeBadge(teraType) : null
            ].filter(x => x)),
            el('div', { style: { fontSize: '11px', color: 'var(--color-text-tertiary)', marginTop: '2px' } },
              formatInt(r.dout) + '% dmg')
          ])
        ]);
      });

      return el('div', {
        style: {
          flex: '1',
          background: isWinner ? coachColor + '10' : 'var(--color-background-secondary)',
          border: '0.5px solid ' + (isWinner ? coachColor + '50' : 'var(--color-border-tertiary)'),
          borderRadius: 'var(--border-radius-lg)',
          padding: '14px 16px',
          minWidth: '0'
        }
      }, [
        el('div', {
          style: { display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: '12px' }
        }, [
          coachBadge(coach),
          isWinner ? el('span', {
            style: {
              fontSize: '11px', fontWeight: '700', color: coachColor,
              textTransform: 'uppercase', letterSpacing: '0.6px'
            }
          }, 'Winner') : null
        ].filter(x => x)),
        el('div', {}, monRows)
      ]);
    };

    return section(
      'Game ' + g,
      gid + (winner ? '  •  ' + winner + ' wins' : '  •  Result unknown'),
      el('div', {
        style: {
          display: 'grid',
          gridTemplateColumns: '1fr 1fr',
          gap: '12px',
          padding: '16px 20px 20px'
        }
      }, [makeTeamPanel(c1), makeTeamPanel(c2)]),
      { marginBottom: '1.25rem' }
    );
  });

  return el('div', {}, [
    controls,
    scoreboard,
    highlightsSection,
    ...gameCards
  ]);
}


function viewMonDeepDive(state) {
  const { data } = state;
  const { coach, mon } = state.mdd;
  const coachMons = data.roster.filter(r => r.coach === coach);
  const currentMon = coachMons.find(m => m.mon === mon) ? mon : (coachMons[0] && coachMons[0].mon) || '';
  if (currentMon !== mon) state.mdd.mon = currentMon;

  const controls = el('div', {
    style: { display: 'flex', gap: '12px', marginBottom: '1.25rem', flexWrap: 'wrap', alignItems: 'center' }
  }, [
    el('label', { style: { fontSize: '12px', color: 'var(--color-text-secondary)', textTransform: 'uppercase', letterSpacing: '0.6px', fontWeight: '600' } }, 'Coach'),
    select(coach, COACHES, v => { state.mdd.coach = v; state.mdd.mon = ''; render(state); }),
    el('label', { style: { fontSize: '12px', color: 'var(--color-text-secondary)', textTransform: 'uppercase', letterSpacing: '0.6px', fontWeight: '600' } }, 'Pokemon'),
    select(state.mdd.mon, coachMons.map(m => ({ value: m.mon, label: m.mon + (m.status === 'Former' ? ' (former)' : '') })), v => { state.mdd.mon = v; render(state); })
  ]);

  const all = monStats(data.gameLog);
  const s = all[coach + '|' + state.mdd.mon];

  if (!s) {
    return el('div', {}, [
      controls,
      card(el('p', { style: { margin: '0', color: 'var(--color-text-secondary)' } }, 'No games played yet.'))
    ]);
  }

  const moves = monMoveStats(data.moveLog, coach, state.mdd.mon);

  const teraTypes = {};
  data.turnLog.forEach(t => {
    if (t.coach === coach && t.mon === state.mdd.mon && t.event === 'TERA') {
      teraTypes[t.outcome] = (teraTypes[t.outcome] || 0) + 1;
    }
  });
  const teraList = Object.entries(teraTypes).sort((a, b) => b[1] - a[1]);

  const coachColor = COACH_COLORS[coach] || '#888';

  const hero = el('div', {
    style: {
      position: 'relative',
      background: 'radial-gradient(circle at 15% 50%, ' + coachColor + '30 0%, ' + coachColor + '0a 60%, transparent 100%), var(--color-background-primary)',
      border: '0.5px solid ' + coachColor + '60',
      borderRadius: 'var(--border-radius-lg)',
      padding: '28px',
      marginBottom: '1.25rem',
      overflow: 'hidden'
    }
  }, [
    el('div', {
      style: {
        display: 'grid',
        gridTemplateColumns: 'auto 1fr',
        gap: '28px',
        alignItems: 'center'
      }
    }, [
      el('div', {
        style: {
          width: '160px',
          height: '160px',
          display: 'flex',
          alignItems: 'center',
          justifyContent: 'center',
          background: 'rgba(255,255,255,0.04)',
          border: '0.5px solid ' + coachColor + '30',
          borderRadius: 'var(--border-radius-lg)',
          flexShrink: '0'
        }
      }, monSprite(state.mdd.mon, 140)),
      el('div', {}, [
        el('div', { style: { marginBottom: '12px' } }, coachBadge(coach, 'lg')),
        el('h1', {
          style: {
            fontFamily: 'var(--font-display)',
            fontSize: '36px',
            fontWeight: '700',
            margin: '0 0 14px 0',
            letterSpacing: '-0.03em',
            lineHeight: '1.1'
          }
        }, state.mdd.mon),
        el('div', { style: { display: 'flex', gap: '20px', flexWrap: 'wrap', fontSize: '13px', alignItems: 'center' } }, [
          el('div', {}, [
            el('span', { style: { color: 'var(--color-text-tertiary)', textTransform: 'uppercase', letterSpacing: '0.6px', fontSize: '11px', fontWeight: '600' } }, 'Record  '),
            el('span', { style: { fontFamily: 'var(--font-mono)', fontWeight: '600', fontSize: '14px' } }, s.gw + '-' + (s.gp - s.gw))
          ]),
          el('div', {}, [
            el('span', { style: { color: 'var(--color-text-tertiary)', textTransform: 'uppercase', letterSpacing: '0.6px', fontSize: '11px', fontWeight: '600' } }, 'MVP  '),
            el('span', { style: { fontFamily: 'var(--font-display)', fontWeight: '700', fontSize: '16px' } }, String(s.mvp))
          ]),
          teraList.length > 0 ? el('div', { style: { display: 'flex', alignItems: 'center', gap: '8px' } }, [
            el('span', { style: { color: 'var(--color-text-tertiary)', textTransform: 'uppercase', letterSpacing: '0.6px', fontSize: '11px', fontWeight: '600' } }, 'Tera'),
            ...teraList.map(([type, n]) => el('span', {
              style: { display: 'inline-flex', alignItems: 'center', gap: '5px' }
            }, [typeBadge(type), n > 1 ? el('span', { style: { fontSize: '11px', color: 'var(--color-text-tertiary)', fontFamily: 'var(--font-mono)' } }, '×' + n) : null].filter(x => x)))
          ]) : null
        ].filter(x => x))
      ])
    ])
  ]);

  const metricsGrid = el('div', {
    style: {
      display: 'grid',
      gridTemplateColumns: 'repeat(auto-fit, minmax(130px, 1fr))',
      gap: '10px',
      marginBottom: '1.25rem'
    }
  }, [
    metric('Games', s.gp, s.gw + ' wins'),
    metric('Win rate', formatPct(s.winPct)),
    metric('Kills', s.tk, s.kd + ' KD / ' + s.ki + ' KI'),
    metric('Deaths', s.deaths),
    metric('K/D', formatKDR(s.kdr)),
    metric('Damage', formatDmg(s.dout), formatInt(s.dmgPerGame) + '% per game'),
    metric('Switches', s.sw, (s.sw / Math.max(1, s.gp)).toFixed(1) + ' per game'),
    metric('Tera', s.teras + '/' + s.gp, formatPct(s.teras / Math.max(1, s.gp)))
  ]);

  let movesSection = null;
  if (moves.length > 0) {
    const maxUses = Math.max(...moves.map(m => m.uses));
    const moveRows = moves.map(m => {
      const pct = maxUses > 0 ? m.uses / maxUses : 0;
      return [
        el('span', { style: { textAlign: 'left', display: 'block', fontWeight: '600', fontSize: '13px' } }, m.move),
        el('div', { style: { display: 'flex', alignItems: 'center', gap: '10px', justifyContent: 'flex-end' } }, [
          el('div', {
            style: {
              width: '80px',
              height: '6px',
              background: 'var(--color-background-secondary)',
              borderRadius: '3px',

function buildSeriesResults(gameLog) {
  const results = {};
  gameLog.forEach(r => {
    const key = 'W' + r.wk + '-M' + r.m;
    if (!results[key]) results[key] = { wk: r.wk, m: r.m, gameWinners: {}, coaches: new Set() };
    results[key].coaches.add(r.coach);
    if (r.won && !results[key].gameWinners[r.g]) results[key].gameWinners[r.g] = r.coach;
  });
  Object.values(results).forEach(s => {
    const coaches = Array.from(s.coaches);
    if (coaches.length === 2) {
      const [c1, c2] = coaches;
      s.w1 = Object.values(s.gameWinners).filter(w => w === c1).length;
      s.w2 = Object.values(s.gameWinners).filter(w => w === c2).length;
      s.c1 = c1; s.c2 = c2;
      s.done = (s.w1 === 2 || s.w2 === 2);
      s.winner = s.w1 > s.w2 ? c1 : s.w2 > s.w1 ? c2 : null;
      s.gamesPlayed = Object.keys(s.gameWinners).length;
    }
  });
  return results;
}

    }));

    const weekGames = FULL_SCHEDULE.filter(s => s.wk === wk);
    const weekDone = weekGames.filter(s => {
      const r = results['W' + s.wk + '-M' + s.m];
      return r && r.done;
    }).length;
    const subtitle = weekDone === weekGames.length
      ? 'All ' + weekGames.length + ' matches complete'
      : weekDone + ' of ' + weekGames.length + ' complete';

    return section('Week ' + wk, subtitle, matchCards, { marginBottom: '1.25rem' });
  }).filter(x => x);

  const totalMatches = FULL_SCHEDULE.length;
  const doneMatches = FULL_SCHEDULE.filter(s => {
    const r = results['W' + s.wk + '-M' + s.m];
    return r && r.done;
  }).length;

  const summary = el('div', {
    style: {
      display: 'grid',
      gridTemplateColumns: 'repeat(auto-fit, minmax(150px, 1fr))',
      gap: '12px',
      marginBottom: '1.75rem'
    }
  }, [
    metric('Total matches', totalMatches, '11 weeks × 6 per week'),
    metric('Completed', doneMatches, Math.round(doneMatches / totalMatches * 100) + '% of season'),
    metric('Remaining', totalMatches - doneMatches, 'matches left to play'),
    metric('Current week', Math.max(...Object.values(results).map(r => r.wk)) || 1, 'active week')
  ]);

  return el('div', {}, [
    controls,
    summary,
    ...weekSections
  ]);
}
// ============================================================
// PLAYOFF CONFIG
// ============================================================
const PLAYOFF_CONFIG = {
  season: 2026,
  format: 'single',
  teams: 12,
  bestOf: 5,
  thirdPlace: true,
  seedingMethod: 'standings',
};

const PLAYOFF_BRACKET = {
  locked: false,
  manualSeeds: null,
  results: {
    // Winners bracket: 'R1-1','R1-2','R1-3','R1-4'
    //                  'QF-1','QF-2','QF-3','QF-4'
    //                  'SF-1','SF-2','FIN'
    // Losers bracket:  'LBR1-1','LBR1-2'
    //                  'LBR2-1','LBR2-2'
    //                  'LBR3-1','LBR3-2'
    //                  'LBSF-1','LBSF-2','LBFIN'
    // Format: { w1: gamesWonByHome, w2: gamesWonByAway, done: bool }
  },
};

const PLAYOFF_GOLD   = '#D4AF37';
const PLAYOFF_BRONZE = '#CD7F32';

// ============================================================
// Seed helpers
// ============================================================
function getPlayoffSeeds(gameLog) {
  if (PLAYOFF_BRACKET.manualSeeds) return PLAYOFF_BRACKET.manualSeeds;
  const stats = coachStats(gameLog);
  return Object.values(stats)
    .sort((a, b) => a.rank - b.rank)
    .slice(0, PLAYOFF_CONFIG.teams)
    .map(s => s.coach);
}

// ============================================================
// Bracket computation
// ============================================================
function getBracketMatchups(seeds) {
  const bo = PLAYOFF_CONFIG.bestOf;
  const r  = PLAYOFF_BRACKET.results;

  function seedCoach(seed) {
    if (typeof seed === 'number') return seeds[seed - 1] || '?';
    return seed;
  }
  function seedNum(coach) {
    const i = seeds.indexOf(coach);
    return i >= 0 ? i + 1 : 999;
  }
  function matchWinner(id, c1, c2) {
    const res = r[id];
    if (!res || !res.done) return null;
    return res.w1 > res.w2 ? c1 : c2;
  }
  function matchLoser(id, c1, c2) {
    const res = r[id];
    if (!res || !res.done) return null;
    return res.w1 < res.w2 ? c1 : c2;
  }

  // ── Winners bracket ──────────────────────────────────────
  const r1 = [
    { id:'R1-1', seed1:5,  seed2:12 },
    { id:'R1-2', seed1:6,  seed2:11 },
    { id:'R1-3', seed1:7,  seed2:10 },
    { id:'R1-4', seed1:8,  seed2:9  },
  ].map(m => {
    const c1 = seedCoach(m.seed1), c2 = seedCoach(m.seed2);
    return { ...m, bo, c1, c2, res: r[m.id]||null,
      winner: matchWinner(m.id,c1,c2), loser: matchLoser(m.id,c1,c2) };
  });

  const qf = [
    { id:'QF-1', seed1:1, feedId:'R1-4' },  // 1 v W(8v9)
    { id:'QF-2', seed1:2, feedId:'R1-2' },  // 2 v W(6v11)
    { id:'QF-3', seed1:3, feedId:'R1-3' },  // 3 v W(7v10)
    { id:'QF-4', seed1:4, feedId:'R1-1' },  // 4 v W(5v12)
  ].map(m => {
    const feeder = r1.find(x => x.id === m.feedId);
    const c1 = seedCoach(m.seed1);
    const c2 = feeder ? (feeder.winner || '?') : '?';
    return { ...m, bo, c1, c2, res: r[m.id]||null,
      winner: matchWinner(m.id,c1,c2), loser: matchLoser(m.id,c1,c2) };
  });

  const sf = [
    { id:'SF-1', feedId1:'QF-1', feedId2:'QF-4' },
    { id:'SF-2', feedId1:'QF-2', feedId2:'QF-3' },
  ].map(m => {
    const f1 = qf.find(x => x.id === m.feedId1);
    const f2 = qf.find(x => x.id === m.feedId2);
    const c1 = f1 ? (f1.winner||'?') : '?';
    const c2 = f2 ? (f2.winner||'?') : '?';
    return { ...m, bo, c1, c2, res: r[m.id]||null,
      winner: matchWinner(m.id,c1,c2), loser: matchLoser(m.id,c1,c2) };
  });

  const fin = (() => {
    const c1 = sf[0]?.winner||'?', c2 = sf[1]?.winner||'?';
    return { id:'FIN', bo, c1, c2, res: r['FIN']||null,
      winner: matchWinner('FIN',c1,c2), loser: matchLoser('FIN',c1,c2) };
  })();

  // ── Losers bracket ───────────────────────────────────────
  // LBR1: R1 losers pair off (R1-1 loser vs R1-2 loser, R1-3 loser vs R1-4 loser)
  const lbr1 = [
    { id:'LBR1-1', feedA:'R1-1', feedB:'R1-2' },
    { id:'LBR1-2', feedA:'R1-3', feedB:'R1-4' },
  ].map(m => {
    const fA = r1.find(x => x.id === m.feedA);
    const fB = r1.find(x => x.id === m.feedB);
    const c1 = fA ? (fA.loser||'?') : '?';
    const c2 = fB ? (fB.loser||'?') : '?';
    return { ...m, bo, c1, c2, res: r[m.id]||null,
      winner: matchWinner(m.id,c1,c2), loser: matchLoser(m.id,c1,c2) };
  });

  // Pool after LBR1 + QF: 2 LBR1 winners + 4 QF losers = 6 teams
  // Top 2 seeds get byes into LBR3; bottom 4 play LBR2
  const lbPool = [];
  lbr1.forEach(m => {
    if (m.winner && m.winner !== '?') lbPool.push({ coach: m.winner, from: 'lbr1' });
  });
  qf.forEach(m => {
    if (m.loser && m.loser !== '?') lbPool.push({ coach: m.loser, from: 'qf' });
  });
  lbPool.sort((a, b) => seedNum(a.coach) - seedNum(b.coach));

  const byeTeams  = lbPool.slice(0, 2);
  const lbr2Pool  = lbPool.slice(2);

  // LBR2: pair LBR1 winner vs QF loser among the 4 non-bye teams
  const lbr2NonBye_lbr1 = lbr2Pool.filter(t => t.from === 'lbr1');
  const lbr2NonBye_qf   = lbr2Pool.filter(t => t.from === 'qf');

  const lbr2 = [0, 1].map(i => {
    const id = 'LBR2-' + (i+1);
    const c1 = lbr2NonBye_lbr1[i]?.coach || '?';
    const c2 = lbr2NonBye_qf[i]?.coach   || '?';
    return { id, bo, c1, c2, res: r[id]||null,
      winner: matchWinner(id,c1,c2), loser: matchLoser(id,c1,c2) };
  });

  // LBR3: bye teams face LBR2 winners
  const lbr3 = [0, 1].map(i => {
    const id = 'LBR3-' + (i+1);
    const c1 = byeTeams[i]?.coach  || '?';
    const c2 = lbr2[i]?.winner     || '?';
    return { id, bo, c1, c2, res: r[id]||null,
      winner: matchWinner(id,c1,c2), loser: matchLoser(id,c1,c2) };
  });

  // LBSF: LBR3 winners vs SF losers
  // Higher seed SF loser faces LOWER seed LBR3 winner
  const lbr3Winners = lbr3.map(m => ({ coach: m.winner||'?', seed: seedNum(m.winner||'?') }))
    .sort((a,b) => a.seed - b.seed);  // [0]=higher seed, [1]=lower seed
  const sfLosers = sf.map(m => ({ coach: m.loser||'?', seed: seedNum(m.loser||'?') }))
    .sort((a,b) => a.seed - b.seed);  // [0]=higher seed SF loser

  // Higher seed SF loser (sfLosers[0]) vs lower LBR3 winner (lbr3Winners[1])
  // Lower seed SF loser (sfLosers[1]) vs higher LBR3 winner (lbr3Winners[0])
  const lbsf = [
    { id:'LBSF-1', c1: sfLosers[0]?.coach||'?',   c2: lbr3Winners[1]?.coach||'?' },
    { id:'LBSF-2', c1: sfLosers[1]?.coach||'?',   c2: lbr3Winners[0]?.coach||'?' },
  ].map(m => ({
    ...m, bo, res: r[m.id]||null,
    winner: matchWinner(m.id,m.c1,m.c2), loser: matchLoser(m.id,m.c1,m.c2)
  }));

  const lbfin = (() => {
    const c1 = lbsf[0]?.winner||'?', c2 = lbsf[1]?.winner||'?';
    return { id:'LBFIN', bo, c1, c2, res: r['LBFIN']||null,
      winner: matchWinner('LBFIN',c1,c2) };
  })();

  return { r1, qf, sf, fin, lbr1, lbPool, byeTeams, lbr2, lbr3, lbsf, lbfin };
}

// ============================================================
// Match card renderer
// ============================================================
function bracketMatchCard(match, roundLabel, onClick, accentColor) {
  const res   = match.res;
  const done  = res && res.done;
  const live  = res && !res.done && (res.w1 > 0 || res.w2 > 0);
  const color = accentColor || PLAYOFF_GOLD;

  const makeRow = (coach, wins, isWinner) => {
    const cc = COACH_COLORS[coach] || '#555';
    const unknown = !coach || coach === '?';
    return el('div', {
      style: {
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        padding: '7px 12px',
        background: done && isWinner ? cc + '22' : 'transparent',
        borderRadius: 'var(--border-radius-sm)',
        opacity: unknown ? '0.4' : '1'
      }
    }, [
      el('div', { style: { display: 'flex', alignItems: 'center', gap: '8px' } }, [
        el('span', {
          style: {
            width: '8px', height: '8px', borderRadius: '50%',
            background: unknown ? 'var(--color-text-tertiary)' : cc, flexShrink: '0',
            boxShadow: done && isWinner ? '0 0 8px ' + cc + '80' : 'none'
          }
        }),
        el('span', {
          style: {
            fontSize: '13px', fontWeight: done && isWinner ? '600' : '500',
            color: unknown ? 'var(--color-text-tertiary)' : 'var(--color-text-primary)'
          }
        }, unknown ? 'TBD' : coach)
      ]),
      done ? el('span', {
        style: {
          fontFamily: 'var(--font-display)', fontWeight: '700', fontSize: '16px',
          color: isWinner ? cc : 'var(--color-text-tertiary)'
        }
      }, String(wins)) : null
    ].filter(x => x));
  };

  const winnerColor = done
    ? (res.w1 > res.w2 ? (COACH_COLORS[match.c1]||'#888') : (COACH_COLORS[match.c2]||'#888'))
    : null;

  const card = el('div', {
    onclick: done && onClick ? onClick : null,
    style: {
      background: 'var(--color-background-secondary)',
      border: '0.5px solid ' + (done ? winnerColor + '50' : 'var(--color-border-tertiary)'),
      borderRadius: 'var(--border-radius-lg)', overflow: 'hidden',
      transition: 'all 0.15s', cursor: done && onClick ? 'pointer' : 'default',
      minWidth: '190px'
    }
  }, [
    el('div', {
      style: {
        padding: '5px 12px', background: 'var(--color-background-primary)',
        borderBottom: '0.5px solid var(--color-border-tertiary)',
        display: 'flex', justifyContent: 'space-between', alignItems: 'center'
      }
    }, [
      el('span', { style: { fontSize: '10px', fontWeight: '600', textTransform: 'uppercase', letterSpacing: '0.6px', color } }, roundLabel),
      live ? el('span', { style: { fontSize: '10px', fontWeight: '600', color: 'var(--color-text-warning)' } }, 'Live') :
      done ? el('span', { style: { fontSize: '10px', color: 'var(--color-text-tertiary)' } }, 'Bo' + match.bo) : null
    ].filter(x => x)),
    el('div', { style: { padding: '4px 0' } }, [
      makeRow(match.c1, res ? res.w1 : 0, done && res.w1 > res.w2),
      el('div', { style: { height: '0.5px', background: 'var(--color-border-tertiary)', margin: '0 12px' } }),
      makeRow(match.c2, res ? res.w2 : 0, done && res.w2 > res.w1),
    ])
  ]);

  if (done && onClick) {
    card.onmouseover = () => { card.style.transform = 'translateY(-2px)'; card.style.borderColor = winnerColor + '80'; };
    card.onmouseout  = () => { card.style.transform = '';  card.style.borderColor = winnerColor + '50'; };
  }
  return card;
}

// ============================================================
// View entrypoint
// ============================================================
function viewPlayoffs(state) {
  const seeds   = getPlayoffSeeds(state.data.gameLog);
  const bracket = getBracketMatchups(seeds);
  const pTab    = state.playoffs.tab || 'bracket';

  const subTabBar = el('div', { style: { display: 'flex', gap: '8px', marginBottom: '1.5rem' } },
    [['bracket','Bracket'],['stats','Playoff stats']].map(([id, label]) => {
      const active = pTab === id;
      return el('button', {
        onclick: () => { state.playoffs.tab = id; render(state); },
        style: {
          padding: '8px 18px', fontSize: '13px',
          fontWeight: active ? '600' : '500',
          background: active ? PLAYOFF_GOLD + '22' : 'var(--color-background-secondary)',
          color: active ? PLAYOFF_GOLD : 'var(--color-text-secondary)',
          border: active ? '0.5px solid ' + PLAYOFF_GOLD + '60' : '0.5px solid var(--color-border-tertiary)',
          borderRadius: 'var(--border-radius-md)', cursor: 'pointer', transition: 'all 0.15s'
        }
      }, label);
    })
  );

  return el('div', {}, [
    subTabBar,
    pTab === 'bracket'
      ? renderBracket(state, seeds, bracket)
      : renderPlayoffStats(state, seeds, bracket)
  ]);
}

// ============================================================
// Bracket renderer
// ============================================================
function renderBracket(state, seeds, bracket) {
  const { r1, qf, sf, fin, lbr1, byeTeams, lbr2, lbr3, lbsf, lbfin } = bracket;

  const jump = (c1, c2) => () => {
    state.h2h.c1 = c1; state.h2h.c2 = c2; state.view = 'h2h'; render(state);
  };
  const mc = (m, label, color) =>
    bracketMatchCard(m, label, m.winner ? jump(m.c1, m.c2) : null, color);

  const sp = h => el('div', { style: { height: h + 'px', flexShrink: '0' } });

  const colStyle = { display: 'flex', flexDirection: 'column', gap: '12px', flex: '1', minWidth: '190px' };
  const colHdr = (label, color) => el('div', {
    style: { fontSize: '11px', fontWeight: '700', textTransform: 'uppercase', letterSpacing: '0.8px', color: color || 'var(--color-text-tertiary)', marginBottom: '4px', textAlign: 'center' }
  }, label);
  const col = (label, cards, color) => el('div', { style: colStyle }, [colHdr(label, color), ...cards]);

  // Seeds
  const seedList = el('div', {
    style: { display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(175px, 1fr))', gap: '8px', padding: '16px 20px 20px' }
  }, seeds.map((coach, i) => {
    const seed = i + 1, hasBye = seed <= 4;
    return el('div', {
      style: { display: 'flex', alignItems: 'center', gap: '10px', padding: '8px 12px', background: 'var(--color-background-secondary)', border: hasBye ? '0.5px solid ' + PLAYOFF_GOLD + '50' : '0.5px solid var(--color-border-tertiary)', borderRadius: 'var(--border-radius-md)' }
    }, [
      el('span', { style: { fontFamily: 'var(--font-display)', fontWeight: '700', fontSize: '14px', color: hasBye ? PLAYOFF_GOLD : 'var(--color-text-tertiary)', minWidth: '24px', textAlign: 'right' } }, '#' + seed),
      coachBadge(coach),
      hasBye ? el('span', { style: { fontSize: '10px', fontWeight: '600', color: PLAYOFF_GOLD, textTransform: 'uppercase', letterSpacing: '0.4px', marginLeft: 'auto' } }, 'bye') : null
    ].filter(x => x));
  }));

  const seedSection = section('Seedings', PLAYOFF_CONFIG.teams + '-team bracket  •  Bo' + PLAYOFF_CONFIG.bestOf + ' every round', seedList, { marginBottom: '1.25rem' });

  // Winners bracket
  const wbGrid = el('div', { style: { display: 'flex', gap: '20px', overflowX: 'auto', padding: '16px 20px 24px', alignItems: 'flex-start' } }, [
    col('Round 1',     r1.map(m => mc(m, 'Round 1'))),
    col('Quarterfinals', [sp(50), mc(qf[0],'Quarterfinal'), sp(12), mc(qf[1],'Quarterfinal'), sp(12), mc(qf[2],'Quarterfinal'), sp(12), mc(qf[3],'Quarterfinal'), sp(50)]),
    col('Semifinals',    [sp(120), mc(sf[0],'Semifinal'), sp(72), mc(sf[1],'Semifinal'), sp(120)]),
    col('Final',         [sp(185), mc(fin,'Grand Final'), sp(185)]),
  ]);
  const wbSection = section('Winners Bracket', 'Champion decided here', wbGrid, { marginBottom: '1.25rem' });

  // Losers bracket
  const byeDisplay = byeTeams.length > 0
    ? el('div', { style: { padding: '0 20px 12px', display: 'flex', gap: '8px', alignItems: 'center', flexWrap: 'wrap' } }, [
        el('span', { style: { fontSize: '11px', color: PLAYOFF_BRONZE, fontWeight: '600', textTransform: 'uppercase', letterSpacing: '0.6px' } }, 'LB R3 byes:'),
        ...byeTeams.map(t => coachBadge(t.coach))
      ])
    : null;

  const lbGrid = el('div', { style: { display: 'flex', gap: '20px', overflowX: 'auto', padding: '16px 20px 24px', alignItems: 'flex-start' } }, [
    col('LB Round 1', lbr1.map(m => mc(m, 'LB R1', PLAYOFF_BRONZE))),
    col('LB Round 2', [sp(20), mc(lbr2[0],'LB R2',PLAYOFF_BRONZE), sp(12), mc(lbr2[1],'LB R2',PLAYOFF_BRONZE), sp(20)]),
    col('LB Round 3', [sp(40), mc(lbr3[0],'LB R3',PLAYOFF_BRONZE), sp(12), mc(lbr3[1],'LB R3',PLAYOFF_BRONZE), sp(40)]),
    col('LB Semis',   [sp(60), mc(lbsf[0],'LB Semi',PLAYOFF_BRONZE), sp(12), mc(lbsf[1],'LB Semi',PLAYOFF_BRONZE), sp(60)]),
    col('3rd Place',  [sp(88), mc(lbfin,'3rd Place',PLAYOFF_BRONZE), sp(88)]),
  ]);
  const lbSection = section('Losers Bracket', 'For 3rd place  •  Top 2 seeds after QF round receive byes into LB R3',
    el('div', {}, [byeDisplay, lbGrid].filter(x => x)),
    { marginBottom: '1.25rem' }
  );

  return el('div', {}, [seedSection, wbSection, lbSection]);
}

function getPlayoffGameIds(gameLog) {
  return new Set(gameLog.filter(r => r.wk > 11).map(r => r.gid));
}

function renderPlayoffStats(state, seeds, bracket) {
  const pGids  = getPlayoffGameIds(state.data.gameLog);
  const pGames = state.data.gameLog.filter(r => pGids.has(r.gid));

  if (pGames.length === 0) {

      el('div', { style: { padding: '40px 24px', textAlign: 'center', color: 'var(--color-text-tertiary)' } }, [
        el('div', { style: { fontSize: '32px', marginBottom: '12px' } }, '🏆'),
        el('div', { style: { fontSize: '14px', fontWeight: '500', marginBottom: '6px' } }, 'Playoffs haven\'t started yet'),
        el('div', { style: { fontSize: '13px' } }, 'Stats appear once playoff replays are uploaded')
      ])
    );
  }

  const mons    = monStats(pGames);
  const top     = Object.values(mons).sort((a, b) => b.mvp - a.mvp).slice(0, 20);
  const coachS  = coachStats(pGames);

  const coachRows = coaches.map(s => [
    rankBadge(s.rank), coachBadge(s.coach),

  const monRows = top.map((r, i) => [

  ]);

  return el('div', {}, [
    section('Coach standings', pGames.length + ' playoff games',

        [{key:'rank',label:'#'},{key:'coach',label:'Coach',align:'left'},{key:'series',label:'Series'},{key:'games',label:'Games'},{key:'kills',label:'K'},{key:'deaths',label:'D'},{key:'kdr',label:'K/D'},{key:'dpg',label:'Dmg/G'}],
        coachRows, { stickyHeader: true }
      )),
      { marginBottom: '1.25rem' }
    ),
    section('Pokemon leaderboard', 'Playoff MVP leaders',
      el('div', { style: { overflowX:'auto' } }, makeTable(
        [{key:'rank',label:'#'},{key:'mvp',label:'MVP'},{key:'mon',label:'Pokemon',align:'left'},{key:'coach',label:'Coach',align:'left'},{key:'gp',label:'GP'},{key:'record',label:'W-L'},{key:'tk',label:'K'},{key:'deaths',label:'D'},{key:'kdr',label:'K/D'},{key:'dout',label:'Dmg'}],
        monRows, { stickyHeader: true }
      ))
    )
  ]);
}
