function viewHeadToHead(state) {
  const { data } = state;
  const c1 = state.h2h.c1, c2 = state.h2h.c2;

  const controls = el('div', {
    style: { display: 'flex', gap: '12px', marginBottom: '1.5rem', flexWrap: 'wrap', alignItems: 'center' }
  }, [
    el('label', { style: { fontSize: '12px', color: 'var(--color-text-secondary)', textTransform: 'uppercase', letterSpacing: '0.6px', fontWeight: '600' } }, 'Coach 1'),
    select(c1, COACHES, v => { state.h2h.c1 = v; render(state); }),
    el('label', { style: { fontSize: '12px', color: 'var(--color-text-secondary)', textTransform: 'uppercase', letterSpacing: '0.6px', fontWeight: '600' } }, 'Coach 2'),
    select(c2, COACHES.filter(c => c !== c1), v => { state.h2h.c2 = v; render(state); }),
  ]);

  if (c1 === c2) return el('div', {}, [controls, card(el('p', { style: { margin: '0', color: 'var(--color-text-secondary)' } }, 'Select two different coaches.'))]);

  const gl = data.gameLog;
  const gids = new Set();
  gl.forEach(r => { if (r.coach === c1 && r.opp === c2) gids.add(r.gid); });
  const games = Array.from(gids).sort();

  if (!games.length) return el('div', {}, [controls, card(el('p', { style: { margin: '0', color: 'var(--color-text-secondary)' } }, 'These coaches have not played yet.'))]);

  const h2hGl = gl.filter(r => gids.has(r.gid));
  const h2hMl = data.moveLog.filter(r => gids.has(r.gid));
  const h2hTl = data.turnLog.filter(r => gids.has(r.gid));

  const c1Rows = h2hGl.filter(r => r.coach === c1);
  const c2Rows = h2hGl.filter(r => r.coach === c2);

  // Game-level wins
  const gameWinners = {};
  h2hGl.forEach(r => { if (r.won && !gameWinners[r.gid]) gameWinners[r.gid] = r.coach; });
  const c1Wins = games.filter(g => gameWinners[g] === c1).length;
  const c2Wins = games.filter(g => gameWinners[g] === c2).length;

  // Overall stats
  const c1Kills = c1Rows.reduce((s, r) => s + (r.kd||0) + (r.ki||0), 0);
  const c2Kills = c2Rows.reduce((s, r) => s + (r.kd||0) + (r.ki||0), 0);
  const c1Dmg   = c1Rows.reduce((s, r) => s + (r.dout||0), 0);
  const c2Dmg   = c2Rows.reduce((s, r) => s + (r.dout||0), 0);

  const c1Color = COACH_COLORS[c1] || '#888';
  const c2Color = COACH_COLORS[c2] || '#888';

  // ── Scoreboard hero ──────────────────────────────────────────────────────
  const scoreboard = el('div', {
    style: {
      background: `linear-gradient(135deg, ${c1Color}15 0%, var(--color-background-primary) 50%, ${c2Color}15 100%)`,
      border: '0.5px solid var(--color-border-tertiary)',
      borderRadius: 'var(--border-radius-lg)',
      padding: '2rem', marginBottom: '1.25rem'
    }
  }, [
    el('div', {
      style: { display: 'grid', gridTemplateColumns: '1fr auto 1fr', alignItems: 'center', gap: '24px' }
    }, [
      // C1 side
      el('div', { style: { textAlign: 'center' } }, [
        el('div', { style: { marginBottom: '12px', display: 'flex', justifyContent: 'center' } }, coachBadge(c1, 'lg')),
        el('div', {
          style: { fontFamily: 'var(--font-display)', fontSize: '72px', fontWeight: '700', color: c1Wins > c2Wins ? c1Color : 'var(--color-text-primary)', lineHeight: '1', letterSpacing: '-0.04em' }
        }, String(c1Wins)),
      ]),
      // Center divider
      el('div', { style: { textAlign: 'center' } }, [
        el('div', { style: { fontSize: '32px', color: 'var(--color-text-tertiary)', fontWeight: '300', lineHeight: '1' } }, '—'),
        el('div', { style: { fontSize: '11px', color: 'var(--color-text-tertiary)', marginTop: '10px', textTransform: 'uppercase', letterSpacing: '0.8px', fontWeight: '600' } }, games.length + ' games'),
      ]),
      // C2 side
      el('div', { style: { textAlign: 'center' } }, [
        el('div', { style: { marginBottom: '12px', display: 'flex', justifyContent: 'center' } }, coachBadge(c2, 'lg')),
        el('div', {
          style: { fontFamily: 'var(--font-display)', fontSize: '72px', fontWeight: '700', color: c2Wins > c1Wins ? c2Color : 'var(--color-text-primary)', lineHeight: '1', letterSpacing: '-0.04em' }
        }, String(c2Wins)),
      ]),
    ]),
    // Team stats row
    el('div', {
      style: { display: 'grid', gridTemplateColumns: '1fr 1fr 1fr 1fr', gap: '0', marginTop: '24px', borderTop: '0.5px solid var(--color-border-tertiary)', paddingTop: '20px' }
    }, [
      el('div', { style: { textAlign: 'center', borderRight: '0.5px solid var(--color-border-tertiary)', padding: '0 16px' } }, [
        el('div', { style: { fontSize: '10px', color: 'var(--color-text-tertiary)', textTransform: 'uppercase', letterSpacing: '0.6px', fontWeight: '600', marginBottom: '6px' } }, c1 + ' kills'),
        el('div', { style: { fontFamily: 'var(--font-display)', fontSize: '24px', fontWeight: '700', color: c1Color } }, String(c1Kills)),
      ]),
      el('div', { style: { textAlign: 'center', borderRight: '0.5px solid var(--color-border-tertiary)', padding: '0 16px' } }, [
        el('div', { style: { fontSize: '10px', color: 'var(--color-text-tertiary)', textTransform: 'uppercase', letterSpacing: '0.6px', fontWeight: '600', marginBottom: '6px' } }, c1 + ' damage'),
        el('div', { style: { fontFamily: 'var(--font-display)', fontSize: '24px', fontWeight: '700', color: c1Color } }, formatInt(c1Dmg) + '%'),
      ]),
      el('div', { style: { textAlign: 'center', borderRight: '0.5px solid var(--color-border-tertiary)', padding: '0 16px' } }, [
        el('div', { style: { fontSize: '10px', color: 'var(--color-text-tertiary)', textTransform: 'uppercase', letterSpacing: '0.6px', fontWeight: '600', marginBottom: '6px' } }, c2 + ' kills'),
        el('div', { style: { fontFamily: 'var(--font-display)', fontSize: '24px', fontWeight: '700', color: c2Color } }, String(c2Kills)),
      ]),
      el('div', { style: { textAlign: 'center', padding: '0 16px' } }, [
        el('div', { style: { fontSize: '10px', color: 'var(--color-text-tertiary)', textTransform: 'uppercase', letterSpacing: '0.6px', fontWeight: '600', marginBottom: '6px' } }, c2 + ' damage'),
        el('div', { style: { fontFamily: 'var(--font-display)', fontSize: '24px', fontWeight: '700', color: c2Color } }, formatInt(c2Dmg) + '%'),
      ]),
    ])
  ]);

  // ── Highlights ───────────────────────────────────────────────────────────
  const monAgg = {};
  h2hGl.forEach(r => {
    const k = r.coach + '|' + r.mon;
    if (!monAgg[k]) monAgg[k] = { coach: r.coach, mon: r.mon, tk: 0, d: 0, dout: 0, gp: 0 };
    monAgg[k].tk += (r.kd||0) + (r.ki||0);
    monAgg[k].d  += r.d||0;
    monAgg[k].dout += r.dout||0;
    monAgg[k].gp++;
  });

  const moveAgg = {};
  h2hMl.forEach(r => {
    const k = r.coach + '|' + r.mon + '|' + r.move;
    if (!moveAgg[k]) moveAgg[k] = { coach: r.coach, mon: r.mon, move: r.move, uses: 0, dmg: 0 };
    moveAgg[k].uses += r.uses||0;
    moveAgg[k].dmg  += r.dmg||0;
  });

  const protectBlocks = {};
  h2hTl.forEach(r => {
    if (r.event === 'PROTECT' && r.outcome === 'BLOCKED' && r.coach && r.mon) {
      const k = r.coach + '|' + r.mon;
      if (!protectBlocks[k]) protectBlocks[k] = { coach: r.coach, mon: r.mon, count: 0 };
      protectBlocks[k].count++;
    }
  });

  const flinchAgg = {};
  h2hTl.forEach(r => {
    if (r.event === 'FLINCH' && r.coach && r.mon) {
      const k = r.coach + '|' + r.mon;
      if (!flinchAgg[k]) flinchAgg[k] = { coach: r.coach, mon: r.mon, count: 0 };
      flinchAgg[k].count++;
    }
  });

  const monArr  = Object.values(monAgg).sort((a,b) => b.tk - a.tk);
  const moveArr = Object.values(moveAgg).sort((a,b) => b.uses - a.uses);
  const topKiller   = monArr[0];
  const topDmg      = Object.values(monAgg).sort((a,b) => b.dout - a.dout)[0];
  const topMove     = moveArr[0];
  const topWall     = Object.values(protectBlocks).sort((a,b) => b.count - a.count)[0];
  const topFlincher = Object.values(flinchAgg).sort((a,b) => b.count - a.count)[0];

  const makeHighlight = (icon, label, coach, mon, valueLine, subLine) => {
    if (!mon) return null;
    const color = COACH_COLORS[coach] || '#888';
    const card = el('div', {
      onclick: () => { state.view = 'mon'; state.mdd.coach = coach; state.mdd.mon = mon; render(state); },
      style: {
        background: 'var(--color-background-secondary)', border: '0.5px solid var(--color-border-tertiary)',
        borderRadius: 'var(--border-radius-lg)', padding: '16px', cursor: 'pointer',
        transition: 'all 0.15s', position: 'relative'
      }
    }, [
      el('div', { style: { position: 'absolute', top: '12px', right: '12px', width: '28px', height: '28px', borderRadius: '50%', background: color + '25', color: color, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '15px' } }, icon),
      el('div', { style: { fontSize: '10px', color: 'var(--color-text-tertiary)', textTransform: 'uppercase', letterSpacing: '0.6px', fontWeight: '600', marginBottom: '10px', paddingRight: '32px' } }, label),
      el('div', { style: { display: 'flex', alignItems: 'center', gap: '10px', marginBottom: '6px' } }, [
        monSprite(mon, 40),
        el('div', {}, [
          el('div', { style: { fontWeight: '600', fontSize: '13px', lineHeight: '1.2' } }, mon),
          el('div', { style: { display: 'flex', justifyContent: 'flex-start', marginTop: '4px' } }, coachBadge(coach))
        ])
      ]),
      el('div', { style: { fontFamily: 'var(--font-display)', fontSize: '20px', fontWeight: '700', color, marginTop: '8px', letterSpacing: '-0.02em' } }, valueLine),
      subLine ? el('div', { style: { fontSize: '11px', color: 'var(--color-text-tertiary)', marginTop: '3px' } }, subLine) : null
    ].filter(x => x));
    card.onmouseover = () => { card.style.transform = 'translateY(-2px)'; card.style.borderColor = color + '60'; };
    card.onmouseout  = () => { card.style.transform = ''; card.style.borderColor = 'var(--color-border-tertiary)'; };
    return card;
  };

  const highlights = [
    topKiller && topKiller.tk > 0 ? makeHighlight('⚔️', 'Match MVP', topKiller.coach, topKiller.mon,
      topKiller.tk + ' kill' + (topKiller.tk !== 1 ? 's' : ''),
      formatInt(topKiller.dout) + '% damage  •  ' + topKiller.gp + ' game' + (topKiller.gp !== 1 ? 's' : '')) : null,
    topMove ? makeHighlight('📋', 'Signature move', topMove.coach, topMove.mon,
      topMove.move + ' ×' + topMove.uses, formatInt(topMove.dmg) + '% total damage') : null,
    topWall && topWall.count >= 2 ? makeHighlight('🛡️', 'The wall', topWall.coach, topWall.mon,
      topWall.count + ' protects blocked', 'hardest to get through') : null,
    topFlincher && topFlincher.count >= 1 ? makeHighlight('💥', 'Flinch machine', topFlincher.coach, topFlincher.mon,
      topFlincher.count + ' flinch' + (topFlincher.count !== 1 ? 'es' : '') + ' caused', 'disruption specialist') : null,
    topDmg && topDmg.mon !== topKiller?.mon ? makeHighlight('💢', 'Damage dealer', topDmg.coach, topDmg.mon,
      formatInt(topDmg.dout) + '% damage', formatInt(topDmg.dout / Math.max(1, topDmg.gp)) + '% per game') : null,
  ].filter(x => x).slice(0, 4);

  const highlightsSection = highlights.length > 0 ? section('Match highlights', 'Click any card to open deep dive',
    el('div', { style: { display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(200px, 1fr))', gap: '12px', padding: '16px 20px 20px' } }, highlights),
    { marginBottom: '1.25rem' }
  ) : null;

  // ── Per-game breakdown — grouped by week ─────────────────────────────────
  // Build team panel for a single game
  const makeTeamPanel = (gid, coach) => {
    const gameRows = h2hGl.filter(r => r.gid === gid);
    const winner   = gameWinners[gid];
    const coachRows = gameRows.filter(r => r.coach === coach);
    const color = COACH_COLORS[coach] || '#888';
    const isWinner = winner === coach;

    const monRows = coachRows.map(r => {
      const movesForMon = h2hMl
        .filter(m => m.gid === gid && m.coach === coach && m.mon === r.mon)
        .sort((a, b) => b.uses - a.uses);
      const teraEvent = h2hTl.find(t => t.gid === gid && t.coach === coach && t.mon === r.mon && t.event === 'TERA');
      const teraType = teraEvent ? teraEvent.outcome : null;

      return el('div', {
        style: { display: 'flex', alignItems: 'center', gap: '10px', padding: '8px 0', borderBottom: '0.5px solid var(--color-border-tertiary)' }
      }, [
        el('div', { style: { position: 'relative', flexShrink: '0' } }, [
          monSprite(r.mon, 38),
          r.lead ? el('span', {
            style: { position: 'absolute', top: '-4px', right: '-4px', width: '14px', height: '14px', borderRadius: '50%', background: color, color: '#fff', fontSize: '8px', fontWeight: '700', display: 'flex', alignItems: 'center', justifyContent: 'center' }
          }, 'L') : null
        ]),
        el('div', { style: { flex: '1', minWidth: '0' } }, [
          el('div', { style: { fontSize: '13px', fontWeight: '600', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' } }, r.mon),
          el('div', { style: { fontSize: '11px', color: 'var(--color-text-tertiary)', marginTop: '3px' } },
            movesForMon.length > 0
              ? movesForMon.map(m => m.move + ' ×' + m.uses).join('  •  ')
              : 'no moves recorded')
        ]),
        el('div', { style: { textAlign: 'right', flexShrink: '0' } }, [
          el('div', { style: { fontSize: '11px', fontWeight: '600', display: 'flex', gap: '6px', justifyContent: 'flex-end', alignItems: 'center' } }, [
            (r.kd + r.ki) > 0 ? el('span', { style: { color: 'var(--color-text-success)' } }, (r.kd + r.ki) + 'K') : null,
            r.d > 0 ? el('span', { style: { color: 'var(--color-text-danger)' } }, r.d + 'D') : null,
            teraType ? typeBadge(teraType) : null
          ].filter(x => x)),
          el('div', { style: { fontSize: '11px', color: 'var(--color-text-tertiary)', marginTop: '2px' } }, formatInt(r.dout) + '% dmg')
        ])
      ]);
    });

    return el('div', {
      style: {
        flex: '1', minWidth: '0',
        background: isWinner ? color + '10' : 'var(--color-background-secondary)',
        border: '0.5px solid ' + (isWinner ? color + '50' : 'var(--color-border-tertiary)'),
        borderRadius: 'var(--border-radius-lg)', padding: '14px 16px'
      }
    }, [
      el('div', { style: { display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: '10px' } }, [
        coachBadge(coach),
        isWinner ? el('span', { style: { fontSize: '11px', fontWeight: '700', color, textTransform: 'uppercase', letterSpacing: '0.6px' } }, 'Winner') : null
      ].filter(x => x)),
      el('div', {}, monRows)
    ]);
  };

  // Group gids by week
  const byWeek = {};
  games.forEach(gid => {
    const wk = h2hGl.find(r => r.gid === gid)?.wk;
    if (!byWeek[wk]) byWeek[wk] = [];
    byWeek[wk].push(gid);
  });

  const weekCards = Object.entries(byWeek).sort((a,b) => parseInt(a[0])-parseInt(b[0])).map(([wk, wkGids]) => {
    // Series result for this week
    const wkC1Wins = wkGids.filter(g => gameWinners[g] === c1).length;
    const wkC2Wins = wkGids.filter(g => gameWinners[g] === c2).length;
    const wkWinner = wkC1Wins > wkC2Wins ? c1 : wkC2Wins > wkC1Wins ? c2 : null;
    const wkColor  = wkWinner ? (COACH_COLORS[wkWinner] || '#888') : 'var(--color-text-tertiary)';
    const seriesLabel = wkWinner
      ? `${wkWinner} wins ${Math.max(wkC1Wins,wkC2Wins)}-${Math.min(wkC1Wins,wkC2Wins)}`
      : `${wkC1Wins}-${wkC2Wins}`;

    // Individual game panels inside the week section
    const gamePanels = wkGids.map((gid, gi) => {
      const gameWinner = gameWinners[gid];
      const gWinColor  = gameWinner ? (COACH_COLORS[gameWinner] || '#888') : 'var(--color-border-tertiary)';
      return el('div', { style: { marginBottom: gi < wkGids.length - 1 ? '16px' : '0' } }, [
        // Game label row
        el('div', { style: { display: 'flex', alignItems: 'center', gap: '10px', marginBottom: '10px' } }, [
          el('span', { style: { fontSize: '11px', fontWeight: '700', textTransform: 'uppercase', letterSpacing: '0.7px', color: 'var(--color-text-tertiary)' } }, 'Game ' + (gi + 1)),
          gameWinner ? el('span', { style: { fontSize: '11px', fontWeight: '600', color: gWinColor, background: gWinColor + '20', padding: '2px 8px', borderRadius: '999px' } }, gameWinner + ' wins') : null,
        ].filter(x => x)),
        // Two-col team panels
        el('div', { style: { display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '12px' } },
          [makeTeamPanel(gid, c1), makeTeamPanel(gid, c2)]
        )
      ]);
    });

    return section(
      'Week ' + wk,
      seriesLabel,
      el('div', { style: { padding: '16px 20px 20px' } }, gamePanels),
      { marginBottom: '1.25rem', accentColor: wkColor }
    );
  });

  return el('div', {}, [controls, scoreboard, highlightsSection, ...weekCards].filter(x => x));
}


// ── Mon Deep Dive ─────────────────────────────────────────────────────────────
function viewMonDeepDive(state) {
  const { data } = state;
  const { coach, mon } = state.mdd;
  const coachMons = data.roster.filter(r => r.coach === coach);
  const currentMon = coachMons.find(m => m.mon === mon) ? mon : (coachMons[0] && coachMons[0].mon) || '';
  if (currentMon !== mon) state.mdd.mon = currentMon;

  const controls = el('div', {
    style: { display: 'flex', gap: '12px', marginBottom: '1.25rem', flexWrap: 'wrap', alignItems: 'center' }
  }, [
    el('label', { style: { fontSize: '12px', color: 'var(--color-text-secondary)', textTransform: 'uppercase', letterSpacing: '0.6px', fontWeight: '600' } }, 'Coach'),
    select(coach, COACHES, v => { state.mdd.coach = v; state.mdd.mon = ''; render(state); }),
    el('label', { style: { fontSize: '12px', color: 'var(--color-text-secondary)', textTransform: 'uppercase', letterSpacing: '0.6px', fontWeight: '600' } }, 'Pokemon'),
    select(state.mdd.mon, coachMons.map(m => ({ value: m.mon, label: m.mon + (m.status === 'Former' ? ' (former)' : '') })), v => { state.mdd.mon = v; render(state); })
  ]);

  const all = monStats(data.gameLog);
  const s = all[coach + '|' + state.mdd.mon];

  if (!s) {
    return el('div', {}, [
      controls,
      card(el('p', { style: { margin: '0', color: 'var(--color-text-secondary)' } }, 'No games played yet.'))
    ]);
  }

  const moves = monMoveStats(data.moveLog, coach, state.mdd.mon);
  const teraTypes = {};
  data.turnLog.forEach(t => {
    if (t.coach === coach && t.mon === state.mdd.mon && t.event === 'TERA') {
      teraTypes[t.outcome] = (teraTypes[t.outcome] || 0) + 1;
    }
  });
  const teraList = Object.entries(teraTypes).sort((a, b) => b[1] - a[1]);
  const coachColor = COACH_COLORS[coach] || '#888';

  // ── Toggle: Stats vs Pokédex ───────────────────────────────────────────────
  const ddTab = state.mdd.tab || 'stats';
  const tabToggle = el('div', {
    style: {
      display:'inline-flex', background:'var(--color-background-secondary)',
      border:'0.5px solid var(--color-border-tertiary)', borderRadius:'999px',
      padding:'4px', gap:'2px', marginBottom:'1.5rem'
    }
  }, [
    ['stats','📊 Stats'], ['pokedex','📖 Pokédex']
  ].map(([id, label]) => {
    const active = ddTab === id;
    return el('button', {
      onclick: () => { state.mdd.tab = id; render(state); },
      style: {
        padding:'7px 18px', fontSize:'13px',
        fontWeight: active?'600':'500',
        background: active?'var(--color-background-primary)':'transparent',
        color: active?'var(--color-text-primary)':'var(--color-text-tertiary)',
        border: active?'0.5px solid var(--color-border-secondary)':'none',
        borderRadius:'999px', cursor:'pointer', transition:'all 0.2s', whiteSpace:'nowrap'
      }
    }, label);
  }));

  // ── Hero ───────────────────────────────────────────────────────────────────
  const hero = el('div', {
    style: {
      display: 'flex', alignItems: 'center', gap: '20px', padding: '20px 24px',
      background: `radial-gradient(circle at 5% 50%, ${coachColor}30 0%, transparent 60%), var(--color-background-primary)`,
      border: `0.5px solid ${coachColor}50`, borderRadius: 'var(--border-radius-lg)', marginBottom: '1.25rem',
      flexWrap: 'wrap'
    }
  }, [
    monSprite(state.mdd.mon, 80),
    el('div', { style: { flex: '1', minWidth: '0' } }, [
      el('h2', { style: { fontFamily: 'var(--font-display)', fontSize: '28px', fontWeight: '700', margin: '0', letterSpacing: '-0.02em' } }, state.mdd.mon),
      el('div', { style: { marginTop: '6px' } }, [coachBadge(coach)]),
      el('div', { style: { display: 'flex', gap: '12px', marginTop: '10px', flexWrap: 'wrap' } }, [
        el('span', { style: { fontSize: '13px', color: 'var(--color-text-secondary)' } }, `${s.gp} games  •  `),
        el('span', { style: { fontSize: '13px', fontWeight: '600', color: s.winPct >= 0.5 ? 'var(--color-text-success)' : 'var(--color-text-danger)' } }, formatPct(s.winPct) + ' win rate'),
        el('span', { style: { fontSize: '13px', color: 'var(--color-text-secondary)' } }, `  •  MVP: `),
        el('span', { style: { fontFamily: 'var(--font-display)', fontSize: '15px', fontWeight: '700', color: coachColor } }, String(s.mvp)),
      ])
    ]),
    teraList.length > 0 ? el('div', { style: { textAlign: 'right' } }, [
      el('div', { style: { fontSize: '10px', color: 'var(--color-text-tertiary)', textTransform: 'uppercase', letterSpacing: '0.6px', marginBottom: '6px', fontWeight: '600' } }, 'Tera types'),
      ...teraList.map(([type, count]) =>
        el('div', { style: { fontSize: '12px', marginBottom: '3px', display: 'flex', alignItems: 'center', gap: '8px', justifyContent: 'flex-end' } }, [
          el('span', { style: { fontWeight: '600' } }, type),
          el('span', { style: { fontFamily: 'var(--font-mono)', fontSize: '11px', color: 'var(--color-text-tertiary)' } }, String(count) + 'x')
        ])
      )
    ]) : null
  ].filter(x => x));

  if (ddTab === 'pokedex') {
    const pokedexContainer = el('div', {});
    renderPokedexView(state, coach, state.mdd.mon, pokedexContainer);
    return el('div', {}, [controls, tabToggle, hero, pokedexContainer]);
  }

  // ── Stats tab ──────────────────────────────────────────────────────────────
  const metric = (label, value, sub, tipText) => {
    const wrapper = el('div', {
      style: {
        background: 'var(--color-background-secondary)', border: '0.5px solid var(--color-border-tertiary)',
        borderRadius: 'var(--border-radius-lg)', padding: '16px 18px'
      }
    }, [
      withTooltip(
        el('div', { style: { fontSize: '10px', color: 'var(--color-text-tertiary)', textTransform: 'uppercase', letterSpacing: '0.8px', marginBottom: '8px', fontWeight: '600', display:'inline-block' } }, label),
        tipText || TOOLTIPS[label]
      ),
      el('div', { style: { fontFamily: 'var(--font-display)', fontSize: '26px', fontWeight: '700', letterSpacing: '-0.02em', color: coachColor } }, value),
      sub ? el('div', { style: { fontSize: '11px', color: 'var(--color-text-tertiary)', marginTop: '4px' } }, sub) : null
    ].filter(x => x));
    return wrapper;
  };

  const metricsGrid = el('div', {
    style: { display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(130px, 1fr))', gap: '10px', marginBottom: '1.25rem' }
  }, [
    metric('Games', s.gp, s.gw + ' wins'),
    metric('Win rate', formatPct(s.winPct), null, TOOLTIPS['Win%']),
    metric('Kills', s.tk, s.kd + ' KD / ' + s.ki + ' KI', TOOLTIPS['K']),
    metric('Deaths', s.deaths, null, TOOLTIPS['D']),
    metric('K/D', formatKDR(s.kdr), null, TOOLTIPS['K/D']),
    metric('Damage', formatDmg(s.dout),
      formatInt(s.dmgPerGame) + '% per game  •  ' + (s.dmgPerTurn > 0 ? s.dmgPerTurn.toFixed(1) + '% per turn' : ''),
      'Total damage dealt. Hover sub-stats for details.'),
    metric('Switches', s.sw, (s.sw / Math.max(1, s.gp)).toFixed(1) + ' per game'),
    metric('Tera', s.teras + '/' + s.gp, formatPct(s.teras / Math.max(1, s.gp)), TOOLTIPS['Tera'])
  ]);

  // Dmg breakdown sub-stats
  const dmgBreakdown = el('div', {
    style: { display:'flex', gap:'12px', flexWrap:'wrap', marginBottom:'1.25rem' }
  }, [
    el('div', {
      style: { display:'flex', alignItems:'center', gap:'8px', padding:'8px 14px', background:'var(--color-background-secondary)', border:'0.5px solid var(--color-border-tertiary)', borderRadius:'var(--border-radius-md)' }
    }, [
      withTooltip(el('span', { style:{ fontSize:'12px', color:'var(--color-text-tertiary)', fontWeight:'600', borderBottom:'1px dashed var(--color-text-tertiary)', cursor:'help' } }, 'Dmg/game'), TOOLTIPS['Dmg/G']),
      el('span', { style:{ fontFamily:'var(--font-display)', fontWeight:'700', fontSize:'16px', marginLeft:'6px' } }, formatInt(s.dmgPerGame) + '%'),
    ]),
    s.dmgPerTurn > 0 ? el('div', {
      style: { display:'flex', alignItems:'center', gap:'8px', padding:'8px 14px', background:'var(--color-background-secondary)', border:'0.5px solid var(--color-border-tertiary)', borderRadius:'var(--border-radius-md)' }
    }, [
      withTooltip(el('span', { style:{ fontSize:'12px', color:'var(--color-text-tertiary)', fontWeight:'600', borderBottom:'1px dashed var(--color-text-tertiary)', cursor:'help' } }, 'Dmg/turn alive'), TOOLTIPS['Dmg/T']),
      el('span', { style:{ fontFamily:'var(--font-display)', fontWeight:'700', fontSize:'16px', marginLeft:'6px' } }, s.dmgPerTurn.toFixed(1) + '%'),
    ]) : null
  ].filter(x=>x));

  let movesSection = null;
  if (moves.length > 0) {
    const maxUses = Math.max(...moves.map(m => m.uses));
    const moveRows = moves.map(m => {
      const pct = maxUses > 0 ? m.uses / maxUses : 0;
      return [
        // Move name with hover tooltip from PokéAPI
        moveTip(m.move),
        el('div', { style: { display: 'flex', alignItems: 'center', gap: '10px', justifyContent: 'flex-end' } }, [
          el('div', {
            style: { width: '80px', height: '6px', background: 'var(--color-background-secondary)', borderRadius: '3px', overflow: 'hidden' }
          }, el('div', {
            style: { width: (pct * 100) + '%', height: '100%', background: coachColor, boxShadow: '0 0 6px ' + coachColor + '80' }
          })),
          el('span', { style: { minWidth: '28px', textAlign: 'right', fontFamily: 'var(--font-mono)', fontWeight: '600', fontSize: '13px' } }, formatInt(m.uses))
        ]),
        formatDmg(m.dmg),
        m.avg.toFixed(1) + '%'
      ];
    });
    movesSection = section('Moves used', moves.length + ' unique moves — hover any move for details',
      el('div', { style: { overflowX: 'auto' } }, makeTable([
        { key: 'move', label: 'Move', align: 'left' },
        { key: 'uses', label: 'Uses', align: 'right' },
        { key: 'dmg', label: 'Total dmg', align: 'right' },
        { key: 'avg', label: 'Avg dmg', align: 'right' }
      ], moveRows)));
  }

  return el('div', {}, [controls, tabToggle, hero, metricsGrid, dmgBreakdown, movesSection].filter(x => x));
}
function viewCoachPanel(state) {
  const { data } = state;
  const coach = state.cp.coach;
  const coachColor = COACH_COLORS[coach] || '#888';

  const controls = el('div', {
    style: { display: 'flex', gap: '12px', marginBottom: '1.25rem', flexWrap: 'wrap', alignItems: 'center' }
  }, [
    el('label', { style: { fontSize: '12px', color: 'var(--color-text-secondary)', textTransform: 'uppercase', letterSpacing: '0.6px', fontWeight: '600' } }, 'Coach'),
    select(coach, COACHES, v => { state.cp.coach = v; render(state); })
  ]);

  const s = coachStats(data.gameLog)[coach];
  if (!s) return el('div', {}, [controls]);

  const all = monStats(data.gameLog);
  const mons = Object.values(all).filter(x => x.coach === coach).sort((a, b) => b.mvp - a.mvp);
  const fullRoster = data.roster.filter(r => r.coach === coach);

  let insights = null;
  if (mons.length > 0) {
    const byDmg = mons.slice().sort((a, b) => b.dout - a.dout);
    const byKills = mons.slice().sort((a, b) => b.tk - a.tk);
    const byMVP = mons.slice().sort((a, b) => b.mvp - a.mvp);
    const coachTurns = data.turnLog.filter(t => t.coach === coach);
    const protectors = {};
    coachTurns.filter(t => t.event === 'PROTECT' && t.outcome === 'BLOCKED').forEach(t => { protectors[t.mon] = (protectors[t.mon] || 0) + 1; });
    const topProtector = Object.entries(protectors).sort((a, b) => b[1] - a[1])[0];
    const teraUsers = {};
    coachTurns.filter(t => t.event === 'TERA').forEach(t => { teraUsers[t.mon] = (teraUsers[t.mon] || 0) + 1; });
    const topTeraUser = Object.entries(teraUsers).sort((a, b) => b[1] - a[1])[0];

    insights = { topDamage: byDmg[0], topKiller: byKills[0], topMVP: byMVP[0], topProtector, topTeraUser };
  }

  // Carry score
  const carry = computeCarryScore(data.gameLog, coach);

  const matchMap = {};
  data.gameLog.filter(r => r.coach === coach).forEach(r => {
    const k = 'W' + r.wk + '-M' + r.m;
    if (!matchMap[k]) matchMap[k] = { wk: r.wk, m: r.m, opp: r.opp, games: {} };
    if (!matchMap[k].games[r.g]) matchMap[k].games[r.g] = r.won;
  });
  const matches = Object.values(matchMap).map(m => {
    const gw = Object.values(m.games).filter(w => w).length;
    const gl = Object.values(m.games).filter(w => !w).length;
    return { wk: m.wk, m: m.m, opp: m.opp, wins: gw, losses: gl, result: gw > gl ? 'W' : 'L', score: gw + '-' + gl };
  }).sort((a, b) => a.wk - b.wk || a.m - b.m);

  const hero = el('div', {
    style: {
      position: 'relative',
      background: 'radial-gradient(circle at 10% 50%, ' + coachColor + '35 0%, ' + coachColor + '08 55%, transparent 100%), var(--color-background-primary)',
      border: '0.5px solid ' + coachColor + '60',
      borderRadius: 'var(--border-radius-lg)',
      padding: '28px 32px',
      marginBottom: '1.25rem'
    }
  }, [
    el('div', { style: { display: 'flex', alignItems: 'center', gap: '18px', marginBottom: '24px', flexWrap: 'wrap' } }, [
      el('div', {
        style: {
          width: '64px',
          height: '64px',
          borderRadius: '50%',
          background: coachColor,
          display: 'flex',
          alignItems: 'center',
          justifyContent: 'center',
          color: '#fff',
          fontSize: '26px',
          fontWeight: '700',
          fontFamily: 'var(--font-display)',
          boxShadow: '0 0 24px ' + coachColor + '60'
        }
      }, coach.charAt(0)),
      el('div', {}, [
        el('h1', {
          style: {
            fontFamily: 'var(--font-display)',
            fontSize: '34px',
            fontWeight: '700',
            margin: '0',
            letterSpacing: '-0.03em',
            lineHeight: '1'
          }
        }, coach),
        el('div', {
          style: {
            fontSize: '11px',
            color: 'var(--color-text-tertiary)',
            textTransform: 'uppercase',
            letterSpacing: '0.8px',
            marginTop: '5px',
            fontWeight: '600'
          }
        }, 'Rank #' + s.rank + ' of ' + COACHES.length + '  •  ' + s.leaguePoints + ' league points')
      ])
    ]),
    el('div', {
      style: {
        display: 'grid',
        gridTemplateColumns: 'repeat(auto-fit, minmax(110px, 1fr))',
        gap: '14px'
      }
    }, [
      ['Series', s.sw_series + '-' + s.sl_series, null, 'var(--font-mono)'],
      ['Points', String(s.leaguePoints), null, 'var(--font-display)'],
      ['Games', s.gw + '-' + s.gl, null, 'var(--font-mono)'],
      ['Win rate', formatPct(s.winPct), null, 'var(--font-display)'],
      ['+/-', (s.plusMinus >= 0 ? '+' : '') + s.plusMinus, s.plusMinus > 0 ? 'var(--color-text-success)' : s.plusMinus < 0 ? 'var(--color-text-danger)' : null, 'var(--font-display)'],
      ['Kills', String(s.kills), null, 'var(--font-display)'],
      ['K/D', formatKDR(s.kdr), null, 'var(--font-display)'],
      ['Dmg/G', formatInt(s.dmgPerGame) + '%', null, 'var(--font-display)']
    ].map(([label, value, color, font]) => el('div', {}, [
      el('div', { style: { fontSize: '10px', color: 'var(--color-text-tertiary)', textTransform: 'uppercase', letterSpacing: '0.8px', marginBottom: '6px', fontWeight: '600' } }, label),
      el('div', { style: { fontSize: '24px', fontWeight: '600', fontFamily: font, color: color || 'var(--color-text-primary)', letterSpacing: '-0.02em' } }, value)
    ])))
  ]);

  let insightsSection = null;
  if (insights) {
    const mkInsight = (label, iconChar, mon, value, sublabel) => {
      if (!mon) return null;
      const cardEl = el('div', {
        onclick: () => { state.view = 'mon'; state.mdd.coach = coach; state.mdd.mon = mon; render(state); },
        style: {
          background: 'var(--color-background-secondary)',
          border: '0.5px solid var(--color-border-tertiary)',
          borderRadius: 'var(--border-radius-lg)',
          padding: '16px',
          cursor: 'pointer',
          transition: 'all 0.15s',
          position: 'relative',
          overflow: 'hidden'
        }
      }, [
        el('div', {
          style: {
            position: 'absolute',
            top: '14px',
            right: '14px',
            width: '32px',
            height: '32px',
            borderRadius: '50%',
            background: coachColor + '25',
            color: coachColor,
            display: 'flex',
            alignItems: 'center',
            justifyContent: 'center',
            fontSize: '14px',
            fontWeight: '700',
            fontFamily: 'var(--font-display)'
          }
        }, iconChar),
        el('div', {
          style: {
            fontSize: '10px',
            color: 'var(--color-text-tertiary)',
            textTransform: 'uppercase',
            letterSpacing: '0.8px',
            marginBottom: '12px',
            paddingRight: '36px',
            fontWeight: '600'
          }
        }, label),
        el('div', {
          style: {
            display: 'flex',
            alignItems: 'center',
            gap: '12px',
            marginBottom: '6px'
          }
        }, [
          monSprite(mon, 44),
          el('div', { style: { minWidth: '0' } }, [
            el('div', { style: { fontWeight: '600', fontSize: '14px', lineHeight: '1.2', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' } }, mon),
            el('div', { style: { fontSize: '11px', color: 'var(--color-text-tertiary)', marginTop: '3px' } }, sublabel)
          ])
        ]),
        el('div', {
          style: {
            fontFamily: 'var(--font-display)',
            fontSize: '22px',
            fontWeight: '700',
            color: coachColor,
            marginTop: '10px',
            letterSpacing: '-0.02em'
          }
        }, value)
      ]);
      cardEl.onmouseover = () => {
        cardEl.style.transform = 'translateY(-3px)';
        cardEl.style.borderColor = coachColor + '70';
        cardEl.style.background = 'var(--color-background-primary)';
      };
      cardEl.onmouseout = () => {
        cardEl.style.transform = '';
        cardEl.style.borderColor = 'var(--color-border-tertiary)';
        cardEl.style.background = 'var(--color-background-secondary)';
      };
      return cardEl;
    };

    // Carry score card
    const carryCard = carry.pct > 0 ? (() => {
      const card = el('div', {
        onclick: () => { state.view = 'mon'; state.mdd.coach = coach; state.mdd.mon = carry.mon; render(state); },
        style: {
          background: 'var(--color-background-secondary)', border: '0.5px solid var(--color-border-tertiary)',
          borderRadius: 'var(--border-radius-lg)', padding: '16px', cursor: 'pointer',
          transition: 'all 0.15s', position: 'relative', overflow: 'hidden'
        }
      }, [
        el('div', { style: { position:'absolute', top:'14px', right:'14px', width:'32px', height:'32px', borderRadius:'50%', background:coachColor+'25', color:coachColor, display:'flex', alignItems:'center', justifyContent:'center', fontSize:'16px' } }, '💪'),
        el('div', { style: { fontSize:'10px', color:'var(--color-text-tertiary)', textTransform:'uppercase', letterSpacing:'0.8px', marginBottom:'12px', paddingRight:'36px', fontWeight:'600' } }, 'Carry score'),
        el('div', { style: { display:'flex', alignItems:'center', gap:'12px', marginBottom:'6px' } }, [
          monSprite(carry.mon, 44),
          el('div', { style: { minWidth:'0' } }, [
            el('div', { style: { fontWeight:'600', fontSize:'14px', lineHeight:'1.2', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' } }, carry.mon),
            el('div', { style: { fontSize:'11px', color:'var(--color-text-tertiary)', marginTop:'3px' } }, 'of team kills + damage')
          ])
        ]),
        el('div', { style: { marginTop:'10px' } }, [
          el('div', { style: { display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'4px' } }, [
            el('span', { style: { fontFamily:'var(--font-display)', fontSize:'22px', fontWeight:'700', color:coachColor, letterSpacing:'-0.02em' } }, carry.pct + '%'),
            el('span', { style: { fontSize:'11px', color:'var(--color-text-tertiary)' } }, 'team contribution')
          ]),
          el('div', { style: { height:'6px', background:'var(--color-background-tertiary)', borderRadius:'3px', overflow:'hidden' } }, [
            el('div', { style: { height:'100%', width:carry.pct+'%', background:coachColor, borderRadius:'3px', transition:'width 0.5s ease' } })
          ])
        ])
      ]);
      card.onmouseover = () => { card.style.transform='translateY(-3px)'; card.style.borderColor=coachColor+'70'; card.style.background='var(--color-background-primary)'; };
      card.onmouseout  = () => { card.style.transform=''; card.style.borderColor='var(--color-border-tertiary)'; card.style.background='var(--color-background-secondary)'; };
      return card;
    })() : null;

    const insightCards = [
      insights.topMVP ? mkInsight('Team MVP', 'M', insights.topMVP.mon, insights.topMVP.mvp + ' pts', insights.topMVP.tk + ' K / ' + insights.topMVP.gw + ' W') : null,
      insights.topDamage ? mkInsight('Top damage', 'D', insights.topDamage.mon, formatDmg(insights.topDamage.dout), formatInt(insights.topDamage.dmgPerGame) + '% per game') : null,
      insights.topKiller ? mkInsight('Top killer', 'K', insights.topKiller.mon, insights.topKiller.tk + ' kills', formatKDR(insights.topKiller.kdr) + ' K/D') : null,
      insights.topProtector ? mkInsight('Protect blocks', 'P', insights.topProtector[0], insights.topProtector[1] + ' blocks', 'defensive pivot') : null,
      insights.topTeraUser ? mkInsight('Tera devotee', 'T', insights.topTeraUser[0], insights.topTeraUser[1] + ' teras', 'clutch commits') : null,
      carryCard
    ].filter(x => x);

    insightsSection = section('Team insights', 'Click any card to see that Pokemon in detail',
      el('div', {
        style: {
          display: 'grid',
          gridTemplateColumns: 'repeat(auto-fit, minmax(200px, 1fr))',
          gap: '12px',
          padding: '18px 22px 22px'
        }
      }, insightCards)
    );
  }

  const rosterRows = fullRoster.map(r => {
    const ms = mons.find(x => x.mon === r.mon);
    return [
      ms ? monLink(coach, r.mon) : el('span', {
        style: {
          display: 'inline-flex',
          alignItems: 'center',
          gap: '9px',
          color: 'var(--color-text-tertiary)',
          padding: '3px 7px'
        }
      }, [monSprite(r.mon, 30), el('span', {}, r.mon)]),
      el('span', {
        style: {
          fontSize: '10px',
          textTransform: 'uppercase',
          letterSpacing: '0.6px',
          fontWeight: '600',
          padding: '3px 8px',
          borderRadius: 'var(--border-radius-sm)',
          background: r.status === 'Former' ? 'var(--color-background-tertiary)' : (r.status === 'Active' ? 'var(--color-background-success)' : 'var(--color-background-secondary)'),
          color: r.status === 'Former' ? 'var(--color-text-tertiary)' : (r.status === 'Active' ? 'var(--color-text-success)' : 'var(--color-text-secondary)')
        }
      }, r.status),
      ms ? formatInt(ms.gp) : '—',
      ms ? formatInt(ms.tk) : '—',
      ms ? formatInt(ms.deaths) : '—',
      ms ? formatDmg(ms.dout) : '—',
      ms ? formatPct(ms.winPct) : '—',
      ms ? formatInt(ms.mvp) : '—'
    ];
  });

  const rosterSection = section(
    'Full roster',
    fullRoster.length + ' drafted • ' + mons.length + ' played',
    el('div', { style: { overflowX: 'auto' } }, makeTable([
      { key: 'mon', label: 'Pokemon', align: 'left' },
      { key: 'status', label: 'Status' },
      { key: 'gp', label: 'GP', align: 'right' },
      { key: 'k', label: 'K', align: 'right' },
      { key: 'd', label: 'D', align: 'right' },
      { key: 'dmg', label: 'Dmg', align: 'right' },
      { key: 'win', label: 'Win%', align: 'right' },
      { key: 'mvp', label: 'MVP', align: 'right' }
    ], rosterRows))
  );

  const matchRows = matches.map(m => {
    const row = el('tr', {
      onclick: () => { state.h2h.c1 = coach; state.h2h.c2 = m.opp; state.view = 'h2h'; render(state); },
      style: { cursor: 'pointer', transition: 'background 0.1s' }
    }, [
      el('td', { style: { padding: '10px 12px', fontFamily: 'var(--font-mono)', fontSize: '12px', color: 'var(--color-text-tertiary)' } }, 'W' + m.wk),
      el('td', { style: { padding: '10px 12px' } }, coachBadge(m.opp)),
      el('td', { style: { padding: '10px 12px', textAlign: 'center' } },
        el('span', {
          style: {
            color: m.result === 'W' ? 'var(--color-text-success)' : 'var(--color-text-danger)',
            fontWeight: '700', fontSize: '15px', fontFamily: 'var(--font-display)',
            padding: '3px 10px', borderRadius: 'var(--border-radius-sm)',
            background: m.result === 'W' ? 'var(--color-background-success)' : 'var(--color-background-danger)'
          }
        }, m.result)
      ),
      el('td', { style: { padding: '10px 12px', textAlign: 'right', fontFamily: 'var(--font-mono)', fontSize: '13px' } }, m.score),
      el('td', { style: { padding: '10px 12px', textAlign: 'right', fontSize: '11px', color: 'var(--color-text-tertiary)' } }, '→ H2H')
    ]);
    row.onmouseover = () => { row.style.background = 'var(--color-background-secondary)'; };
    row.onmouseout  = () => { row.style.background = ''; };
    return row;
  });

  const matchTable = el('div', { style: { overflowX: 'auto' } }, [
    el('table', { style: { width: '100%', borderCollapse: 'collapse', fontSize: '13px' } }, [
      el('thead', {}, [
        el('tr', { style: { background: 'var(--color-background-secondary)', borderBottom: '0.5px solid var(--color-border-tertiary)' } }, [
          el('th', { style: { padding: '10px 12px', textAlign: 'left', fontSize: '11px', fontWeight: '600', color: 'var(--color-text-tertiary)', textTransform: 'uppercase', letterSpacing: '0.6px' } }, 'Week'),
          el('th', { style: { padding: '10px 12px', textAlign: 'left', fontSize: '11px', fontWeight: '600', color: 'var(--color-text-tertiary)', textTransform: 'uppercase', letterSpacing: '0.6px' } }, 'Opponent'),
          el('th', { style: { padding: '10px 12px', textAlign: 'center', fontSize: '11px', fontWeight: '600', color: 'var(--color-text-tertiary)', textTransform: 'uppercase', letterSpacing: '0.6px' } }, 'Result'),
          el('th', { style: { padding: '10px 12px', textAlign: 'right', fontSize: '11px', fontWeight: '600', color: 'var(--color-text-tertiary)', textTransform: 'uppercase', letterSpacing: '0.6px' } }, 'Score'),
          el('th', { style: { padding: '10px 12px' } }, '')
        ])
      ]),
      el('tbody', {}, matchRows)
    ])
  ]);

  const matchesSection = section('Match history', matches.length + ' matches — click any row to open H2H', matchTable);

  // Roster / Match History tab toggle
  const cpTab = state.cp.tab || 'roster';
  const cpTabBar = el('div', {
    style: {
      display:'inline-flex', background:'var(--color-background-secondary)',
      border:'0.5px solid var(--color-border-tertiary)', borderRadius:'999px',
      padding:'4px', gap:'2px', marginBottom:'1.25rem'
    }
  }, [
    ['roster','Full Roster'], ['history','Match History']
  ].map(([id, label]) => {
    const active = cpTab === id;
    return el('button', {
      onclick: () => { state.cp.tab = id; render(state); },
      style: {
        padding:'7px 18px', fontSize:'13px',
        fontWeight: active?'600':'500',
        background: active?'var(--color-background-primary)':'transparent',
        color: active?'var(--color-text-primary)':'var(--color-text-tertiary)',
        border: active?'0.5px solid var(--color-border-secondary)':'none',
        borderRadius:'999px', cursor:'pointer', transition:'all 0.2s', whiteSpace:'nowrap'
      }
    }, label);

function buildSeriesResults(gameLog) {
  const results = {};
  gameLog.forEach(r => {
    const key = 'W' + r.wk + '-M' + r.m;
    if (!results[key]) results[key] = { wk: r.wk, m: r.m, gameWinners: {}, coaches: new Set() };
    results[key].coaches.add(r.coach);
    if (r.won && !results[key].gameWinners[r.g]) results[key].gameWinners[r.g] = r.coach;
  });
  Object.values(results).forEach(s => {
    const coaches = Array.from(s.coaches);
    if (coaches.length === 2) {
      const [c1, c2] = coaches;
      s.w1 = Object.values(s.gameWinners).filter(w => w === c1).length;
      s.w2 = Object.values(s.gameWinners).filter(w => w === c2).length;
      s.c1 = c1; s.c2 = c2;
      s.done = (s.w1 === 2 || s.w2 === 2);
      s.winner = s.w1 > s.w2 ? c1 : s.w2 > s.w1 ? c2 : null;
      s.gamesPlayed = Object.keys(s.gameWinners).length;
    }
  });
  return results;
}

// ============================================================
// PLAYOFF CONFIG
// ============================================================
const PLAYOFF_CONFIG = {
  season: 2026,
  format: 'single',
  teams: 12,
  bestOf: 5,
  thirdPlace: true,
  seedingMethod: 'standings',
};

const PLAYOFF_BRACKET = {
  locked: false,
  manualSeeds: null,
  results: {
    // Winners bracket: 'R1-1','R1-2','R1-3','R1-4'
    //                  'QF-1','QF-2','QF-3','QF-4'
    //                  'SF-1','SF-2','FIN'
    // Losers bracket:  'LBR1-1','LBR1-2'
    //                  'LBR2-1','LBR2-2'
    //                  'LBR3-1','LBR3-2'
    //                  'LBSF-1','LBSF-2','LBFIN'
    // Format: { w1: gamesWonByHome, w2: gamesWonByAway, done: bool }
  },
};

const PLAYOFF_GOLD   = '#D4AF37';
const PLAYOFF_BRONZE = '#CD7F32';

// ============================================================
// Seed helpers
// ============================================================
function getPlayoffSeeds(gameLog) {
  if (PLAYOFF_BRACKET.manualSeeds) return PLAYOFF_BRACKET.manualSeeds;
  const stats = coachStats(gameLog);
  return Object.values(stats)
    .sort((a, b) => a.rank - b.rank)
    .slice(0, PLAYOFF_CONFIG.teams)
    .map(s => s.coach);
}

// ============================================================
// Bracket computation
// ============================================================
function getBracketMatchups(seeds) {
  const bo = PLAYOFF_CONFIG.bestOf;
  const r  = PLAYOFF_BRACKET.results;

  function seedCoach(seed) {
    if (typeof seed === 'number') return seeds[seed - 1] || '?';
    return seed;
  }
  function seedNum(coach) {
    const i = seeds.indexOf(coach);
    return i >= 0 ? i + 1 : 999;
  }
  function matchWinner(id, c1, c2) {
    const res = r[id];
    if (!res || !res.done) return null;
    return res.w1 > res.w2 ? c1 : c2;
  }
  function matchLoser(id, c1, c2) {
    const res = r[id];
    if (!res || !res.done) return null;
    return res.w1 < res.w2 ? c1 : c2;
  }

  // ── Winners bracket ──────────────────────────────────────
  const r1 = [
    { id:'R1-1', seed1:5,  seed2:12 },
    { id:'R1-2', seed1:6,  seed2:11 },
    { id:'R1-3', seed1:7,  seed2:10 },
    { id:'R1-4', seed1:8,  seed2:9  },
  ].map(m => {
    const c1 = seedCoach(m.seed1), c2 = seedCoach(m.seed2);
    return { ...m, bo, c1, c2, res: r[m.id]||null,
      winner: matchWinner(m.id,c1,c2), loser: matchLoser(m.id,c1,c2) };
  });

  const qf = [
    { id:'QF-1', seed1:1, feedId:'R1-4' },  // 1 v W(8v9)
    { id:'QF-2', seed1:2, feedId:'R1-2' },  // 2 v W(6v11)
    { id:'QF-3', seed1:3, feedId:'R1-3' },  // 3 v W(7v10)
    { id:'QF-4', seed1:4, feedId:'R1-1' },  // 4 v W(5v12)
  ].map(m => {
    const feeder = r1.find(x => x.id === m.feedId);
    const c1 = seedCoach(m.seed1);
    const c2 = feeder ? (feeder.winner || '?') : '?';
    return { ...m, bo, c1, c2, res: r[m.id]||null,
      winner: matchWinner(m.id,c1,c2), loser: matchLoser(m.id,c1,c2) };
  });

  const sf = [
    { id:'SF-1', feedId1:'QF-1', feedId2:'QF-4' },
    { id:'SF-2', feedId1:'QF-2', feedId2:'QF-3' },
  ].map(m => {
    const f1 = qf.find(x => x.id === m.feedId1);
    const f2 = qf.find(x => x.id === m.feedId2);
    const c1 = f1 ? (f1.winner||'?') : '?';
    const c2 = f2 ? (f2.winner||'?') : '?';
    return { ...m, bo, c1, c2, res: r[m.id]||null,
      winner: matchWinner(m.id,c1,c2), loser: matchLoser(m.id,c1,c2) };
  });

  const fin = (() => {
    const c1 = sf[0]?.winner||'?', c2 = sf[1]?.winner||'?';
    return { id:'FIN', bo, c1, c2, res: r['FIN']||null,
      winner: matchWinner('FIN',c1,c2), loser: matchLoser('FIN',c1,c2) };
  })();

  // ── Losers bracket ───────────────────────────────────────
  // LBR1: R1 losers pair off (R1-1 loser vs R1-2 loser, R1-3 loser vs R1-4 loser)
  const lbr1 = [
    { id:'LBR1-1', feedA:'R1-1', feedB:'R1-2' },
    { id:'LBR1-2', feedA:'R1-3', feedB:'R1-4' },
  ].map(m => {
    const fA = r1.find(x => x.id === m.feedA);
    const fB = r1.find(x => x.id === m.feedB);
    const c1 = fA ? (fA.loser||'?') : '?';
    const c2 = fB ? (fB.loser||'?') : '?';
    return { ...m, bo, c1, c2, res: r[m.id]||null,
      winner: matchWinner(m.id,c1,c2), loser: matchLoser(m.id,c1,c2) };
  });

  // Pool after LBR1 + QF: 2 LBR1 winners + 4 QF losers = 6 teams
  // Top 2 seeds get byes into LBR3; bottom 4 play LBR2
  const lbPool = [];
  lbr1.forEach(m => {
    if (m.winner && m.winner !== '?') lbPool.push({ coach: m.winner, from: 'lbr1' });
  });
  qf.forEach(m => {
    if (m.loser && m.loser !== '?') lbPool.push({ coach: m.loser, from: 'qf' });
  });
  lbPool.sort((a, b) => seedNum(a.coach) - seedNum(b.coach));

  const byeTeams  = lbPool.slice(0, 2);
  const lbr2Pool  = lbPool.slice(2);

  // LBR2: pair LBR1 winner vs QF loser among the 4 non-bye teams
  const lbr2NonBye_lbr1 = lbr2Pool.filter(t => t.from === 'lbr1');
  const lbr2NonBye_qf   = lbr2Pool.filter(t => t.from === 'qf');

  const lbr2 = [0, 1].map(i => {
    const id = 'LBR2-' + (i+1);
    const c1 = lbr2NonBye_lbr1[i]?.coach || '?';
    const c2 = lbr2NonBye_qf[i]?.coach   || '?';
    return { id, bo, c1, c2, res: r[id]||null,
      winner: matchWinner(id,c1,c2), loser: matchLoser(id,c1,c2) };
  });

  // LBR3: bye teams face LBR2 winners
  const lbr3 = [0, 1].map(i => {
    const id = 'LBR3-' + (i+1);
    const c1 = byeTeams[i]?.coach  || '?';
    const c2 = lbr2[i]?.winner     || '?';
    return { id, bo, c1, c2, res: r[id]||null,
      winner: matchWinner(id,c1,c2), loser: matchLoser(id,c1,c2) };
  });

  // LBSF: LBR3 winners vs SF losers
  // Higher seed SF loser faces LOWER seed LBR3 winner
  const lbr3Winners = lbr3.map(m => ({ coach: m.winner||'?', seed: seedNum(m.winner||'?') }))
    .sort((a,b) => a.seed - b.seed);  // [0]=higher seed, [1]=lower seed
  const sfLosers = sf.map(m => ({ coach: m.loser||'?', seed: seedNum(m.loser||'?') }))
    .sort((a,b) => a.seed - b.seed);  // [0]=higher seed SF loser

  // Higher seed SF loser (sfLosers[0]) vs lower LBR3 winner (lbr3Winners[1])
  // Lower seed SF loser (sfLosers[1]) vs higher LBR3 winner (lbr3Winners[0])
  const lbsf = [
    { id:'LBSF-1', c1: sfLosers[0]?.coach||'?',   c2: lbr3Winners[1]?.coach||'?' },
    { id:'LBSF-2', c1: sfLosers[1]?.coach||'?',   c2: lbr3Winners[0]?.coach||'?' },
  ].map(m => ({
    ...m, bo, res: r[m.id]||null,
    winner: matchWinner(m.id,m.c1,m.c2), loser: matchLoser(m.id,m.c1,m.c2)
  }));

  const lbfin = (() => {
    const c1 = lbsf[0]?.winner||'?', c2 = lbsf[1]?.winner||'?';
    return { id:'LBFIN', bo, c1, c2, res: r['LBFIN']||null,
      winner: matchWinner('LBFIN',c1,c2) };
  })();

  return { r1, qf, sf, fin, lbr1, lbPool, byeTeams, lbr2, lbr3, lbsf, lbfin };
}

// ============================================================
// Match card renderer
// ============================================================
function bracketMatchCard(match, roundLabel, onClick, accentColor) {
  const res   = match.res;
  const done  = res && res.done;
  const live  = res && !res.done && (res.w1 > 0 || res.w2 > 0);
  const color = accentColor || PLAYOFF_GOLD;

  const makeRow = (coach, wins, isWinner) => {
    const cc = COACH_COLORS[coach] || '#555';
    const unknown = !coach || coach === '?';
    return el('div', {
      style: {
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        padding: '7px 12px',
        background: done && isWinner ? cc + '22' : 'transparent',
        borderRadius: 'var(--border-radius-sm)',
        opacity: unknown ? '0.4' : '1'
      }
    }, [
      el('div', { style: { display: 'flex', alignItems: 'center', gap: '8px' } }, [
        el('span', {
          style: {
            width: '8px', height: '8px', borderRadius: '50%',
            background: unknown ? 'var(--color-text-tertiary)' : cc, flexShrink: '0',
            boxShadow: done && isWinner ? '0 0 8px ' + cc + '80' : 'none'
          }
        }),
        el('span', {
          style: {
            fontSize: '13px', fontWeight: done && isWinner ? '600' : '500',
            color: unknown ? 'var(--color-text-tertiary)' : 'var(--color-text-primary)'
          }
        }, unknown ? 'TBD' : coach)
      ]),
      done ? el('span', {
        style: {
          fontFamily: 'var(--font-display)', fontWeight: '700', fontSize: '16px',
          color: isWinner ? cc : 'var(--color-text-tertiary)'
        }
      }, String(wins)) : null
    ].filter(x => x));
  };

  const winnerColor = done
    ? (res.w1 > res.w2 ? (COACH_COLORS[match.c1]||'#888') : (COACH_COLORS[match.c2]||'#888'))
    : null;

  const card = el('div', {
    onclick: done && onClick ? onClick : null,
    style: {
      background: 'var(--color-background-secondary)',
      border: '0.5px solid ' + (done ? winnerColor + '50' : 'var(--color-border-tertiary)'),
      borderRadius: 'var(--border-radius-lg)', overflow: 'hidden',
      transition: 'all 0.15s', cursor: done && onClick ? 'pointer' : 'default',
      minWidth: '190px'
    }
  }, [
    el('div', {
      style: {
        padding: '5px 12px', background: 'var(--color-background-primary)',
        borderBottom: '0.5px solid var(--color-border-tertiary)',
        display: 'flex', justifyContent: 'space-between', alignItems: 'center'
      }
    }, [
      el('span', { style: { fontSize: '10px', fontWeight: '600', textTransform: 'uppercase', letterSpacing: '0.6px', color } }, roundLabel),
      live ? el('span', { style: { fontSize: '10px', fontWeight: '600', color: 'var(--color-text-warning)' } }, 'Live') :
      done ? el('span', { style: { fontSize: '10px', color: 'var(--color-text-tertiary)' } }, 'Bo' + match.bo) : null
    ].filter(x => x)),
    el('div', { style: { padding: '4px 0' } }, [
      makeRow(match.c1, res ? res.w1 : 0, done && res.w1 > res.w2),
      el('div', { style: { height: '0.5px', background: 'var(--color-border-tertiary)', margin: '0 12px' } }),
      makeRow(match.c2, res ? res.w2 : 0, done && res.w2 > res.w1),
    ])
  ]);

  if (done && onClick) {
    card.onmouseover = () => { card.style.transform = 'translateY(-2px)'; card.style.borderColor = winnerColor + '80'; };
    card.onmouseout  = () => { card.style.transform = '';  card.style.borderColor = winnerColor + '50'; };
  }
  return card;
}

// ============================================================
// View entrypoint
// ============================================================
function viewPlayoffs(state) {
  const seeds   = getPlayoffSeeds(state.data.gameLog);
  const bracket = getBracketMatchups(seeds);
  const pTab    = state.playoffs.tab || 'bracket';

  const subTabBar = el('div', { style: { display: 'flex', gap: '8px', marginBottom: '1.5rem' } },
    [['bracket','Bracket'],['stats','Playoff stats']].map(([id, label]) => {
      const active = pTab === id;
      return el('button', {
        onclick: () => { state.playoffs.tab = id; render(state); },
        style: {
          padding: '8px 18px', fontSize: '13px',
          fontWeight: active ? '600' : '500',
          background: active ? PLAYOFF_GOLD + '22' : 'var(--color-background-secondary)',
          color: active ? PLAYOFF_GOLD : 'var(--color-text-secondary)',
          border: active ? '0.5px solid ' + PLAYOFF_GOLD + '60' : '0.5px solid var(--color-border-tertiary)',
          borderRadius: 'var(--border-radius-md)', cursor: 'pointer', transition: 'all 0.15s'
        }
      }, label);
    })
  );

  return el('div', {}, [
    subTabBar,
    pTab === 'bracket'
      ? renderBracket(state, seeds, bracket)
      : renderPlayoffStats(state, seeds, bracket)
  ]);
}

// ============================================================
// Bracket renderer
// ============================================================
function renderBracket(state, seeds, bracket) {
  const { r1, qf, sf, fin, lbr1, byeTeams, lbr2, lbr3, lbsf, lbfin } = bracket;

  const jump = (c1, c2) => () => {
    state.h2h.c1 = c1; state.h2h.c2 = c2; state.view = 'h2h'; render(state);
  };

function getPlayoffGameIds(gameLog) {
  return new Set(gameLog.filter(r => r.wk > 11).map(r => r.gid));
}

function renderPlayoffStats(state, seeds, bracket) {
  const pGids  = getPlayoffGameIds(state.data.gameLog);
  const pGames = state.data.gameLog.filter(r => pGids.has(r.gid));

  if (pGames.length === 0) {
    return section('Playoff stats', 'No playoff games yet',
      el('div', { style: { padding: '40px 24px', textAlign: 'center', color: 'var(--color-text-tertiary)' } }, [
        el('div', { style: { fontSize: '32px', marginBottom: '12px' } }, '🏆'),
        el('div', { style: { fontSize: '14px', fontWeight: '500', marginBottom: '6px' } }, 'Playoffs haven\'t started yet'),
        el('div', { style: { fontSize: '13px' } }, 'Stats appear once playoff replays are uploaded')
      ])
    );
  }

  const mons    = monStats(pGames);
  const top     = Object.values(mons).sort((a, b) => b.mvp - a.mvp).slice(0, 20);
  const coachS  = coachStats(pGames);
  const coaches = Object.values(coachS).filter(s => s.gp > 0).sort((a, b) => a.rank - b.rank);

  const coachRows = coaches.map(s => [
    rankBadge(s.rank), coachBadge(s.coach),
    mono(s.sw_series+'-'+s.sl_series), mono(s.gw+'-'+(s.gp-s.gw)),
    formatInt(s.kills), formatInt(s.deaths), formatKDR(s.kdr), formatInt(s.dmgPerGame)+'%'
  ]);
  const monRows = top.map((r, i) => [
    rankBadge(i+1),
    el('span', { style: { fontFamily:'var(--font-display)', fontWeight:'600', fontSize:'15px' } }, String(r.mvp)),
    monLink(r.coach, r.mon), coachBadge(r.coach),
    formatInt(r.gp), mono(r.gw+'-'+(r.gp-r.gw)),
    formatInt(r.tk), formatInt(r.deaths), formatKDR(r.kdr), formatDmg(r.dout)
  ]);

  return el('div', {}, [
    section('Coach standings', pGames.length + ' playoff games',
      el('div', { style: { overflowX:'auto' } }, makeTable(
        [{key:'rank',label:'#'},{key:'coach',label:'Coach',align:'left'},{key:'series',label:'Series'},{key:'games',label:'Games'},{key:'kills',label:'K'},{key:'deaths',label:'D'},{key:'kdr',label:'K/D'},{key:'dpg',label:'Dmg/G'}],
        coachRows, { stickyHeader: true }
      )),
      { marginBottom: '1.25rem' }
    ),
    section('Pokemon leaderboard', 'Playoff MVP leaders',
      el('div', { style: { overflowX:'auto' } }, makeTable(
        [{key:'rank',label:'#'},{key:'mvp',label:'MVP'},{key:'mon',label:'Pokemon',align:'left'},{key:'coach',label:'Coach',align:'left'},{key:'gp',label:'GP'},{key:'record',label:'W-L'},{key:'tk',label:'K'},{key:'deaths',label:'D'},{key:'kdr',label:'K/D'},{key:'dout',label:'Dmg'}],
        monRows, { stickyHeader: true }
      ))
    )
  ]);
}

function buildSearchIndex(data) {
  const results = [];
  // Coaches
  COACHES.forEach(coach => {
    results.push({ type: 'coach', label: coach, sub: 'Coach panel', action: (state) => { state.cp.coach = coach; state.view = 'coach'; } });
  });
  // Mons
  const mons = monStats(data.gameLog);
  Object.values(mons).forEach(m => {
    results.push({ type: 'mon', label: m.mon, sub: m.coach + ' • MVP ' + m.mvp, action: (state) => { state.mdd.coach = m.coach; state.mdd.mon = m.mon; state.view = 'mon'; } });
  });
  return results;
}

function renderSearch(state) {
  if (!state.searchOpen) return null;
  const index = buildSearchIndex(state.data);

  const backdrop = el('div', {
    onclick: () => { state.searchOpen = false; state.searchQuery = ''; render(state); },
    style: { position: 'fixed', inset: '0', background: 'rgba(0,0,0,0.5)', zIndex: '999' }
  });

  const resultsDiv = el('div', { style: { maxHeight: '400px', overflowY: 'auto' } });

  function updateResults(q) {
    resultsDiv.innerHTML = '';
    const filtered = q ? index.filter(r => r.label.toLowerCase().includes(q.toLowerCase()) || r.sub.toLowerCase().includes(q.toLowerCase())).slice(0, 10) : index.slice(0, 8);
    if (filtered.length === 0) {
      const empty = el('div', { style: { padding: '24px 20px', textAlign: 'center', color: 'var(--color-text-tertiary)', fontSize: '14px' } }, q ? 'No results for "' + q + '"' : 'Start typing...');
      resultsDiv.appendChild(empty);
      return;
    }
    filtered.forEach(r => {
      const iconEl = r.type === 'coach'
        ? el('div', { style: { width: '32px', height: '32px', borderRadius: '50%', background: (COACH_COLORS[r.label]||'#888'), display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#fff', fontSize: '13px', fontWeight: '700', flexShrink: '0' } }, r.label.charAt(0))
        : el('div', { style: { flexShrink: '0' } }, monSprite(r.label, 32));
      const item = el('div', {
        onclick: () => { r.action(state); state.searchOpen = false; state.searchQuery = ''; render(state); },
        style: { display: 'flex', alignItems: 'center', gap: '12px', padding: '12px 20px', cursor: 'pointer', transition: 'background 0.1s' }
      }, [
        iconEl,
        el('div', {}, [
          el('div', { style: { fontWeight: '600', fontSize: '14px' } }, r.label),
          el('div', { style: { fontSize: '12px', color: 'var(--color-text-tertiary)', marginTop: '2px' } }, r.sub)
        ])
      ]);
      item.onmouseover = () => { item.style.background = 'var(--color-background-secondary)'; };
      item.onmouseout  = () => { item.style.background = ''; };
      resultsDiv.appendChild(item);
    });
  }

  // Create input WITHOUT value attribute — never re-render on keystroke
  const searchInput = document.createElement('input');
  searchInput.type = 'text';
  searchInput.placeholder = 'Search coaches or Pokémon...';
  searchInput.style.cssText = 'width:100%;padding:16px 20px;font-size:16px;background:transparent;border:none;outline:none;color:var(--color-text-primary);font-family:var(--font-sans);box-sizing:border-box;';
  searchInput.oninput = (e) => { state.searchQuery = e.target.value; updateResults(e.target.value); };

  updateResults(state.searchQuery || '');

  const modal = el('div', {
    style: {
      position: 'fixed', top: '80px', left: '50%', transform: 'translateX(-50%)',
      width: 'min(600px, 90vw)',
      background: 'var(--color-background-primary)',
      border: '0.5px solid var(--color-border-secondary)',
      borderRadius: 'var(--border-radius-lg)',
      boxShadow: '0 20px 60px rgba(0,0,0,0.4)',
      zIndex: '1000', overflow: 'hidden'
    }
  }, [
    el('div', { style: { borderBottom: '0.5px solid var(--color-border-tertiary)', display: 'flex', alignItems: 'center', paddingLeft: '20px', gap: '12px' } }, [
      el('span', { style: { fontSize: '18px', color: 'var(--color-text-tertiary)' } }, '🔍'),
    ]),
    resultsDiv
  ]);

  // Inject the raw input into the header div
  modal.firstChild.appendChild(searchInput);
  setTimeout(() => { searchInput.focus(); if (state.searchQuery) searchInput.value = state.searchQuery; }, 30);

  return el('div', {}, [backdrop, modal]);
}

    { id:'query', label:'Stat pivot' }, { id:'turnlog', label:'Event book' }
  ];

  const tabBar = el('div', {
    style: { display: 'flex', gap: '4px', flexWrap: 'wrap', borderBottom: '0.5px solid var(--color-border-tertiary)', marginBottom: '1.5rem' }
  }, tabs.map(t => tab(t.label, state.view === t.id, () => { state.view = t.id; render(state); })));

  const statState = { ...state, data: { ...state.data, gameLog: activeGameLog(state) } };
  let content;
  if      (state.view === 'standings')    content = viewStandings(statState);
  else if (state.view === 'schedule')     content = viewSchedule(state);
  else if (state.view === 'leaderboard')  content = viewLeaderboard(statState);
  else if (state.view === 'coach')        content = viewCoachPanel(statState);
  else if (state.view === 'mon')          content = viewMonDeepDive(statState);
  else if (state.view === 'h2h')          content = viewHeadToHead(statState);
  else if (state.view === 'query')        content = viewCustomQuery(statState);
  else if (state.view === 'turnlog')      content = viewTurnLog(statState);
  else                                    content = viewStandings(statState);

  root.appendChild(header);
  root.appendChild(tabBar);
  if (content) root.appendChild(content);
}

function init() {
  applyTheme(state.darkMode);
  state.data = decodeAll(decompressData(BAKED_DATA_B64));
  render(state);
}

// Keyboard shortcut: Cmd/Ctrl+K opens search
document.addEventListener('keydown', (e) => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
    e.preventDefault();
    state.searchOpen = !state.searchOpen;
    if (!state.searchOpen) state.searchQuery = '';
    render(state);
  }
  if (e.key === 'Escape' && state.searchOpen) {
    state.searchOpen = false;
    state.searchQuery = '';
    render(state);
  }
});

init();
</script>
