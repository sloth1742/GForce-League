<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');

:root, html, body {
  --color-background-primary: #13151c;
  --color-background-secondary: #1a1d27;
  --color-background-tertiary: #0e1016;
  --color-background-info: #1e3a5f;
  --color-background-success: #1e3a2f;
  --color-background-danger: #3e1e24;
  --color-background-warning: #3e331e;
  --color-text-primary: #e8eaed;
  --color-text-secondary: #a8b0bd;
  --color-text-tertiary: #6b7280;
  --color-text-info: #7ab8ff;
  --color-text-success: #6bd994;
  --color-text-danger: #ff7788;
  --color-text-warning: #f5c547;
  --color-border-primary: rgba(255,255,255,0.18);
  --color-border-secondary: rgba(255,255,255,0.12);
  --color-border-tertiary: rgba(255,255,255,0.08);
  --color-border-info: #7ab8ff;
  --color-border-danger: #ff7788;
  --color-border-success: #6bd994;
  --border-radius-sm: 6px;
  --border-radius-md: 10px;
  --border-radius-lg: 14px;
  --border-radius-xl: 20px;
  --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-display: 'Space Grotesk', 'Inter', sans-serif;
  --font-mono: 'JetBrains Mono', 'Courier New', monospace;
}

body {
  background: var(--color-background-tertiary) !important;
  color: var(--color-text-primary);
  font-family: var(--font-sans);
  margin: 0;
  padding: 0;
}

#gforce-root {
  max-width: 1200px;
  margin: 0 auto;
  padding: 2rem 1.5rem;
}

#gforce-app * {
  box-sizing: border-box;
}

#gforce-app h1, #gforce-app h2, #gforce-app h3 {
  font-family: var(--font-display);
  letter-spacing: -0.02em;
}

#gforce-app table {
  border-collapse: collapse;
  width: 100%;
}

#gforce-app button {
  font-family: var(--font-sans);
  background: var(--color-background-secondary);
  color: var(--color-text-primary);
  border: 0.5px solid var(--color-border-secondary);
  padding: 8px 14px;
  border-radius: var(--border-radius-md);
  cursor: pointer;
  transition: all 0.15s;
  font-size: 13px;
}
#gforce-app button:hover {
  background: var(--color-background-primary);
  border-color: var(--color-border-primary);
}

#gforce-app select, #gforce-app input {
  font-family: var(--font-sans);
  background: var(--color-background-secondary);
  color: var(--color-text-primary);
  border: 0.5px solid var(--color-border-secondary);
  padding: 7px 10px;
  border-radius: var(--border-radius-md);
  font-size: 13px;
  transition: border-color 0.15s;
}
#gforce-app select:focus, #gforce-app input:focus {
  outline: none;
  border-color: var(--color-border-info);
}

#gforce-app ::-webkit-scrollbar {
  width: 10px;
  height: 10px;
}
#gforce-app ::-webkit-scrollbar-track {
  background: var(--color-background-tertiary);
}
#gforce-app ::-webkit-scrollbar-thumb {
  background: var(--color-background-secondary);
  border-radius: 5px;
}
#gforce-app ::-webkit-scrollbar-thumb:hover {
  background: var(--color-border-secondary);
}
</style>

<div id="gforce-root">
<div id="gforce-app"></div>
</div>

function decompressData(b64) {
  const binary = atob(b64);
  const bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  const decompressed = pako.ungzip(bytes, { to: 'string' });
  return JSON.parse(decompressed);
}

function decode(rows, keys) {
  return rows.map(r => {
    const o = {};
    keys.forEach((k, i) => { o[k] = r[i]; });
    o.gid = 'W' + String(o.wk).padStart(2,'0') + '-M' + String(o.m).padStart(2,'0') + '-G' + o.g;
    return o;
  });
}

function decodeAll(raw) {
  return {
    gameLog: decode(raw.gl, GL_KEYS),
    moveLog: decode(raw.ml, ML_KEYS),
    turnLog: decode(raw.tl, TL_KEYS),
    roster: raw.rs.map(r => ({ coach: r[0], mon: r[1], status: r[2] }))
  };
}
function coachStats(gameLog) {
  const stats = {};
  COACHES.forEach(c => {
    stats[c] = {
      coach: c,
      gp: 0, gw: 0,
      brought_rows: 0,
      kills: 0, kd: 0, ki: 0, deaths: 0,
      dmg: 0, dmg_taken: 0,
      sw: 0, abil: 0, item: 0,
      cp: 0, cm: 0, teras: 0,
      gids: new Set(),
      gwGids: new Set(),
      seriesPlayed: new Set(),
      seriesWon: new Set(),
      leaguePoints: 0
    };
  });

  gameLog.forEach(r => {
    const s = stats[r.coach];
    if (!s) return;
    s.brought_rows++;
    s.kd += r.kd || 0;
    s.ki += r.ki || 0;
    s.kills += (r.kd || 0) + (r.ki || 0);
    s.deaths += r.d || 0;
    s.dmg += r.dout || 0;
    s.dmg_taken += r.din || 0;
    s.sw += r.sw || 0;
    s.abil += r.abil || 0;
    s.item += r.item || 0;
    s.cp += r.cp || 0;
    s.cm += r.cm || 0;
    s.teras += r.tera || 0;
    s.gids.add(r.gid);
    if (r.won) s.gwGids.add(r.gid);
  });

  Object.values(stats).forEach(s => {
    s.gp = s.gids.size;
    s.gw = s.gwGids.size;
    s.gl = s.gp - s.gw;
  });

  // Compute series records and league points
  const seriesMap = {};
  gameLog.forEach(r => {
    const key = 'W' + r.wk + '-M' + r.m;
    if (!seriesMap[key]) seriesMap[key] = {};
    if (!seriesMap[key][r.coach]) seriesMap[key][r.coach] = new Set();
    if (r.won) seriesMap[key][r.coach].add(r.g);
  });

  Object.keys(seriesMap).forEach(key => {
    const match = seriesMap[key];
    const coaches = Object.keys(match);
    if (coaches.length !== 2) return;
    const [a, b] = coaches;
    stats[a].seriesPlayed.add(key);
    stats[b].seriesPlayed.add(key);
    const aWins = match[a].size;
    const bWins = match[b].size;

    // League points: 3 for 2-0 win, 2 for 2-1 win, 1 for 1-2 loss, 0 for 0-2 loss
    if (aWins === 2 && bWins === 0) {
      stats[a].seriesWon.add(key);
      stats[a].leaguePoints += 3;
      stats[b].leaguePoints += 0;
    } else if (aWins === 2 && bWins === 1) {
      stats[a].seriesWon.add(key);
      stats[a].leaguePoints += 2;
      stats[b].leaguePoints += 1;
    } else if (bWins === 2 && aWins === 0) {
      stats[b].seriesWon.add(key);
      stats[b].leaguePoints += 3;
      stats[a].leaguePoints += 0;
    } else if (bWins === 2 && aWins === 1) {
      stats[b].seriesWon.add(key);
      stats[b].leaguePoints += 2;
      stats[a].leaguePoints += 1;
    }
  });

  Object.values(stats).forEach(s => {
    s.sp = s.seriesPlayed.size;
    s.sw_series = s.seriesWon.size;
    s.sl_series = s.sp - s.sw_series;
    s.seriesWinPct = s.sp > 0 ? s.sw_series / s.sp : 0;
    s.winPct = s.gp > 0 ? s.gw / s.gp : 0;
    s.kdr = s.deaths > 0 ? s.kills / s.deaths : s.kills;
    s.dmgPerGame = s.gp > 0 ? s.dmg / s.gp : 0;
    s.swPerGame = s.gp > 0 ? s.sw / s.gp : 0;
    s.plusMinus = s.gw - s.gl;
    s.gids = undefined;
    s.gwGids = undefined;
    s.seriesPlayed = undefined;
    s.seriesWon = undefined;
  });

  // New ranking: series wins → league points → +/- → total kills → coach name
  const ranked = Object.values(stats).sort((a, b) => {
    if (b.sw_series !== a.sw_series) return b.sw_series - a.sw_series;
    if (b.leaguePoints !== a.leaguePoints) return b.leaguePoints - a.leaguePoints;
    if (b.plusMinus !== a.plusMinus) return b.plusMinus - a.plusMinus;
    if (b.kills !== a.kills) return b.kills - a.kills;
    return a.coach.localeCompare(b.coach);
  });
  ranked.forEach((s, i) => { s.rank = i + 1; });

  return stats;
}

function monStats(gameLog) {
  const stats = {};
  gameLog.forEach(r => {
    const key = r.coach + '|' + r.mon;
    if (!stats[key]) {
      stats[key] = {
        coach: r.coach, mon: r.mon,
        gp: 0, gw: 0,
        kd: 0, ki: 0, tk: 0, deaths: 0,
        dout: 0, din: 0,
        sw: 0, teras: 0, leads: 0,
        cp: 0, cm: 0,
        moves: 0, abil: 0, item: 0, ta: 0,
        gids: new Set()
      };
    }
    const s = stats[key];
    s.gp++;
    if (r.won) s.gw++;
    s.kd += r.kd || 0;
    s.ki += r.ki || 0;
    s.tk += (r.kd || 0) + (r.ki || 0);
    s.deaths += r.d || 0;
    s.dout += r.dout || 0;
    s.din += r.din || 0;
    s.sw += r.sw || 0;
    s.teras += r.tera || 0;
    s.leads += r.lead || 0;
    s.cp += r.cp || 0;
    s.cm += r.cm || 0;
    s.moves += r.moves || 0;
    s.abil += r.abil || 0;
    s.item += r.item || 0;
    s.ta += r.ta || 0;
    s.gids.add(r.gid);
  });
  Object.values(stats).forEach(s => {
    s.winPct = s.gp > 0 ? s.gw / s.gp : 0;
    s.kdr = s.deaths > 0 ? s.tk / s.deaths : s.tk;
    s.dmgPerGame = s.gp > 0 ? s.dout / s.gp : 0;
    s.mvp = s.tk * 3 + s.deaths * -1 + s.gw * 2 + s.teras * 1;
    s.gids = undefined;
  });
  return stats;
}

function monMoveStats(moveLog, coach, mon) {
  const moves = {};
  moveLog.filter(r => r.coach === coach && r.mon === mon).forEach(r => {
    if (!moves[r.move]) moves[r.move] = { move: r.move, uses: 0, dmg: 0 };
    moves[r.move].uses += r.uses || 0;
    moves[r.move].dmg += r.dmg || 0;
  });
  return Object.values(moves).map(m => ({
    move: m.move,
    uses: m.uses,
    dmg: m.dmg,
    avg: m.uses > 0 ? m.dmg / m.uses : 0
  })).sort((a, b) => b.uses - a.uses);
}

function pivotGameStats(gameLog, config) {
  const { metric, groupBy, filters } = config;
  const filtered = gameLog.filter(r => {
    if (filters.coach !== 'All' && r.coach !== filters.coach) return false;
    if (filters.week !== 'All' && r.wk !== parseInt(filters.week)) return false;
    if (filters.opponent !== 'All' && r.opp !== filters.opponent) return false;
    if (filters.teraOnly === 'yes' && !r.tera) return false;
    if (filters.teraOnly === 'no' && r.tera) return false;
    if (filters.leadOnly === 'yes' && !r.lead) return false;
    if (filters.leadOnly === 'no' && r.lead) return false;
    if (filters.wonOnly === 'yes' && !r.won) return false;
    if (filters.wonOnly === 'no' && r.won) return false;
    return true;
  });

  const groups = {};
  filtered.forEach(r => {
    let key;
    if (groupBy === 'mon') key = r.coach + '|' + r.mon;
    else if (groupBy === 'coach') key = r.coach;
    else if (groupBy === 'week') key = r.wk;
    else if (groupBy === 'opponent') key = r.opp;

    if (!groups[key]) {
      groups[key] = {
        key, coach: r.coach, mon: r.mon, wk: r.wk, opp: r.opp,
        rows: 0, games: new Set(), wins: new Set(),
        value: 0,
        kd: 0, ki: 0, deaths: 0, dout: 0, din: 0,
        sw: 0, teras: 0, cp: 0, cm: 0, moves: 0,
        abil: 0, item: 0, leads: 0, ta: 0
      };
    }
    const g = groups[key];
    g.rows++;
    g.games.add(r.gid);
    if (r.won) g.wins.add(r.gid);
    g.kd += r.kd || 0;
    g.ki += r.ki || 0;
    g.deaths += r.d || 0;
    g.dout += r.dout || 0;
    g.din += r.din || 0;
    g.sw += r.sw || 0;
    g.teras += r.tera || 0;
    g.cp += r.cp || 0;
    g.cm += r.cm || 0;
    g.moves += r.moves || 0;
    g.abil += r.abil || 0;
    g.item += r.item || 0;
    g.leads += r.lead || 0;
    g.ta += r.ta || 0;
  });

  Object.values(groups).forEach(g => {
    g.gp = g.games.size;
    g.gw = g.wins.size;
    g.kills = g.kd + g.ki;
    g.kdr = g.deaths > 0 ? g.kills / g.deaths : g.kills;
    g.winPct = g.gp > 0 ? g.gw / g.gp : 0;
    g.dmgPerGame = g.gp > 0 ? g.dout / g.gp : 0;
    g.kpg = g.gp > 0 ? g.kills / g.gp : 0;
    g.teraRate = g.gp > 0 ? g.teras / g.gp : 0;
    g.leadRate = g.gp > 0 ? g.leads / g.gp : 0;

    if (metric === 'kills') g.value = g.kills;
    else if (metric === 'kdr') g.value = g.kdr;
    else if (metric === 'kpg') g.value = g.kpg;
    else if (metric === 'winPct') g.value = g.winPct;
    else if (metric === 'dmgPerGame') g.value = g.dmgPerGame;
    else if (metric === 'teraRate') g.value = g.teraRate;
    else if (metric === 'leadRate') g.value = g.leadRate;
    else g.value = g[metric] || 0;

    g.games = undefined;
    g.wins = undefined;
  });

  return Object.values(groups).sort((a, b) => b.value - a.value);
}

function pivotEventStats(turnLog, gameLog, config) {
  const { event, outcome, groupBy, filters, statusType, teraType } = config;

  let filtered = turnLog.filter(t => {
    if (event !== 'All' && t.event !== event) return false;
    if (outcome && outcome !== 'All' && t.outcome !== outcome) return false;
    if (filters.coach !== 'All' && t.coach !== filters.coach) return false;
    if (filters.week !== 'All' && t.wk !== parseInt(filters.week)) return false;

    if (event === 'STATUS' && statusType && statusType !== 'All') {
      const detail = (t.detail || '').toLowerCase();
      if (statusType === 'burn' && !detail.includes('burn')) return false;
      if (statusType === 'paralysis' && !detail.includes('paralysis')) return false;
      if (statusType === 'sleep' && !detail.includes('sleep')) return false;
      if (statusType === 'poison' && !detail.includes('poison') && !detail.includes('toxic')) return false;
      if (statusType === 'freeze' && !detail.includes('freeze')) return false;
    }
    if (event === 'TERA' && teraType && teraType !== 'All') {
      if (t.outcome !== teraType) return false;
    }
    return true;
  });

  const groups = {};
  filtered.forEach(t => {
    if (!t.coach) return;
    let key;
    if (groupBy === 'mon') key = t.coach + '|' + (t.mon || '?');
    else if (groupBy === 'coach') key = t.coach;
    else if (groupBy === 'week') key = t.wk;
    else if (groupBy === 'event') key = t.event;
    else if (groupBy === 'detail') key = t.detail || t.outcome || '?';

    if (!groups[key]) {
      groups[key] = { key, coach: t.coach, mon: t.mon, wk: t.wk, count: 0 };
    }
    groups[key].count++;
  });

  return Object.values(groups).sort((a, b) => b.count - a.count);
}

const el = (tag, attrs, children) => {
  const e = document.createElement(tag);
  if (attrs) for (const k in attrs) {
    if (k === 'style') Object.assign(e.style, attrs[k]);
    else if (k === 'onclick') e.onclick = attrs[k];
    else if (k === 'onchange') e.onchange = attrs[k];
    else if (k === 'onmouseover') e.onmouseover = attrs[k];
    else if (k === 'onmouseout') e.onmouseout = attrs[k];
    else if (k === 'html') e.innerHTML = attrs[k];
    else e.setAttribute(k, attrs[k]);
  }
  if (children) {
    if (!Array.isArray(children)) children = [children];
    children.forEach(c => {
      if (c == null) return;
      if (typeof c === 'string' || typeof c === 'number') e.appendChild(document.createTextNode(c));
      else e.appendChild(c);
    });
  }
  return e;
};

        padding: '16px 20px 20px'
      }
    }, highlights.length > 0 ? highlights :
      [el('div', { style: { padding: '20px', color: 'var(--color-text-tertiary)', textAlign: 'center' } }, 'Not enough data for highlights yet')]
    ),
    { marginBottom: '1.25rem' }
  );

  // Per-game team breakdowns
  const gameCards = games.map((gid, gameIdx) => {
    const gameRows = h2hGl.filter(r => r.gid === gid);
    const winner = gameWinners[gid];
    const g = gameIdx + 1;

    const makeTeamPanel = (coach) => {
      const coachRows = gameRows.filter(r => r.coach === coach);
      const coachColor = COACH_COLORS[coach] || '#888';
      const isWinner = winner === coach;

      const monRows = coachRows.map(r => {
        const moves = h2hMl
          .filter(m => m.gid === gid && m.coach === coach && m.mon === r.mon)
          .sort((a, b) => b.uses - a.uses)
          .slice(0, 2)
          .map(m => m.move + ' ×' + m.uses);

        // Look up actual Tera type from turn log
        const teraEvent = h2hTl.find(t => t.gid === gid && t.coach === coach && t.mon === r.mon && t.event === 'TERA');
        const teraType = teraEvent ? teraEvent.outcome : null;

        return el('div', {
          style: {
            display: 'flex',
            alignItems: 'center',
            gap: '10px',
            padding: '8px 0',
            borderBottom: '0.5px solid var(--color-border-tertiary)',
            opacity: '1'
          }
        }, [
          el('div', { style: { position: 'relative', flexShrink: '0' } }, [
            monSprite(r.mon, 36),
            r.lead ? el('span', {
              style: {
                position: 'absolute', top: '-4px', right: '-4px',
                width: '14px', height: '14px', borderRadius: '50%',
                background: coachColor, color: '#fff',
                fontSize: '8px', fontWeight: '700',
                display: 'flex', alignItems: 'center', justifyContent: 'center'
              }
            }, 'L') : null
          ]),
          el('div', { style: { flex: '1', minWidth: '0' } }, [
            el('div', { style: { fontSize: '13px', fontWeight: '600', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' } }, r.mon),
            el('div', { style: { fontSize: '11px', color: 'var(--color-text-tertiary)', marginTop: '2px', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' } },
              moves.length > 0 ? moves.join('  •  ') : 'no moves recorded')
          ]),
          el('div', { style: { textAlign: 'right', flexShrink: '0' } }, [
            el('div', {
              style: {
                fontSize: '11px', fontWeight: '600',
                display: 'flex', gap: '8px', justifyContent: 'flex-end'
              }
            }, [
              (r.kd + r.ki) > 0 ? el('span', { style: { color: 'var(--color-text-success)' } }, (r.kd + r.ki) + 'K') : null,
              r.d > 0 ? el('span', { style: { color: 'var(--color-text-danger)' } }, r.d + 'D') : null,
              teraType ? typeBadge(teraType) : null
            ].filter(x => x)),
            el('div', { style: { fontSize: '11px', color: 'var(--color-text-tertiary)', marginTop: '2px' } },
              formatInt(r.dout) + '% dmg')
          ])
        ]);
      });

      return el('div', {
        style: {
          flex: '1',
          background: isWinner ? coachColor + '10' : 'var(--color-background-secondary)',
          border: '0.5px solid ' + (isWinner ? coachColor + '50' : 'var(--color-border-tertiary)'),
          borderRadius: 'var(--border-radius-lg)',
          padding: '14px 16px',
          minWidth: '0'
        }
      }, [
        el('div', {
          style: { display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: '12px' }
        }, [
          coachBadge(coach),
          isWinner ? el('span', {
            style: {
              fontSize: '11px', fontWeight: '700', color: coachColor,
              textTransform: 'uppercase', letterSpacing: '0.6px'
            }
          }, 'Winner') : null
        ].filter(x => x)),
        el('div', {}, monRows)
      ]);
    };

    return section(
      'Game ' + g,
      gid + (winner ? '  •  ' + winner + ' wins' : '  •  Result unknown'),
      el('div', {
        style: {
          display: 'grid',
          gridTemplateColumns: '1fr 1fr',
          gap: '12px',
          padding: '16px 20px 20px'
        }
      }, [makeTeamPanel(c1), makeTeamPanel(c2)]),
      { marginBottom: '1.25rem' }
    );
  });

  return el('div', {}, [
    controls,
    scoreboard,
    highlightsSection,
    ...gameCards
  ]);
}

function viewCoachPanel(state) {

    const protectors = {};
    coachTurns.filter(t => t.event === 'PROTECT' && t.outcome === 'BLOCKED').forEach(t => { protectors[t.mon] = (protectors[t.mon] || 0) + 1; });
    const topProtector = Object.entries(protectors).sort((a, b) => b[1] - a[1])[0];

    const topTeraUser = Object.entries(teraUsers).sort((a, b) => b[1] - a[1])[0];

function buildSeriesResults(gameLog) {
  const results = {};
  gameLog.forEach(r => {
    const key = 'W' + r.wk + '-M' + r.m;
    if (!results[key]) results[key] = { wk: r.wk, m: r.m, gameWinners: {}, coaches: new Set() };
    results[key].coaches.add(r.coach);
    if (r.won && !results[key].gameWinners[r.g]) results[key].gameWinners[r.g] = r.coach;
  });
  Object.values(results).forEach(s => {
    const coaches = Array.from(s.coaches);
    if (coaches.length === 2) {
      const [c1, c2] = coaches;
      s.w1 = Object.values(s.gameWinners).filter(w => w === c1).length;
      s.w2 = Object.values(s.gameWinners).filter(w => w === c2).length;
      s.c1 = c1; s.c2 = c2;
      s.done = (s.w1 === 2 || s.w2 === 2);
      s.winner = s.w1 > s.w2 ? c1 : s.w2 > s.w1 ? c2 : null;
      s.gamesPlayed = Object.keys(s.gameWinners).length;
    }
  });
  return results;
}

// ============================================================
// PLAYOFF CONFIG — edit these values each season
// ============================================================
const PLAYOFF_CONFIG = {
  season: 2026,
  format: 'single',      // 'single' | 'double'
  teams: 12,             // teams in bracket
  bestOf: 3,             // games per series (or per-round: {r1:3,qf:3,sf:3,final:5})
  thirdPlace: true,
  seedingMethod: 'standings',  // 'standings' | 'manual'
};

// ============================================================
// BRACKET STATE — update as results come in
// Seeds will auto-populate from standings once Week 11 is done.
// To override, set manualSeeds to an ordered array of coach names.
// ============================================================
const PLAYOFF_BRACKET = {
  locked: false,           // set true to finalize bracket / prevent seed changes
  manualSeeds: null,       // null = use standings rankings; or ['Abbey','Joe',...]
  results: {
    // Format: 'MATCH_ID': { w1: gamesWon_by_home, w2: gamesWon_by_away, done: bool }
    // Example: 'R1-1': { w1: 2, w2: 1, done: true }
    // Leave empty until games are played
  },
};

// ============================================================
// Bracket logic
// ============================================================
function getPlayoffSeeds(gameLog) {
  if (PLAYOFF_BRACKET.manualSeeds) return PLAYOFF_BRACKET.manualSeeds;
  const stats = coachStats(gameLog);
  return Object.values(stats)
    .sort((a, b) => a.rank - b.rank)
    .slice(0, PLAYOFF_CONFIG.teams)
    .map(s => s.coach);
}

function getBracketMatchups(seeds) {
  // 12-team: seeds 1-4 get byes, 5v12, 6v11, 7v10, 8v9
  const bo = (typeof PLAYOFF_CONFIG.bestOf === 'object')
    ? PLAYOFF_CONFIG.bestOf
    : { r1: PLAYOFF_CONFIG.bestOf, qf: PLAYOFF_CONFIG.bestOf, sf: PLAYOFF_CONFIG.bestOf, final: PLAYOFF_CONFIG.bestOf };

  const r = PLAYOFF_BRACKET.results;

  // Helper: resolve a seed reference to a coach name (or placeholder)
  function seedCoach(seed) {
    if (typeof seed === 'number') return seeds[seed - 1] || '?';
    return seed; // already a name
  }

  function matchWinner(id, home, away) {
    const res = r[id];
    if (!res || !res.done) return null;
    return res.w1 > res.w2 ? home : away;
  }
  function matchLoser(id, home, away) {
    const res = r[id];
    if (!res || !res.done) return null;
    return res.w1 < res.w2 ? home : away;
  }

  // Round 1
  const r1 = [
    { id: 'R1-1', seed1: 5, seed2: 12, bo: bo.r1 },
    { id: 'R1-2', seed1: 6, seed2: 11, bo: bo.r1 },
    { id: 'R1-3', seed1: 7, seed2: 10, bo: bo.r1 },
    { id: 'R1-4', seed1: 8, seed2:  9, bo: bo.r1 },
  ].map(m => ({
    ...m,
    c1: seedCoach(m.seed1), c2: seedCoach(m.seed2),
    res: r[m.id] || null,
    winner: matchWinner(m.id, seedCoach(m.seed1), seedCoach(m.seed2)),
    loser:  matchLoser(m.id,  seedCoach(m.seed1), seedCoach(m.seed2)),
  }));

  // QF — higher seed (lower number) always home
  const qf = [
    { id: 'QF-1', seed1: 1, feedId: 'R1-4', bo: bo.qf },
    { id: 'QF-2', seed1: 2, feedId: 'R1-3', bo: bo.qf },
    { id: 'QF-3', seed1: 3, feedId: 'R1-2', bo: bo.qf },
    { id: 'QF-4', seed1: 4, feedId: 'R1-1', bo: bo.qf },
  ].map(m => {
    const feeder = r1.find(x => x.id === m.feedId);
    const c1 = seedCoach(m.seed1);
    const c2 = feeder ? (feeder.winner || '?') : '?';
    return {
      ...m, c1, c2,
      res: r[m.id] || null,
      winner: matchWinner(m.id, c1, c2),
      loser:  matchLoser(m.id,  c1, c2),
    };
  });

  // SF
  const sf = [
    { id: 'SF-1', feedId1: 'QF-1', feedId2: 'QF-4', bo: bo.sf },
    { id: 'SF-2', feedId1: 'QF-2', feedId2: 'QF-3', bo: bo.sf },
  ].map(m => {
    const f1 = qf.find(x => x.id === m.feedId1);
    const f2 = qf.find(x => x.id === m.feedId2);
    const c1 = f1 ? (f1.winner || '?') : '?';
    const c2 = f2 ? (f2.winner || '?') : '?';
    return {
      ...m, c1, c2,
      res: r[m.id] || null,
      winner: matchWinner(m.id, c1, c2),
      loser:  matchLoser(m.id,  c1, c2),
    };
  });

  // 3rd place
  const sf1 = sf[0], sf2 = sf[1];
  const third = PLAYOFF_CONFIG.thirdPlace ? [{
    id: '3RD',
    c1: sf1 ? (sf1.loser || '?') : '?',
    c2: sf2 ? (sf2.loser || '?') : '?',
    bo: bo.final,
    res: r['3RD'] || null,
    winner: matchWinner('3RD', sf1?.loser || '?', sf2?.loser || '?'),
  }] : [];

  const fin = [{
    id: 'FIN',
    c1: sf1 ? (sf1.winner || '?') : '?',
    c2: sf2 ? (sf2.winner || '?') : '?',
    bo: bo.final,
    res: r['FIN'] || null,
    winner: matchWinner('FIN', sf1?.winner || '?', sf2?.winner || '?'),
  }];

  return { r1, qf, sf, third, fin };
}

function bracketMatchCard(match, roundLabel, onClick) {
  const res = match.res;
  const done = res && res.done;
  const inProgress = res && !res.done && (res.w1 > 0 || res.w2 > 0);
  const upcoming = !res;
  const pending = match.c1 === '?' || match.c2 === '?';

  const c1Color = COACH_COLORS[match.c1] || '#555';
  const c2Color = COACH_COLORS[match.c2] || '#555';
  const winnerColor = done ? (res.w1 > res.w2 ? c1Color : c2Color) : null;

  const makeCoachRow = (coach, wins, isWinner) => {
    const color = COACH_COLORS[coach] || '#555';
    const isUnknown = coach === '?';
    return el('div', {
      style: {
        display: 'flex',
        alignItems: 'center',
        justifyContent: 'space-between',
        padding: '7px 12px',
        background: done && isWinner ? color + '22' : 'transparent',
        borderRadius: 'var(--border-radius-sm)',

            flexShrink: '0',
            boxShadow: (done && isWinner) ? '0 0 8px ' + color + '80' : 'none'
          }
        }),
        el('span', {
          style: {
            fontSize: '13px',
            fontWeight: (done && isWinner) ? '600' : '500',
            color: isUnknown ? 'var(--color-text-tertiary)' : 'var(--color-text-primary)'
          }
        }, isUnknown ? 'TBD' : coach)
      ]),
      done ? el('span', {
        style: {
          fontFamily: 'var(--font-display)',
          fontWeight: '700',
          fontSize: '16px',
          color: isWinner ? color : 'var(--color-text-tertiary)'
        }
      }, String(wins)) : null
    ].filter(x => x));
  };

  const card = el('div', {
    onclick: (done && onClick) ? onClick : null,
    style: {
      background: 'var(--color-background-secondary)',
      border: '0.5px solid ' + (done ? (winnerColor + '50') : 'var(--color-border-tertiary)'),
      borderRadius: 'var(--border-radius-lg)',
      overflow: 'hidden',
      transition: 'all 0.15s',
      cursor: (done && onClick) ? 'pointer' : 'default',
      minWidth: '200px'
    }
  }, [
    el('div', {
      style: {
        padding: '6px 12px',
        background: done ? 'var(--color-background-primary)' : 'var(--color-background-secondary)',
        borderBottom: '0.5px solid var(--color-border-tertiary)',
        display: 'flex',
        justifyContent: 'space-between',
        alignItems: 'center'
      }
    }, [
      el('span', {
        style: {
          fontSize: '10px',
          fontWeight: '600',
          textTransform: 'uppercase',
          letterSpacing: '0.6px',
          color: 'var(--color-text-tertiary)'
        }
      }, roundLabel),
      inProgress ? el('span', {
        style: {
          fontSize: '10px',
          fontWeight: '600',
          color: 'var(--color-text-warning)',
          textTransform: 'uppercase',
          letterSpacing: '0.4px'
        }
      }, 'Live') : null,
      done ? el('span', {
        style: {
          fontSize: '10px',
          color: 'var(--color-text-tertiary)'
        }
      }, 'Bo' + match.bo) : null
    ].filter(x => x)),
    el('div', { style: { padding: '4px 0' } }, [
      makeCoachRow(match.c1, res ? res.w1 : 0, done && res.w1 > res.w2),
      el('div', { style: { height: '0.5px', background: 'var(--color-border-tertiary)', margin: '0 12px' } }),
      makeCoachRow(match.c2, res ? res.w2 : 0, done && res.w2 > res.w1),
    ])
  ]);

  if (done && onClick) {
    card.onmouseover = () => {
      card.style.transform = 'translateY(-2px)';
      card.style.borderColor = winnerColor + '80';
    };
    card.onmouseout = () => {
      card.style.transform = '';
      card.style.borderColor = winnerColor + '50';
    };
  }
  return card;
}

      el('span', {
        style: {
          fontFamily: 'var(--font-display)',
          fontWeight: '700',
          fontSize: '15px',
          color: hasBye ? PLAYOFF_GOLD : 'var(--color-text-tertiary)',
          minWidth: '24px',
          textAlign: 'right'
        }
      }, '#' + seed),
      coachBadge(coach),
      hasBye ? el('span', {
        style: {
          fontSize: '10px',
          fontWeight: '600',
          color: PLAYOFF_GOLD,
          textTransform: 'uppercase',
          letterSpacing: '0.4px',
          marginLeft: 'auto'
        }
      }, 'bye') : null
    ].filter(x => x));
  }));

  const seedSection = section('Seedings', PLAYOFF_CONFIG.teams + '-team ' + PLAYOFF_CONFIG.format + ' elimination • Bo' + PLAYOFF_CONFIG.bestOf + ' per round', seedList, { marginBottom: '1.25rem' });

  // Bracket columns
  const colStyle = {
    display: 'flex',
    flexDirection: 'column',
    gap: '16px',
    flex: '1',
    minWidth: '200px'
  };

  const spacer = (h) => el('div', { style: { height: h + 'px', flexShrink: '0' } });

  const r1Cards = r1.map(m => bracketMatchCard(m, 'Round 1', m.winner ? h2hJump(m.c1, m.c2) : null));
  const qfCards = [
    spacer(60),
    bracketMatchCard(qf[0], 'Quarterfinal', qf[0].winner ? h2hJump(qf[0].c1, qf[0].c2) : null),
    spacer(16),
    bracketMatchCard(qf[1], 'Quarterfinal', qf[1].winner ? h2hJump(qf[1].c1, qf[1].c2) : null),
    spacer(16),
    bracketMatchCard(qf[2], 'Quarterfinal', qf[2].winner ? h2hJump(qf[2].c1, qf[2].c2) : null),
    spacer(16),
    bracketMatchCard(qf[3], 'Quarterfinal', qf[3].winner ? h2hJump(qf[3].c1, qf[3].c2) : null),
    spacer(60),
  ];
  const sfCards = [
    spacer(130),
    bracketMatchCard(sf[0], 'Semifinal', sf[0].winner ? h2hJump(sf[0].c1, sf[0].c2) : null),
    spacer(80),
    bracketMatchCard(sf[1], 'Semifinal', sf[1].winner ? h2hJump(sf[1].c1, sf[1].c2) : null),
    spacer(130),
  ];
  const finCards = [
    spacer(200),
    bracketMatchCard(fin[0], 'Grand Final', fin[0].winner ? h2hJump(fin[0].c1, fin[0].c2) : null),
    spacer(50),
    bracketMatchCard(third[0], '3rd Place', third[0]?.winner ? h2hJump(third[0].c1, third[0].c2) : null),
    spacer(200),
  ];

  const bracketGrid = el('div', {
    style: {
      display: 'flex',
      gap: '24px',
      overflowX: 'auto',
      padding: '16px 20px 24px',
      alignItems: 'flex-start'
    }
  }, [
    col('Round 1', r1Cards),
    col('Quarterfinals', qfCards),
    col('Semifinals', sfCards),
    col('Final', finCards),
  ]);

  const bracketSection = section(
    'Bracket',
    PLAYOFF_CONFIG.season + ' playoffs',
    bracketGrid,
    { marginBottom: '1.25rem' }
  );

  return el('div', {}, [seedSection, bracketSection]);
}

// ============================================================
// Playoff stats (scoped to playoff game IDs)
// ============================================================
function getPlayoffGameIds(gameLog) {
  // Playoff games are tagged by having wk > 11, OR we can store them
  // in PLAYOFF_BRACKET.results and cross-reference GIDs.
  // For now, return games with wk > 11 (parser tags them this week=12+)
  return new Set(gameLog.filter(r => r.wk > 11).map(r => r.gid));
}

function renderPlayoffStats(state, seeds, bracket) {
  const pGids = getPlayoffGameIds(state.data.gameLog);
  const pGames = state.data.gameLog.filter(r => pGids.has(r.gid));

  if (pGames.length === 0) {
    return el('div', {}, section(
      'Playoff stats',
      'No playoff games parsed yet',
      el('div', {
        style: { padding: '32px 24px', textAlign: 'center', color: 'var(--color-text-tertiary)' }
      }, [
        el('div', { style: { fontSize: '32px', marginBottom: '12px' } }, '🏆'),
        el('div', { style: { fontSize: '14px', fontWeight: '500', marginBottom: '6px' } }, 'Playoffs haven\'t started yet'),
        el('div', { style: { fontSize: '13px' } }, 'Stats will appear here once playoff replays are uploaded')
      ])
    ));
  }

  const mons = monStats(pGames);
  const top = Object.values(mons).sort((a, b) => b.mvp - a.mvp).slice(0, 20);
  const coachS = coachStats(pGames);

  const headers = [
    { key: 'rank', label: '#' },
    { key: 'mvp', label: 'MVP' },
    { key: 'mon', label: 'Pokemon', align: 'left' },
    { key: 'coach', label: 'Coach', align: 'left' },
    { key: 'gp', label: 'GP' },
    { key: 'record', label: 'W-L' },
    { key: 'winPct', label: 'Win%' },
    { key: 'tk', label: 'K' },
    { key: 'deaths', label: 'D' },
    { key: 'kdr', label: 'K/D' },
    { key: 'dout', label: 'Dmg' },
  ];

  const rows = top.map((r, i) => [
    rankBadge(i + 1),
    el('span', { style: { fontFamily: 'var(--font-display)', fontWeight: '600', fontSize: '15px' } }, String(r.mvp)),
    monLink(r.coach, r.mon),
    coachBadge(r.coach),
    formatInt(r.gp),
    mono(r.gw + '-' + (r.gp - r.gw)),
    formatPct(r.winPct),
    formatInt(r.tk),
    formatInt(r.deaths),
    formatKDR(r.kdr),
    formatDmg(r.dout),
  ]);

  const tbl = makeTable(headers, rows, { stickyHeader: true });

  const coachArr = Object.values(coachS).sort((a, b) => a.rank - b.rank);
  const coachHeaders = [
    { key: 'rank', label: '#' },
    { key: 'coach', label: 'Coach', align: 'left' },
    { key: 'series', label: 'Series' },
    { key: 'games', label: 'Games' },
    { key: 'kills', label: 'K' },
    { key: 'deaths', label: 'D' },
    { key: 'kdr', label: 'K/D' },
    { key: 'dpg', label: 'Dmg/G' },
  ];
  const coachRows = coachArr.filter(s => s.gp > 0).map(s => [
    rankBadge(s.rank),
    coachBadge(s.coach),
    mono(s.sw_series + '-' + s.sl_series),
    mono(s.gw + '-' + s.gl),
    formatInt(s.kills),
    formatInt(s.deaths),
    formatKDR(s.kdr),
    formatInt(s.dmgPerGame) + '%',
  ]);

  return el('div', {}, [
    section('Coach standings', pGames.length + ' games across ' + pGids.size + ' playoff series',
      el('div', { style: { overflowX: 'auto' } }, makeTable(coachHeaders, coachRows, { stickyHeader: true })),
      { marginBottom: '1.25rem' }
    ),
    section('Pokemon leaderboard', 'Playoff MVP leaders',
      el('div', { style: { overflowX: 'auto' } }, tbl)
    )
  ]);
}
const BAKED_TIMESTAMP = 'April 19, 2026';

const state = {
  view: 'standings',
  data: null,
  dataSource: 'baked',
  lastUpdated: BAKED_TIMESTAMP,
  unlocked: false,
  uploadStatus: '',
  statsPhase: 'regular',
  standings: {},
  lb: { sortKey: 'mvp', sortDir: 'desc', filterCoach: 'All', minGP: 1 },
  h2h: { c1: 'Abbey', c2: 'Zion' },
  mdd: { coach: 'Ben', mon: 'Dragonite' },
  cp: { coach: 'Abbey' },
  schedule: { filterCoach: 'All' },
  playoffs: { tab: 'bracket' },
  query: {
    metric: 'dout', groupBy: 'mon', sortDir: 'desc', minGP: 1,
    filterCoach: 'All', filterWeek: 'All', filterOpp: 'All',
    teraOnly: 'any', leadOnly: 'any', wonOnly: 'any'
  },
  tl: {
    event: 'PROTECT', outcome: 'All', groupBy: 'mon', sortDir: 'desc',
    statusType: 'All', filterCoach: 'All', filterWeek: 'All'
  }
};

function activeGameLog(state) {
  const gl = state.data.gameLog;
  if (state.statsPhase === 'regular') return gl.filter(r => r.wk <= 11);
  if (state.statsPhase === 'playoff') return gl.filter(r => r.wk > 11);
  return gl;
}

function dataUpload(state) {
  if (!state.unlocked) {
    const pwInput = el('input', { type: 'password', placeholder: 'Admin password', style: { width: '160px' } });
    const btn = el('button', {
      onclick: () => {
        if (pwInput.value === ADMIN_PASSWORD) { state.unlocked = true; render(state); }
        else { state.uploadStatus = 'Wrong password'; render(state); }
      }
    }, 'Unlock');
    return el('div', { style: { display: 'flex', gap: '8px', alignItems: 'center', fontSize: '12px' } }, [
      pwInput, btn,
      state.uploadStatus ? el('span', { style: { color: 'var(--color-text-danger)' } }, state.uploadStatus) : null
    ].filter(x => x));
  }
  const fileInput = el('input', { type: 'file', accept: '.json', style: { display: 'none' } });
  fileInput.onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    try {
      const text = await file.text();
      const parsed = JSON.parse(text);
      if (!parsed.gl || !parsed.ml || !parsed.tl || !parsed.rs) throw new Error('Missing required keys');
      const ts = new Date().toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
      const payload = JSON.stringify({ data: parsed, uploadedAt: ts });
      await window.storage.set('gforceData', payload, true);
      state.data = decodeAll(parsed);
      state.dataSource = 'live';
      state.lastUpdated = ts;
      state.uploadStatus = '✓ Updated ' + ts;
      render(state);
    } catch (err) {
      state.uploadStatus = 'Error: ' + err.message;
      render(state);
    }
  };
  const label = el('label', {
    style: {
      padding: '7px 14px', border: '0.5px solid var(--color-border-secondary)',
      borderRadius: 'var(--border-radius-md)', cursor: 'pointer',
      background: 'var(--color-background-secondary)', fontSize: '12px', fontWeight: '500'
    }
  }, ['Upload data.json', fileInput]);
  return el('div', { style: { display: 'flex', gap: '10px', alignItems: 'center', fontSize: '12px' } }, [
    label,
    state.uploadStatus ? el('span', { style: { color: 'var(--color-text-secondary)' } }, state.uploadStatus) : null
  ].filter(x => x));
}

function phaseToggle(state) {
  const options = [
    { id: 'regular', label: 'Regular season' },
    { id: 'playoff', label: 'Playoffs' },
    { id: 'combined', label: 'Combined' },
  ];
  return el('div', {
    style: {
      display: 'flex', background: 'var(--color-background-secondary)',
      border: '0.5px solid var(--color-border-tertiary)',
      borderRadius: 'var(--border-radius-md)', padding: '3px', gap: '2px'
    }
  }, options.map(o => {
    const active = state.statsPhase === o.id;
    return el('button', {
      onclick: () => { state.statsPhase = o.id; render(state); },
      style: {
        padding: '5px 12px', fontSize: '11px',
        fontWeight: active ? '600' : '500',
        background: active ? 'var(--color-background-primary)' : 'transparent',
        color: active ? 'var(--color-text-primary)' : 'var(--color-text-tertiary)',
        border: active ? '0.5px solid var(--color-border-tertiary)' : 'none',
        borderRadius: '6px', cursor: 'pointer', transition: 'all 0.15s', whiteSpace: 'nowrap'
      }
    }, o.label);
  }));
}

function render(state) {
  const root = document.getElementById('gforce-app');
  root.innerHTML = '';
  if (!state.data) {
    root.appendChild(el('div', { style: { padding: '2rem', textAlign: 'center', color: 'var(--color-text-secondary)' } }, 'Loading...'));
    return;
  }
  if (state.view === 'playoffs') {
    renderPlayoffsMode(state, root);
  } else {
    renderRegularSeasonMode(state, root);
  }
}

function renderPlayoffsMode(state, root) {
  const backBtn = el('button', {
    onclick: () => { state.view = 'standings'; render(state); },
    style: {
      display: 'inline-flex', alignItems: 'center', gap: '8px',
      padding: '8px 16px', marginBottom: '1.5rem', fontSize: '13px', fontWeight: '500',
      background: 'transparent', color: 'var(--color-text-secondary)',
      border: '0.5px solid var(--color-border-tertiary)',
      borderRadius: 'var(--border-radius-md)', cursor: 'pointer'
    }
  }, '← Regular Season');

  const header = el('div', { style: { marginBottom: '2rem' } }, [
    backBtn,
    el('div', { style: { display: 'flex', alignItems: 'baseline', gap: '16px', marginBottom: '6px' } }, [
      el('h1', {
        style: {
          fontFamily: 'var(--font-display)', fontSize: '36px', fontWeight: '700',
          margin: '0', letterSpacing: '-0.03em',
          background: 'linear-gradient(135deg, ' + PLAYOFF_GOLD + ' 0%, #fff8dc 100%)',
          WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent', backgroundClip: 'text'
        }
      }, '🏆 Playoffs'),
      el('span', { style: { fontSize: '14px', fontWeight: '500', color: PLAYOFF_GOLD, opacity: '0.8' } }, '2026 Season')
    ]),
    el('div', {
      style: { fontSize: '12px', color: 'var(--color-text-tertiary)', textTransform: 'uppercase', letterSpacing: '0.8px', fontWeight: '600' }
    }, PLAYOFF_CONFIG.teams + '-team ' + PLAYOFF_CONFIG.format + ' elimination • Bo' + PLAYOFF_CONFIG.bestOf)
  ]);

  root.appendChild(header);
  root.appendChild(viewPlayoffs(state));
}

function renderRegularSeasonMode(state, root) {
  const totalGames = new Set(state.data.gameLog.filter(r => r.wk <= 11).map(r => r.gid)).size;
  const hasPlayoffGames = state.data.gameLog.some(r => r.wk > 11);
  const statsViews = ['standings','leaderboard','coach','mon','h2h','query','turnlog'];
  const showToggle = statsViews.includes(state.view) && hasPlayoffGames;

  const lastUpdatedBadge = el('div', {
    style: {
      display: 'inline-flex', alignItems: 'center', gap: '6px',
      fontSize: '11px', color: 'var(--color-text-tertiary)',
      background: 'var(--color-background-secondary)',
      border: '0.5px solid var(--color-border-tertiary)',
      borderRadius: 'var(--border-radius-md)', padding: '4px 10px', fontWeight: '500'
    }
  }, [
    el('span', {
      style: {
        width: '6px', height: '6px', borderRadius: '50%',
        background: state.dataSource === 'live' ? 'var(--color-text-success)' : 'var(--color-text-tertiary)',
        flexShrink: '0'
      }
    }),
    'Updated ' + state.lastUpdated
  ]);

  const playoffsBtn = el('button', {
    onclick: () => { state.view = 'playoffs'; render(state); },
    style: {
      display: 'inline-flex', alignItems: 'center', gap: '8px',
      padding: '7px 16px', fontSize: '13px', fontWeight: '600',
      background: PLAYOFF_GOLD + '18', color: PLAYOFF_GOLD,
      border: '0.5px solid ' + PLAYOFF_GOLD + '60',
      borderRadius: 'var(--border-radius-md)', cursor: 'pointer', transition: 'all 0.15s'
    }
  }, '🏆 Playoffs');
  playoffsBtn.onmouseover = () => { playoffsBtn.style.background = PLAYOFF_GOLD + '30'; };
  playoffsBtn.onmouseout = () => { playoffsBtn.style.background = PLAYOFF_GOLD + '18'; };

  const header = el('div', { style: { marginBottom: '2rem' } }, [
    el('div', {
      style: { display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: '16px', flexWrap: 'wrap', marginBottom: '10px' }
    }, [
      el('div', {}, [
        el('h1', {
          style: {
            fontFamily: 'var(--font-display)', fontSize: '32px', fontWeight: '700',
            margin: '0', letterSpacing: '-0.03em',
            background: 'linear-gradient(135deg, #e8eaed 0%, #a8b0bd 100%)',
            WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent', backgroundClip: 'text'
          }
        }, 'G-Force Draft League'),
        el('div', { style: { display: 'flex', alignItems: 'center', gap: '12px', marginTop: '6px', flexWrap: 'wrap' } }, [
          el('div', { style: { fontSize: '12px', color: 'var(--color-text-tertiary)', textTransform: 'uppercase', letterSpacing: '0.8px', fontWeight: '600' } }, '2026 Season  •  ' + totalGames + ' games'),
          lastUpdatedBadge,
          showToggle ? phaseToggle(state) : null,
          playoffsBtn
        ].filter(x => x))
      ]),
      dataUpload(state)
    ])
  ]);

  const tabs = [
    { id: 'standings', label: 'Standings' },
    { id: 'schedule', label: 'Schedule' },
    { id: 'leaderboard', label: 'Leaderboard' },
    { id: 'coach', label: 'Coach panels' },
    { id: 'mon', label: 'Pokemon deep dive' },
    { id: 'h2h', label: 'Head-to-head' },
    { id: 'query', label: 'Stat pivot' },
    { id: 'turnlog', label: 'Event book' }
  ];

  const tabBar = el('div', {
    style: { display: 'flex', gap: '4px', flexWrap: 'wrap', borderBottom: '0.5px solid var(--color-border-tertiary)', marginBottom: '1.5rem' }
  }, tabs.map(t => tab(t.label, state.view === t.id, () => { state.view = t.id; render(state); })));

  const statState = { ...state, data: { ...state.data, gameLog: activeGameLog(state) } };
  let content;
  if (state.view === 'standings')   content = viewStandings(statState);
  else if (state.view === 'schedule')    content = viewSchedule(state);
  else if (state.view === 'leaderboard') content = viewLeaderboard(statState);
  else if (state.view === 'coach')       content = viewCoachPanel(statState);
  else if (state.view === 'mon')         content = viewMonDeepDive(statState);
  else if (state.view === 'h2h')         content = viewHeadToHead(statState);
  else if (state.view === 'query')       content = viewCustomQuery(statState);
  else if (state.view === 'turnlog')     content = viewTurnLog(statState);

  root.appendChild(header);
  root.appendChild(tabBar);
  root.appendChild(content);
}

async function init() {
  render(state);
  try {
    if (window.storage) {
      const stored = await window.storage.get('gforceData', true);
      if (stored && stored.value) {
        let parsed;
        try {
          const envelope = JSON.parse(stored.value);
          if (envelope.data && envelope.uploadedAt) {
            parsed = envelope.data;
            state.lastUpdated = envelope.uploadedAt;
          } else { parsed = envelope; }
        } catch (e) { parsed = JSON.parse(stored.value); }
        if (parsed && parsed.gl && parsed.ml && parsed.tl && parsed.rs) {
          state.data = decodeAll(parsed);
          state.dataSource = 'live';
          render(state);
          return;
        }
      }
    }
  } catch (e) { }
  state.data = decodeAll(decompressData(BAKED_DATA_B64));
  state.dataSource = 'baked';
  render(state);
}

init();
</script>
