            }
          }, [
            el('div', { style: { flex: '1' } }, coachBadge(match.c1)),
            el('div', {
              style: {
                fontFamily: 'var(--font-display)',
                fontWeight: '700',
                fontSize: isDone ? '18px' : '13px',
                color: isDone ? 'var(--color-text-primary)' : 'var(--color-text-tertiary)',
                textAlign: 'center',
                minWidth: '40px'
              }
            }, score || 'vs'),
            el('div', { style: { flex: '1', display: 'flex', justifyContent: 'flex-end' } }, coachBadge(match.c2))
          ]),
          isDone ? el('div', {
            style: {
              marginTop: '8px',
              fontSize: '11px',
              color: 'var(--color-text-tertiary)',
              textAlign: 'center'
            }
          }, res.winner + ' wins' + (res.gamesPlayed ? ' (' + res.gamesPlayed + 'g)' : '')) : null,
          isPending ? el('div', {
            style: {
              marginTop: '8px',
              fontSize: '11px',
              color: 'var(--color-text-warning)',
              textAlign: 'center',
              fontWeight: '600'
            }
          }, 'In progress') : null
        ].filter(x => x))
      ]);

      if (isDone) {
        matchCard.onclick = () => {
          state.h2h.c1 = match.c1;
          state.h2h.c2 = match.c2;
          state.view = 'h2h';
          render(state);
        };
        matchCard.style.cursor = 'pointer';
        matchCard.onmouseover = () => matchCard.style.borderColor = 'var(--color-border-secondary)';
        matchCard.onmouseout = () => matchCard.style.borderColor = 'var(--color-border-tertiary)';
      }

      return matchCard;
    }));

    const weekGames = FULL_SCHEDULE.filter(s => s.wk === wk);
    const weekDone = weekGames.filter(s => {
      const r = results['W' + s.wk + '-M' + s.m];
      return r && r.done;
    }).length;
    const subtitle = weekDone === weekGames.length
      ? 'All ' + weekGames.length + ' matches complete'
      : weekDone + ' of ' + weekGames.length + ' complete';

    return section('Week ' + wk, subtitle, matchCards, { marginBottom: '1.25rem' });
  }).filter(x => x);

  const totalMatches = FULL_SCHEDULE.length;
  const doneMatches = FULL_SCHEDULE.filter(s => {
    const r = results['W' + s.wk + '-M' + s.m];
    return r && r.done;
  }).length;

  const summary = el('div', {
    style: {
      display: 'grid',
      gridTemplateColumns: 'repeat(auto-fit, minmax(150px, 1fr))',
      gap: '12px',
      marginBottom: '1.75rem'
    }
  }, [
    metric('Total matches', totalMatches, '11 weeks × 6 per week'),
    metric('Completed', doneMatches, Math.round(doneMatches / totalMatches * 100) + '% of season'),
    metric('Remaining', totalMatches - doneMatches, 'matches left to play'),
    metric('Current week', Math.max(...Object.values(results).map(r => r.wk)) || 1, 'active week')
  ]);

  return el('div', {}, [
    controls,
    summary,
    ...weekSections
  ]);
}
// ============================================================
// PLAYOFF CONFIG
// ============================================================
const PLAYOFF_CONFIG = {
  season: 2026,
  format: 'single',
  teams: 12,
  bestOf: 5,
  thirdPlace: true,
  seedingMethod: 'standings',
};

const PLAYOFF_BRACKET = {
  locked: false,
  manualSeeds: null,
  results: {
    // Winners bracket: 'R1-1','R1-2','R1-3','R1-4'
    //                  'QF-1','QF-2','QF-3','QF-4'
    //                  'SF-1','SF-2','FIN'
    // Losers bracket:  'LBR1-1','LBR1-2'
    //                  'LBR2-1','LBR2-2'
    //                  'LBR3-1','LBR3-2'
    //                  'LBSF-1','LBSF-2','LBFIN'
    // Format: { w1: gamesWonByHome, w2: gamesWonByAway, done: bool }
  },
};

const PLAYOFF_GOLD   = '#D4AF37';
const PLAYOFF_BRONZE = '#CD7F32';

// ============================================================
// Seed helpers
// ============================================================
function getPlayoffSeeds(gameLog) {
  if (PLAYOFF_BRACKET.manualSeeds) return PLAYOFF_BRACKET.manualSeeds;
  const stats = coachStats(gameLog);
  return Object.values(stats)
    .sort((a, b) => a.rank - b.rank)
    .slice(0, PLAYOFF_CONFIG.teams)
    .map(s => s.coach);
}

// ============================================================
// Bracket computation
// ============================================================
function getBracketMatchups(seeds) {
  const bo = PLAYOFF_CONFIG.bestOf;
  const r  = PLAYOFF_BRACKET.results;

  function seedCoach(seed) {
    if (typeof seed === 'number') return seeds[seed - 1] || '?';
    return seed;
  }
  function seedNum(coach) {
    const i = seeds.indexOf(coach);
    return i >= 0 ? i + 1 : 999;
  }
  function matchWinner(id, c1, c2) {
    const res = r[id];
    if (!res || !res.done) return null;
    return res.w1 > res.w2 ? c1 : c2;
  }
  function matchLoser(id, c1, c2) {
    const res = r[id];
    if (!res || !res.done) return null;
    return res.w1 < res.w2 ? c1 : c2;
  }

  // ── Winners bracket ──────────────────────────────────────
  const r1 = [
    { id:'R1-1', seed1:5,  seed2:12 },
    { id:'R1-2', seed1:6,  seed2:11 },
    { id:'R1-3', seed1:7,  seed2:10 },
    { id:'R1-4', seed1:8,  seed2:9  },
  ].map(m => {
    const c1 = seedCoach(m.seed1), c2 = seedCoach(m.seed2);
    return { ...m, bo, c1, c2, res: r[m.id]||null,
      winner: matchWinner(m.id,c1,c2), loser: matchLoser(m.id,c1,c2) };
  });

  const qf = [
    { id:'QF-1', seed1:1, feedId:'R1-4' },  // 1 v W(8v9)
    { id:'QF-2', seed1:2, feedId:'R1-2' },  // 2 v W(6v11)
    { id:'QF-3', seed1:3, feedId:'R1-3' },  // 3 v W(7v10)
    { id:'QF-4', seed1:4, feedId:'R1-1' },  // 4 v W(5v12)
  ].map(m => {
    const feeder = r1.find(x => x.id === m.feedId);
    const c1 = seedCoach(m.seed1);
    const c2 = feeder ? (feeder.winner || '?') : '?';
    return { ...m, bo, c1, c2, res: r[m.id]||null,
      winner: matchWinner(m.id,c1,c2), loser: matchLoser(m.id,c1,c2) };
  });

  const sf = [
    { id:'SF-1', feedId1:'QF-1', feedId2:'QF-4' },
    { id:'SF-2', feedId1:'QF-2', feedId2:'QF-3' },
  ].map(m => {
    const f1 = qf.find(x => x.id === m.feedId1);
    const f2 = qf.find(x => x.id === m.feedId2);
    const c1 = f1 ? (f1.winner||'?') : '?';
    const c2 = f2 ? (f2.winner||'?') : '?';
    return { ...m, bo, c1, c2, res: r[m.id]||null,
      winner: matchWinner(m.id,c1,c2), loser: matchLoser(m.id,c1,c2) };
  });

  const fin = (() => {
    const c1 = sf[0]?.winner||'?', c2 = sf[1]?.winner||'?';
    return { id:'FIN', bo, c1, c2, res: r['FIN']||null,
      winner: matchWinner('FIN',c1,c2), loser: matchLoser('FIN',c1,c2) };
  })();

  // ── Losers bracket ───────────────────────────────────────
  // LBR1: R1 losers pair off (R1-1 loser vs R1-2 loser, R1-3 loser vs R1-4 loser)
  const lbr1 = [
    { id:'LBR1-1', feedA:'R1-1', feedB:'R1-2' },
    { id:'LBR1-2', feedA:'R1-3', feedB:'R1-4' },
  ].map(m => {
    const fA = r1.find(x => x.id === m.feedA);
    const fB = r1.find(x => x.id === m.feedB);
    const c1 = fA ? (fA.loser||'?') : '?';
    const c2 = fB ? (fB.loser||'?') : '?';
    return { ...m, bo, c1, c2, res: r[m.id]||null,
      winner: matchWinner(m.id,c1,c2), loser: matchLoser(m.id,c1,c2) };
  });

  // Pool after LBR1 + QF: 2 LBR1 winners + 4 QF losers = 6 teams
  // Top 2 seeds get byes into LBR3; bottom 4 play LBR2
  const lbPool = [];
  lbr1.forEach(m => {
    if (m.winner && m.winner !== '?') lbPool.push({ coach: m.winner, from: 'lbr1' });
  });
  qf.forEach(m => {
    if (m.loser && m.loser !== '?') lbPool.push({ coach: m.loser, from: 'qf' });
  });
  lbPool.sort((a, b) => seedNum(a.coach) - seedNum(b.coach));

  const byeTeams  = lbPool.slice(0, 2);
  const lbr2Pool  = lbPool.slice(2);

  // LBR2: pair LBR1 winner vs QF loser among the 4 non-bye teams
  const lbr2NonBye_lbr1 = lbr2Pool.filter(t => t.from === 'lbr1');
  const lbr2NonBye_qf   = lbr2Pool.filter(t => t.from === 'qf');

  const lbr2 = [0, 1].map(i => {
    const id = 'LBR2-' + (i+1);
    const c1 = lbr2NonBye_lbr1[i]?.coach || '?';
    const c2 = lbr2NonBye_qf[i]?.coach   || '?';
    return { id, bo, c1, c2, res: r[id]||null,
      winner: matchWinner(id,c1,c2), loser: matchLoser(id,c1,c2) };
  });

  // LBR3: bye teams face LBR2 winners
  const lbr3 = [0, 1].map(i => {
    const id = 'LBR3-' + (i+1);
    const c1 = byeTeams[i]?.coach  || '?';
    const c2 = lbr2[i]?.winner     || '?';
    return { id, bo, c1, c2, res: r[id]||null,
      winner: matchWinner(id,c1,c2), loser: matchLoser(id,c1,c2) };
  });

  // LBSF: LBR3 winners vs SF losers
  // Higher seed SF loser faces LOWER seed LBR3 winner
  const lbr3Winners = lbr3.map(m => ({ coach: m.winner||'?', seed: seedNum(m.winner||'?') }))
    .sort((a,b) => a.seed - b.seed);  // [0]=higher seed, [1]=lower seed
  const sfLosers = sf.map(m => ({ coach: m.loser||'?', seed: seedNum(m.loser||'?') }))
    .sort((a,b) => a.seed - b.seed);  // [0]=higher seed SF loser

  // Higher seed SF loser (sfLosers[0]) vs lower LBR3 winner (lbr3Winners[1])
  // Lower seed SF loser (sfLosers[1]) vs higher LBR3 winner (lbr3Winners[0])
  const lbsf = [
    { id:'LBSF-1', c1: sfLosers[0]?.coach||'?',   c2: lbr3Winners[1]?.coach||'?' },
    { id:'LBSF-2', c1: sfLosers[1]?.coach||'?',   c2: lbr3Winners[0]?.coach||'?' },
  ].map(m => ({
    ...m, bo, res: r[m.id]||null,
    winner: matchWinner(m.id,m.c1,m.c2), loser: matchLoser(m.id,m.c1,m.c2)
  }));

  const lbfin = (() => {
    const c1 = lbsf[0]?.winner||'?', c2 = lbsf[1]?.winner||'?';
    return { id:'LBFIN', bo, c1, c2, res: r['LBFIN']||null,
      winner: matchWinner('LBFIN',c1,c2) };
  })();

  return { r1, qf, sf, fin, lbr1, lbPool, byeTeams, lbr2, lbr3, lbsf, lbfin };
}

// ============================================================
// Match card renderer
// ============================================================
function bracketMatchCard(match, roundLabel, onClick, accentColor) {
  const res   = match.res;
  const done  = res && res.done;
  const live  = res && !res.done && (res.w1 > 0 || res.w2 > 0);
  const color = accentColor || PLAYOFF_GOLD;

  const makeRow = (coach, wins, isWinner) => {
    const cc = COACH_COLORS[coach] || '#555';
    const unknown = !coach || coach === '?';
    return el('div', {
      style: {
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        padding: '7px 12px',
        background: done && isWinner ? cc + '22' : 'transparent',
        borderRadius: 'var(--border-radius-sm)',
        opacity: unknown ? '0.4' : '1'
      }
    }, [
      el('div', { style: { display: 'flex', alignItems: 'center', gap: '8px' } }, [
        el('span', {
          style: {
            width: '8px', height: '8px', borderRadius: '50%',
            background: unknown ? 'var(--color-text-tertiary)' : cc, flexShrink: '0',
            boxShadow: done && isWinner ? '0 0 8px ' + cc + '80' : 'none'
          }
        }),
        el('span', {
          style: {
            fontSize: '13px', fontWeight: done && isWinner ? '600' : '500',
            color: unknown ? 'var(--color-text-tertiary)' : 'var(--color-text-primary)'
          }
        }, unknown ? 'TBD' : coach)
      ]),
      done ? el('span', {
        style: {
          fontFamily: 'var(--font-display)', fontWeight: '700', fontSize: '16px',
          color: isWinner ? cc : 'var(--color-text-tertiary)'
        }
      }, String(wins)) : null
    ].filter(x => x));
  };

  const winnerColor = done
    ? (res.w1 > res.w2 ? (COACH_COLORS[match.c1]||'#888') : (COACH_COLORS[match.c2]||'#888'))
    : null;

  const card = el('div', {
    onclick: done && onClick ? onClick : null,
    style: {
      background: 'var(--color-background-secondary)',
      border: '0.5px solid ' + (done ? winnerColor + '50' : 'var(--color-border-tertiary)'),
      borderRadius: 'var(--border-radius-lg)', overflow: 'hidden',
      transition: 'all 0.15s', cursor: done && onClick ? 'pointer' : 'default',
      minWidth: '190px'
    }
  }, [
    el('div', {
      style: {
        padding: '5px 12px', background: 'var(--color-background-primary)',
        borderBottom: '0.5px solid var(--color-border-tertiary)',
        display: 'flex', justifyContent: 'space-between', alignItems: 'center'
      }
    }, [
      el('span', { style: { fontSize: '10px', fontWeight: '600', textTransform: 'uppercase', letterSpacing: '0.6px', color } }, roundLabel),
      live ? el('span', { style: { fontSize: '10px', fontWeight: '600', color: 'var(--color-text-warning)' } }, 'Live') :
      done ? el('span', { style: { fontSize: '10px', color: 'var(--color-text-tertiary)' } }, 'Bo' + match.bo) : null
    ].filter(x => x)),
    el('div', { style: { padding: '4px 0' } }, [
      makeRow(match.c1, res ? res.w1 : 0, done && res.w1 > res.w2),
      el('div', { style: { height: '0.5px', background: 'var(--color-border-tertiary)', margin: '0 12px' } }),
      makeRow(match.c2, res ? res.w2 : 0, done && res.w2 > res.w1),
    ])
  ]);

  if (done && onClick) {
    card.onmouseover = () => { card.style.transform = 'translateY(-2px)'; card.style.borderColor = winnerColor + '80'; };
    card.onmouseout  = () => { card.style.transform = '';  card.style.borderColor = winnerColor + '50'; };
  }
  return card;
}

// ============================================================
// View entrypoint
// ============================================================
function viewPlayoffs(state) {
  const seeds   = getPlayoffSeeds(state.data.gameLog);
  const bracket = getBracketMatchups(seeds);
  const pTab    = state.playoffs.tab || 'bracket';

  const subTabBar = el('div', { style: { display: 'flex', gap: '8px', marginBottom: '1.5rem' } },
    [['bracket','Bracket'],['stats','Playoff stats']].map(([id, label]) => {
      const active = pTab === id;
      return el('button', {
        onclick: () => { state.playoffs.tab = id; render(state); },
        style: {
          padding: '8px 18px', fontSize: '13px',
          fontWeight: active ? '600' : '500',
          background: active ? PLAYOFF_GOLD + '22' : 'var(--color-background-secondary)',
          color: active ? PLAYOFF_GOLD : 'var(--color-text-secondary)',
          border: active ? '0.5px solid ' + PLAYOFF_GOLD + '60' : '0.5px solid var(--color-border-tertiary)',
          borderRadius: 'var(--border-radius-md)', cursor: 'pointer', transition: 'all 0.15s'
        }
      }, label);
    })
  );

  return el('div', {}, [
    subTabBar,
    pTab === 'bracket'
      ? renderBracket(state, seeds, bracket)
      : renderPlayoffStats(state, seeds, bracket)
  ]);
}

// ============================================================
// Bracket renderer
// ============================================================
function renderBracket(state, seeds, bracket) {
  const { r1, qf, sf, fin, lbr1, byeTeams, lbr2, lbr3, lbsf, lbfin } = bracket;

  const jump = (c1, c2) => () => {
    state.h2h.c1 = c1; state.h2h.c2 = c2; state.view = 'h2h'; render(state);
  };
  const mc = (m, label, color) =>
    bracketMatchCard(m, label, m.winner ? jump(m.c1, m.c2) : null, color);

  const sp = h => el('div', { style: { height: h + 'px', flexShrink: '0' } });

  const colStyle = { display: 'flex', flexDirection: 'column', gap: '12px', flex: '1', minWidth: '190px' };
  const colHdr = (label, color) => el('div', {
    style: { fontSize: '11px', fontWeight: '700', textTransform: 'uppercase', letterSpacing: '0.8px', color: color || 'var(--color-text-tertiary)', marginBottom: '4px', textAlign: 'center' }
  }, label);
  const col = (label, cards, color) => el('div', { style: colStyle }, [colHdr(label, color), ...cards]);

  // Seeds
  const seedList = el('div', {
    style: { display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(175px, 1fr))', gap: '8px', padding: '16px 20px 20px' }
  }, seeds.map((coach, i) => {
    const seed = i + 1, hasBye = seed <= 4;
    return el('div', {
      style: { display: 'flex', alignItems: 'center', gap: '10px', padding: '8px 12px', background: 'var(--color-background-secondary)', border: hasBye ? '0.5px solid ' + PLAYOFF_GOLD + '50' : '0.5px solid var(--color-border-tertiary)', borderRadius: 'var(--border-radius-md)' }
    }, [
      el('span', { style: { fontFamily: 'var(--font-display)', fontWeight: '700', fontSize: '14px', color: hasBye ? PLAYOFF_GOLD : 'var(--color-text-tertiary)', minWidth: '24px', textAlign: 'right' } }, '#' + seed),
      coachBadge(coach),
      hasBye ? el('span', { style: { fontSize: '10px', fontWeight: '600', color: PLAYOFF_GOLD, textTransform: 'uppercase', letterSpacing: '0.4px', marginLeft: 'auto' } }, 'bye') : null
    ].filter(x => x));
  }));

  const seedSection = section('Seedings', PLAYOFF_CONFIG.teams + '-team bracket  •  Bo' + PLAYOFF_CONFIG.bestOf + ' every round', seedList, { marginBottom: '1.25rem' });

  // Winners bracket
  const wbGrid = el('div', { style: { display: 'flex', gap: '20px', overflowX: 'auto', padding: '16px 20px 24px', alignItems: 'flex-start' } }, [
    col('Round 1',     r1.map(m => mc(m, 'Round 1'))),
    col('Quarterfinals', [sp(50), mc(qf[0],'Quarterfinal'), sp(12), mc(qf[1],'Quarterfinal'), sp(12), mc(qf[2],'Quarterfinal'), sp(12), mc(qf[3],'Quarterfinal'), sp(50)]),
    col('Semifinals',    [sp(120), mc(sf[0],'Semifinal'), sp(72), mc(sf[1],'Semifinal'), sp(120)]),
    col('Final',         [sp(185), mc(fin,'Grand Final'), sp(185)]),
  ]);
  const wbSection = section('Winners Bracket', 'Champion decided here', wbGrid, { marginBottom: '1.25rem' });

  // Losers bracket
  const byeDisplay = byeTeams.length > 0
    ? el('div', { style: { padding: '0 20px 12px', display: 'flex', gap: '8px', alignItems: 'center', flexWrap: 'wrap' } }, [
        el('span', { style: { fontSize: '11px', color: PLAYOFF_BRONZE, fontWeight: '600', textTransform: 'uppercase', letterSpacing: '0.6px' } }, 'LB R3 byes:'),
        ...byeTeams.map(t => coachBadge(t.coach))
      ])
    : null;

  const lbGrid = el('div', { style: { display: 'flex', gap: '20px', overflowX: 'auto', padding: '16px 20px 24px', alignItems: 'flex-start' } }, [
    col('LB Round 1', lbr1.map(m => mc(m, 'LB R1', PLAYOFF_BRONZE))),
    col('LB Round 2', [sp(20), mc(lbr2[0],'LB R2',PLAYOFF_BRONZE), sp(12), mc(lbr2[1],'LB R2',PLAYOFF_BRONZE), sp(20)]),
    col('LB Round 3', [sp(40), mc(lbr3[0],'LB R3',PLAYOFF_BRONZE), sp(12), mc(lbr3[1],'LB R3',PLAYOFF_BRONZE), sp(40)]),
    col('LB Semis',   [sp(60), mc(lbsf[0],'LB Semi',PLAYOFF_BRONZE), sp(12), mc(lbsf[1],'LB Semi',PLAYOFF_BRONZE), sp(60)]),
    col('3rd Place',  [sp(88), mc(lbfin,'3rd Place',PLAYOFF_BRONZE), sp(88)]),
  ]);
  const lbSection = section('Losers Bracket', 'For 3rd place  •  Top 2 seeds after QF round receive byes into LB R3',
    el('div', {}, [byeDisplay, lbGrid].filter(x => x)),
    { marginBottom: '1.25rem' }
  );

  return el('div', {}, [seedSection, wbSection, lbSection]);
}

// ============================================================
// Playoff stats
// ============================================================
function getPlayoffGameIds(gameLog) {
  return new Set(gameLog.filter(r => r.wk > 11).map(r => r.gid));
}

function renderPlayoffStats(state, seeds, bracket) {
  const pGids  = getPlayoffGameIds(state.data.gameLog);
  const pGames = state.data.gameLog.filter(r => pGids.has(r.gid));

  if (pGames.length === 0) {
    return section('Playoff stats', 'No playoff games yet',
      el('div', { style: { padding: '40px 24px', textAlign: 'center', color: 'var(--color-text-tertiary)' } }, [
        el('div', { style: { fontSize: '32px', marginBottom: '12px' } }, '🏆'),
        el('div', { style: { fontSize: '14px', fontWeight: '500', marginBottom: '6px' } }, 'Playoffs haven\'t started yet'),
        el('div', { style: { fontSize: '13px' } }, 'Stats appear once playoff replays are uploaded')
      ])
    );
  }

  const mons    = monStats(pGames);
  const top     = Object.values(mons).sort((a, b) => b.mvp - a.mvp).slice(0, 20);
  const coachS  = coachStats(pGames);
  const coaches = Object.values(coachS).filter(s => s.gp > 0).sort((a, b) => a.rank - b.rank);

  const coachRows = coaches.map(s => [
    rankBadge(s.rank), coachBadge(s.coach),
    mono(s.sw_series+'-'+s.sl_series), mono(s.gw+'-'+(s.gp-s.gw)),
    formatInt(s.kills), formatInt(s.deaths), formatKDR(s.kdr), formatInt(s.dmgPerGame)+'%'
  ]);
  const monRows = top.map((r, i) => [
    rankBadge(i+1),
    el('span', { style: { fontFamily:'var(--font-display)', fontWeight:'600', fontSize:'15px' } }, String(r.mvp)),
    monLink(r.coach, r.mon), coachBadge(r.coach),
    formatInt(r.gp), mono(r.gw+'-'+(r.gp-r.gw)),
    formatInt(r.tk), formatInt(r.deaths), formatKDR(r.kdr), formatDmg(r.dout)
  ]);

  return el('div', {}, [
    section('Coach standings', pGames.length + ' playoff games',
      el('div', { style: { overflowX:'auto' } }, makeTable(
        [{key:'rank',label:'#'},{key:'coach',label:'Coach',align:'left'},{key:'series',label:'Series'},{key:'games',label:'Games'},{key:'kills',label:'K'},{key:'deaths',label:'D'},{key:'kdr',label:'K/D'},{key:'dpg',label:'Dmg/G'}],
        coachRows, { stickyHeader: true }
      )),
      { marginBottom: '1.25rem' }
    ),
    section('Pokemon leaderboard', 'Playoff MVP leaders',
      el('div', { style: { overflowX:'auto' } }, makeTable(
        [{key:'rank',label:'#'},{key:'mvp',label:'MVP'},{key:'mon',label:'Pokemon',align:'left'},{key:'coach',label:'Coach',align:'left'},{key:'gp',label:'GP'},{key:'record',label:'W-L'},{key:'tk',label:'K'},{key:'deaths',label:'D'},{key:'kdr',label:'K/D'},{key:'dout',label:'Dmg'}],
        monRows, { stickyHeader: true }
      ))
    )
  ]);
}
const BAKED_TIMESTAMP = 'April 19, 2026';

const state = {
  view: 'standings',
  data: null,
  dataSource: 'baked',
  lastUpdated: BAKED_TIMESTAMP,
  darkMode: true,
  searchOpen: false,
  searchQuery: '',
  statsPhase: 'regular',
  standings: { subView: 'standings' },
  lb: { sortKey: 'mvp', sortDir: 'desc', filterCoach: 'All', minGP: 1 },
  h2h: { c1: 'Abbey', c2: 'Zion' },
  mdd: { coach: 'Ben', mon: 'Dragonite' },
  cp: { coach: 'Abbey' },
  schedule: { filterCoach: 'All' },
  playoffs: { tab: 'bracket' },
  query: {
    metric: 'dout', groupBy: 'mon', sortDir: 'desc', minGP: 1,
    filterCoach: 'All', filterWeek: 'All', filterOpp: 'All',
    teraOnly: 'any', leadOnly: 'any', wonOnly: 'any'
  },
  tl: {
    event: 'PROTECT', outcome: 'All', groupBy: 'mon', sortDir: 'desc',
    statusType: 'All', filterCoach: 'All', filterWeek: 'All'
  }
};

function activeGameLog(state) {
  const gl = state.data.gameLog;
  if (state.statsPhase === 'regular') return gl.filter(r => r.wk <= 11);
  if (state.statsPhase === 'playoff') return gl.filter(r => r.wk > 11);
  return gl;
}

function applyTheme(dark) {
  const el = document.documentElement;
  const vars = dark ? {
    '--color-background-primary':   '#13151c',
    '--color-background-secondary': '#1a1d27',
    '--color-background-tertiary':  '#0e1016',
    '--color-background-success':   '#16653480',
    '--color-background-danger':    '#991b1b80',
    '--color-background-warning':   '#92400e80',
    '--color-background-info':      '#1e3a5f',
    '--color-text-primary':         '#e8eaed',
    '--color-text-secondary':       '#9aa0b2',
    '--color-text-tertiary':        '#5c6378',
    '--color-text-success':         '#4ade80',
    '--color-text-danger':          '#f87171',
    '--color-text-warning':         '#fbbf24',
    '--color-text-info':            '#7ab8ff',
    '--color-border-primary':       'rgba(255,255,255,0.18)',
    '--color-border-secondary':     'rgba(255,255,255,0.12)',
    '--color-border-tertiary':      'rgba(255,255,255,0.08)',
    '--color-border-success':       '#4ade80',
    '--color-border-danger':        '#f87171',
  } : {
    '--color-background-primary':   '#ffffff',
    '--color-background-secondary': '#f4f5f8',
    '--color-background-tertiary':  '#e8eaef',
    '--color-background-success':   '#dcfce7',
    '--color-background-danger':    '#fee2e2',
    '--color-background-warning':   '#fef3c7',
    '--color-background-info':      '#dbeafe',
    '--color-text-primary':         '#111827',
    '--color-text-secondary':       '#4b5563',
    '--color-text-tertiary':        '#9ca3af',
    '--color-text-success':         '#16a34a',
    '--color-text-danger':          '#dc2626',
    '--color-text-warning':         '#d97706',
    '--color-text-info':            '#2563eb',
    '--color-border-primary':       'rgba(0,0,0,0.15)',
    '--color-border-secondary':     '#d1d5db',
    '--color-border-tertiary':      '#e5e7eb',
    '--color-border-success':       '#16a34a',
    '--color-border-danger':        '#dc2626',
  };
  Object.entries(vars).forEach(([k,v]) => el.style.setProperty(k, v));
  // Also update body background directly for full-page coverage
  document.body.style.background = dark ? '#13151c' : '#ffffff';
  document.body.style.color = dark ? '#e8eaed' : '#111827';
}

// ── Search ─────────────────────────────────────────────────────────────────
function buildSearchIndex(data) {
  const results = [];
  // Coaches
  COACHES.forEach(coach => {
    results.push({ type: 'coach', label: coach, sub: 'Coach panel', action: (state) => { state.cp.coach = coach; state.view = 'coach'; } });
  });
  // Mons
  const mons = monStats(data.gameLog);
  Object.values(mons).forEach(m => {
    results.push({ type: 'mon', label: m.mon, sub: m.coach + ' • MVP ' + m.mvp, action: (state) => { state.mdd.coach = m.coach; state.mdd.mon = m.mon; state.view = 'mon'; } });
  });
  return results;
}

function renderSearch(state) {
  if (!state.searchOpen) return null;
  const index = buildSearchIndex(state.data);

  const backdrop = el('div', {
    onclick: () => { state.searchOpen = false; state.searchQuery = ''; render(state); },
    style: { position: 'fixed', inset: '0', background: 'rgba(0,0,0,0.5)', zIndex: '999' }
  });

  const resultsDiv = el('div', { style: { maxHeight: '400px', overflowY: 'auto' } });

  function updateResults(q) {
    resultsDiv.innerHTML = '';
    const filtered = q ? index.filter(r => r.label.toLowerCase().includes(q.toLowerCase()) || r.sub.toLowerCase().includes(q.toLowerCase())).slice(0, 10) : index.slice(0, 8);
    if (filtered.length === 0) {
      const empty = el('div', { style: { padding: '24px 20px', textAlign: 'center', color: 'var(--color-text-tertiary)', fontSize: '14px' } }, q ? 'No results for "' + q + '"' : 'Start typing...');
      resultsDiv.appendChild(empty);
      return;
    }
    filtered.forEach(r => {
      const iconEl = r.type === 'coach'
        ? el('div', { style: { width: '32px', height: '32px', borderRadius: '50%', background: (COACH_COLORS[r.label]||'#888'), display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#fff', fontSize: '13px', fontWeight: '700', flexShrink: '0' } }, r.label.charAt(0))
        : el('div', { style: { flexShrink: '0' } }, monSprite(r.label, 32));
      const item = el('div', {
        onclick: () => { r.action(state); state.searchOpen = false; state.searchQuery = ''; render(state); },
        style: { display: 'flex', alignItems: 'center', gap: '12px', padding: '12px 20px', cursor: 'pointer', transition: 'background 0.1s' }
      }, [
        iconEl,
        el('div', {}, [
          el('div', { style: { fontWeight: '600', fontSize: '14px' } }, r.label),
          el('div', { style: { fontSize: '12px', color: 'var(--color-text-tertiary)', marginTop: '2px' } }, r.sub)
        ])
      ]);
      item.onmouseover = () => { item.style.background = 'var(--color-background-secondary)'; };
      item.onmouseout  = () => { item.style.background = ''; };
      resultsDiv.appendChild(item);
    });
  }

  // Create input WITHOUT value attribute — never re-render on keystroke
  const searchInput = document.createElement('input');
  searchInput.type = 'text';
  searchInput.placeholder = 'Search coaches or Pokémon...';
  searchInput.style.cssText = 'width:100%;padding:16px 20px;font-size:16px;background:transparent;border:none;outline:none;color:var(--color-text-primary);font-family:var(--font-sans);box-sizing:border-box;';
  searchInput.oninput = (e) => { state.searchQuery = e.target.value; updateResults(e.target.value); };

  updateResults(state.searchQuery || '');

  const modal = el('div', {
    style: {
      position: 'fixed', top: '80px', left: '50%', transform: 'translateX(-50%)',
      width: 'min(600px, 90vw)',
      background: 'var(--color-background-primary)',
      border: '0.5px solid var(--color-border-secondary)',
      borderRadius: 'var(--border-radius-lg)',
      boxShadow: '0 20px 60px rgba(0,0,0,0.4)',
      zIndex: '1000', overflow: 'hidden'
    }
  }, [
    el('div', { style: { borderBottom: '0.5px solid var(--color-border-tertiary)', display: 'flex', alignItems: 'center', paddingLeft: '20px', gap: '12px' } }, [
      el('span', { style: { fontSize: '18px', color: 'var(--color-text-tertiary)' } }, '🔍'),
    ]),
    resultsDiv
  ]);

  // Inject the raw input into the header div
  modal.firstChild.appendChild(searchInput);
  setTimeout(() => { searchInput.focus(); if (state.searchQuery) searchInput.value = state.searchQuery; }, 30);

  return el('div', {}, [backdrop, modal]);
}

function phaseToggle(state) {
  const options = [
    { id:'regular', label:'Regular' },
    { id:'playoff', label:'Playoffs' },
    { id:'combined', label:'Combined' },
  ];
  return el('div', {
    style: {
      display: 'flex', background: 'var(--color-background-secondary)',
      border: '0.5px solid var(--color-border-tertiary)',
      borderRadius: 'var(--border-radius-md)', padding: '3px', gap: '2px'
    }
  }, options.map(o => {
    const active = state.statsPhase === o.id;
    return el('button', {
      onclick: () => { state.statsPhase = o.id; render(state); },
      style: {
        padding: '5px 10px', fontSize: '11px', fontWeight: active ? '600' : '500',
        background: active ? 'var(--color-background-primary)' : 'transparent',
        color: active ? 'var(--color-text-primary)' : 'var(--color-text-tertiary)',
        border: active ? '0.5px solid var(--color-border-tertiary)' : 'none',
        borderRadius: '6px', cursor: 'pointer', transition: 'all 0.15s', whiteSpace: 'nowrap'
      }
    }, o.label);
  }));
}

function render(state) {
  applyTheme(state.darkMode);
  const root = document.getElementById('gforce-app');
  root.innerHTML = '';
  if (!state.data) {
    root.appendChild(el('div', { style: { padding: '2rem', textAlign: 'center', color: 'var(--color-text-secondary)' } }, 'Loading...'));
    return;
  }

  // Search overlay
  const searchOverlay = renderSearch(state);
  if (searchOverlay) root.appendChild(searchOverlay);

  if (state.view === 'playoffs') {
    renderPlayoffsMode(state, root);
    return;
  }
  renderRegularSeasonMode(state, root);
}

function renderPlayoffsMode(state, root) {
  const backBtn = el('button', {
    onclick: () => { state.view = 'standings'; render(state); },
    style: {
      display: 'inline-flex', alignItems: 'center', gap: '8px',
      padding: '8px 16px', marginBottom: '1.5rem', fontSize: '13px', fontWeight: '500',
      background: 'transparent', color: 'var(--color-text-secondary)',
      border: '0.5px solid var(--color-border-tertiary)',
      borderRadius: 'var(--border-radius-md)', cursor: 'pointer'
    }
  }, '← Regular Season');

  const header = el('div', { style: { marginBottom: '2rem' } }, [
    backBtn,
    el('div', { style: { display: 'flex', alignItems: 'baseline', gap: '16px', marginBottom: '6px' } }, [
      el('h1', {
        style: { fontFamily: 'var(--font-display)', fontSize: '36px', fontWeight: '700', margin: '0', letterSpacing: '-0.03em', background: 'linear-gradient(135deg, ' + PLAYOFF_GOLD + ' 0%, #fff8dc 100%)', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent', backgroundClip: 'text' }
      }, '🏆 Playoffs'),
      el('span', { style: { fontSize: '14px', fontWeight: '500', color: PLAYOFF_GOLD, opacity: '0.8' } }, '2026 Season')
    ]),
    el('div', { style: { fontSize: '12px', color: 'var(--color-text-tertiary)', textTransform: 'uppercase', letterSpacing: '0.8px', fontWeight: '600' } },
      PLAYOFF_CONFIG.teams + '-team bracket  •  Bo' + PLAYOFF_CONFIG.bestOf + ' every round')
  ]);
  root.appendChild(header);
  root.appendChild(viewPlayoffs(state));
}

function renderRegularSeasonMode(state, root) {
  const totalGames = new Set(state.data.gameLog.filter(r => r.wk <= 11).map(r => r.gid)).size;
  const hasPlayoffGames = state.data.gameLog.some(r => r.wk > 11);
  const statsViews = ['standings','leaderboard','coach','mon','h2h','query','turnlog'];
  const showToggle = statsViews.includes(state.view) && hasPlayoffGames;

  const lastUpdatedBadge = el('div', {
    style: { display: 'inline-flex', alignItems: 'center', gap: '6px', fontSize: '11px', color: 'var(--color-text-tertiary)', background: 'var(--color-background-secondary)', border: '0.5px solid var(--color-border-tertiary)', borderRadius: 'var(--border-radius-md)', padding: '4px 10px', fontWeight: '500' }
  }, [
    el('span', { style: { width: '6px', height: '6px', borderRadius: '50%', background: 'var(--color-text-success)', flexShrink: '0' } }),
    'Updated ' + state.lastUpdated
  ]);

  // Search button
  const searchBtn = el('button', {
    onclick: () => { state.searchOpen = true; render(state); },
    style: {
      display: 'inline-flex', alignItems: 'center', gap: '7px',
      padding: '6px 14px', fontSize: '12px', fontWeight: '500',
      background: 'var(--color-background-secondary)',
      color: 'var(--color-text-tertiary)',
      border: '0.5px solid var(--color-border-tertiary)',
      borderRadius: 'var(--border-radius-md)', cursor: 'pointer', transition: 'all 0.15s'
    }
  }, ['🔍', el('span', {}, 'Search')]);
  searchBtn.onmouseover = () => { searchBtn.style.color = 'var(--color-text-primary)'; searchBtn.style.borderColor = 'var(--color-border-secondary)'; };
  searchBtn.onmouseout  = () => { searchBtn.style.color = 'var(--color-text-tertiary)'; searchBtn.style.borderColor = 'var(--color-border-tertiary)'; };

  // Dark/light toggle
  const themeBtn = el('button', {
    onclick: () => { state.darkMode = !state.darkMode; render(state); },
    style: {
      display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
      width: '34px', height: '34px',
      background: 'var(--color-background-secondary)',
      border: '0.5px solid var(--color-border-tertiary)',
      borderRadius: 'var(--border-radius-md)', cursor: 'pointer',
      fontSize: '16px', transition: 'all 0.15s'
    }
  }, state.darkMode ? '☀️' : '🌙');

  const playoffsBtn = el('button', {
    onclick: () => { state.view = 'playoffs'; render(state); },
    style: {
      display: 'inline-flex', alignItems: 'center', gap: '8px', padding: '7px 16px',
      fontSize: '13px', fontWeight: '600', background: PLAYOFF_GOLD + '18', color: PLAYOFF_GOLD,
      border: '0.5px solid ' + PLAYOFF_GOLD + '60', borderRadius: 'var(--border-radius-md)',
      cursor: 'pointer', transition: 'all 0.15s'
    }
  }, '🏆 Playoffs');
  playoffsBtn.onmouseover = () => { playoffsBtn.style.background = PLAYOFF_GOLD + '30'; };
  playoffsBtn.onmouseout  = () => { playoffsBtn.style.background = PLAYOFF_GOLD + '18'; };

  const header = el('div', { style: { marginBottom: '2rem' } }, [
    el('div', {
      style: { display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: '16px', flexWrap: 'wrap' }
    }, [
      el('div', {}, [
        el('h1', {
          style: { fontFamily: 'var(--font-display)', fontSize: '32px', fontWeight: '700', margin: '0', letterSpacing: '-0.03em', background: 'linear-gradient(135deg, #e8eaed 0%, #a8b0bd 100%)', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent', backgroundClip: 'text' }
        }, 'G-Force Draft League'),
        el('div', { style: { display: 'flex', alignItems: 'center', gap: '10px', marginTop: '6px', flexWrap: 'wrap' } }, [
          el('div', { style: { fontSize: '12px', color: 'var(--color-text-tertiary)', textTransform: 'uppercase', letterSpacing: '0.8px', fontWeight: '600' } }, '2026 Season  •  ' + totalGames + ' games'),
          lastUpdatedBadge,
          showToggle ? phaseToggle(state) : null,
          playoffsBtn
        ].filter(x => x))
      ]),
      el('div', { style: { display: 'flex', gap: '8px', alignItems: 'center' } }, [
        searchBtn, themeBtn
      ])
    ])
  ]);

  const tabs = [
    { id:'standings', label:'Standings' }, { id:'schedule', label:'Schedule' },
    { id:'leaderboard', label:'Leaderboard' }, { id:'coach', label:'Coach panels' },
    { id:'mon', label:'Pokémon deep dive' }, { id:'h2h', label:'Head-to-head' },
    { id:'query', label:'Stat pivot' }, { id:'turnlog', label:'Event book' }
  ];

  const tabBar = el('div', {
    style: { display: 'flex', gap: '4px', flexWrap: 'wrap', borderBottom: '0.5px solid var(--color-border-tertiary)', marginBottom: '1.5rem' }
  }, tabs.map(t => tab(t.label, state.view === t.id, () => { state.view = t.id; render(state); })));

  const statState = { ...state, data: { ...state.data, gameLog: activeGameLog(state) } };
  let content;
  if      (state.view === 'standings')    content = viewStandings(statState);
  else if (state.view === 'schedule')     content = viewSchedule(state);
  else if (state.view === 'leaderboard')  content = viewLeaderboard(statState);
  else if (state.view === 'coach')        content = viewCoachPanel(statState);
  else if (state.view === 'mon')          content = viewMonDeepDive(statState);
  else if (state.view === 'h2h')          content = viewHeadToHead(statState);
  else if (state.view === 'query')        content = viewCustomQuery(statState);
  else if (state.view === 'turnlog')      content = viewTurnLog(statState);
  else                                    content = viewStandings(statState);

  root.appendChild(header);
  root.appendChild(tabBar);
  if (content) root.appendChild(content);
}

function init() {
  applyTheme(state.darkMode);
  state.data = decodeAll(decompressData(BAKED_DATA_B64));
  render(state);
}

// Keyboard shortcut: Cmd/Ctrl+K opens search
document.addEventListener('keydown', (e) => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
    e.preventDefault();
    state.searchOpen = !state.searchOpen;
    if (!state.searchOpen) state.searchQuery = '';
    render(state);
  }
  if (e.key === 'Escape' && state.searchOpen) {
    state.searchOpen = false;
    state.searchQuery = '';
    render(state);
  }
});

init();
</script>
