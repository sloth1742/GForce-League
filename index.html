    const weekMatches = FULL_SCHEDULE.filter(s => s.wk === wk &&
      (filterCoach === 'All' || s.c1 === filterCoach || s.c2 === filterCoach));
    if (weekMatches.length === 0) return null;

    const matchCards = el('div', {
      style: {
        display: 'grid',
        gridTemplateColumns: 'repeat(auto-fill, minmax(280px, 1fr))',
        gap: '10px',
        padding: '16px 20px 20px'
      }
    }, weekMatches.map(match => {
      const key = 'W' + match.wk + '-M' + match.m;
      const res = results[key];
      const isDone = res && res.done;
      const isPending = res && !res.done && res.gamesPlayed > 0;
      const isUpcoming = !res;

      let statusBar, score;
      if (isDone) {
        const winner = res.winner;
        const loser = winner === res.c1 ? res.c2 : res.c1;
        const wScore = winner === res.c1 ? res.w1 : res.w2;
        const lScore = winner === res.c1 ? res.w2 : res.w1;
        score = wScore + '-' + lScore;
        statusBar = el('div', {
          style: {
            width: '8px',
            borderRadius: '4px 0 0 4px',
            background: COACH_COLORS[winner] || '#888',
            flexShrink: '0'
          }
        });
      } else if (isPending) {
        score = res.w1 + '-' + res.w2 + ' (live)';
        statusBar = el('div', {
          style: {
            width: '8px',
            borderRadius: '4px 0 0 4px',
            background: 'var(--color-text-warning)',
            flexShrink: '0'
          }
        });
      } else {
        score = null;
        statusBar = el('div', {
          style: {
            width: '8px',
            borderRadius: '4px 0 0 4px',
            background: 'var(--color-border-tertiary)',
            flexShrink: '0'
          }
        });
      }

      const matchCard = el('div', {
        style: {
          display: 'flex',
          background: 'var(--color-background-secondary)',
          border: '0.5px solid var(--color-border-tertiary)',
          borderRadius: 'var(--border-radius-lg)',
          overflow: 'hidden',
          transition: 'border-color 0.15s'
        }
      }, [
        statusBar,
        el('div', { style: { padding: '14px 16px', flex: '1', minWidth: '0' } }, [
          el('div', {
            style: {
              fontSize: '10px',
              color: 'var(--color-text-tertiary)',
              textTransform: 'uppercase',
              letterSpacing: '0.6px',
              fontWeight: '600',
              marginBottom: '10px'
            }
          }, 'Match ' + match.m),
          el('div', {
            style: {
              display: 'flex',
              alignItems: 'center',
              justifyContent: 'space-between',
              gap: '8px'
            }
          }, [
            el('div', { style: { flex: '1' } }, coachBadge(match.c1)),
            el('div', {
              style: {
                fontFamily: 'var(--font-display)',
                fontWeight: '700',
                fontSize: isDone ? '18px' : '13px',
                color: isDone ? 'var(--color-text-primary)' : 'var(--color-text-tertiary)',
                textAlign: 'center',
                minWidth: '40px'
              }
            }, score || 'vs'),
            el('div', { style: { flex: '1', display: 'flex', justifyContent: 'flex-end' } }, coachBadge(match.c2))
          ]),
          isDone ? el('div', {
            style: {
              marginTop: '8px',
              fontSize: '11px',
              color: 'var(--color-text-tertiary)',
              textAlign: 'center'
            }
          }, res.winner + ' wins' + (res.gamesPlayed ? ' (' + res.gamesPlayed + 'g)' : '')) : null,
          isPending ? el('div', {
            style: {
              marginTop: '8px',
              fontSize: '11px',
              color: 'var(--color-text-warning)',
              textAlign: 'center',
              fontWeight: '600'
            }
          }, 'In progress') : null
        ].filter(x => x))
      ]);

      if (isDone) {
        matchCard.onclick = () => {
          state.h2h.c1 = match.c1;
          state.h2h.c2 = match.c2;
          state.view = 'h2h';
          render(state);
        };
        matchCard.style.cursor = 'pointer';
        matchCard.onmouseover = () => matchCard.style.borderColor = 'var(--color-border-secondary)';
        matchCard.onmouseout = () => matchCard.style.borderColor = 'var(--color-border-tertiary)';
      }

      return matchCard;
    }));

    const weekGames = FULL_SCHEDULE.filter(s => s.wk === wk);
    const weekDone = weekGames.filter(s => {
      const r = results['W' + s.wk + '-M' + s.m];
      return r && r.done;
    }).length;
    const subtitle = weekDone === weekGames.length
      ? 'All ' + weekGames.length + ' matches complete'
      : weekDone + ' of ' + weekGames.length + ' complete';

    return section('Week ' + wk, subtitle, matchCards, { marginBottom: '1.25rem' });
  }).filter(x => x);

  const totalMatches = FULL_SCHEDULE.length;
  const doneMatches = FULL_SCHEDULE.filter(s => {
    const r = results['W' + s.wk + '-M' + s.m];
    return r && r.done;
  }).length;

  const summary = el('div', {
    style: {
      display: 'grid',
      gridTemplateColumns: 'repeat(auto-fit, minmax(150px, 1fr))',
      gap: '12px',
      marginBottom: '1.75rem'
    }
  }, [
    metric('Total matches', totalMatches, '11 weeks × 6 per week'),
    metric('Completed', doneMatches, Math.round(doneMatches / totalMatches * 100) + '% of season'),
    metric('Remaining', totalMatches - doneMatches, 'matches left to play'),
    metric('Current week', Math.max(...Object.values(results).map(r => r.wk)) || 1, 'active week')
  ]);

  return el('div', {}, [
    controls,
    summary,
    ...weekSections
  ]);
}
// ============================================================
// PLAYOFF CONFIG
// ============================================================
const PLAYOFF_CONFIG = {
  season: 2026,
  format: 'single',
  teams: 12,
  bestOf: 5,
  thirdPlace: true,
  seedingMethod: 'standings',
};

const PLAYOFF_BRACKET = {
  locked: false,
  manualSeeds: null,
  results: {
    // Winners bracket: 'R1-1','R1-2','R1-3','R1-4'
    //                  'QF-1','QF-2','QF-3','QF-4'
    //                  'SF-1','SF-2','FIN'
    // Losers bracket:  'LBR1-1','LBR1-2'
    //                  'LBR2-1','LBR2-2'
    //                  'LBR3-1','LBR3-2'
    //                  'LBSF-1','LBSF-2','LBFIN'
    // Format: { w1: gamesWonByHome, w2: gamesWonByAway, done: bool }
  },
};

const PLAYOFF_GOLD   = '#D4AF37';
const PLAYOFF_BRONZE = '#CD7F32';

// ============================================================
// Seed helpers
// ============================================================
function getPlayoffSeeds(gameLog) {
  if (PLAYOFF_BRACKET.manualSeeds) return PLAYOFF_BRACKET.manualSeeds;
  const stats = coachStats(gameLog);
  return Object.values(stats)
    .sort((a, b) => a.rank - b.rank)
    .slice(0, PLAYOFF_CONFIG.teams)
    .map(s => s.coach);
}

// ============================================================
// Bracket computation
// ============================================================
function getBracketMatchups(seeds) {
  const bo = PLAYOFF_CONFIG.bestOf;
  const r  = PLAYOFF_BRACKET.results;

  function seedCoach(seed) {
    if (typeof seed === 'number') return seeds[seed - 1] || '?';
    return seed;
  }
  function seedNum(coach) {
    const i = seeds.indexOf(coach);
    return i >= 0 ? i + 1 : 999;
  }
  function matchWinner(id, c1, c2) {
    const res = r[id];
    if (!res || !res.done) return null;
    return res.w1 > res.w2 ? c1 : c2;
  }
  function matchLoser(id, c1, c2) {
    const res = r[id];
    if (!res || !res.done) return null;
    return res.w1 < res.w2 ? c1 : c2;
  }

  // ── Winners bracket ──────────────────────────────────────
  const r1 = [
    { id:'R1-1', seed1:5,  seed2:12 },
    { id:'R1-2', seed1:6,  seed2:11 },
    { id:'R1-3', seed1:7,  seed2:10 },
    { id:'R1-4', seed1:8,  seed2:9  },
  ].map(m => {
    const c1 = seedCoach(m.seed1), c2 = seedCoach(m.seed2);
    return { ...m, bo, c1, c2, res: r[m.id]||null,
      winner: matchWinner(m.id,c1,c2), loser: matchLoser(m.id,c1,c2) };
  });

  const qf = [
    { id:'QF-1', seed1:1, feedId:'R1-4' },  // 1 v W(8v9)
    { id:'QF-2', seed1:2, feedId:'R1-2' },  // 2 v W(6v11)
    { id:'QF-3', seed1:3, feedId:'R1-3' },  // 3 v W(7v10)
    { id:'QF-4', seed1:4, feedId:'R1-1' },  // 4 v W(5v12)
  ].map(m => {
    const feeder = r1.find(x => x.id === m.feedId);
    const c1 = seedCoach(m.seed1);
    const c2 = feeder ? (feeder.winner || '?') : '?';
    return { ...m, bo, c1, c2, res: r[m.id]||null,
      winner: matchWinner(m.id,c1,c2), loser: matchLoser(m.id,c1,c2) };
  });

  const sf = [
    { id:'SF-1', feedId1:'QF-1', feedId2:'QF-4' },
    { id:'SF-2', feedId1:'QF-2', feedId2:'QF-3' },
  ].map(m => {
    const f1 = qf.find(x => x.id === m.feedId1);
    const f2 = qf.find(x => x.id === m.feedId2);
    const c1 = f1 ? (f1.winner||'?') : '?';
    const c2 = f2 ? (f2.winner||'?') : '?';
    return { ...m, bo, c1, c2, res: r[m.id]||null,
      winner: matchWinner(m.id,c1,c2), loser: matchLoser(m.id,c1,c2) };
  });

  const fin = (() => {
    const c1 = sf[0]?.winner||'?', c2 = sf[1]?.winner||'?';
    return { id:'FIN', bo, c1, c2, res: r['FIN']||null,
      winner: matchWinner('FIN',c1,c2), loser: matchLoser('FIN',c1,c2) };
  })();

  // ── Losers bracket ───────────────────────────────────────
  // LBR1: R1 losers pair off (R1-1 loser vs R1-2 loser, R1-3 loser vs R1-4 loser)
  const lbr1 = [
    { id:'LBR1-1', feedA:'R1-1', feedB:'R1-2' },
    { id:'LBR1-2', feedA:'R1-3', feedB:'R1-4' },
  ].map(m => {
    const fA = r1.find(x => x.id === m.feedA);
    const fB = r1.find(x => x.id === m.feedB);
    const c1 = fA ? (fA.loser||'?') : '?';
    const c2 = fB ? (fB.loser||'?') : '?';
    return { ...m, bo, c1, c2, res: r[m.id]||null,
      winner: matchWinner(m.id,c1,c2), loser: matchLoser(m.id,c1,c2) };
  });

  // Pool after LBR1 + QF: 2 LBR1 winners + 4 QF losers = 6 teams
  // Top 2 seeds get byes into LBR3; bottom 4 play LBR2
  const lbPool = [];
  lbr1.forEach(m => {
    if (m.winner && m.winner !== '?') lbPool.push({ coach: m.winner, from: 'lbr1' });
  });
  qf.forEach(m => {
    if (m.loser && m.loser !== '?') lbPool.push({ coach: m.loser, from: 'qf' });
  });
  lbPool.sort((a, b) => seedNum(a.coach) - seedNum(b.coach));

  const byeTeams  = lbPool.slice(0, 2);
  const lbr2Pool  = lbPool.slice(2);

  // LBR2: pair LBR1 winner vs QF loser among the 4 non-bye teams
  const lbr2NonBye_lbr1 = lbr2Pool.filter(t => t.from === 'lbr1');
  const lbr2NonBye_qf   = lbr2Pool.filter(t => t.from === 'qf');

  const lbr2 = [0, 1].map(i => {
    const id = 'LBR2-' + (i+1);
    const c1 = lbr2NonBye_lbr1[i]?.coach || '?';
    const c2 = lbr2NonBye_qf[i]?.coach   || '?';
    return { id, bo, c1, c2, res: r[id]||null,
      winner: matchWinner(id,c1,c2), loser: matchLoser(id,c1,c2) };
  });

  // LBR3: bye teams face LBR2 winners
  const lbr3 = [0, 1].map(i => {
    const id = 'LBR3-' + (i+1);
    const c1 = byeTeams[i]?.coach  || '?';
    const c2 = lbr2[i]?.winner     || '?';
    return { id, bo, c1, c2, res: r[id]||null,
      winner: matchWinner(id,c1,c2), loser: matchLoser(id,c1,c2) };
  });

  // LBSF: LBR3 winners vs SF losers
  // Higher seed SF loser faces LOWER seed LBR3 winner
  const lbr3Winners = lbr3.map(m => ({ coach: m.winner||'?', seed: seedNum(m.winner||'?') }))
    .sort((a,b) => a.seed - b.seed);  // [0]=higher seed, [1]=lower seed
  const sfLosers = sf.map(m => ({ coach: m.loser||'?', seed: seedNum(m.loser||'?') }))
    .sort((a,b) => a.seed - b.seed);  // [0]=higher seed SF loser

  // Higher seed SF loser (sfLosers[0]) vs lower LBR3 winner (lbr3Winners[1])
  // Lower seed SF loser (sfLosers[1]) vs higher LBR3 winner (lbr3Winners[0])
  const lbsf = [
    { id:'LBSF-1', c1: sfLosers[0]?.coach||'?',   c2: lbr3Winners[1]?.coach||'?' },
    { id:'LBSF-2', c1: sfLosers[1]?.coach||'?',   c2: lbr3Winners[0]?.coach||'?' },
  ].map(m => ({
    ...m, bo, res: r[m.id]||null,
    winner: matchWinner(m.id,m.c1,m.c2), loser: matchLoser(m.id,m.c1,m.c2)
  }));

  const lbfin = (() => {
    const c1 = lbsf[0]?.winner||'?', c2 = lbsf[1]?.winner||'?';
    return { id:'LBFIN', bo, c1, c2, res: r['LBFIN']||null,
      winner: matchWinner('LBFIN',c1,c2) };
  })();

  return { r1, qf, sf, fin, lbr1, lbPool, byeTeams, lbr2, lbr3, lbsf, lbfin };
}

// ============================================================
// Match card renderer
// ============================================================
function bracketMatchCard(match, roundLabel, onClick, accentColor) {
  const res   = match.res;
  const done  = res && res.done;
  const live  = res && !res.done && (res.w1 > 0 || res.w2 > 0);
  const color = accentColor || PLAYOFF_GOLD;

  const makeRow = (coach, wins, isWinner) => {
    const cc = COACH_COLORS[coach] || '#555';
    const unknown = !coach || coach === '?';
    return el('div', {
      style: {
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        padding: '7px 12px',
        background: done && isWinner ? cc + '22' : 'transparent',
        borderRadius: 'var(--border-radius-sm)',
        opacity: unknown ? '0.4' : '1'
      }
    }, [
      el('div', { style: { display: 'flex', alignItems: 'center', gap: '8px' } }, [
        el('span', {
          style: {
            width: '8px', height: '8px', borderRadius: '50%',
            background: unknown ? 'var(--color-text-tertiary)' : cc, flexShrink: '0',
            boxShadow: done && isWinner ? '0 0 8px ' + cc + '80' : 'none'
          }
        }),
        el('span', {
          style: {
            fontSize: '13px', fontWeight: done && isWinner ? '600' : '500',
            color: unknown ? 'var(--color-text-tertiary)' : 'var(--color-text-primary)'
          }
        }, unknown ? 'TBD' : coach)
      ]),
      done ? el('span', {
        style: {
          fontFamily: 'var(--font-display)', fontWeight: '700', fontSize: '16px',
          color: isWinner ? cc : 'var(--color-text-tertiary)'
        }
      }, String(wins)) : null
    ].filter(x => x));
  };

  const winnerColor = done
    ? (res.w1 > res.w2 ? (COACH_COLORS[match.c1]||'#888') : (COACH_COLORS[match.c2]||'#888'))
    : null;

  const card = el('div', {
    onclick: done && onClick ? onClick : null,
    style: {
      background: 'var(--color-background-secondary)',
      border: '0.5px solid ' + (done ? winnerColor + '50' : 'var(--color-border-tertiary)'),
      borderRadius: 'var(--border-radius-lg)', overflow: 'hidden',
      transition: 'all 0.15s', cursor: done && onClick ? 'pointer' : 'default',
      minWidth: '190px'
    }
  }, [
    el('div', {
      style: {
        padding: '5px 12px', background: 'var(--color-background-primary)',
        borderBottom: '0.5px solid var(--color-border-tertiary)',
        display: 'flex', justifyContent: 'space-between', alignItems: 'center'
      }
    }, [
      el('span', { style: { fontSize: '10px', fontWeight: '600', textTransform: 'uppercase', letterSpacing: '0.6px', color } }, roundLabel),
      live ? el('span', { style: { fontSize: '10px', fontWeight: '600', color: 'var(--color-text-warning)' } }, 'Live') :
      done ? el('span', { style: { fontSize: '10px', color: 'var(--color-text-tertiary)' } }, 'Bo' + match.bo) : null
    ].filter(x => x)),
    el('div', { style: { padding: '4px 0' } }, [
      makeRow(match.c1, res ? res.w1 : 0, done && res.w1 > res.w2),
      el('div', { style: { height: '0.5px', background: 'var(--color-border-tertiary)', margin: '0 12px' } }),
      makeRow(match.c2, res ? res.w2 : 0, done && res.w2 > res.w1),
    ])
  ]);

  if (done && onClick) {
    card.onmouseover = () => { card.style.transform = 'translateY(-2px)'; card.style.borderColor = winnerColor + '80'; };
    card.onmouseout  = () => { card.style.transform = '';  card.style.borderColor = winnerColor + '50'; };
  }
  return card;
}

// ============================================================
// View entrypoint
// ============================================================
function viewPlayoffs(state) {
  const seeds   = getPlayoffSeeds(state.data.gameLog);
  const bracket = getBracketMatchups(seeds);
  const pTab    = state.playoffs.tab || 'bracket';

  const subTabBar = el('div', { style: { display: 'flex', gap: '8px', marginBottom: '1.5rem' } },
    [['bracket','Bracket'],['stats','Playoff stats']].map(([id, label]) => {
      const active = pTab === id;
      return el('button', {
        onclick: () => { state.playoffs.tab = id; render(state); },
        style: {
          padding: '8px 18px', fontSize: '13px',
          fontWeight: active ? '600' : '500',
          background: active ? PLAYOFF_GOLD + '22' : 'var(--color-background-secondary)',
          color: active ? PLAYOFF_GOLD : 'var(--color-text-secondary)',
          border: active ? '0.5px solid ' + PLAYOFF_GOLD + '60' : '0.5px solid var(--color-border-tertiary)',
          borderRadius: 'var(--border-radius-md)', cursor: 'pointer', transition: 'all 0.15s'
        }
      }, label);
    })
  );

  return el('div', {}, [
    subTabBar,
    pTab === 'bracket'
      ? renderBracket(state, seeds, bracket)
      : renderPlayoffStats(state, seeds, bracket)
  ]);
}

// ============================================================
// Bracket renderer
// ============================================================
function renderBracket(state, seeds, bracket) {
  const { r1, qf, sf, fin, lbr1, byeTeams, lbr2, lbr3, lbsf, lbfin } = bracket;

  const jump = (c1, c2) => () => {
    state.h2h.c1 = c1; state.h2h.c2 = c2; state.view = 'h2h'; render(state);
  };
  const mc = (m, label, color) =>
    bracketMatchCard(m, label, m.winner ? jump(m.c1, m.c2) : null, color);

  const sp = h => el('div', { style: { height: h + 'px', flexShrink: '0' } });

  const colStyle = { display: 'flex', flexDirection: 'column', gap: '12px', flex: '1', minWidth: '190px' };
  const colHdr = (label, color) => el('div', {
    style: { fontSize: '11px', fontWeight: '700', textTransform: 'uppercase', letterSpacing: '0.8px', color: color || 'var(--color-text-tertiary)', marginBottom: '4px', textAlign: 'center' }
  }, label);
  const col = (label, cards, color) => el('div', { style: colStyle }, [colHdr(label, color), ...cards]);

  // Seeds
  const seedList = el('div', {
    style: { display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(175px, 1fr))', gap: '8px', padding: '16px 20px 20px' }
  }, seeds.map((coach, i) => {
    const seed = i + 1, hasBye = seed <= 4;
    return el('div', {
      style: { display: 'flex', alignItems: 'center', gap: '10px', padding: '8px 12px', background: 'var(--color-background-secondary)', border: hasBye ? '0.5px solid ' + PLAYOFF_GOLD + '50' : '0.5px solid var(--color-border-tertiary)', borderRadius: 'var(--border-radius-md)' }
    }, [
      el('span', { style: { fontFamily: 'var(--font-display)', fontWeight: '700', fontSize: '14px', color: hasBye ? PLAYOFF_GOLD : 'var(--color-text-tertiary)', minWidth: '24px', textAlign: 'right' } }, '#' + seed),
      coachBadge(coach),
      hasBye ? el('span', { style: { fontSize: '10px', fontWeight: '600', color: PLAYOFF_GOLD, textTransform: 'uppercase', letterSpacing: '0.4px', marginLeft: 'auto' } }, 'bye') : null
    ].filter(x => x));
  }));

  const seedSection = section('Seedings', PLAYOFF_CONFIG.teams + '-team bracket  •  Bo' + PLAYOFF_CONFIG.bestOf + ' every round', seedList, { marginBottom: '1.25rem' });

  // Winners bracket
  const wbGrid = el('div', { style: { display: 'flex', gap: '20px', overflowX: 'auto', padding: '16px 20px 24px', alignItems: 'flex-start' } }, [
    col('Round 1',     r1.map(m => mc(m, 'Round 1'))),
    col('Quarterfinals', [sp(50), mc(qf[0],'Quarterfinal'), sp(12), mc(qf[1],'Quarterfinal'), sp(12), mc(qf[2],'Quarterfinal'), sp(12), mc(qf[3],'Quarterfinal'), sp(50)]),
    col('Semifinals',    [sp(120), mc(sf[0],'Semifinal'), sp(72), mc(sf[1],'Semifinal'), sp(120)]),
    col('Final',         [sp(185), mc(fin,'Grand Final'), sp(185)]),
  ]);
  const wbSection = section('Winners Bracket', 'Champion decided here', wbGrid, { marginBottom: '1.25rem' });

  // Losers bracket
  const byeDisplay = byeTeams.length > 0
    ? el('div', { style: { padding: '0 20px 12px', display: 'flex', gap: '8px', alignItems: 'center', flexWrap: 'wrap' } }, [
        el('span', { style: { fontSize: '11px', color: PLAYOFF_BRONZE, fontWeight: '600', textTransform: 'uppercase', letterSpacing: '0.6px' } }, 'LB R3 byes:'),
        ...byeTeams.map(t => coachBadge(t.coach))
      ])
    : null;

  const lbGrid = el('div', { style: { display: 'flex', gap: '20px', overflowX: 'auto', padding: '16px 20px 24px', alignItems: 'flex-start' } }, [

// ── Supabase REST client (no SDK needed) ──────────────────
// Wraps fetch() to give a Supabase-like .from().select()... API
function getSB() {
  const headers = {
    'apikey': HUB_KEY,
    'Authorization': 'Bearer ' + HUB_KEY,
    'Content-Type': 'application/json',
    'Prefer': 'return=representation',
  };

  function buildUrl(table, params) {
    const url = new URL(HUB_URL + '/rest/v1/' + table);
    if (params) Object.entries(params).forEach(([k,v]) => url.searchParams.set(k, v));
    return url.toString();
  }

  function table(tableName) {
    let _filters = {};
    let _order = null;
    let _limit = null;
    let _single = false;
    let _select = '*';

    const q = {
      select(cols) { _select = cols || '*'; return q; },
      eq(col, val) { _filters[col] = 'eq.' + val; return q; },
      order(col, opts) { _order = col + (opts?.ascending===false ? '.desc' : '.asc'); return q; },
      limit(n) { _limit = n; return q; },
      single() { _single = true; return q; },

      async then(resolve, reject) {
        try {
          const params = { select: _select };
          Object.assign(params, _filters);
          if (_order) params.order = _order;
          if (_limit) params.limit = _limit;
          const h = { ...headers };
          if (_single) h['Accept'] = 'application/vnd.pgrst.object+json';
          const res = await fetch(buildUrl(tableName, params), { headers: h });
          const data = res.ok ? await res.json() : null;
          const error = res.ok ? null : { message: await res.text() };
          resolve(_single ? { data, error } : { data: data || [], error });
        } catch(e) { resolve({ data: null, error: { message: e.message } }); }
      },

      async insert(rows) {
        const body = Array.isArray(rows) ? rows : [rows];
        const res = await fetch(buildUrl(tableName), {
          method: 'POST', headers, body: JSON.stringify(body)
        });
        const data = res.ok ? await res.json() : null;
        return { data, error: res.ok ? null : { message: await res.text() } };
      },

      update(updates) {
        return {
          eq: async (col, val) => {
            const url = buildUrl(tableName, { [col]: 'eq.' + val });
            const res = await fetch(url, { method: 'PATCH', headers, body: JSON.stringify(updates) });
            return { error: res.ok ? null : { message: await res.text() } };
          }
        };
      },

      delete() {
        let _delFilters = {};
        const d = {
          eq(col, val) { _delFilters[col] = 'eq.' + val; return d; },
          async then(resolve) {
            const res = await fetch(buildUrl(tableName, _delFilters), { method: 'DELETE', headers });
            resolve({ error: res.ok ? null : { message: await res.text() } });
          }
        };
        return d;
      }
    };
    return q;
  }

  return { from: table };
}

async function hubLogin(username, password) {
  const sb = getSB();

  // Commissioner master password bypasses DB
  if (password === HUB_ADMIN_PASS) {
    const { data: commData } = await sb.from('coaches').select('*').eq('is_commissioner', true).single();
    hubState.user = commData || {
      username: 'commissioner', display_name: 'Commissioner',
      team_name: 'Admin', is_commissioner: true
    };
    return { ok: true };
  }

  const { data, error } = await sb.from('coaches').select('*').eq('username', username.toLowerCase()).single();
  if (error || !data) return { ok: false, msg: 'Username not found.' };
  if (data.password_hash !== password) return { ok: false, msg: 'Incorrect password.' };
  hubState.user = data;
  return { ok: true };
}

            el('div', { style:{ fontSize:'13px', fontWeight:'500', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' } }, mon.pokemon_name),
            el('div', { style:{ fontSize:'10px', color:'var(--color-text-tertiary)' } }, mon.acquired_via)
          ])
        ]);
        grid.appendChild(slot);
      } else {
        const slot = el('div', { style:{ display:'flex', alignItems:'center', gap:'8px', padding:'10px 12px', border:'0.5px dashed var(--color-border-tertiary)', borderRadius:'var(--border-radius-md)', opacity:'0.4' } }, [
          el('span', { style:{ fontFamily:'var(--font-mono)', fontSize:'10px', color:'var(--color-text-tertiary)', minWidth:'18px' } }, String(i+1)),
          el('span', { style:{ color:'var(--color-text-tertiary)', fontSize:'12px' } }, 'Empty')
        ]);
        grid.appendChild(slot);
      }
    }
    card.appendChild(grid);

    // Trade button
    if (!isMe && roster.length > 0 && (hubState.rosters[hubState.user.username]||[]).length > 0) {
      const tradeBtn = el('button', {
        onclick: () => { hubShowTradeModal(dashState, username); },
        style:{ marginTop:'12px', padding:'7px 14px', fontSize:'12px', fontWeight:'500', background:'var(--color-background-tertiary)', color:'var(--color-text-secondary)', border:'0.5px solid var(--color-border-tertiary)', borderRadius:'var(--border-radius-md)', cursor:'pointer' }
      }, '📤 Propose Trade with ' + (coach.display_name || username));
      card.appendChild(tradeBtn);
    }

    panel.appendChild(card);
  }

  coachSel.onchange = (e) => buildPanel(e.target.value);
  buildPanel(hubState.user.username);

  wrap.appendChild(coachSel);
  wrap.appendChild(panel);
  return wrap;
}

// ── Draft ─────────────────────────────────────────────────
function hubViewDraft(dashState) {
  const draft = hubState.draft;
  const wrap = el('div', {});

  if (!draft || draft.status === 'pre') {
    const msg = el('div', { style:{ background:'var(--color-background-secondary)', border:'0.5px solid var(--color-border-tertiary)', borderRadius:'var(--border-radius-lg)', padding:'40px', textAlign:'center', color:'var(--color-text-tertiary)' } }, [
      el('div', { style:{ fontSize:'32px', marginBottom:'12px' } }, '📋'),
      el('div', { style:{ fontWeight:'600', marginBottom:'6px' } }, 'Draft not started yet'),
      el('div', { style:{ fontSize:'12px' } }, 'The commissioner will kick it off when everyone is ready.')
    ]);
    wrap.appendChild(msg);
    if (hubState.user?.is_commissioner) wrap.appendChild(hubDraftAdminPanel(dashState));
    return wrap;
  }

  if (draft.status === 'complete') {
    wrap.appendChild(el('div', { style:{ fontWeight:'600', marginBottom:'16px', color:'var(--color-text-secondary)' } }, '✅ Draft complete'));
    wrap.appendChild(hubPicksTable());
    return wrap;
  }

  // Active draft
  const takenNames = new Set(hubState.picks.map(p => p.pokemon_name));
  const n = draft.num_coaches || 12;
  const order = draft.snake_order || [];
  const overallPick = draft.current_pick || 1;
  const round = Math.ceil(overallPick / n);
  const idx = overallPick - 1;
  const ri = Math.floor(idx / n);
  const pi = idx % n;
  const onClock = ri%2===0 ? order[pi] : order[n-1-pi];
  const isMyTurn = onClock === hubState.user?.username;
  const myRoster = hubState.rosters[hubState.user?.username] || [];
  const mySpent = myRoster.reduce((s,r)=>s+r.cost,0);
  const myRemaining = HUB_BUDGET - mySpent;

  // Status row
  const clockColor = COACH_COLORS[onClock] || '#f0c040';
  const statusRow = el('div', { style:{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'12px', marginBottom:'1.25rem' } }, [
    el('div', { style:{ background:'var(--color-background-secondary)', border:'0.5px solid '+clockColor+'50', borderRadius:'var(--border-radius-lg)', padding:'20px' } }, [
      el('div', { style:{ fontSize:'11px', fontWeight:'600', textTransform:'uppercase', letterSpacing:'0.7px', color:'var(--color-text-tertiary)', marginBottom:'10px' } }, 'On the Clock'),
      el('div', { style:{ fontFamily:'var(--font-display)', fontSize:'28px', color:clockColor, letterSpacing:'-0.01em', marginBottom:'6px' } }, onClock || '—'),
      el('div', { style:{ fontSize:'12px', color:'var(--color-text-tertiary)' } }, 'Round '+round+'  •  Pick '+overallPick+' of '+(n*HUB_ROSTER_SIZE)),
      isMyTurn ? el('div', { style:{ marginTop:'10px', padding:'6px 12px', background:'rgba(240,192,64,0.15)', borderRadius:'var(--border-radius-md)', fontSize:'13px', fontWeight:'600', color:'#f0c040' } }, '🎯 It\'s your turn!') : null,
      hubState.user?.is_commissioner ? el('button', {
        onclick: async () => {
          await getSB().from('draft_config').update({ current_pick: overallPick+1, updated_at:new Date().toISOString() }).eq('id', draft.id);
          await hubAudit('DRAFT_FORCE_ADVANCE', { from:overallPick, to:overallPick+1 });
          await hubLoadAll(); render(dashState);
        },
        style:{ marginTop:'10px', padding:'5px 12px', fontSize:'11px', background:'var(--color-background-tertiary)', border:'0.5px solid var(--color-border-tertiary)', borderRadius:'var(--border-radius-md)', cursor:'pointer', color:'var(--color-text-secondary)' }
      }, '⏭ Force advance') : null
    ].filter(x=>x)),
    el('div', { style:{ background:'var(--color-background-secondary)', border:'0.5px solid var(--color-border-tertiary)', borderRadius:'var(--border-radius-lg)', padding:'20px' } }, [
      el('div', { style:{ fontSize:'11px', fontWeight:'600', textTransform:'uppercase', letterSpacing:'0.7px', color:'var(--color-text-tertiary)', marginBottom:'10px' } }, 'My Budget'),
      el('div', { style:{ fontFamily:'var(--font-mono)', fontSize:'24px', fontWeight:'600', color:mySpent/HUB_BUDGET>0.9?'#f87171':mySpent/HUB_BUDGET>0.7?'#fbbf24':'#34d399' } }, mySpent + ' / ' + HUB_BUDGET),
      el('div', { style:{ height:'6px', background:'var(--color-background-tertiary)', borderRadius:'3px', overflow:'hidden', margin:'8px 0' } }, [
        el('div', { style:{ height:'100%', width:Math.min(100,mySpent/HUB_BUDGET*100)+'%', background:mySpent/HUB_BUDGET>0.9?'#f87171':mySpent/HUB_BUDGET>0.7?'#fbbf24':'#34d399', borderRadius:'3px' } })
      ]),
      el('div', { style:{ fontSize:'11px', color:'var(--color-text-tertiary)' } }, myRoster.length+'/'+HUB_ROSTER_SIZE+' Pokémon  •  '+myRemaining+' pts left'),
      el('div', { style:{ marginTop:'10px', display:'flex', flexWrap:'wrap', gap:'4px' } }, myRoster.map(r =>
        el('span', { style:{ fontSize:'11px', padding:'2px 7px', background:'var(--color-background-tertiary)', borderRadius:'999px', border:'0.5px solid var(--color-border-tertiary)' } }, r.pokemon_name)
      ))
    ])
  ]);

  // Pick queue (next 8)
  const queueRow = el('div', { style:{ display:'flex', gap:'6px', overflowX:'auto', paddingBottom:'4px', marginBottom:'1.25rem' } });
  for (let i=idx; i<Math.min(idx+8, n*HUB_ROSTER_SIZE); i++) {
    const r2 = Math.floor(i/n), p2 = i%n;
    const coach = r2%2===0 ? order[p2] : order[n-1-p2];
    const isCurrent = i===idx;
    const c = COACH_COLORS[coach] || '#888';
    const chip = el('div', {
      style:{
        flexShrink:'0', padding:'5px 12px', borderRadius:'999px', fontSize:'11px', fontWeight:'600',
        background: isCurrent ? '#f0c040' : 'var(--color-background-secondary)',
        color: isCurrent ? '#000' : c,
        border: isCurrent ? 'none' : '0.5px solid var(--color-border-tertiary)'
      }
    }, [el('div', { style:{ fontSize:'9px', opacity:'0.6' } }, '#'+(i+1)), el('div', {}, coach)]);
    queueRow.appendChild(chip);
  }

  // Filter
  const filterInput = el('input', {
    placeholder:'🔍 Filter Pokémon…',
    style:{ padding:'8px 12px', background:'var(--color-background-secondary)', border:'0.5px solid var(--color-border-secondary)', borderRadius:'var(--border-radius-md)', color:'var(--color-text-primary)', fontFamily:'var(--font-body)', fontSize:'13px', marginBottom:'12px', width:'280px', outline:'none' }
  });

  // Pool grid
  const poolGrid = el('div', { style:{ display:'grid', gridTemplateColumns:'repeat(auto-fill,minmax(180px,1fr))', gap:'8px' } });

  function buildPoolGrid(filter='') {
    poolGrid.innerHTML = '';
    hubState.pool.filter(m=>m.is_available).forEach(mon => {
      if (filter && !mon.name.toLowerCase().includes(filter.toLowerCase())) return;
      const taken = takenNames.has(mon.name);
      const canAfford = myRemaining >= mon.cost;
      const canPick = isMyTurn && !taken && canAfford && myRoster.length < HUB_ROSTER_SIZE;

      const monEl = el('div', {
        style:{
          display:'flex', alignItems:'center', gap:'8px', padding:'9px 11px',
          background: taken?'var(--color-background-tertiary)':'var(--color-background-secondary)',
          border:'0.5px solid var(--color-border-tertiary)',
          borderRadius:'var(--border-radius-md)',
          opacity: (taken || (!isMyTurn && !taken) || !canAfford) && !taken ? (canPick?'1':'0.45') : taken?'0.3':'1',
          cursor: canPick?'pointer':'default',
          transition:'all 0.1s'
        }
      }, [
        hubCostPill(mon.cost),
        el('div', { style:{ flex:'1', minWidth:'0' } }, [
          el('div', { style:{ fontSize:'12px', fontWeight:'500', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' } }, mon.name),
          taken ? el('div', { style:{ fontSize:'10px', color:'var(--color-text-tertiary)' } }, 'taken') : null
        ].filter(x=>x))
      ]);

      if (canPick) {
        monEl.onmouseover = () => { monEl.style.borderColor='#f0c040'; monEl.style.background='rgba(240,192,64,0.08)'; };
        monEl.onmouseout  = () => { monEl.style.borderColor='var(--color-border-tertiary)'; monEl.style.background='var(--color-background-secondary)'; };
        monEl.onclick = async () => {
          if (!confirm('Draft '+mon.name+' ('+mon.cost+' pts)?')) return;
          const nextPick = overallPick + 1;
          const isDone = nextPick > n * HUB_ROSTER_SIZE;
          await getSB().from('draft_picks').insert({ season:HUB_SEASON, pick_number:overallPick, round, pick_in_round:pi+1, coach_username:hubState.user.username, pokemon_name:mon.name, cost:mon.cost });
          await getSB().from('rosters').insert({ season:HUB_SEASON, coach_username:hubState.user.username, pokemon_name:mon.name, cost:mon.cost, acquired_via:'draft' });
          await getSB().from('draft_config').update({ current_pick:nextPick, status:isDone?'complete':'active', updated_at:new Date().toISOString() }).eq('id', draft.id);
          await hubAudit('DRAFT_PICK', { pick:overallPick, pokemon:mon.name, cost:mon.cost });
          hubToast('✅ Drafted '+mon.name+'!', 'success');
          await hubLoadAll(); render(dashState);
        };
      }
      poolGrid.appendChild(monEl);
    });
  }

  filterInput.oninput = (e) => buildPoolGrid(e.target.value);
  buildPoolGrid();

  wrap.appendChild(statusRow);
  wrap.appendChild(queueRow);
  wrap.appendChild(filterInput);
  wrap.appendChild(poolGrid);
  return wrap;
}

function hubPicksTable() {
  const wrap = el('div', { style:{ background:'var(--color-background-secondary)', border:'0.5px solid var(--color-border-tertiary)', borderRadius:'var(--border-radius-lg)', overflow:'hidden' } });
  const table = el('table', { style:{ width:'100%', borderCollapse:'collapse' } });
  const thead = el('thead', {});
  const hr = el('tr', { style:{ background:'var(--color-background-tertiary)' } });
  ['#','Round','Coach','Pokémon','Cost'].forEach(h => {
    const th = el('th', { style:{ padding:'10px 12px', fontSize:'11px', fontWeight:'600', textTransform:'uppercase', letterSpacing:'0.6px', color:'var(--color-text-tertiary)', textAlign:'left', borderBottom:'0.5px solid var(--color-border-tertiary)' } }, h);
    hr.appendChild(th);
  });
  thead.appendChild(hr); table.appendChild(thead);
  const tbody = el('tbody', {});
  hubState.picks.forEach(p => {
    const color = COACH_COLORS[p.coach_username] || '#888';
    const tr = el('tr', { style:{ borderBottom:'0.5px solid var(--color-border-tertiary)' } });
    [String(p.pick_number), String(p.round), p.coach_username, p.pokemon_name].forEach((v,i) => {
      const td = el('td', { style:{ padding:'10px 12px', fontSize:'13px' } });
      if (i===2) { const dot=el('span',{style:{display:'inline-block',width:'8px',height:'8px',borderRadius:'50%',background:color,marginRight:'6px'}}); td.appendChild(dot); td.appendChild(document.createTextNode(v)); }
      else td.textContent=v;
      tr.appendChild(td);
    });
    const tdCost = el('td', { style:{ padding:'10px 12px' } }); tdCost.appendChild(hubCostPill(p.cost)); tr.appendChild(tdCost);
    tbody.appendChild(tr);
  });
  table.appendChild(tbody); wrap.appendChild(table);
  return wrap;
}

function hubDraftAdminPanel(dashState) {
  const draft = hubState.draft;
  const coaches = hubState.coaches;
  const currentOrder = draft?.snake_order?.length ? draft.snake_order : coaches.map(c=>c.username);

  const orderInput = el('input', {
    value: currentOrder.join(', '),
    placeholder: 'zion, abbey, evan, … (12 comma-separated usernames)',
    style:{ width:'100%', padding:'9px 12px', background:'var(--color-background-tertiary)', border:'0.5px solid var(--color-border-secondary)', borderRadius:'var(--border-radius-md)', color:'var(--color-text-primary)', fontFamily:'var(--font-body)', fontSize:'13px', outline:'none', marginBottom:'10px' }
  });

  const panel = el('div', { style:{ background:'var(--color-background-secondary)', border:'0.5px solid var(--color-border-tertiary)', borderRadius:'var(--border-radius-lg)', padding:'20px', marginTop:'16px' } }, [
    el('div', { style:{ fontFamily:'var(--font-display)', fontSize:'18px', letterSpacing:'0.03em', color:'var(--color-text-primary)', marginBottom:'16px' } }, '⚙ Draft Controls'),
    el('div', { style:{ fontSize:'11px', fontWeight:'600', textTransform:'uppercase', letterSpacing:'0.6px', color:'var(--color-text-tertiary)', marginBottom:'6px' } }, 'Draft order (comma-separated)'),
    orderInput,
    el('div', { style:{ display:'flex', gap:'8px', flexWrap:'wrap' } }, [
      el('button', {
        onclick: async () => {
          const order = orderInput.value.split(',').map(s=>s.trim().toLowerCase()).filter(s=>s);
          if (order.length!==12) { hubToast('Need exactly 12 coaches.','error'); return; }
          await getSB().from('draft_config').update({ snake_order:order, updated_at:new Date().toISOString() }).eq('season', HUB_SEASON);
          hubToast('Order saved.','success');
          await hubLoadAll(); render(dashState);
        },
        style:{ padding:'8px 16px', background:'var(--color-background-tertiary)', border:'0.5px solid var(--color-border-secondary)', borderRadius:'var(--border-radius-md)', cursor:'pointer', fontSize:'13px', fontWeight:'500', color:'var(--color-text-primary)' }
      }, 'Save Order'),
      el('button', {
        onclick: async () => {
          if (!confirm('Start the draft now?')) return;
          await getSB().from('draft_config').update({ status:'active', current_pick:1, updated_at:new Date().toISOString() }).eq('season', HUB_SEASON);
          await hubAudit('DRAFT_STARTED', { season:HUB_SEASON });
          hubToast('🚀 Draft started!','success');
          await hubLoadAll(); render(dashState);
        },
        style:{ padding:'8px 16px', background:'#f0c040', border:'none', borderRadius:'var(--border-radius-md)', cursor:'pointer', fontSize:'13px', fontWeight:'700', color:'#000' }
      }, '🚀 Start Draft'),
      el('button', {
        onclick: async () => {
          if (!confirm('Reset ALL picks? Cannot be undone.')) return;
          const sb = getSB();
          await sb.from('draft_picks').delete().eq('season', HUB_SEASON);
          await sb.from('rosters').delete().eq('season', HUB_SEASON).eq('acquired_via','draft');
          await sb.from('draft_config').update({ status:'pre', current_pick:1, updated_at:new Date().toISOString() }).eq('season', HUB_SEASON);
          await hubAudit('DRAFT_RESET', { season:HUB_SEASON });
          hubToast('Draft reset.','info');
          await hubLoadAll(); render(dashState);
        },
        style:{ padding:'8px 16px', background:'var(--color-background-tertiary)', border:'0.5px solid #f87171', borderRadius:'var(--border-radius-md)', cursor:'pointer', fontSize:'13px', fontWeight:'500', color:'#f87171' }
      }, '↺ Reset Draft')
    ])
  ]);
  return panel;
}

// ── Trades ────────────────────────────────────────────────
function hubViewTrades(dashState) {
  const wrap = el('div', {});

  const proposeBtn = el('button', {
    onclick: () => hubShowTradeModal(dashState, null),
    style:{ padding:'8px 16px', background:'#f0c040', border:'none', borderRadius:'var(--border-radius-md)', cursor:'pointer', fontSize:'13px', fontWeight:'700', color:'#000', marginBottom:'1.25rem' }
  }, '📤 Propose Trade');

  wrap.appendChild(el('div', { style:{ display:'flex', justifyContent:'flex-end', marginBottom:'1.25rem' } }, proposeBtn));

  // Pending for me
  const pendingForMe = hubState.trades.filter(t => t.receiver===hubState.user.username && t.status==='pending');
  if (pendingForMe.length) {
    const sect = el('div', { style:{ background:'var(--color-background-secondary)', border:'0.5px solid #fbbf24', borderRadius:'var(--border-radius-lg)', padding:'20px', marginBottom:'1rem' } }, [
      el('div', { style:{ fontFamily:'var(--font-display)', fontSize:'18px', letterSpacing:'0.03em', color:'var(--color-text-primary)', marginBottom:'12px' } }, '📬 Awaiting Your Response')
    ]);
    pendingForMe.forEach(t => sect.appendChild(hubTradeCard(t, dashState)));
    wrap.appendChild(sect);
  }

  // Commissioner approval queue
  if (hubState.user?.is_commissioner) {
    const pendingApproval = hubState.trades.filter(t => t.status==='accepted');
    if (pendingApproval.length) {
      const sect = el('div', { style:{ background:'var(--color-background-secondary)', border:'0.5px solid #f0c040', borderRadius:'var(--border-radius-lg)', padding:'20px', marginBottom:'1rem' } }, [
        el('div', { style:{ fontFamily:'var(--font-display)', fontSize:'18px', letterSpacing:'0.03em', color:'var(--color-text-primary)', marginBottom:'12px' } }, '👑 Awaiting Approval')
      ]);
      pendingApproval.forEach(t => sect.appendChild(hubTradeCard(t, dashState)));
      wrap.appendChild(sect);
    }
  }

  // All trades table
  const allSection = el('div', { style:{ background:'var(--color-background-secondary)', border:'0.5px solid var(--color-border-tertiary)', borderRadius:'var(--border-radius-lg)', padding:'20px' } }, [
    el('div', { style:{ fontFamily:'var(--font-display)', fontSize:'18px', letterSpacing:'0.03em', color:'var(--color-text-primary)', marginBottom:'12px' } }, 'All Trades')
  ]);

  if (!hubState.trades.length) {
    allSection.appendChild(el('div', { style:{ textAlign:'center', padding:'32px', color:'var(--color-text-tertiary)' } }, 'No trades yet'));
  } else {
    hubState.trades.forEach(t => allSection.appendChild(hubTradeCard(t, dashState)));
  }
  wrap.appendChild(allSection);
  return wrap;
}

    el('div', { style:{ marginBottom:'16px' } }, receiverSel),
    el('div', { style:{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'16px', marginBottom:'16px' } }, [

      el('div', {}, [el('div', { style:{ fontSize:'11px', fontWeight:'600', textTransform:'uppercase', letterSpacing:'0.6px', color:'var(--color-text-tertiary)', marginBottom:'8px' } }, 'You receive'), requestList]),

                if (w.pokemon_to_drop) await getSB().from('rosters').delete().eq('season',HUB_SEASON).eq('coach_username',w.coach_username).eq('pokemon_name',w.pokemon_to_drop);
                await getSB().from('waiver_claims').update({ status:'approved', resolved_at:new Date().toISOString() }).eq('id',w.id);

    histSect.appendChild(el('div', { style:{ textAlign:'center', padding:'32px', color:'var(--color-text-tertiary)' } }, 'No waiver claims yet'));
  } else {

  wrap.appendChild(histSect);
  return wrap;

// ── Pool ──────────────────────────────────────────────────
function hubViewPool(dashState) {
  const takenNames = new Set(Object.values(hubState.rosters).flat().map(r=>r.pokemon_name));
  const wrap = el('div', {});

  const topRow = el('div', { style:{ display:'flex', gap:'12px', alignItems:'center', marginBottom:'1.25rem', flexWrap:'wrap' } });
  const filterInput = el('input', { placeholder:'🔍 Search…', style:{ padding:'8px 12px', background:'var(--color-background-secondary)', border:'0.5px solid var(--color-border-secondary)', borderRadius:'var(--border-radius-md)', color:'var(--color-text-primary)', fontFamily:'var(--font-body)', fontSize:'13px', outline:'none', flex:'1', minWidth:'160px' } });
  topRow.appendChild(filterInput);

  if (hubState.user?.is_commissioner) {
    const addForm = el('div', { style:{ display:'flex', gap:'8px', alignItems:'center', flexWrap:'wrap' } }, [
      el('input', { id:'hub-new-mon', placeholder:'Pokémon name', style:{ padding:'8px 12px', background:'var(--color-background-secondary)', border:'0.5px solid var(--color-border-secondary)', borderRadius:'var(--border-radius-md)', color:'var(--color-text-primary)', fontFamily:'var(--font-body)', fontSize:'13px', outline:'none', width:'180px' } }),
      el('input', { id:'hub-new-cost', type:'number', min:'0', max:'20', placeholder:'Cost', style:{ padding:'8px 12px', background:'var(--color-background-secondary)', border:'0.5px solid var(--color-border-secondary)', borderRadius:'var(--border-radius-md)', color:'var(--color-text-primary)', fontFamily:'var(--font-body)', fontSize:'13px', outline:'none', width:'80px' } }),
      el('button', {
        onclick: async () => {
          const name = document.getElementById('hub-new-mon').value.trim();
          const cost = parseInt(document.getElementById('hub-new-cost').value);
          if (!name||isNaN(cost)) { hubToast('Enter name and cost.','error'); return; }
          const { error } = await getSB().from('pokemon_pool').insert({ name, cost });
          if (error) { hubToast('Error: '+error.message,'error'); return; }
          await hubAudit('POOL_ADD', { name, cost });
          hubToast(name+' added.','success');
          await hubLoadAll(); render(dashState);
        },
        style:{ padding:'8px 14px', background:'#f0c040', border:'none', borderRadius:'var(--border-radius-md)', cursor:'pointer', fontSize:'13px', fontWeight:'700', color:'#000' }
      }, '+ Add')
    ]);
    topRow.appendChild(addForm);
  }
  wrap.appendChild(topRow);

  const grid = el('div', { style:{ display:'grid', gridTemplateColumns:'repeat(auto-fill,minmax(200px,1fr))', gap:'8px' } });

  function buildGrid(filter='') {
    grid.innerHTML='';
    hubState.pool.filter(m=>!filter||m.name.toLowerCase().includes(filter.toLowerCase())).forEach(mon => {
      const taken = takenNames.has(mon.name);
      const owner = taken ? Object.entries(hubState.rosters).find(([u,mons])=>mons.some(r=>r.pokemon_name===mon.name)) : null;
      const ownerColor = owner ? COACH_COLORS[owner[0]]||'#888' : null;

      const item = el('div', {
        style:{
          display:'flex', alignItems:'center', gap:'8px', padding:'10px 12px',
          background: taken?'var(--color-background-tertiary)':'var(--color-background-secondary)',
          border:'0.5px solid var(--color-border-tertiary)',
          borderRadius:'var(--border-radius-md)',
          opacity: !mon.is_available ? '0.4' : '1'
        }
      }, [
        hubCostPill(mon.cost),
        el('div', { style:{ flex:'1', minWidth:'0' } }, [
          el('div', { style:{ fontSize:'13px', fontWeight:'500', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' } }, mon.name),
          taken ? el('div', { style:{ fontSize:'10px', color:ownerColor } }, '→ '+owner[0]) :
          !mon.is_available ? el('div', { style:{ fontSize:'10px', color:'var(--color-text-tertiary)' } }, 'hidden') :
          el('div', { style:{ fontSize:'10px', color:'#34d399' } }, 'available')
        ]),
        hubState.user?.is_commissioner ? el('button', {
          onclick: async () => {
            const newCost = prompt('Edit cost for '+mon.name+' (current '+mon.cost+'):', mon.cost);
            if (newCost===null) return;
            await getSB().from('pokemon_pool').update({ cost:parseInt(newCost)||mon.cost, is_available:!mon.is_available===confirm('Toggle visibility for '+mon.name+'?') ? !mon.is_available : mon.is_available }).eq('id',mon.id);
            await hubAudit('POOL_EDIT', { name:mon.name, newCost });
            hubToast('Updated.','success');
            await hubLoadAll(); render(dashState);
          },
          style:{ padding:'2px 7px', background:'var(--color-background-tertiary)', border:'0.5px solid var(--color-border-tertiary)', borderRadius:'var(--border-radius-sm)', cursor:'pointer', fontSize:'11px', color:'var(--color-text-tertiary)', flexShrink:'0' }
        }, '✏') : null
      ].filter(x=>x));
      grid.appendChild(item);
    });
  }

  filterInput.oninput = (e) => buildGrid(e.target.value);
  buildGrid();
  wrap.appendChild(grid);
  return wrap;
}

  // Set password

  updateRmMons(hubState.coaches[0]?.username);
  rmCoachSel.onchange = (e) => updateRmMons(e.target.value);

  const rmCard = el('div', { style:{ background:'var(--color-background-secondary)', border:'0.5px solid var(--color-border-tertiary)', borderRadius:'var(--border-radius-lg)', padding:'20px' } }, [
    el('div', { style:{ fontFamily:'var(--font-display)', fontSize:'18px', letterSpacing:'0.03em', marginBottom:'14px' } }, 'Roster Edit'),
    el('div', { style:{ display:'flex', gap:'8px', marginBottom:'10px', flexWrap:'wrap' } }, [rmCoachSel, rmMonSel]),
    el('button', {
      onclick: async () => {
        const u=rmCoachSel.value; const m=rmMonSel.value;
        if (!m||!confirm('Remove '+m+' from '+u+'?')) return;
        await getSB().from('rosters').delete().eq('season',HUB_SEASON).eq('coach_username',u).eq('pokemon_name',m);
        await hubAudit('ADMIN_ROSTER_REMOVE', { coach:u, mon:m });
        hubToast('Removed.','info');
        await hubLoadAll(); render(dashState);
      },
      style:{ padding:'8px 16px', background:'rgba(248,113,113,0.2)', border:'0.5px solid #f87171', borderRadius:'var(--border-radius-md)', cursor:'pointer', fontSize:'13px', fontWeight:'600', color:'#f87171' }
    }, 'Remove from Roster')
  ]);

  grid.appendChild(pwCard);
  grid.appendChild(rmCard);
  wrap.appendChild(grid);
  return wrap;
}

function hubViewLog(dashState) {
  const wrap = el('div', {});
  const loading = el('div', { style:{ padding:'32px', textAlign:'center', color:'var(--color-text-tertiary)' } }, 'Loading audit log…');
  wrap.appendChild(loading);

  getSB().from('audit_log').select('*').order('created_at', { ascending:false }).limit(100).then(({ data }) => {

  const table = el('table', { style:{ width:'100%', borderCollapse:'collapse' } });
  const thead = el('thead', {});
  const hr = el('tr', { style:{ background:'var(--color-background-secondary)' } });
  ['Action','By','Details','Time'].forEach(h => {
    const th = el('th', { style:{ padding:'10px 12px', fontSize:'11px', fontWeight:'600', textTransform:'uppercase', letterSpacing:'0.6px', color:'var(--color-text-tertiary)', textAlign:'left', borderBottom:'0.5px solid var(--color-border-tertiary)' } }, h);
    hr.appendChild(th);
  });
  thead.appendChild(hr); table.appendChild(thead);

  const tbody = el('tbody', {});
  (data||[]).forEach(row => {
    const tr = el('tr', { style:{ borderBottom:'0.5px solid var(--color-border-tertiary)' } });
    const tdAction = el('td', { style:{ padding:'10px 12px' } });
    tdAction.appendChild(el('code', { style:{ fontFamily:'var(--font-mono)', fontSize:'11px', color:'#f0c040', background:'rgba(240,192,64,0.1)', padding:'2px 6px', borderRadius:'4px' } }, row.action));
    const tdBy  = el('td', { style:{ padding:'10px 12px', fontSize:'13px', fontWeight:'500' } }, row.actor||'—');
    const tdDet = el('td', { style:{ padding:'10px 12px', fontSize:'11px', color:'var(--color-text-tertiary)', fontFamily:'var(--font-mono)' } }, JSON.stringify(row.details).slice(0,60));
    const tdTime= el('td', { style:{ padding:'10px 12px', fontSize:'11px', color:'var(--color-text-tertiary)', whiteSpace:'nowrap' } }, new Date(row.created_at).toLocaleString());
    [tdAction,tdBy,tdDet,tdTime].forEach(td=>tr.appendChild(td));
    tbody.appendChild(tr);
  });
  table.appendChild(tbody);

  const card = el('div', { style:{ background:'var(--color-background-secondary)', border:'0.5px solid var(--color-border-tertiary)', borderRadius:'var(--border-radius-lg)', overflow:'hidden' } });
    card.appendChild(table);
    loading.replaceWith(card);
  });

  return wrap;
}

function activeGameLog(state) {
  const gl = state.data.gameLog;
  if (state.statsPhase === 'regular') return gl.filter(r => r.wk <= 11);
  if (state.statsPhase === 'playoff') return gl.filter(r => r.wk > 11);
  return gl;
}

// ── Search ─────────────────────────────────────────────────────────────────
function buildSearchIndex(data) {
  const results = [];
  // Coaches
  COACHES.forEach(coach => {
    results.push({ type: 'coach', label: coach, sub: 'Coach panel', action: (state) => { state.cp.coach = coach; state.view = 'coach'; } });
  });
  // Mons
  const mons = monStats(data.gameLog);
  Object.values(mons).forEach(m => {
    results.push({ type: 'mon', label: m.mon, sub: m.coach + ' • MVP ' + m.mvp, action: (state) => { state.mdd.coach = m.coach; state.mdd.mon = m.mon; state.view = 'mon'; } });
  });
  return results;
}

function renderSearch(state) {
  if (!state.searchOpen) return null;
  const index = buildSearchIndex(state.data);

  const backdrop = el('div', {
    onclick: () => { state.searchOpen = false; state.searchQuery = ''; render(state); },
    style: { position: 'fixed', inset: '0', background: 'rgba(0,0,0,0.5)', zIndex: '999' }
  });

  const resultsDiv = el('div', { style: { maxHeight: '400px', overflowY: 'auto' } });

  function updateResults(q) {
    resultsDiv.innerHTML = '';
    const filtered = q ? index.filter(r => r.label.toLowerCase().includes(q.toLowerCase()) || r.sub.toLowerCase().includes(q.toLowerCase())).slice(0, 10) : index.slice(0, 8);
    if (filtered.length === 0) {
      const empty = el('div', { style: { padding: '24px 20px', textAlign: 'center', color: 'var(--color-text-tertiary)', fontSize: '14px' } }, q ? 'No results for "' + q + '"' : 'Start typing...');
      resultsDiv.appendChild(empty);
      return;
    }
    filtered.forEach(r => {
      const iconEl = r.type === 'coach'
        ? el('div', { style: { width: '32px', height: '32px', borderRadius: '50%', background: (COACH_COLORS[r.label]||'#888'), display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#fff', fontSize: '13px', fontWeight: '700', flexShrink: '0' } }, r.label.charAt(0))
        : el('div', { style: { flexShrink: '0' } }, monSprite(r.label, 32));
      const item = el('div', {
        onclick: () => { r.action(state); state.searchOpen = false; state.searchQuery = ''; render(state); },
        style: { display: 'flex', alignItems: 'center', gap: '12px', padding: '12px 20px', cursor: 'pointer', transition: 'background 0.1s' }
      }, [
        iconEl,
        el('div', {}, [
          el('div', { style: { fontWeight: '600', fontSize: '14px' } }, r.label),
          el('div', { style: { fontSize: '12px', color: 'var(--color-text-tertiary)', marginTop: '2px' } }, r.sub)
        ])
      ]);
      item.onmouseover = () => { item.style.background = 'var(--color-background-secondary)'; };
      item.onmouseout  = () => { item.style.background = ''; };
      resultsDiv.appendChild(item);
    });
  }

  // Create input WITHOUT value attribute — never re-render on keystroke
  const searchInput = document.createElement('input');
  searchInput.type = 'text';
  searchInput.placeholder = 'Search coaches or Pokémon...';
  searchInput.style.cssText = 'width:100%;padding:16px 20px;font-size:16px;background:transparent;border:none;outline:none;color:var(--color-text-primary);font-family:var(--font-sans);box-sizing:border-box;';
  searchInput.oninput = (e) => { state.searchQuery = e.target.value; updateResults(e.target.value); };

  updateResults(state.searchQuery || '');

  const modal = el('div', {
    style: {
      position: 'fixed', top: '80px', left: '50%', transform: 'translateX(-50%)',
      width: 'min(600px, 90vw)',
      background: 'var(--color-background-primary)',
      border: '0.5px solid var(--color-border-secondary)',
      borderRadius: 'var(--border-radius-lg)',
      boxShadow: '0 20px 60px rgba(0,0,0,0.4)',
      zIndex: '1000', overflow: 'hidden'
    }
  }, [
    el('div', { style: { borderBottom: '0.5px solid var(--color-border-tertiary)', display: 'flex', alignItems: 'center', paddingLeft: '20px', gap: '12px' } }, [
      el('span', { style: { fontSize: '18px', color: 'var(--color-text-tertiary)' } }, '🔍'),
    ]),
    resultsDiv
  ]);

  // Inject the raw input into the header div
  modal.firstChild.appendChild(searchInput);
  setTimeout(() => { searchInput.focus(); if (state.searchQuery) searchInput.value = state.searchQuery; }, 30);

  return el('div', {}, [backdrop, modal]);
}

function phaseToggle(state) {
  const options = [
    { id:'regular', label:'Regular' },
    { id:'playoff', label:'Playoffs' },
    { id:'combined', label:'Combined' },
  ];
  return el('div', {
    style: {
      display: 'flex', background: 'var(--color-background-secondary)',
      border: '0.5px solid var(--color-border-tertiary)',
      borderRadius: 'var(--border-radius-md)', padding: '3px', gap: '2px'
    }
  }, options.map(o => {
    const active = state.statsPhase === o.id;
    return el('button', {
      onclick: () => { state.statsPhase = o.id; render(state); },
      style: {
        padding: '5px 10px', fontSize: '11px', fontWeight: active ? '600' : '500',
        background: active ? 'var(--color-background-primary)' : 'transparent',
        color: active ? 'var(--color-text-primary)' : 'var(--color-text-tertiary)',
        border: active ? '0.5px solid var(--color-border-tertiary)' : 'none',
        borderRadius: '6px', cursor: 'pointer', transition: 'all 0.15s', whiteSpace: 'nowrap'
      }
    }, o.label);
  }));
}

function render(state) {
  applyTheme(state.darkMode);
  const root = document.getElementById('gforce-app');
  root.innerHTML = '';
  if (!state.data) {
    root.appendChild(el('div', { style: { padding: '2rem', textAlign: 'center', color: 'var(--color-text-secondary)' } }, 'Loading...'));
    return;
  }

  // Search overlay
  const searchOverlay = renderSearch(state);
  if (searchOverlay) root.appendChild(searchOverlay);

  if (state.view === 'playoffs') {
    renderPlayoffsMode(state, root);
    return;
  }
  if (state.view === 'hub-login') {
    renderRegularSeasonMode(state, root);  // stats still visible
    try { renderHubLoginModal(state, root); } catch(e) { console.error('Hub login modal error:', e); }
    return;
  }
  if (state.view === 'hub') {
    try { renderHubMode(state, root); } catch(e) {
      console.error('Hub render error:', e);
      root.appendChild(document.createTextNode('Hub error: ' + e.message));
    }
    return;
  }
  renderRegularSeasonMode(state, root);
}

function renderPlayoffsMode(state, root) {
  const backBtn = el('button', {
    onclick: () => { state.view = 'standings'; render(state); },
    style: {
      display: 'inline-flex', alignItems: 'center', gap: '8px',
      padding: '8px 16px', marginBottom: '1.5rem', fontSize: '13px', fontWeight: '500',
      background: 'transparent', color: 'var(--color-text-secondary)',
      border: '0.5px solid var(--color-border-tertiary)',
      borderRadius: 'var(--border-radius-md)', cursor: 'pointer'
    }
  }, '← Regular Season');

  const header = el('div', { style: { marginBottom: '2rem' } }, [

    el('div', { style: { display: 'flex', alignItems: 'baseline', gap: '16px', marginBottom: '6px' } }, [
      el('h1', {
        style: { fontFamily: 'var(--font-display)', fontSize: '36px', fontWeight: '700', margin: '0', letterSpacing: '-0.03em', background: 'linear-gradient(135deg, ' + PLAYOFF_GOLD + ' 0%, #fff8dc 100%)', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent', backgroundClip: 'text' }
      }, '🏆 Playoffs'),
      el('span', { style: { fontSize: '14px', fontWeight: '500', color: PLAYOFF_GOLD, opacity: '0.8' } }, '2026 Season')
    ]),
    el('div', { style: { fontSize: '12px', color: 'var(--color-text-tertiary)', textTransform: 'uppercase', letterSpacing: '0.8px', fontWeight: '600' } },

  ]);

  root.appendChild(viewPlayoffs(state));
}

function renderRegularSeasonMode(state, root) {
  const totalGames = new Set(state.data.gameLog.filter(r => r.wk <= 11).map(r => r.gid)).size;
  const hasPlayoffGames = state.data.gameLog.some(r => r.wk > 11);
  const statsViews = ['standings','leaderboard','coach','mon','h2h','query','turnlog'];
  const showToggle = statsViews.includes(state.view) && hasPlayoffGames;

  const lastUpdatedBadge = el('div', {
    style: { display: 'inline-flex', alignItems: 'center', gap: '6px', fontSize: '11px', color: 'var(--color-text-tertiary)', background: 'var(--color-background-secondary)', border: '0.5px solid var(--color-border-tertiary)', borderRadius: 'var(--border-radius-md)', padding: '4px 10px', fontWeight: '500' }
  }, [
    el('span', { style: { width: '6px', height: '6px', borderRadius: '50%', background: 'var(--color-text-success)', flexShrink: '0' } }),
    'Updated ' + state.lastUpdated
  ]);

  // Search button
  const searchBtn = el('button', {
    onclick: () => { state.searchOpen = true; render(state); },
    style: {
      display: 'inline-flex', alignItems: 'center', gap: '7px',
      padding: '6px 14px', fontSize: '12px', fontWeight: '500',
      background: 'var(--color-background-secondary)',
      color: 'var(--color-text-tertiary)',
      border: '0.5px solid var(--color-border-tertiary)',
      borderRadius: 'var(--border-radius-md)', cursor: 'pointer', transition: 'all 0.15s'
    }
  }, ['🔍', el('span', {}, 'Search')]);
  searchBtn.onmouseover = () => { searchBtn.style.color = 'var(--color-text-primary)'; searchBtn.style.borderColor = 'var(--color-border-secondary)'; };
  searchBtn.onmouseout  = () => { searchBtn.style.color = 'var(--color-text-tertiary)'; searchBtn.style.borderColor = 'var(--color-border-tertiary)'; };

  // Dark/light toggle
  const themeBtn = el('button', {
    onclick: () => { state.darkMode = !state.darkMode; render(state); },
    style: {
      display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
      width: '34px', height: '34px',
      background: 'var(--color-background-secondary)',
      border: '0.5px solid var(--color-border-tertiary)',
      borderRadius: 'var(--border-radius-md)', cursor: 'pointer',
      fontSize: '16px', transition: 'all 0.15s'
    }
  }, state.darkMode ? '☀️' : '🌙');

  const playoffsBtn = el('button', {
    onclick: () => { state.view = 'playoffs'; render(state); },
    style: {
      display: 'inline-flex', alignItems: 'center', gap: '8px', padding: '7px 16px',
      fontSize: '13px', fontWeight: '600', background: PLAYOFF_GOLD + '18', color: PLAYOFF_GOLD,
      border: '0.5px solid ' + PLAYOFF_GOLD + '60', borderRadius: 'var(--border-radius-md)',
      cursor: 'pointer', transition: 'all 0.15s'
    }
  }, '🏆 Playoffs');
  playoffsBtn.onmouseover = () => { playoffsBtn.style.background = PLAYOFF_GOLD + '30'; };
  playoffsBtn.onmouseout  = () => { playoffsBtn.style.background = PLAYOFF_GOLD + '18'; };

  const header = el('div', { style: { marginBottom: '2rem' } }, [
    el('div', {
      style: { display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: '16px', flexWrap: 'wrap' }
    }, [
      el('div', {}, [
        el('h1', {
          style: { fontFamily: 'var(--font-display)', fontSize: '32px', fontWeight: '700', margin: '0', letterSpacing: '-0.03em', background: 'linear-gradient(135deg, #e8eaed 0%, #a8b0bd 100%)', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent', backgroundClip: 'text' }
        }, 'G-Force Draft League'),
        el('div', { style: { display: 'flex', alignItems: 'center', gap: '10px', marginTop: '6px', flexWrap: 'wrap' } }, [
          el('div', { style: { fontSize: '12px', color: 'var(--color-text-tertiary)', textTransform: 'uppercase', letterSpacing: '0.8px', fontWeight: '600' } }, '2026 Season  •  ' + totalGames + ' games'),
          lastUpdatedBadge,
          showToggle ? phaseToggle(state) : null,
          playoffsBtn
        ].filter(x => x))
      ]),
      el('div', { style: { display: 'flex', gap: '8px', alignItems: 'center' } }, [
        hubState.user ? el('button', {
          onclick: () => { hubState.view='rosters'; state.view='hub'; render(state); },
          style: { display:'inline-flex', alignItems:'center', gap:'6px', padding:'7px 14px', fontSize:'12px', fontWeight:'700', background:'rgba(240,192,64,0.15)', color:'#f0c040', border:'0.5px solid rgba(240,192,64,0.4)', borderRadius:'var(--border-radius-md)', cursor:'pointer', transition:'all 0.15s' }
        }, '⚡ League Hub') :
        el('button', {
          onclick: () => { state.view='hub-login'; render(state); },
          style: { display:'inline-flex', alignItems:'center', gap:'6px', padding:'7px 14px', fontSize:'12px', fontWeight:'600', background:'var(--color-background-secondary)', color:'var(--color-text-secondary)', border:'0.5px solid var(--color-border-tertiary)', borderRadius:'var(--border-radius-md)', cursor:'pointer', transition:'all 0.15s' }
        }, '⚡ League Hub'),
        searchBtn, themeBtn
      ])
    ])
  ]);

  const tabs = [
    { id:'standings', label:'Standings' }, { id:'schedule', label:'Schedule' },
    { id:'leaderboard', label:'Leaderboard' }, { id:'coach', label:'Coach panels' },
    { id:'mon', label:'Pokémon deep dive' }, { id:'h2h', label:'Head-to-head' },
    { id:'query', label:'Stat pivot' }, { id:'turnlog', label:'Event book' }
  ];

  const tabBar = el('div', {
    style: { display: 'flex', gap: '4px', flexWrap: 'wrap', borderBottom: '0.5px solid var(--color-border-tertiary)', marginBottom: '1.5rem' }
  }, tabs.map(t => tab(t.label, state.view === t.id, () => { state.view = t.id; render(state); })));

  const statState = { ...state, data: { ...state.data, gameLog: activeGameLog(state) } };
  let content;
  if      (state.view === 'standings')    content = viewStandings(statState);
  else if (state.view === 'schedule')     content = viewSchedule(state);
  else if (state.view === 'leaderboard')  content = viewLeaderboard(statState);
  else if (state.view === 'coach')        content = viewCoachPanel(statState);
  else if (state.view === 'mon')          content = viewMonDeepDive(statState);
  else if (state.view === 'h2h')          content = viewHeadToHead(statState);
  else if (state.view === 'query')        content = viewCustomQuery(statState);
  else if (state.view === 'turnlog')      content = viewTurnLog(statState);

  root.appendChild(header);
  root.appendChild(tabBar);
  root.appendChild(content);
}

function init() {
  applyTheme(state.darkMode);
  state.data = decodeAll(decompressData(BAKED_DATA_B64));
  render(state);
}

// Keyboard shortcut: Cmd/Ctrl+K opens search
document.addEventListener('keydown', (e) => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
    e.preventDefault();
    state.searchOpen = !state.searchOpen;
    if (!state.searchOpen) state.searchQuery = '';
    render(state);
  }
  if (e.key === 'Escape' && state.searchOpen) {
    state.searchOpen = false;
    state.searchQuery = '';
    render(state);
  }
});

init();
</script>
