<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');

:root, html, body {
  --color-background-primary: #13151c;
  --color-background-secondary: #1a1d27;
  --color-background-tertiary: #0e1016;
  --color-background-info: #1e3a5f;
  --color-background-success: #1e3a2f;
  --color-background-danger: #3e1e24;
  --color-background-warning: #3e331e;
  --color-text-primary: #e8eaed;
  --color-text-secondary: #a8b0bd;
  --color-text-tertiary: #6b7280;
  --color-text-info: #7ab8ff;
  --color-text-success: #6bd994;
  --color-text-danger: #ff7788;
  --color-text-warning: #f5c547;
  --color-border-primary: rgba(255,255,255,0.18);
  --color-border-secondary: rgba(255,255,255,0.12);
  --color-border-tertiary: rgba(255,255,255,0.08);
  --color-border-info: #7ab8ff;
  --color-border-danger: #ff7788;
  --color-border-success: #6bd994;
  --border-radius-sm: 6px;
  --border-radius-md: 10px;
  --border-radius-lg: 14px;
  --border-radius-xl: 20px;
  --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-display: 'Space Grotesk', 'Inter', sans-serif;
  --font-mono: 'JetBrains Mono', 'Courier New', monospace;
}

body {
  background: var(--color-background-tertiary) !important;
  color: var(--color-text-primary);
  font-family: var(--font-sans);
  margin: 0;
  padding: 0;
}

#gforce-root {
  max-width: 1200px;
  margin: 0 auto;
  padding: 2rem 1.5rem;
}

#gforce-app * {
  box-sizing: border-box;
}

#gforce-app h1, #gforce-app h2, #gforce-app h3 {
  font-family: var(--font-display);
  letter-spacing: -0.02em;
}

#gforce-app table {
  border-collapse: collapse;
  width: 100%;
}

#gforce-app button {
  font-family: var(--font-sans);
  background: var(--color-background-secondary);
  color: var(--color-text-primary);
  border: 0.5px solid var(--color-border-secondary);
  padding: 8px 14px;
  border-radius: var(--border-radius-md);
  cursor: pointer;
  transition: all 0.15s;
  font-size: 13px;
}
#gforce-app button:hover {
  background: var(--color-background-primary);
  border-color: var(--color-border-primary);
}

#gforce-app select, #gforce-app input {
  font-family: var(--font-sans);
  background: var(--color-background-secondary);
  color: var(--color-text-primary);
  border: 0.5px solid var(--color-border-secondary);
  padding: 7px 10px;
  border-radius: var(--border-radius-md);
  font-size: 13px;
  transition: border-color 0.15s;
}
#gforce-app select:focus, #gforce-app input:focus {
  outline: none;
  border-color: var(--color-border-info);
}

#gforce-app ::-webkit-scrollbar {
  width: 10px;
  height: 10px;
}
#gforce-app ::-webkit-scrollbar-track {
  background: var(--color-background-tertiary);
}
#gforce-app ::-webkit-scrollbar-thumb {
  background: var(--color-background-secondary);
  border-radius: 5px;
}
#gforce-app ::-webkit-scrollbar-thumb:hover {
  background: var(--color-border-secondary);
}
</style>

<div id="gforce-root">
<div id="gforce-app"></div>
</div>

function decompressData(b64) {
  const binary = atob(b64);
  const bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  const decompressed = pako.ungzip(bytes, { to: 'string' });
  return JSON.parse(decompressed);
}

function decode(rows, keys) {
  return rows.map(r => {
    const o = {};
    keys.forEach((k, i) => { o[k] = r[i]; });
    o.gid = 'W' + String(o.wk).padStart(2,'0') + '-M' + String(o.m).padStart(2,'0') + '-G' + o.g;
    return o;
  });
}

function decodeAll(raw) {
  return {
    gameLog: decode(raw.gl, GL_KEYS),
    moveLog: decode(raw.ml, ML_KEYS),
    turnLog: decode(raw.tl, TL_KEYS),
    roster: raw.rs.map(r => ({ coach: r[0], mon: r[1], status: r[2] }))
  };
}
function coachStats(gameLog) {
  const stats = {};
  COACHES.forEach(c => {
    stats[c] = {
      coach: c,
      gp: 0, gw: 0,
      brought_rows: 0,
      kills: 0, kd: 0, ki: 0, deaths: 0,
      dmg: 0, dmg_taken: 0,
      sw: 0, abil: 0, item: 0,
      cp: 0, cm: 0, teras: 0,
      gids: new Set(),
      gwGids: new Set(),
      seriesPlayed: new Set(),
      seriesWon: new Set(),
      leaguePoints: 0
    };
  });

  gameLog.forEach(r => {
    const s = stats[r.coach];
    if (!s) return;
    s.brought_rows++;
    s.kd += r.kd || 0;
    s.ki += r.ki || 0;
    s.kills += (r.kd || 0) + (r.ki || 0);
    s.deaths += r.d || 0;
    s.dmg += r.dout || 0;
    s.dmg_taken += r.din || 0;
    s.sw += r.sw || 0;
    s.abil += r.abil || 0;
    s.item += r.item || 0;
    s.cp += r.cp || 0;
    s.cm += r.cm || 0;
    s.teras += r.tera || 0;
    s.gids.add(r.gid);
    if (r.won) s.gwGids.add(r.gid);
  });

  Object.values(stats).forEach(s => {
    s.gp = s.gids.size;
    s.gw = s.gwGids.size;
    s.gl = s.gp - s.gw;
  });

  // Compute series records and league points
  const seriesMap = {};
  gameLog.forEach(r => {
    const key = 'W' + r.wk + '-M' + r.m;
    if (!seriesMap[key]) seriesMap[key] = {};
    if (!seriesMap[key][r.coach]) seriesMap[key][r.coach] = new Set();
    if (r.won) seriesMap[key][r.coach].add(r.g);
  });

  Object.keys(seriesMap).forEach(key => {
    const match = seriesMap[key];
    const coaches = Object.keys(match);
    if (coaches.length !== 2) return;
    const [a, b] = coaches;
    stats[a].seriesPlayed.add(key);
    stats[b].seriesPlayed.add(key);
    const aWins = match[a].size;
    const bWins = match[b].size;

    // League points: 3 for 2-0 win, 2 for 2-1 win, 1 for 1-2 loss, 0 for 0-2 loss
    if (aWins === 2 && bWins === 0) {
      stats[a].seriesWon.add(key);
      stats[a].leaguePoints += 3;
      stats[b].leaguePoints += 0;
    } else if (aWins === 2 && bWins === 1) {
      stats[a].seriesWon.add(key);
      stats[a].leaguePoints += 2;
      stats[b].leaguePoints += 1;
    } else if (bWins === 2 && aWins === 0) {
      stats[b].seriesWon.add(key);
      stats[b].leaguePoints += 3;
      stats[a].leaguePoints += 0;
    } else if (bWins === 2 && aWins === 1) {
      stats[b].seriesWon.add(key);
      stats[b].leaguePoints += 2;
      stats[a].leaguePoints += 1;
    }
  });

  Object.values(stats).forEach(s => {
    s.sp = s.seriesPlayed.size;
    s.sw_series = s.seriesWon.size;
    s.sl_series = s.sp - s.sw_series;
    s.seriesWinPct = s.sp > 0 ? s.sw_series / s.sp : 0;
    s.winPct = s.gp > 0 ? s.gw / s.gp : 0;
    s.kdr = s.deaths > 0 ? s.kills / s.deaths : s.kills;
    s.dmgPerGame = s.gp > 0 ? s.dmg / s.gp : 0;
    s.swPerGame = s.gp > 0 ? s.sw / s.gp : 0;
    s.plusMinus = s.gw - s.gl;
    s.gids = undefined;
    s.gwGids = undefined;
    s.seriesPlayed = undefined;
    s.seriesWon = undefined;
  });

  // New ranking: series wins → league points → +/- → total kills → coach name
  const ranked = Object.values(stats).sort((a, b) => {
    if (b.sw_series !== a.sw_series) return b.sw_series - a.sw_series;
    if (b.leaguePoints !== a.leaguePoints) return b.leaguePoints - a.leaguePoints;
    if (b.plusMinus !== a.plusMinus) return b.plusMinus - a.plusMinus;
    if (b.kills !== a.kills) return b.kills - a.kills;
    return a.coach.localeCompare(b.coach);
  });
  ranked.forEach((s, i) => { s.rank = i + 1; });

  return stats;
}

function monStats(gameLog) {
  const stats = {};
  gameLog.forEach(r => {
    const key = r.coach + '|' + r.mon;
    if (!stats[key]) {
      stats[key] = {
        coach: r.coach, mon: r.mon,
        gp: 0, gw: 0,
        kd: 0, ki: 0, tk: 0, deaths: 0,
        dout: 0, din: 0,
        sw: 0, teras: 0, leads: 0,
        cp: 0, cm: 0,
        moves: 0, abil: 0, item: 0, ta: 0,
        gids: new Set()
      };
    }
    const s = stats[key];
    s.gp++;
    if (r.won) s.gw++;
    s.kd += r.kd || 0;
    s.ki += r.ki || 0;
    s.tk += (r.kd || 0) + (r.ki || 0);
    s.deaths += r.d || 0;
    s.dout += r.dout || 0;
    s.din += r.din || 0;
    s.sw += r.sw || 0;
    s.teras += r.tera || 0;
    s.leads += r.lead || 0;
    s.cp += r.cp || 0;
    s.cm += r.cm || 0;
    s.moves += r.moves || 0;
    s.abil += r.abil || 0;
    s.item += r.item || 0;
    s.ta += r.ta || 0;
    s.gids.add(r.gid);
  });
  Object.values(stats).forEach(s => {
    s.winPct = s.gp > 0 ? s.gw / s.gp : 0;
    s.kdr = s.deaths > 0 ? s.tk / s.deaths : s.tk;
    s.dmgPerGame = s.gp > 0 ? s.dout / s.gp : 0;
    s.mvp = s.tk * 3 + s.deaths * -1 + s.gw * 2 + s.teras * 1;
    s.gids = undefined;
  });
  return stats;
}

function monMoveStats(moveLog, coach, mon) {
  const moves = {};
  moveLog.filter(r => r.coach === coach && r.mon === mon).forEach(r => {
    if (!moves[r.move]) moves[r.move] = { move: r.move, uses: 0, dmg: 0 };
    moves[r.move].uses += r.uses || 0;
    moves[r.move].dmg += r.dmg || 0;
  });
  return Object.values(moves).map(m => ({
    move: m.move,
    uses: m.uses,
    dmg: m.dmg,
    avg: m.uses > 0 ? m.dmg / m.uses : 0
  })).sort((a, b) => b.uses - a.uses);
}

function pivotGameStats(gameLog, config) {
  const { metric, groupBy, filters } = config;
  const filtered = gameLog.filter(r => {
    if (filters.coach !== 'All' && r.coach !== filters.coach) return false;
    if (filters.week !== 'All' && r.wk !== parseInt(filters.week)) return false;

    if (filters.wonOnly === 'no' && r.won) return false;

    else if (groupBy === 'coach') key = r.coach;
    else if (groupBy === 'week') key = r.wk;
    else if (groupBy === 'opponent') key = r.opp;

    if (!groups[key]) {

    g.gw = g.wins.size;
    g.kills = g.kd + g.ki;
    g.kdr = g.deaths > 0 ? g.kills / g.deaths : g.kills;
    g.winPct = g.gp > 0 ? g.gw / g.gp : 0;
    g.dmgPerGame = g.gp > 0 ? g.dout / g.gp : 0;
    g.kpg = g.gp > 0 ? g.kills / g.gp : 0;
    g.teraRate = g.gp > 0 ? g.teras / g.gp : 0;
    g.leadRate = g.gp > 0 ? g.leads / g.gp : 0;

    if (metric === 'kills') g.value = g.kills;
    else if (metric === 'kdr') g.value = g.kdr;
    else if (metric === 'kpg') g.value = g.kpg;
    else if (metric === 'winPct') g.value = g.winPct;
    else if (metric === 'dmgPerGame') g.value = g.dmgPerGame;
    else if (metric === 'teraRate') g.value = g.teraRate;
    else if (metric === 'leadRate') g.value = g.leadRate;
    else g.value = g[metric] || 0;

function pivotEventStats(turnLog, gameLog, config) {
  const { event, outcome, groupBy, filters, statusType, teraType } = config;

  let filtered = turnLog.filter(t => {
    if (event !== 'All' && t.event !== event) return false;
    if (outcome && outcome !== 'All' && t.outcome !== outcome) return false;
    if (filters.coach !== 'All' && t.coach !== filters.coach) return false;
    if (filters.week !== 'All' && t.wk !== parseInt(filters.week)) return false;

    if (event === 'STATUS' && statusType && statusType !== 'All') {
      const detail = (t.detail || '').toLowerCase();
      if (statusType === 'burn' && !detail.includes('burn')) return false;
      if (statusType === 'paralysis' && !detail.includes('paralysis')) return false;
      if (statusType === 'sleep' && !detail.includes('sleep')) return false;
      if (statusType === 'poison' && !detail.includes('poison') && !detail.includes('toxic')) return false;
      if (statusType === 'freeze' && !detail.includes('freeze')) return false;
    }
    if (event === 'TERA' && teraType && teraType !== 'All') {
      if (t.outcome !== teraType) return false;
    }
    return true;
  });

  const groups = {};
  filtered.forEach(t => {
    if (!t.coach) return;
    let key;
    if (groupBy === 'mon') key = t.coach + '|' + (t.mon || '?');
    else if (groupBy === 'coach') key = t.coach;
    else if (groupBy === 'week') key = t.wk;
    else if (groupBy === 'event') key = t.event;
    else if (groupBy === 'detail') key = t.detail || t.outcome || '?';

    if (!groups[key]) {
      groups[key] = { key, coach: t.coach, mon: t.mon, wk: t.wk, count: 0 };
    }
    groups[key].count++;
  });

  return Object.values(groups).sort((a, b) => b.count - a.count);
}

  if (children) {
    if (!Array.isArray(children)) children = [children];
    children.forEach(c => {
      if (c == null) return;
      if (typeof c === 'string' || typeof c === 'number') e.appendChild(document.createTextNode(c));

function viewLeaderboard(state) {
  const gameLog = state.data.gameLog;
  const stats = monStats(gameLog);
  let arr = Object.values(stats);
  if (state.lb.filterCoach !== 'All') arr = arr.filter(s => s.coach === state.lb.filterCoach);
  arr = arr.filter(s => s.gp >= state.lb.minGP);
  const { sortKey, sortDir } = state.lb;
  arr.sort((a, b) => {
    const av = a[sortKey] || 0, bv = b[sortKey] || 0;
    if (typeof av === 'string') return sortDir === 'desc' ? bv.localeCompare(av) : av.localeCompare(bv);
    return sortDir === 'desc' ? bv - av : av - bv;
  });
  const top = arr.slice(0, 50);

  const controls = el('div', {
    style: { display: 'flex', gap: '12px', marginBottom: '1.25rem', flexWrap: 'wrap', alignItems: 'center' }
  }, [
    el('label', { style: { fontSize: '12px', color: 'var(--color-text-secondary)', textTransform: 'uppercase', letterSpacing: '0.6px', fontWeight: '600' } }, 'Coach'),
    select(state.lb.filterCoach, ['All'].concat(COACHES), v => { state.lb.filterCoach = v; render(state); }),
    el('label', { style: { fontSize: '12px', color: 'var(--color-text-secondary)', textTransform: 'uppercase', letterSpacing: '0.6px', fontWeight: '600' } }, 'Min games'),
    (() => {
      const inp = el('input', { type: 'number', value: state.lb.minGP, min: '1', max: '20', style: { width: '70px' } });
      inp.onchange = e => { state.lb.minGP = Math.max(1, parseInt(e.target.value) || 1); render(state); };
      return inp;
    })(),
    el('span', { style: { fontSize: '12px', color: 'var(--color-text-tertiary)', marginLeft: 'auto' } }, 'Top ' + top.length + ' of ' + arr.length)
  ]);

  const headers = [
    { key: 'rank', label: '#' },
    { key: 'mvp', label: 'MVP' },
    { key: 'mon', label: 'Pokemon', align: 'left' },
    { key: 'coach', label: 'Coach', align: 'left' },
    { key: 'gp', label: 'GP' },
    { key: 'record', label: 'W-L' },
    { key: 'winPct', label: 'Win %' },
    { key: 'tk', label: 'K' },
    { key: 'kd', label: 'KD' },
    { key: 'ki', label: 'KI' },
    { key: 'deaths', label: 'D' },
    { key: 'kdr', label: 'K/D' },
    { key: 'dout', label: 'Dmg' },
    { key: 'dmgPerGame', label: 'D/G' }
  ];

  const rankColors = ['#FFD700', '#C0C0C0', '#CD7F32'];

  const rows = top.map((r, i) => {
    const rank = i + 1;
    const isSortedByMVP = sortKey === 'mvp';
    let rankCell, mvpCell;

    if (isSortedByMVP && rank <= 3) {
      rankCell = rankBadge(rank);
      mvpCell = el('span', {
        style: {
          fontFamily: 'var(--font-display)',
          fontWeight: '600',
          fontSize: '17px',
          color: rankColors[rank - 1]
        }
      }, String(r.mvp));
    } else {
      rankCell = rankBadge(rank);
      mvpCell = el('span', {
        style: {
          fontFamily: 'var(--font-display)',
          fontWeight: isSortedByMVP ? '600' : '500',
          fontSize: isSortedByMVP ? '15px' : '14px'
        }
      }, String(r.mvp));
    }

    return [
      rankCell,
      mvpCell,
      monLink(r.coach, r.mon),
      coachBadge(r.coach),
      formatInt(r.gp),
      mono(r.gw + '-' + (r.gp - r.gw)),
      formatPct(r.winPct),
      formatInt(r.tk),
      formatInt(r.kd),
      formatInt(r.ki),
      formatInt(r.deaths),
      formatKDR(r.kdr),
      formatDmg(r.dout),
      formatInt(r.dmgPerGame)
    ];
  });

  const tbl = makeTable(headers, rows, {
    sortable: true, sortKey, sortDir, stickyHeader: true,
    onSort: (key) => {
      if (key === 'rank' || key === 'mon' || key === 'coach' || key === 'record') return;
      if (state.lb.sortKey === key) state.lb.sortDir = state.lb.sortDir === 'desc' ? 'asc' : 'desc';
      else { state.lb.sortKey = key; state.lb.sortDir = 'desc'; }
      render(state);
    }
  });

  return el('div', {}, [
    controls,
    section('Pokemon leaderboard', 'Click any Pokemon to see their deep dive', el('div', { style: { overflowX: 'auto' } }, tbl))
  ]);
}
function viewHeadToHead(state) {
  const { c1, c2 } = state.h2h;
  const gameLog = state.data.gameLog;

  const controls = el('div', {
    style: { display: 'flex', gap: '12px', marginBottom: '1.25rem', flexWrap: 'wrap', alignItems: 'center' }
  }, [
    el('label', { style: { fontSize: '12px', color: 'var(--color-text-secondary)', textTransform: 'uppercase', letterSpacing: '0.6px', fontWeight: '600' } }, 'Coach A'),
    select(c1, COACHES, v => { state.h2h.c1 = v; render(state); }),
    el('label', { style: { fontSize: '12px', color: 'var(--color-text-secondary)', textTransform: 'uppercase', letterSpacing: '0.6px', fontWeight: '600' } }, 'Coach B'),
    select(c2, COACHES, v => { state.h2h.c2 = v; render(state); })
  ]);

  if (c1 === c2) {
    return el('div', {}, [controls, card(el('p', { style: { margin: '0', color: 'var(--color-text-secondary)' } }, 'Select two different coaches.'))]);
  }

  const gids = new Set();
  gameLog.forEach(r => { if (r.coach === c1 && r.opp === c2) gids.add(r.gid); });
  const games = Array.from(gids).sort();
  const c1Rows = gameLog.filter(r => r.coach === c1 && gids.has(r.gid));
  const c2Rows = gameLog.filter(r => r.coach === c2 && gids.has(r.gid));
  const c1Wins = new Set(c1Rows.filter(r => r.won).map(r => r.gid)).size;
  const c2Wins = new Set(c2Rows.filter(r => r.won).map(r => r.gid)).size;
  const c1Dmg = c1Rows.reduce((s, r) => s + (r.dout || 0), 0);
  const c2Dmg = c2Rows.reduce((s, r) => s + (r.dout || 0), 0);
  const c1Kills = c1Rows.reduce((s, r) => s + (r.kd || 0) + (r.ki || 0), 0);
  const c2Kills = c2Rows.reduce((s, r) => s + (r.kd || 0) + (r.ki || 0), 0);

  if (games.length === 0) {
    return el('div', {}, [controls, card(el('p', { style: { margin: '0', color: 'var(--color-text-secondary)' } }, 'No games between ' + c1 + ' and ' + c2 + ' found.'))]);
  }

  const c1Color = COACH_COLORS[c1] || '#888';
  const c2Color = COACH_COLORS[c2] || '#888';

  const scoreboard = el('div', {
    style: {
      background: 'linear-gradient(135deg, ' + c1Color + '15 0%, ' + c2Color + '15 100%)',
      border: '0.5px solid var(--color-border-tertiary)',
      borderRadius: 'var(--border-radius-lg)',
      padding: '2rem',
      marginBottom: '1.25rem'
    }
  }, [
    el('div', {
      style: {
        display: 'grid',
        gridTemplateColumns: '1fr auto 1fr',
        alignItems: 'center',
        gap: '24px',
        textAlign: 'center'
      }
    }, [
      el('div', {}, [
        el('div', { style: { marginBottom: '12px', display: 'flex', justifyContent: 'center' } }, coachBadge(c1, 'lg')),
        el('div', {
          style: {
            fontFamily: 'var(--font-display)',
            fontSize: '64px',
            fontWeight: '700',
            color: c1Wins > c2Wins ? c1Color : 'var(--color-text-primary)',
            lineHeight: '1',
            letterSpacing: '-0.03em'
          }
        }, String(c1Wins))
      ]),
      el('div', {
        style: {
          fontSize: '28px',
          color: 'var(--color-text-tertiary)',
          fontWeight: '300'
        }
      }, '—'),
      el('div', {}, [
        el('div', { style: { marginBottom: '12px', display: 'flex', justifyContent: 'center' } }, coachBadge(c2, 'lg')),
        el('div', {
          style: {
            fontFamily: 'var(--font-display)',
            fontSize: '64px',
            fontWeight: '700',
            color: c2Wins > c1Wins ? c2Color : 'var(--color-text-primary)',
            lineHeight: '1',
            letterSpacing: '-0.03em'
          }
        }, String(c2Wins))
      ])
    ]),
    el('div', {
      style: {
        fontSize: '11px',
        color: 'var(--color-text-tertiary)',
        textAlign: 'center',
        marginTop: '12px',
        textTransform: 'uppercase',
        letterSpacing: '0.8px',
        fontWeight: '600'
      }
    }, 'across ' + games.length + ' games')
  ]);

  const metrics = el('div', { style: { display: 'grid', gridTemplateColumns: '1fr 1fr 1fr 1fr', gap: '10px', marginBottom: '1.25rem' } }, [
    metric(c1 + ' damage', formatDmg(c1Dmg), null, { valueColor: c1Color }),
    metric(c2 + ' damage', formatDmg(c2Dmg), null, { valueColor: c2Color }),
    metric(c1 + ' kills', formatInt(c1Kills), null, { valueColor: c1Color }),
    metric(c2 + ' kills', formatInt(c2Kills), null, { valueColor: c2Color })
  ]);

  const gameRows = games.map(gid => {
    const c1G = c1Rows.filter(r => r.gid === gid);
    const c2G = c2Rows.filter(r => r.gid === gid);
    const winner = c1G[0] && c1G[0].won ? c1 : c2;
    const c1K = c1G.reduce((s, r) => s + (r.kd || 0) + (r.ki || 0), 0);
    const c2K = c2G.reduce((s, r) => s + (r.kd || 0) + (r.ki || 0), 0);
    const c1D = c1G.reduce((s, r) => s + (r.dout || 0), 0);
    const c2D = c2G.reduce((s, r) => s + (r.dout || 0), 0);
    return [
      mono(gid),
      coachBadge(winner),
      formatInt(c1K),
      formatInt(c2K),
      formatDmg(c1D),
      formatDmg(c2D)
    ];
  });

  const gamesSection = section('Game by game',
    games.length + ' games played',
    el('div', { style: { overflowX: 'auto' } },
      makeTable([
        { key: 'gid', label: 'Game', align: 'left' },
        { key: 'winner', label: 'Winner' },
        { key: 'c1k', label: c1 + ' K', align: 'right' },
        { key: 'c2k', label: c2 + ' K', align: 'right' },
        { key: 'c1d', label: c1 + ' Dmg', align: 'right' },
        { key: 'c2d', label: c2 + ' Dmg', align: 'right' }
      ], gameRows))
  );

  return el('div', {}, [controls, scoreboard, metrics, gamesSection]);
}

function buildSeriesResults(gameLog) {
  const results = {};
  gameLog.forEach(r => {
    const key = 'W' + r.wk + '-M' + r.m;
    if (!results[key]) results[key] = { wk: r.wk, m: r.m, gameWinners: {}, coaches: new Set() };
    results[key].coaches.add(r.coach);
    if (r.won && !results[key].gameWinners[r.g]) results[key].gameWinners[r.g] = r.coach;
  });
  Object.values(results).forEach(s => {
    const coaches = Array.from(s.coaches);
    if (coaches.length === 2) {
      const [c1, c2] = coaches;
      s.w1 = Object.values(s.gameWinners).filter(w => w === c1).length;
      s.w2 = Object.values(s.gameWinners).filter(w => w === c2).length;
      s.c1 = c1; s.c2 = c2;
      s.done = (s.w1 === 2 || s.w2 === 2);
      s.winner = s.w1 > s.w2 ? c1 : s.w2 > s.w1 ? c2 : null;
      s.gamesPlayed = Object.keys(s.gameWinners).length;
    }
  });
  return results;
}

function viewSchedule(state) {
  const { data } = state;
  const results = buildSeriesResults(data.gameLog);
  const weeks = Array.from(new Set(FULL_SCHEDULE.map(s => s.wk))).sort((a, b) => a - b);
  const filterCoach = state.schedule.filterCoach || 'All';

  const controls = el('div', {

    select(filterCoach, ['All'].concat(COACHES), v => { state.schedule.filterCoach = v; render(state); })
  ]);

  const weekSections = weeks.map(wk => {
    const weekMatches = FULL_SCHEDULE.filter(s => s.wk === wk &&
      (filterCoach === 'All' || s.c1 === filterCoach || s.c2 === filterCoach));
    if (weekMatches.length === 0) return null;

    const matchCards = el('div', {
      style: {
        display: 'grid',
        gridTemplateColumns: 'repeat(auto-fill, minmax(280px, 1fr))',
        gap: '10px',

      }

      const key = 'W' + match.wk + '-M' + match.m;
      const res = results[key];
      const isDone = res && res.done;
      const isPending = res && !res.done && res.gamesPlayed > 0;
      const isUpcoming = !res;

      let statusBar, score;
      if (isDone) {
        const winner = res.winner;
        const loser = winner === res.c1 ? res.c2 : res.c1;
        const wScore = winner === res.c1 ? res.w1 : res.w2;

        statusBar = el('div', {

          el('div', {
            style: {
              fontSize: '10px',
              color: 'var(--color-text-tertiary)',
              textTransform: 'uppercase',
              letterSpacing: '0.6px',

              marginBottom: '10px'

          }, 'Match ' + match.m),
          el('div', {
            style: {

              justifyContent: 'space-between',

          }, [
            el('div', { style: { flex: '1' } }, coachBadge(match.c1)),
            el('div', {
              style: {
                fontFamily: 'var(--font-display)',
                fontWeight: '700',
                fontSize: isDone ? '18px' : '13px',
                color: isDone ? 'var(--color-text-primary)' : 'var(--color-text-tertiary)',
                textAlign: 'center',
                minWidth: '40px'
              }
            }, score || 'vs'),
            el('div', { style: { flex: '1', display: 'flex', justifyContent: 'flex-end' } }, coachBadge(match.c2))
          ]),
          isDone ? el('div', {
            style: {
              marginTop: '8px',
              fontSize: '11px',
              color: 'var(--color-text-tertiary)',
              textAlign: 'center'
            }
          }, res.winner + ' wins' + (res.gamesPlayed ? ' (' + res.gamesPlayed + 'g)' : '')) : null,
          isPending ? el('div', {
            style: {
              marginTop: '8px',
              fontSize: '11px',
              color: 'var(--color-text-warning)',
              textAlign: 'center',
              fontWeight: '600'
            }
          }, 'In progress') : null
        ].filter(x => x))
      ]);

      if (isDone) {
        matchCard.onclick = () => {
          state.h2h.c1 = match.c1;
          state.h2h.c2 = match.c2;

        matchCard.onmouseout = () => matchCard.style.borderColor = 'var(--color-border-tertiary)';
      }

      return matchCard;
    }));

    const weekGames = FULL_SCHEDULE.filter(s => s.wk === wk);
    const weekDone = weekGames.filter(s => {
      const r = results['W' + s.wk + '-M' + s.m];
      return r && r.done;
    }).length;
    const subtitle = weekDone === weekGames.length
      ? 'All ' + weekGames.length + ' matches complete'
      : weekDone + ' of ' + weekGames.length + ' complete';

    return section('Week ' + wk, subtitle, matchCards, { marginBottom: '1.25rem' });
  }).filter(x => x);

  const totalMatches = FULL_SCHEDULE.length;
  const doneMatches = FULL_SCHEDULE.filter(s => {
    const r = results['W' + s.wk + '-M' + s.m];

  const summary = el('div', {

  return el('div', {}, [
    controls,
    summary,
    ...weekSections
  ]);

    return el('div', { style: { display: 'flex', gap: '8px', alignItems: 'center', fontSize: '12px' } }, [
      pwInput, btn,
      state.uploadStatus ? el('span', { style: { color: 'var(--color-text-danger)' } }, state.uploadStatus) : null
    ].filter(x => x));
  }

  const fileInput = el('input', { type: 'file', accept: '.json', style: { display: 'none' } });
  fileInput.onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    try {
      const text = await file.text();
      const parsed = JSON.parse(text);
      if (!parsed.gl || !parsed.ml || !parsed.tl || !parsed.rs) throw new Error('Missing required keys (gl, ml, tl, rs)');
      // Store with timestamp
      const ts = new Date().toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
      const payload = JSON.stringify({ data: parsed, uploadedAt: ts });
      await window.storage.set('gforceData', payload, true);
      state.data = decodeAll(parsed);
      state.dataSource = 'live';
      state.lastUpdated = ts;
      state.uploadStatus = '✓ Updated ' + ts;
      render(state);
    } catch (err) {
      state.uploadStatus = 'Error: ' + err.message;
      render(state);
    }
  };

  const label = el('label', {
    style: {
      padding: '7px 14px',
      border: '0.5px solid var(--color-border-secondary)',
      borderRadius: 'var(--border-radius-md)',
      cursor: 'pointer',
      background: 'var(--color-background-secondary)',
      fontSize: '12px',
      fontWeight: '500'
    }
  }, ['Upload data.json', fileInput]);

  return el('div', { style: { display: 'flex', gap: '10px', alignItems: 'center', fontSize: '12px' } }, [
    label,
    state.uploadStatus ? el('span', { style: { color: 'var(--color-text-secondary)' } }, state.uploadStatus) : null
  ].filter(x => x));
}

function render(state) {
  const root = document.getElementById('gforce-app');
  root.innerHTML = '';

  if (!state.data) {
    root.appendChild(el('div', { style: { padding: '2rem', textAlign: 'center', color: 'var(--color-text-secondary)' } }, 'Loading...'));
    return;
  }

  const totalGames = new Set(state.data.gameLog.map(r => r.gid)).size;

  const lastUpdatedBadge = el('div', {
    style: {
      display: 'inline-flex',
      alignItems: 'center',
      gap: '6px',
      fontSize: '11px',
      color: 'var(--color-text-tertiary)',
      background: 'var(--color-background-secondary)',
      border: '0.5px solid var(--color-border-tertiary)',
      borderRadius: 'var(--border-radius-md)',
      padding: '4px 10px',
      fontWeight: '500'
    }
  }, [
    el('span', { style: { width: '6px', height: '6px', borderRadius: '50%', background: state.dataSource === 'live' ? 'var(--color-text-success)' : 'var(--color-text-tertiary)', flexShrink: '0' } }),
    'Updated ' + state.lastUpdated
  ]);

  const header = el('div', { style: { marginBottom: '2rem' } }, [
    el('div', {
      style: {
        display: 'flex',
        justifyContent: 'space-between',
        alignItems: 'flex-start',
        gap: '16px',
        flexWrap: 'wrap',
        marginBottom: '10px'
      }
    }, [
      el('div', {}, [
        el('h1', {
          style: {
            fontFamily: 'var(--font-display)',
            fontSize: '32px',
            fontWeight: '700',
            margin: '0',
            letterSpacing: '-0.03em',
            background: 'linear-gradient(135deg, #e8eaed 0%, #a8b0bd 100%)',
            WebkitBackgroundClip: 'text',
            WebkitTextFillColor: 'transparent',
            backgroundClip: 'text'
          }
        }, 'G-Force Draft League'),
        el('div', {
          style: {
            display: 'flex',
            alignItems: 'center',
            gap: '12px',
            marginTop: '6px',
            flexWrap: 'wrap'
          }
        }, [
          el('div', {
            style: {
              fontSize: '12px',
              color: 'var(--color-text-tertiary)',
              textTransform: 'uppercase',
              letterSpacing: '0.8px',
              fontWeight: '600'
            }
          }, '2026 Season  •  ' + totalGames + ' games'),
          lastUpdatedBadge
        ])
      ]),
      dataUpload(state)
    ])
  ]);

  const tabs = [
    { id: 'standings', label: 'Standings' },
    { id: 'schedule', label: 'Schedule' },
    { id: 'leaderboard', label: 'Leaderboard' },
    { id: 'coach', label: 'Coach panels' },
    { id: 'mon', label: 'Pokemon deep dive' },
    { id: 'h2h', label: 'Head-to-head' },
    { id: 'query', label: 'Stat pivot' },
    { id: 'turnlog', label: 'Event book' }
  ];

  const tabBar = el('div', {
    style: {
      display: 'flex',
      gap: '4px',
      flexWrap: 'wrap',
      borderBottom: '0.5px solid var(--color-border-tertiary)',
      marginBottom: '1.5rem'
    }
  }, tabs.map(t => tab(t.label, state.view === t.id, () => { state.view = t.id; render(state); })));

  let content;
  if (state.view === 'standings') content = viewStandings(state);
  else if (state.view === 'schedule') content = viewSchedule(state);
  else if (state.view === 'leaderboard') content = viewLeaderboard(state);
  else if (state.view === 'coach') content = viewCoachPanel(state);
  else if (state.view === 'mon') content = viewMonDeepDive(state);
  else if (state.view === 'h2h') content = viewHeadToHead(state);
  else if (state.view === 'query') content = viewCustomQuery(state);
  else if (state.view === 'turnlog') content = viewTurnLog(state);

  root.appendChild(header);
  root.appendChild(tabBar);
  root.appendChild(content);
}

async function init() {
  render(state);
  try {
    if (window.storage) {
      const stored = await window.storage.get('gforceData', true);
      if (stored && stored.value) {
        let parsed;
        try {
          // New format: { data, uploadedAt }
          const envelope = JSON.parse(stored.value);
          if (envelope.data && envelope.uploadedAt) {
            parsed = envelope.data;
            state.lastUpdated = envelope.uploadedAt;
          } else {
            // Old format: raw data
            parsed = envelope;
          }
        } catch (e) {
          parsed = JSON.parse(stored.value);
        }
        if (parsed && parsed.gl && parsed.ml && parsed.tl && parsed.rs) {
          state.data = decodeAll(parsed);
          state.dataSource = 'live';
          render(state);
          return;
        }
      }
    }
  } catch (e) { }
  state.data = decodeAll(decompressData(BAKED_DATA_B64));
  state.dataSource = 'baked';
  render(state);
}

init();
</script>
